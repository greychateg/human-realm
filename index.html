。他们都能射到一定的距离就是力，而射得中就都是巧。然而能步行射箭的不能骑马射箭，能骑马射箭的不能远处射箭，各有所长，这便是才力的局限有所不同。孔子则兼有三者的长处。然而孔子的‘和’只能到柳下惠的限度，‘清’只能到伯夷的限度，‘任’只能到伊尹的限度，何尝在三人的限度上多加了一些吗？如果说这三人力有余而巧不足，那就是说他们的力反而超过孔子了。巧和力的比喻只是用来说明圣和知的含义，如果能够知道圣和知的本意是什么，便自然了然于心了。”"],["下","二六九","致良知","问：“知譬日，欲譬云。云虽能蔽日，亦是天之一气合有的，欲亦莫非人心合有否？”\n\n先生曰：“喜、怒、哀、惧、爱、恶、欲，谓之七情，七者俱是人心合有的，但要认得良知明白。比如日光，亦不可指着方所，一隙通明，皆是日光所在。虽云雾四塞，太虚中色象可辨，亦是日光不灭处。不可以云能蔽日，教天不要生云。七情顺其自然之流行，皆是良知之用，不可分别善恶，但不可有所着。七情有着，俱谓之欲，俱为良知之蔽。然才有着时，良知亦自会觉；觉即蔽去，复其体矣。此处能勘得破，方是简易透彻功夫。”","有人问：“先生以太阳比喻良知，以乌云比喻私欲。乌云虽然能遮蔽太阳，那也是天地之间的气所本该有的，私欲难道也是人心中本该有的吗？”\n\n先生说：“喜、怒、哀、惧、爱、恶、欲，是人的七情，这都是人心本该有的，只是必须把良知体认明白。比如阳光，也不能局限在一个固定的地方，只要有一丝的光亮，都是阳光的所在之处。虽然云雾蔽日，在空虚之中依然能辨别颜色外貌，这也是因为日光尚存的缘故。不能因为乌云会遮蔽太阳，就让天不产生乌云。七情顺其自然地流露，都是良知的作用，不能认为七情有善有恶，但也不能有所执着。执着于七情，就称之为欲，就是良知的遮蔽。不过七情稍有执着，良知也自然会觉察；觉察后便要去掉蒙蔽，恢复本体。对这个问题能够看得明白，才是简易透彻的功夫。”"],["下","二七〇","致良知","问：“圣人‘生知安行’是自然的，如何？有甚功夫？”\n\n先生曰：“‘知行’二字即是功夫，但有浅深难易之殊耳。良知原是精精明明的，如欲孝亲。‘生知安行’的只是依此良知实落尽孝而已；‘学知利行’者只是时时省觉，务要依此良知尽孝已；至于‘困知勉行’者，蔽锢已深，虽要依此良知去孝，又为私欲所阻，是以不能，必须加人一己百、人十己千之功，方能依此良知以尽其孝。圣人虽是‘生知安行’，然其心不敢自是，肯做‘困知勉行’的功夫。‘困知勉行’的却要思量做‘生知安行’的事，怎生成得？”","有人问：“圣人‘生知安行’是自然而然的，这话对吗？有什么功夫吗？”\n\n先生说：“‘知行’二字就是功夫，但是有深浅难易的区别。良知原本是精察明白的，比如想要孝顺双亲。‘生知安行’的人只要依此良知切实去孝亲即可；‘学知利行’的人只要时时反省觉察，努力按照良知去尽孝而已；至于‘困知勉行’的人，因为良知受到蒙蔽禁锢十分深重，虽然要按照良知去行孝，但又被私欲阻隔，所以才做不到，必须付出比别人多千百倍的功夫，才能按照良知去尽孝。圣人虽然是‘生知安行’的，然而圣人的心却不敢自以为是，愿意做‘困知勉行’的功夫。那些‘困知勉行’的人却想着去做‘生知安行’的事，这怎么做得到呢？”"],["下","二七二","致良知","问：“良知一而已，文王作《彖》，周公系《爻》，孔子赞《易》，何以各自看理不同？”\n\n先生曰：“圣人何能拘得死格？大要出于良知同，便各为说何害？且如一园竹，只要同此枝节，便是大同。若拘定枝枝节节，都要高下大小一样，便非造化妙手矣。汝辈只要去培养良知，良知同更不妨有异处。汝辈若不肯用功，连笋也不曾抽得，何处去论枝节？”","有人问：“良知只是一个，然而文王作《卦辞》，周公作《爻辞》，孔子写《十翼》，为何他们对于《易》理的看法不同呢？”\n\n先生说：“圣人怎会拘泥于教条呢？只要大体上是出于相同的良知，即便各为其说又有什么害处呢？好比一个竹园里的竹子，只要长着竹子的枝节，就是本体上的相同。如果拘泥于具体的枝节，非要竹子每一节的高下大小都一样，就不是天地造化的妙用了。你们只要用心去培养良知，只要良知相同，其他方面有差异也无妨。你们如果不肯用功，就好比种竹子连笋都发不出，还谈什么具体的枝节？”"],["下","二七三","改过","乡人有父子讼狱，请诉于先生。侍者欲阻之，先生听之。言不终辞，其父子相抱恸哭而去。\n\n柴鸣治\n入，问曰：“先生何言，致伊感悔之速？”\n\n先生曰：“我言舜是世间大不孝的子，瞽是世间大慈的父。”\n\n鸣治愕然，请问。\n\n先生曰：“舜常自以为大不孝，所以能孝；瞽叟常自以为大慈，所以不能慈。瞽叟只记得舜是我提孩长的，今何不曾豫悦我？不知自心已为后妻所移了，尚谓自家能慈，所以愈不能慈。舜只思父提孩我时如何爱我，今日不爱，只是我不能尽孝，日思所以不能尽孝处，所以愈能孝。及至瞽瞍底豫时，又不过复得此心原慈的本体。所以后世称舜是个古今大孝的子，瞽叟亦做成个慈父。”","乡里有父子俩打官司，请先生裁断。先生的侍从意欲阻止，先生却听着他们说。话还没说完，父子俩就抱头痛哭离去了。\n\n柴鸣治进来，问道：“先生说了什么，使他们那么快就悔悟了？”\n\n先生说：“我说舜是世间最不孝的儿子，瞽叟是世间最慈爱的父亲。”\n\n柴鸣治很惊讶，请教先生为何这么说。\n\n先生说：“舜时常认为自己最不孝，所以才能孝顺；瞽叟时常认为自己很慈爱，所以做不到慈爱。瞽叟只记得舜是自己从小养大的，现在为何不能让自己高兴？却不知道自己的心思已经被后妻改变了，还以为自己能够慈爱，所以愈发不能慈爱。舜则一直想到父亲在自己小时候如何爱自己，如今不爱自己只是因为自己不能尽孝，所以每天考虑自己为何不能尽孝，所以愈发孝顺。等到瞽叟高兴的时候，只不过恢复了心中原本慈爱的状态。所以后世称赞舜是古往今来最孝的儿子，瞽叟也就成了慈爱的父亲。”"],["下","二七四","致良知","先生曰：“孔子有鄙夫来问，未尝先有知识以应之，其心只空空而已，但叩他自知的是非两端\n，与之一剖决，鄙夫之心便已了然。鄙夫自知的是非，便是他本来天则，虽圣人聪明，如何可与增减得一毫？他只不能自信，夫子与之一剖决，便已竭尽无余了。若夫子与鄙夫言时，留得些子知识在，便是不能竭他的良知，道体即有二了。”","先生说：“有农夫来向孔子请教时，孔子并非预先有知识来应对他，心中只是空空如也，只是孔子根据农夫所问来判断是非，帮他分析，农夫便能够明白。农夫自己知道的是非，是他内心本就有的天赋准则，即便如圣人那般聪明，又怎能增减得一丝一毫？农夫只是不自信，孔子帮他一分析，是非曲直就一览无余了。如果孔子跟农夫讲的时候，想要告诉他一些知识，就不能使他悟到自己的良知，反而将良知与道一分为二了。”"],["下","二七五","修行语录","先生曰：“‘烝烝乂，不格奸\n’\n，本注说象已进进于义，不至大为奸恶。舜征庸后，象犹日以杀舜为事\n，何大奸恶如之！舜只是自进于乂，以乂熏烝，不去正他奸恶。凡文过掩慝，此是恶人常态，若要指摘他是非，反去激他恶性。舜初时致得象要杀己，亦是要象好的心太急，此就是舜之过处。经过来，乃知功夫只在自己，不去责人，所以致得‘克谐’。此是舜‘动心忍性，增益不\n能’\n处。古人言语，俱是自家经历过来，所以说得亲切，遗之后世，曲当人情。若非自家经过，如何得他许多苦心处？”","先生说：“《尚书》有言‘烝烝乂，不格奸’，旧注认为象已接近于义，不至于去做大奸大恶的事。但舜被尧征召为官后，象还是每天想着要杀舜，还有什么大奸大恶可以与此相比！舜只是自己发扬义，用义来感化他，而不是去纠正他的奸恶。文过饰非，掩盖罪恶，这是恶人的常态，如果要去批评他的错误，反而会激化他的恶性。舜当时就知道象要杀他，但那时想要象变好的心太急切，这是舜的过失。有了这次的教训，舜才知道功夫只在自己，不要去苛责他人，所以才能与象和平相处。这是舜‘动心忍性，增益不能’的地方。古人的话，都是从自身经历过的事情上感悟得来，所以说得亲切，流传到后世，经过变通仍能适用于人情事变。如果不是自己经历过，怎能体会得了圣人的苦心呢？”"],["下","二七六","致良知","先生曰：“古乐不作久矣。今之戏子，尚与古乐意思相近。”\n\n未达，请问。\n\n先生曰：“《韶》之九成\n，便是舜的一本戏子；《武》之九变\n，便是武王的一本戏子。圣人一生实事，俱播在乐中。所以有德者闻之，便知他尽善尽美与尽美未尽善处\n。若后世作乐，只是做些词调，于民俗风化绝无关涉，何以化民善俗！今要民俗反朴还淳，取今之戏子，将妖淫词调俱去了，只取忠臣孝子故事，使愚俗百姓人人易晓，无意中感激他良知起来，却于风化有益，然后古乐渐次可复矣。”\n\n曰：“洪要求元声\n不可得，恐于古乐亦难复。”\n\n先生曰：“你说元声在何处求？”\n\n对曰：“古人制管候气，恐是求元声之法。”\n\n先生曰：“若要去葭灰黍粒中求元声，却如水底捞月，如何可得？元声只在你心上求。”\n\n曰：“心如何求？”\n\n先生曰：“古人为治，先养得人心和平，然后作乐。比如在此歌诗，你的心气和平，听者自然悦怿兴起，只此便是元声之始。《书》云‘诗言志’，志便是乐的本；‘歌永言’，歌便是作乐的本；‘声依永，律和声’，律只要和声，和声便是制律的本\n。何尝求之于外？”\n\n曰：“古人制候气法，是意何取？”\n\n先生曰：“古人具中和之体以作乐。我的中和原与天地之气相应，候天地之气，协凤凰之音，不过去验我的气果和否。此是成律已后事，非必待此以成律也。今要候灰管先须定至日\n，然至日子时恐又不准，又何处取得准来？”","先生说：“古代的乐曲不流行已经很久了。如今的戏曲与古代的乐曲还有些相近。”\n\n钱德洪不明白，向先生请教。\n\n先生说：“《韶》有九章，就是舜的戏曲；《武》有九变，就是武王的戏曲。圣人一生的事迹，都记录在乐曲之中。所以品德高尚的人听了乐曲，就能知道其中尽善尽美以及尽美而不尽善的地方。后世作曲，只是作一些词调，与民俗风化没有任何关系，这怎么可以用来教化风俗呢！现在要想使民风返朴还淳，就要将当今戏曲中的淫词滥调都删去，只保留忠臣孝子的故事，使得愚笨庸俗的百姓都能人人明白，在潜移默化之中激发他们的良知，这对于风俗教化大有益处，然后古代的乐曲便能渐渐恢复了。”\n\n钱德洪说：“我要寻找元声却找不到，恐怕古代的乐曲也难以恢复吧。”\n\n先生说：“你说元声去哪里找呢？”\n\n钱德洪回答：“古人制造律管来确定节气，这大概就是寻找元声的方法吧。”\n\n先生说：“如果你要在草灰稻谷里寻找元声，就好像在水里捞月，怎么可能找得到呢？元声只在你心中寻找。”\n\n钱德洪说：“如何在心中寻找？”\n\n先生说：“古人治理天下，先将人心存养得中正平和，然后制作音乐。比如在此吟咏诗歌，你的心气平和，听的人自然能感到愉悦兴奋，这就是元声的发端。《尚书》说：‘诗言志’，志便是乐的根本；‘歌永言’，歌便是作乐的根本；‘声依永，律和声’，音律只要声音和谐，和谐的声音就是制律的根本。何曾向外求过？”\n\n钱德洪说：“那么古人制作律管来确定节气的方法，是根据什么呢？”\n\n先生说：“古人具备中正平和的心体才制作乐曲。我中正平和的心体原本与天地之气相对应，测定天地之气、协调凤凰的声音，不过是为了验证自己的气是否中正平和。这些都是制成音律之后的事了，并非根据这些来制作音律。如今要用律管来确定节气，必须先确定冬至的日子，但是到了冬至的子时，又怕时间不准确，这又要去何处寻找标准呢？”"],["下","二八六","修行语录","或问“未发”“已发”。\n\n先生曰：“只缘后儒将‘未发’‘已发’分说了，只得劈头说个无‘未发’‘已发’，使人自思得之。若说有个‘已发’‘未发’，听者依旧落在后儒见解。若真见得无‘未发’‘已发’，说个有‘未发’‘已发’，原不妨，原有个‘未发’‘已发’在。”\n\n问曰：“‘未发’未尝不和，‘已发’未尝不中。譬如钟声，未扣不可谓无，既扣不可谓有。毕竟有个扣与不扣，何如？”\n\n先生曰：“未扣时原是惊天动地，既扣时也只是寂天寞地。”","有人向先生请教“未发”与“已发”。\n\n先生说：“只是因为后世儒者将‘未发’和‘已发’分开来说，我只能劈头盖脸先说没有‘未发’和‘已发’，让学者自己思考。如果说有‘未发’和‘已发’，听的人仍然摆脱不了后世儒者的见解。如果真的能懂得没有‘未发’和‘已发’之分，即便说个‘未发’和‘已发’也无妨，因为原本就有‘未发’和‘已发’存在。”\n\n有人问：“‘未发’未尝不平和，‘已发’未尝不中正。好比钟声，没有敲时不能说没有声音，敲了也不能说就有声音。但毕竟有敲和不敲的区别，是这样吗？”\n\n先生说：“不敲时的钟声原本是惊天动地的，敲了后的钟声原本是寂寞无声的。”"],["下","二八七","四句教","问：“古人论性各有异同，何者乃为定论？”\n\n先生曰：“性无定体，论亦无定体。有自本体上说者，有自发用上说者，有自源头上说者，有自流弊处说者。总而言之，只是一个性，但所见有浅深尔。若执定一边，便不是了。性之本体，原是无善无恶的，发用上也原是可以为善、可以为不善的，其流弊也原是一定善、一定恶的。譬如眼，有喜时的眼，有怒时的眼，直视就是看的眼，微视就是觑的眼。总而言之，只是这个眼。若见得怒时眼就说未尝有喜的眼，见得看时眼就说未尝有觑的眼，皆是执定，就知是错。孟子说性，直从源头上说来，亦是说个大概如此；荀子性恶之说，是从流弊上来，也未可尽说他不是，只是见得未精耳。众人则失了心之本体。”\n\n问：“孟子从源头上说性，要人用功在源头上明彻；荀子从流弊说性，功夫只在末流上救正，便费力了。”\n\n先生曰：“然。”","有人问：“古人论性的说法各有异同，谁的说法可以作为定论呢？”\n\n先生说：“性没有定体，关于性的说法也不存在定论。有的人从本体上说，有的人从发用上说，有的人从源头上说，有的人从流弊上说。总而言之，只是一个性，只是见解有深有浅罢了。如果执着于一家之言，便流于偏颇了。性的本体原本无分善恶，在作用上也只是可以为善、可以为不善的，性的流弊也是有一定的善、一定的恶的。好比眼睛，有高兴时的眼睛，有愤怒时的眼睛，直视时就是正面看的眼睛，偷看时就是窥视的眼睛。总而言之，只是同一个眼睛。如果看到愤怒时的眼睛就说没有高兴时的眼睛，看到直视时的眼睛就说没有窥视时的眼睛，这就都是执着，显然是错误的。孟子说性，都是从源头上说的，也只说了个大概；荀子说性恶，是从流弊上说，也不能认为他说的就一定不对，只是认识得不精到而已。但一般人却失去了心的本体。”\n\n那人问：“孟子从源头上说性，要人用功，从源头上开始就明白透彻；荀子从流弊上说性，所以在功夫上就舍本逐末，白费了许多力气。”\n\n先生说：“是的。”"],["下","二九〇","致良知","“人一日间，古今世界都经过一番，只是人不见耳。夜气清明时，无视无听，无思无作，淡然平怀，就是羲皇世界；平旦时，神清气朗，雍雍穆穆，就是尧舜世界；日中以前，礼仪交会，气象秩然，就是三代世界；日中以后，神气渐昏，往来杂扰，就是春秋战国世界；渐渐昏夜，万物寝息，景象寂寥，就是人消物尽世界。学者信得良知过，不为气所乱，便常做个羲皇以上人。”","“人在一日之间，从古至今的世界都能游历一番，只是人自己没有意识到罢了。夜晚清爽明白之时，没有视觉和听觉，没有思想和作为，心中淡然平静，就是伏羲的时代；清晨时，人神清气爽，安定庄严，便是尧舜的时代；中午以前，人们礼貌交往，秩序井然，就是夏商周的时代；中午以后，人的精神昏蔽，往来杂扰，就是春秋战国的时代；等到夜晚渐渐昏黑，万物休息，景象寂然，便是人与物都消失殆尽的时代。学者如果能坚信良知，不为气的变化所扰乱，就能一直做伏羲时代的人。”"],["下","二九一","致良知","薛尚谦、邹谦之、马子萃、王汝止\n待坐，因叹先生自征宁藩\n以来，天下谤议益众。请各言其故。有言先生功业势位日隆，天下忌之者日众；有言先生之学日明，故为宋儒争是非者亦日博；有言先生自南都以后，同志信从者日众，而四方排阻者日益力。\n\n先生曰：“诸君之言，信皆有之。但吾一段自知处，诸君俱未道及耳。”\n\n诸友请问。\n\n先生曰：“我在南都以前，尚有些子乡愿\n的意思在。我今信得这良知真是真非，信手行去，更不着些覆藏。我今才做得个狂者\n的胸次，使天下之人都说我行不掩言也罢。”\n\n尚谦出曰：“信得此过，方是圣人的真血脉。”","薛尚谦、邹谦之、马子萃、王艮坐在先生旁，感叹先生从平定宁王之乱以来，天下诽谤议论的人越来越多。先生就让大家谈谈是何原因。有人说是因为先生的功业权势日盛，天下嫉妒的人越来越多；有人说是因为先生的学说日益昌明，所以替宋儒争辩是非的人越来越多；有人说是先生从南京讲学以后，同道和信众越来越多，所以四面八方的排挤阻挠也越来越多。\n\n先生说：“你们说的这些原因，想来也都存在。只是我有一些自己的感受，你们都没有说到。”\n\n大家向先生请教。\n\n先生说：“我到南京以前，还有一些乡愿的想法。如今我确信良知能够知道真是真非，便放手去做，不去遮掩。我如今才有狂放的心胸，即便天下人都说我做得不如说得好也没有关系。”\n\n薛尚谦起来说：“相信这个道理，才是圣人真正的血脉。”"],["下","二九二","谦卑","先生锻炼人处，一言之下，感人最深。\n\n一日，王汝止出游归，先生问曰：“游何见？”\n\n对曰：“见满街人都是圣人。”\n\n先生曰：“你看满街人是圣人，满街人倒看你是圣人在。”\n\n又一日，董萝石\n出游而归，见先生曰：“今日见一异事。”\n\n先生曰：“何异？”\n\n对曰：“见满街人都是圣人。”\n\n先生曰：“此亦常事耳，何足为异？”\n\n盖汝止圭角\n未融，萝石恍见有悟，故问同答异，皆反其言而进之。\n\n洪与黄正之、张叔谦\n、汝中丙戌会试归，为先生道涂中讲学，有信、有不信。\n\n先生曰：“你们拿一个圣人去与人讲学，人见圣人来，都怕走了，如何讲得行？须做得个愚夫愚妇，方可与人讲学。”\n\n洪又言：“今日要见人品高下最易。”\n\n先生曰：“何以见之？”\n\n对曰：“先生譬如泰山在前，有不知仰者，须是无目人。”\n\n先生曰：“泰山不如平地大，平地有何可见？”\n\n先生一言翦裁，剖破终年为外好高之病，在座者莫不悚惧。","先生点化人，一句话就能使人有很深切的感受。\n\n一天，王艮出门归来，先生问他：“出门看到了什么？”\n\n王艮回答：“我看到满街都是圣人。”\n\n先生说：“你看满街都是圣人，满街的人倒看你是个圣人了。”\n\n有一天，董云外出归来，见到先生，说：“今天看到一件怪事。”\n\n先生问：“什么怪事？”\n\n董云说：“我看到满街都是圣人。”\n\n先生说：“这不过是平常事，有什么好奇怪的？”\n\n大概是因为王艮的锋芒与棱角不能收敛，董云则是恍然有所领悟，所以对同一个问题，先生的回答不同，这大概是针对他们的话来开导他们。\n\n钱德洪、黄正之、张叔谦、王畿丙戌年参加会试回来，途中讲授先生的学说，有人信、有人不信。\n\n先生说：“你们一个个都扮作圣人去跟人讲学，别人看到圣人来了，都害怕逃走了，怎么能讲得通呢？必须扮作愚夫愚妇的模样，才能与人讲学。”\n\n钱德洪又说：“如今要分辨人品的高下最为容易。”\n\n先生说：“何以见得？”\n\n钱德洪回答：“先生好比眼前的泰山，如果有人不知道仰望先生，大概就是不长眼的人吧。”\n\n先生说：“泰山不如平地广大，平地有什么值得仰望的？”\n\n经过先生的一言点化，便破除我们多年来好高骛远的毛病，在座之人没有不感到心惊的。"],["下","二九三","谦卑","癸未春，邹谦之来越问学，居数日，先生送别于浮峰。是夕与希渊诸友移舟宿延寿寺，秉烛夜坐。先生慨怅不已，曰：“江涛烟柳，故人倏在百里外矣！”\n\n一友问曰：“先生何念谦之之深也？”\n\n先生曰：“曾子所谓‘以能问于不能，以多问于寡；有若无，实若虚；犯而不校’\n，若谦之者，良近之矣。”","嘉靖二年（1523年）春天，邹谦之来绍兴问学，住了几天，走的时候先生送他到浮峰。当天晚上，先生与希渊等人乘船到延寿寺过夜，大家秉烛夜谈。先生感慨不已，说道：“江水滔滔，烟柳朦胧，一瞬之间故人都已在百里之外了！”\n\n一位学友问：“先生为何如此挂念谦之？”\n\n先生说：“曾子说过‘明明有才能却向无才的人请教，明明有学识却向无学识的人请教；有才却如同没有才能一样，有实学却又虚怀若谷；受到冒犯也能够不计较’，像谦之这样的人，就非常接近了。”"],["下","二九四","致良知","丁亥年九月，先生起复\n征思田\n。将命行时，德洪与汝中论学。汝中举先生教言曰：“无善无恶是心之体，有善有恶是意之动。知善知恶是良知，为善去恶是格物。”\n\n德洪曰：“此意如何？”\n\n汝中曰：“此恐未是究竟话头。若说心体是无善无恶，意亦是无善无恶的意，知亦是无善无恶的知，物亦是无善无恶的物矣。若说意有善恶，毕竟心体还有善恶在。”\n\n德洪曰：“心体是天命之性，原是无善无恶的。但人有习心，意念上见有善恶在。格、致、诚、正、修，此正是复那性体功夫。若原无善恶，功夫亦不消说矣。”\n\n是夕侍坐天泉桥\n，各举请正。\n\n先生曰：“我今将行，正要你们来讲破此意。二君之见，正好相资为用，不可各执一边。我这里接人，原有此二种：利根之人，直从本原上悟入，人心本体原是明莹无滞的，原是个‘未发之中’，利根之人一悟本体，即是功夫，人己内外一齐俱透了；其次不免有习心在，本体受蔽，故且教在意念上实落为善去恶，功夫熟后，渣滓去得尽时，本体亦明尽了。汝中之见，是我这里接利根人的；德洪之见，是我这里为其次立法的。二君相取为用，则中人上下皆可引入于道。若各执一边，跟前便有失人，便于道体各有未尽。”\n\n既而曰：“以后与朋友讲学，切不可失了我的宗旨：‘无善无恶是心之体，有善有恶是意之动。知善知恶是良知，为善去恶是格物。’\n只依我这话头，随人指点，自没病痛，此原是彻上彻下功夫。利根之人，世亦难遇。本体功夫一悟尽透，此颜子、明道所不敢承当，岂可轻易望人？人有习心，不教他在良知上实用为善去恶功夫，只去悬空想个本体，一切事为俱不着实，不过养成一个虚寂。此个病痛不是小小，不可不早说破。”\n\n是日德洪、汝中俱有省。","嘉靖六年（1527年）九月，先生守孝期满复职，奉命讨伐思恩、田州的叛乱。出征前，钱德洪与王汝中讨论学问。王汝中举出先生的教诲说：“无善无恶是心的本体，有善有恶是意念发动。知善知恶是良知呈现，为善去恶是格物功夫。”\n\n钱德洪说：“这句话的意思怎么理解？”\n\n王汝中说：“这恐怕还没有说尽。如果说心的本体是无善无恶的，意念也应当是无善无恶的意念，良知也应当是无善无恶的良知，物也应当是无善无恶的物。如果说意念有善有恶，那么心的本体便还有善恶之分存在。”\n\n钱德洪说：“心的本体是天所赋予的本性，原本就是无善无恶的。然而人有沾染习气之心，意念上便看得到善恶。格物、致知、诚意、正心、修身，正是要恢复天性本体的功夫。如果原本就无善无恶，那便不需要说功夫了。”\n\n当天夜晚，两人陪同先生一起坐在天泉桥上，各自说了自己的观点，请先生指正。\n\n先生说：“我马上要出征了，正要给你们阐明这个意思。你们两人的见解，正好可以相互补充，切不可各执一边。我开导人的方法一直有两种：天资聪颖的人，直接从本原上体悟，人心的本体原本就明白透彻，原本就是个‘未发之中’，聪明的人只要领悟了本体，便有了功夫，人与己、内与外就都贯通透彻了；资质较差的人，心中难免会受到习气的干扰，心的本体受到蒙蔽，所以就教他们在意念上切实去下为善去恶的功夫，功夫纯熟之后，心中的杂念都去干净了，心的本体也就明白了。汝中的见解，是我这里开导天资聪颖之人的；德洪的见解，是我这里开导天资较差之人的。你们两人的观点相互补充运用，无论天资高下，都可以引导入道；如果各执一边，当下就会有许多人不得入道，对于道也不能穷尽。”\n\n先生接着说：“以后与朋友们讲学，你们千万不能丢掉我的宗旨：‘无善无恶是心的本体，有善有恶是意念发动。知善知恶是良知呈现，为善去恶是格物功夫。’只要照着我这话，随人所需进行指点，便不会有什么差错，这本来就是一以贯之的功夫。天资聪颖的人，世间难遇。本体和功夫一领悟就能全然明白，即便是颜回、程颢先生都不敢当，怎能轻易期望别人呢？人有习气沾染，不教人在良知上切实地下为善去恶的功夫，只凭空去思考心体，一切事情都不切实应对，只会养成好虚喜静的毛病。这不是小病小痛，不能不早向你们说清楚。”\n\n这一天，钱德洪与王汝中都有所省悟。"],["下","二九五","朋友之道","先生初归越时，朋友踪迹尚寥落，既后四方来游者日进。癸未年以后，环先生而居者比屋，如天妃、光相诸刹，每当一室，常合食者数十人，夜无卧处，更相就席，歌声彻昏旦。南镇、禹穴、阳明洞诸山远近寺刹，徙足所到，无非同志游寓所在。先生每临讲座，前后左右环坐而听者，常不下数百人。送往迎来，月无虚日。至有在侍更岁，不能遍记其姓名者。每临别，先生常叹曰：“君等虽别，不出天地间，苟同此志，吾亦可以忘形似矣。”诸生每听讲出门，未尝不跳跃称快。尝闻之同门先辈曰：“南都以前，朋友从游者虽众，未有如在越之盛者。”此虽讲学日久，孚信渐博，要亦先生之学日进，感召之机申变无方，亦自有不同也。","先生刚回绍兴时，前来拜访的朋友还寥寥无几，后来四面八方前来拜访的人越来越多。嘉靖二年（1523年）以后，围绕先生居住的人也越来越多，天妃、光相两寺，每间屋里时常有几十人一起吃饭，晚上没有躺卧的地方，就轮流睡觉，歌声通宵达旦。南镇、禹穴、阳明洞等山中远近的寺庙，凡是移步便能到的，都有同道们居住的地方。先生每次讲学，前后左右四周围着听的人，常常不下数百人。迎来送往，一个月当中没有间断的时日。甚至有人听讲了一年多，先生还不能完全记住他们的名字。每次分别时，先生常感慨说：“你们虽然离开了，但还在天地之间，只要我们志向相同，我不记得你们的形貌又有什么关系。”学生们每次听完先生讲学，出门时无不欢呼雀跃。我曾听同门师兄说：“以前在南京讲学，向先生求教的朋友虽然多，但远不如在绍兴那么隆盛。”这固然是先生讲学时日久了，获得的信任越来越多，但关键还是先生的学说日益精进，感召学生的时机和方法巧妙无比，效果自然也会不同。"],["下","二九六","心体","以后黄以方录\n。\n\n黄以方问：“‘博学于文’为随事学存此天理，然则谓‘行有余力，则以学文’，其说似不相合。”\n\n先生曰：“《诗》《书》六艺皆是天理之发见，文字都包在其中。考之《诗》《书》六艺，皆所以学存此天理也，不特发见于事为者方为文耳。‘余力学文’亦只‘博学于文’中事。”\n\n或问“学而不思”二句\n。\n\n曰：“此亦有为而言，其实思即学也，学有所疑，便须思之。‘思而不学’者，盖有此等人，只悬空去思，要想出一个道理，却不在身心上实用其力，以学存此天理。思与学作两事做，故有‘罔’与‘殆’之病。其实思只是思其所学，原非两事也。”","此后内容是黄以方所录。\n\n黄以方问：“孔子说‘博学于文’，是要人在遇到的事情上学习存养天理，然而孔子又说‘行有余力，则以学文’，两个说法似乎并不一致。”\n\n先生说：“《诗》《书》等《六经》都是天理的显现，文字都包含在其中。考察《诗》《书》等《六经》，都是用来学习存养天理的，并不是说显现在事情的上才叫文。‘余力学文’也只是‘博学于文’之中的事。”\n\n有人向先生请教“学而不思则罔，思而不学则殆”两句。\n\n先生说：“孔子说这两句话也是有特定的目的，实际上思考就是学习，学习有疑问便需要思考。‘思而不学’的人也有，这类人只凭空思考，想要思考出个道理来，却全然不在自己的身体与心体上切实用功，学习存养天理。将思考与学习分作两件事，所以才会有‘罔’和‘殆’的毛病。其实思就是思其所学，原本并不存在两件事。”"],["下","二九七","致良知","先生曰：“先儒解‘格物’为格天下之物，天下之物如何格得？且谓‘一草一木亦皆有理’，今如何去格？纵格得草木来，如何反来诚得自家意？我解‘格’作‘正’字义，‘物’作‘事’字义。《大学》之所谓‘身’，即耳、目、口、鼻、四肢是也。欲修身，便是要目非礼勿视，耳非礼勿听，口非礼勿言，四肢非礼勿动。要修这个身，身上如何用得功夫？心者身之主宰，目虽视，而所以视者心也；耳虽听，而所以听者心也；口与四肢虽言、动，而所以言、动者心也。故欲修身，在于体当自家心体，常令廓然大公，无有些子不正处。主宰一正，则发窍于目自无非礼之视，发窍于耳自无非礼之听，发窍于口与四肢自无非礼之言、动，此便是修身在正其心。\n\n“然至善者，心之本体也，心之本体那有不善？如今要正心，本体上何处用得工？必就心之发动处才可着力也。心之发动不能无不善，故须就此处着力，便是在诚意。如一念发在好善上，便实实落落去好善；一念发在恶恶上，便实实落落去恶恶。意之所发既无不诚，则其本体如何有不正的？故欲正其心在诚意。工夫到诚意始有着落处。\n\n“然诚意之本，又在于致知也。所谓‘人虽不知而己所独知’者，此正是吾心良知处。然知得善，却不依这个良知便做去，知得不善，却不依这个良知便不去做，则这个良知便遮蔽了，是不能致知也。吾心良知既不得扩充到底，则善虽知好，不能着实好了；恶虽知恶，不能着实恶了，如何得意诚？故致知者，意诚之本也。\n\n“然亦不是悬空的致知，致知在实事上格。如意在于为善，便就这件事上去为；意在于去恶，便就这件事上去不为。去恶固是格不正以归于正；为善则不善正了，亦是格不正以归于正也。如此，则吾心良知无私欲蔽了，得以致其极，而意之所发，好善去恶，无有不诚矣。诚意工夫实下手处在格物也，若如此格物，人人便做得。‘人皆可以为尧舜’，正在此也。”","先生说：“程颐先生解释‘格物’为格天下之物，天底下那么多物要怎么去格呢？还说‘一草一木都有理’，如今要怎么去格呢？纵然能够格草木的道理，又如何用来作用于自己，来诚自己的意念呢？我把‘格’字解作‘正’字，‘物’字解作‘事’字。《大学》所谓‘身，即是耳、目、口、鼻、四肢。想要修身，就是要眼睛非礼勿视，耳朵非礼勿听，嘴巴非礼勿言，四肢非礼勿动。想要修这个身，那么身上的功夫怎么去下呢？心是身体的主宰，眼睛虽然会看，但使眼睛能看的是心；耳朵虽然会听，但使得耳朵能听的是心，嘴巴和四肢虽然会言说、动作，但使得嘴巴、四肢能够言说、动作的是心。所以想要修身，就应该体悟自己的心体，时常令其宽广、公正，没有一点不正的念头。身体的主宰一旦正了，那么作用于眼睛便没有非礼之视，作用于耳朵便没有非礼之听，作用于嘴巴和四肢便能没有非礼之言和动，这就是修身在正心的意思。\n\n“然而至善是心的本体，心的本体何来不善？如今要正心，可以在本体上什么地方用功呢？这就要在心的发动之处才能用功了。心的发动不可能没有不善的，所以必须在此处用功，这就是诚意。如果一念发动在好善上，便切切实实去好善；一念发动在恶恶上，便切切实实去恶恶。意念的发动便没有不诚的了，那么本体怎么会不正呢？所以要正心就在于诚意。功夫用到诚意上，才有了着落。\n\n“然而诚意的根本在于致知。朱熹所谓‘人虽不知而己所独知’，正是我们心中良知的所在。然而知道善却不依良知去做，知道不善却不依良知不去做，良知便被遮蔽了，这就是不能致良知。我心中的良知既然不能扩充到底，那么虽然知道善是好的，却不能切实去喜欢，知道恶是坏的，却不能切实去厌恶，怎能使得意念真诚呢？所以致知是诚意的根本。\n\n“然而也并非凭空追求致良知，致良知要在实际的事物上下手。比如意念指向为善，就要在为善的事上去做；意念指向去恶，就要在去恶的事上去做。去恶固然是纠正不正的念头，使其归于正；为善则是不善已经得到纠正，也同样是纠正不正的念头，使其归于正。这样，我们心中的良知便没有私欲蒙蔽，才能扩充到极致，好善恶恶的意念发动，才没有不真诚的。诚意功夫的切实下手之处在于格物，如果像这样格物，人人都能做到。‘人人都能成为尧舜’，正是这个意思。”"],["下","二九八","格物","先生曰：“众人只说格物要依晦翁，何曾把他的说去用？我着实曾用来。初年与钱友同论，做圣贤要格天下之物，如今安得这等大的力量？因指亭前竹子，令去格看。钱子早夜去穷格竹子的道理，竭其心思，至于三日，便致劳神成疾。当初说他这是精力不足，某因自去穷格，早夜不得其理。到七日，亦以劳思致疾。遂相与叹圣贤是做不得的，无他大力量去格物了。及在夷中三年，颇见得此意思，乃知天下之物本无可格者，其格物之功，只在身心上做。决然以圣人为人人可到，便自有担当了。这里意思，却要说与诸公知道。”","先生说：“人人都说格物要遵照朱熹先生的教诲，但他们何曾切实把朱子的学说付诸实践？我曾经认真实践过。早年，我同一名姓钱的朋友一起讨论，认为做圣贤就要格尽天下之物，但哪能有那么大的力量呢？我就指了指亭前的竹子，让他去格格看。他从早到晚去穷格竹子的道理，殚精竭虑，到了第三天，便因为劳心劳神生了病。当时我说他是精力不足，于是我就自己去格竹，从早到晚地格，也没看出道理。到了第七天，我也劳思致病了。于是我们互相感叹，认为圣贤是做不成的，没有那般大的力量去格物。然而在贵州龙场的三年，我对格物的道理有了自己的心得，才知道天下的事物本来就没什么可以格的，格物的功夫只需要在自己的身体和心灵上做。这才相信人人都可以成圣人，才有了一分传播圣人之道的担当。这个道理，我要让诸位都知道。”"],["下","二九九","致良知","门人有言，邵端峰\n论童子不能“格物”，只教以洒扫应对之说。\n\n先生曰：“洒扫应对就是一件物。童子良知只到此，便教去洒扫应对，就是致他这一点良知了。又如童子知畏先生长者，此亦是他良知处。故虽嬉戏中，见了先生长者，便去作揖恭敬，是他能格物以致敬师长之良知了。童子自有童子的格物致知。”\n\n又曰：“我这里言格物，自童子以至圣人，皆是此等工夫。但圣人格物，便更熟得些子，不消费力。如此格物，虽卖柴人亦是做得，虽公卿大夫以至天子，皆是如此做。”","弟子中有人说，邵端峰认为儿童不能“格物”，只能教给他们洒水扫地、酬答宾客的道理。\n\n先生说：“洒水扫地、酬答宾客就是一件事。儿童的良知只到这个程度，便教他们洒水扫地、酬答宾客，就是实现他们那一点的良知。又比如儿童知道敬畏师长，这也是他们的良知所在。所以即便他们正在嬉戏玩耍，见到师长也会去打躬作揖，这是他能格物、尊敬师长的良知。儿童有儿童自己的格物与致知。”\n\n先生又说：“我这里说的格物，从儿童到圣人，都是这样的功夫。只是圣人格物，功夫更纯熟，不需要费力气。这样的格物，即便是卖柴的人也能做到，即便是公卿大夫甚至到天子，也都是这样做。”"],["下","三〇一","心即理","门人问曰：“知行如何得合一？且如《中庸》言‘博学之’，又说个‘笃行之’，分明知行是两件。”\n\n先生曰：“博学只是事事学存此天理，笃行只是学之不已之意。”\n\n又问：“《易》‘学以聚之’，又言‘仁以行之’\n，此是如何？”\n\n先生曰：“也是如此。事事去学存此天理，则此心更无放失时，故曰‘学以聚之’。然常常学存此天理，更无私欲间断，此即是此心不息处，故曰‘仁以行之’。”\n\n又问：“孔子言‘知及之，仁不能守之’\n，知行却是两个了。”\n\n先生曰：“说‘及之’，已是行了，但不能常常行，已为私欲间断，便是‘仁不能守’。”\n\n又问：“心即理之说，程子云‘在物为理’，如何谓‘心即理’？”\n\n先生曰：“‘在物为理’，‘在’字上当添一‘心’字，此心在物则为理。如此心在事父则为孝、在事君则为忠之类。”\n\n先生因谓之曰：“诸君要识得我立言宗旨。我如今说个‘心即理’是如何？只为世人分心与理为二，故便有许多病痛。如五伯攘夷狄、尊周室，都是一个私心，使不当理。人却说他做得当理，只心有未纯，往往悦慕其所为，要来外面做得好看，却与心全不相干。分心与理为二，其流至于伯道之伪而不自知。故我说个‘心即理’，要使知心理是一个，便来心上做工夫，不去袭义于义\n，便是王道之真。此我立言宗旨。”\n\n又问：“圣贤言语许多，如何却要打做一个？”\n\n曰：“我不是要打做一个，如曰‘夫道，一而已矣’\n，又曰‘其为物不二，则其生物不测’\n，天地圣人皆是一个，如何二得？”","有弟子问：“知行如何能够合一？比如《中庸》说‘博学之’，又说‘笃行之’，知行分明是两件事。”\n\n先生说：“博学只是每件事上都学习存养天理，笃行也只是学习不已的意思。”\n\n那位弟子又问：“《易》说‘学以聚之’，又说‘仁以行之’，这话如何理解？”\n\n先生说：“也是如此。每件事上学习存养天理，那么心就没有放纵丢失的时候，所以说‘学以聚之’。然而，时常存养天理，又没有私欲中断，这就是心体生生不息之处，所以说‘仁以行之’。”\n\n那位弟子又问：“孔子说‘知及之，仁不能守之’，知和行就成了两件事。”\n\n先生说：“谈到‘及之’，那就已经是行了，只是不能一直去行，有私欲阻隔，所以才说‘仁不能守’。”\n\n又问：“关于心即理的说法，程颐先生说‘在物为理’，先生为何说‘心就是理’呢？”\n\n先生说：“‘在物为理’，‘在’字上应当加一个‘心’字，心呈现在物上便是理。比如心呈现在侍奉父亲上就是孝、呈现在事君上就是忠等等。”\n\n先生继而又说：“诸位要明白我立言的宗旨。我如今说‘心就是理’是为何？只是因为世人将心和理分作两边，所以有许多毛病。比如春秋五霸尊王攘夷，都是为了一己私心，便不符合天理。有人却说他们做得符合天理，这是因为他们的心还不纯正，往往会羡慕他们的事功，只求外表做得好看，实则与自己的内心毫不相干。将心与理分作两边，就会流于霸道虚伪而不自知。所以我说‘心就是理’，就是要人在心上用功，不去心外求义，这才是至纯至真的王道。这就是我立言的宗旨。”\n\n这位弟子又问：“圣贤说了许多话，为何要把它们概括成一个道理呢？”\n\n先生说：“并非我要概括成一个道理，比如孟子说‘世间的道只有一个’，《中庸》又说‘道与物并行不二，道生物神妙不测’，天地与圣人都是一个，怎能把它分作两个呢？”"],["下","三〇三","格物","以方问曰：“先生之说格物，凡《中庸》之‘慎独’及‘集义’‘博约’等说，皆为格物之事？”\n\n先生曰：“非也。格物即‘慎独’，即‘戒惧’。至于‘集义’‘博约’，工夫只一般，\n不是以那数件都做‘格物’底事。”","黄以方问：“先生解释格物，像《中庸》所说的‘慎独’、《孟子》所说的‘集义’、《论语》所说的‘博约’等，都包括在格物之中吗？”\n\n先生说：“不是。格物就是‘慎独’，就是‘戒慎恐惧’。至于‘集义’‘博约’，只是一般的功夫，并不能说那几件都是格物的事。”"],["下","三〇四","心体","以方问“尊德性”\n一条。\n\n先生曰：“‘道问学’即所以“尊德性’也。晦翁言：‘子静\n以‘尊德性’诲人，某教人岂不是‘道问学’处多了些子？’是分‘尊德性’‘道问学’作两件。且如今讲习讨论，下许多工夫，无非只是存此心，不失其德性而已。岂有‘尊德性’只空空去尊，更不去问学，问学只是空空去问学，更与德性无关涉？如此，则不知今之所以讲习讨论者，更学何事！”\n\n问“致广大”二句。\n\n曰：“‘尽精微’即所以‘致广大’也，‘道中庸’即所以‘极高明’也。盖心之本体自是广大底，人不能‘尽精微’，则便为私欲所蔽，有不胜其小者矣。故能细微曲折无所不尽，则私意不足以蔽之，自无许多障碍遮隔处，如何广大不致？”\n\n又问：“精微还是念虑之精微，事理之精微？”\n\n曰：“念虑之精微，即事理之精微也。”","黄以方向先生请教“尊德性”的意思。\n\n先生说：“‘道问学’就是为了‘尊德性’。朱熹先生说过：‘子静用‘尊德性’来教诲人，我教人岂不是‘道问学’的地方多一些呢？’这是将‘尊德性’和‘道问学’分作两件事了。如今我们讲习讨论，下许多功夫，无非都是为了存养此心，使自己不失去德性罢了。岂有凭空去‘尊德性’而不去问学，凭空去问学而全然与德性无关的道理？若是如此，就不知道我们现在的讲习讨论和学习的究竟是什么了！”\n\n黄以方向先生请教“致广大”两句的意思。\n\n先生说：“‘尽精微’就是为了‘致广大’，‘道中庸’就是为了‘极高明’。因为心的本体原本就是广大的，人不能‘尽精微’就会被私欲蒙蔽，在细微之处无法致知。所以如果能在细微曲折的地方都穷尽精微，那么私意就不足以蒙蔽心体，自然就没了许多障碍阻隔，又怎能不广大呢？”\n\n黄以方又问：“精微是指意念思虑的精微，还是事物道理的精微？”\n\n先生说：“意念思虑的精微就是事物道理的精微。”"],["下","三〇六","致良知","问：“声、色、货、利，恐良知亦不能无？”\n\n先生曰：“固然。但初学用功，却须扫除荡涤，勿使留积，则适然来遇，始不为累，自然顺而应之。良知只在声、色、货、利上用工。能致得良知精精明明，毫发无蔽，则声、色、货、利之交，无非天则流行矣。”","有人问：“声、色、货、利，恐怕良知里也不能没有吧？”\n\n先生说：“当然。只是初学用功时，需要将其扫除干净，不能有存留，这样偶然遇到了，也不会为其所牵累，自然能顺良知去应对。致良知只在声、色、货、利上用功。能把良知致得精细明白，没有丝毫遮蔽，即便与声、色、货、利交往，也无非是天理的流转罢了。”"],["下","三〇九","致良知","一友举：“佛家以手指显出，问曰：‘众曾见否？’众曰：‘见之。’复以手指入袖，问曰：‘众还见否？’众曰：‘不见。’佛说：‘还未见性。’此义未明。”\n\n先生曰：“手指有见有不见，尔之见性常在。人之心神只在有睹有闻上驰骛，不在不睹不闻上着实用功。盖不睹不闻是良知本体，‘戒慎恐惧’是致良知的工夫。学者时时刻刻常睹其所不睹，常闻其所不闻，工夫方有个实落处。久久成熟后，则不须着力，不待防检，而真性自不息矣。岂以在外者之闻见为累哉？”","一位学友举佛家的例子问道：“佛伸出手指问：‘诸位可曾看到？’众人说：‘看到了。’佛又把手指缩回袖子里，问：‘诸位还能看到吗？’众人说：‘看不到了。’佛说：‘你们还没有见性。’我不明白佛的意思。”\n\n先生说：“手指有时看得到，有时看不到，但你的本性却一直存在。人的心神往往只在看得见、摸得着的地方驰骋，却不在看不见、摸不着的地方切实用功。然而看不见、摸不着才是良知的本然状态，‘戒慎恐惧’才是致良知的功夫。为学之人时时刻刻去体察那些眼睛看不到的地方，听闻那些耳朵听不到的地方，功夫才有个切实的着落。久而久之，功夫纯熟之后，便不费力，也不需要时刻提防检查，真正的本性自然生生不息。怎能为外在的见闻所牵累呢？”"],["下","三一〇","致良知","问：“先儒谓‘鸢飞鱼跃’与‘必有事焉’，同一活泼泼地\n？”\n\n先生曰：“亦是。天地间活泼泼地，无非此理，便是吾良知的流行不息。致良知便是‘必有事’的工夫。此理非惟不可离，实亦不得而离也。无往而非道，无往而非工夫。”","有人问：“程颢先生认为‘鸢飞鱼跃’和‘必有事焉’，同样都是生动活泼的吗？”\n\n先生说：“这样说也对。天地之间，生动活泼的无非是这个理，就是我们的良知流行不息。致良知便是‘必有事’的功夫。这个理不仅不能脱离，也确实无法脱离。世间所有的事物都符合大道，世间所有的事物都是这个功夫。”"],["下","三一四","修行语录","“夫子说‘性相近’\n，即孟子说‘性善’，不可专在气质上说。若说气质，如刚与柔对，如何相近得？惟‘性善’则同耳。人生初时善原是同的，但刚的习于善则为刚善，习于恶则为刚恶；柔的习于善则为柔善，习于恶则为柔恶。\n便日相远了。”","“孔子说‘性相近’，就是孟子所谓的‘性善’，不能仅从气质方面说性。如果仅从气质上说，刚柔对立，怎能相近？只是‘性善’是相同的。人初生时的善原本是相同的，只是气质刚强的人受到善性的熏染则表现为刚善，受到恶性的熏染则表现为刚恶；气质柔弱的人受到善性的熏染则表现为柔善，受到恶性的熏染则表现为柔恶。这才愈行愈远了。”"],["下","三一六","万物一体","问：“人心与物同体，如吾身原是血气流通的，所以谓之同体。若于人便异体了，禽兽草木益远矣。而何谓之同体？”\n\n先生曰：“你只在感应之几上看，岂但禽兽草木，虽天地也与我同体的，鬼神也与我同体的。”\n\n请问。\n\n先生曰：“你看这个天地中间，什么是天地的心？”\n\n对曰：“尝闻人是天地的心\n。”\n\n曰：“人又甚么教做心？”\n\n对曰：“只是一个灵明。”\n\n“可知充天塞地中间，只有这个灵明。人只为形体自间隔了。我的灵明，便是天地鬼神的主宰。天没有我的灵明，谁去仰他高？地没有我的灵明，谁去俯他深？鬼神没有我的灵明，谁去辩他吉凶灾祥？天地鬼神万物离却我的灵明，便没有天地鬼神万物了；我的灵明离却天地鬼神万物，亦没有我的灵明。如此便是一气流通的，如何与他间隔得？”\n\n又问：“天地鬼神万物，千古见在，何没了我的灵明便俱无了？”\n\n曰：“今看死的人，他这些精灵游散了，他的天地鬼神万物尚在何处？”","有人问：“人心与万物同为一体，比如我的身体原本是血气流通的，因而可以说是同体。如果对其他人异体了，禽兽草木就相差更远了，还怎能称为同体呢？”\n\n先生说：“你只要在事物感应的微妙之处看，何止禽兽草木，即使天地也与我同体，鬼神也与我同体。”\n\n那人请先生解释。\n\n先生说：“你看这天地中间，什么是天地之心？”\n\n那人回答说：“曾经听闻说人是天地之心。”\n\n先生说：“人又凭什么叫作天地之心呢？”\n\n那人回答：“是因为人有灵性。”\n\n“由此可知，天地之间充塞的，只是这个灵性。人与天地万物，只是被形体间隔开了。我的灵性，便是天地鬼神的主宰。天失去了我的灵性，谁去仰望它的高？地失去了我的灵性，谁去俯视它的深？鬼神没有我的灵性，谁去辨别吉凶灾祥？天地鬼神万物离开了我的灵性，便没有天地鬼神万物了；我的灵性离开了天地鬼神万物，也无所谓我的灵性了。所以说人与天地鬼神万物一气相通，怎能分隔开来呢？”\n\n那人又问：“天地鬼神万物，从古至今都在，为何没了我的灵性，就都不存在了呢？”\n\n先生说：“你去看那些死了的人，他们的灵魂都散去了，他们的天地鬼神万物还在哪里呢？”"],["下","三一七","心体","先生起行征思、田，德洪与汝中追送严滩\n。汝中举佛家实相、幻相之说。\n\n先生曰：“有心俱是实，无心俱是幻；无心俱是实，有心俱是幻。”\n\n汝中曰：“有心俱是实，无心俱是幻，是本体上说工夫；无心俱是实，有心俱是幻，是功夫上说本体。”\n\n先生然其言。\n\n洪于是时尚未了达，数年用功，始信本体功夫合一。但先生是时因问偶谈，若吾儒指点人处，不必借此立言耳。”","先生起行征讨思恩、田州，钱德洪与王汝中送先生一路到严滩。王汝中向先生请教佛家的实相和幻相之说。\n\n先生说：“有心都是实相，无心都是幻相；无心都是实相，有心都是幻相。”\n\n王汝中说：“有心都是实相，无心都是幻相，是从本体出发理解功夫；无心都是实相，有心都是幻相，是从功夫出发通达本体。”\n\n先生肯定他的说法。\n\n钱德洪当时尚不明白，几年用功后，才开始相信本体与功夫是合一的。但是，先生当时是因为王汝中的问题才偶然这样说，如果我们儒家要指点人，并不需要这种说法来立论。"],["下","三一八","致良知","尝见先生送二三耆宿出门，退坐于中轩，若有忧色。\n\n德洪趋进请问。\n\n先生曰：“顷与诸老论及此学，真圆凿方枘。此道坦如道路，世儒往往自加荒塞，终身陷荆棘之场而不悔，吾不知其何说也！”\n\n德洪退，谓朋友曰：“先生诲人不择衰朽，仁人悯物之心也。”","曾见先生送两三位老先生出门，回来后坐在走廊上，面有忧色。\n\n钱德洪上前问先生。\n\n先生说：“刚才我与诸位老先生谈到致良知的学说，就好像圆孔和方榫之间格格不入。大道就像道路一样，世俗的儒者往往自己将道路荒芜、蔽塞了，终身陷溺在荆棘丛中而不知悔改，我真不知道该怎么说！”\n\n钱德洪退下来，对朋友们说：“先生教人，无论对象是否衰老、腐朽，这便是先生的仁人爱物之心。”"],["下","三一九","谦卑","先生曰：“人生大病，只是一‘傲’字。为子而傲必不孝，为臣而傲必不忠，为父而傲必不慈，为友而傲必不信。故象与丹朱\n俱不肖，亦只一‘傲’字，便结果了此生。诸君常要体此。人心本是天然之理，精精明明，无纤介染着，只是一‘无我’而已。胸中切不可‘有’，‘有’即‘傲’也。古先圣人许多好处，也只是‘无我’而已。‘无我’自能谦，谦者众善之基，傲者众恶之魁。”","先生说：“人最大的毛病就是一个‘傲’字。做儿子的如果傲慢一定会不孝，做臣子的如果傲慢一定会不忠，做父亲的如果傲慢一定会不慈，做朋友的如果傲慢一定会不诚。所以象和丹朱都不贤明，也只是因为一个‘傲’字，便断送了自己的一生。诸位要时常体会这一点。人心本就具备天然的道理，精确明白，没有丝毫沾染，只是一个‘无我’罢了。因此，心中绝对不能‘有我’，‘有我’就是‘傲’了。古圣先贤许多长处，也只是‘无我’而已。‘无我’自然能够谦虚，谦虚是所有善德的基础，傲慢是所有恶行的根源。”"],["下","三二〇","致良知","又曰：“此道至简至易的，亦至精至微的。孔子曰：‘其如示诸掌乎。’\n且人于掌何日不见？及至问他掌中多少文理，却便不知。即如我‘良知’二字，一讲便明，谁不知得？若欲的见良知，却谁能见得？”\n\n问曰：“此知恐是无方体的，最难捉摸。”\n\n先生曰：“良知即是《易》‘其为道也屡迁，变动不居，周流六虚，上下无常，刚柔相易，不可为典要，惟变所适’\n。此知如何捉摸得？见得透时便是圣人。”","先生又说：“大道极其简单平易，也极其精微神妙。孔子说：‘就像看自己手掌上的东西一样。’人哪天看不到自己的手掌？可是当你问他掌上有多少纹理，他却不知道。这就像我所说的‘良知’，一说就明白，有谁不知道呢？但要真的体认到良知，却又有谁做到了呢？”\n\n有人问：“这恐怕是因为良知没有固定的方向和处所，很难把握。”\n\n先生说：“良知就是《易》所说的‘道变动不居，周流于天地之间，上下流转没有常态，刚柔变化没有定体，不能以此为根本依据，只有随时而变’。良知要怎样才能把握呢？弄清这个问题就是圣人了。”"],["下","三二一","心体","问：“孔子曰：‘回也，非助我者也。’\n是圣人果以相助望门弟子否？”\n\n先生曰：“亦是实话。此道本无穷尽，问难愈多，则精微愈显。圣人之言本自周遍，但有问难的人胸中窒碍，圣人被他一难，发挥得愈加精神。若颜子闻一知十\n，胸中了然，如何得问难？故圣人亦寂然不动，无所发挥，故曰‘非助’。”","有人问：“孔子说：‘颜回并非有助于我的人。’圣人果真希望弟子帮助自己吗？”\n\n先生说：“这也是实话。圣人之道本就没有穷尽，问题疑难越多，精微之处就越能显明。圣人的言辞本就周密完备，然而有问题疑难的人胸中有所困惑，圣人被他一问，便能把道理发挥得愈发精妙。像颜回那样的学生，听闻一件事可以推知十件事，心里什么都清楚，又怎会发问呢？所以圣人的心体也就寂然不动，没什么可发挥的，所以孔子才说颜回对自己没有帮助。”"],["下","三二二","致良知","邹谦之尝语德洪曰：“舒国裳曾持一张纸，请先生写‘拱把之桐梓’\n一章。先生悬笔为书，到‘至于身，而不知所以养之者’，顾而笑曰：‘国裳读书中过状元来，岂诚不知身之所以当养？还须诵此以求警。’一时在侍诸友皆惕然。”","邹谦之曾对钱德洪说：“舒国裳曾拿一张纸，请先生写‘拱把之桐梓’一章。先生提笔，写到‘至于身，而不知所以养之者’一句，回过头笑着说：‘国裳都中了状元，难道还不知道应该怎么修身吗？但他还是要诵读这章来警示自己。’一时间在座的朋友都警醒起来。”\n\n嘉靖戊子冬\n，德洪与王汝中奔师丧至广信，讣告同门，约三年收录遗言。\n\n继后同门各以所记见遗，洪择其切于问正者，合所私录，得若干条。居吴时\n，将与《文录》并刻矣，适以忧去，未遂。当是时也，四方讲学日众，师门宗旨既明，若无事于赘刻者，故不复营念。\n\n去年，同门曾子才汉\n得洪手抄，复傍为采辑，名曰《遗言》，以刻行于荆。洪读之，觉当时采录未精，乃为删其重复，削去芜蔓，存其三分之一，名曰《传习续录》，复刻于宁国之水西精舍。\n\n今年夏，洪来游蕲，沈君思畏\n曰：“师门之教久行于四方，而独未及于蕲。蕲之士得读《遗言》，若亲炙夫子之教，指见良知，若重睹日月之光。惟恐传习之不博，而未以重复之为繁也。请裒\n其所逸者增刻之，若何？”洪曰然。师门致知格物之旨，开示来学，学者躬修默悟，不敢以知解承，而惟以实体得。故吾师终日言是而不惮其烦，学者终日听是而不厌其数。盖指示专一，则体悟日精，几迎于言前，神发于言外，感遇之诚也。\n\n今吾师之没未及三纪，而格言微旨渐觉沦晦，岂非吾党身践之不力、多言有以病之耶？学者之趋不一，师门之教不宣也。乃复取逸稿，采其语之不背者，得一卷。其余影响不真，与《文录》既载者，皆削之。并易中卷为问答语，以付黄梅尹张君\n增刻之。庶几读者不以知解承而惟以实体得，则无疑于是录矣。\n\n嘉靖丙辰夏四月\n\n门人钱德洪拜书于蕲之崇正书院"]];

function kwClassify(txt){
  txt=txt.toLowerCase();
  var best=null,bestScore=0;
  for(var name in DEMON_KW){
    var score=0;
    DEMON_KW[name].forEach(function(kw){if(txt.indexOf(kw)>=0)score++});
    if(score>bestScore){bestScore=score;best=name}
  }
  if(best){
    for(var i=0;i<DEMONS.length;i++){if(DEMONS[i][2]===best)return i}
  }
  return -1;
}

function startB(dur){document.getElementById('bB').style.display='none';var o=document.getElementById('bO'),p=document.getElementById('bP'),d=document.getElementById('tD');tmrLeft=dur;tmrRun=1;var phases=[['吸气',4000,'bIn'],['屏住',4000,''],['呼气',6000,'bOut']],ci=0;function sp(){var ph=phases[ci%3];p.textContent=ph[0]+'…';o.textContent=ph[0];o.style.animation=ph[2]?ph[2]+' '+ph[1]+'ms ease-in-out forwards':'none';speak(ph[0])}sp();function nx2(){if(!tmrRun)return;ci++;sp();setTimeout(nx2,phases[ci%3][1])}setTimeout(nx2,phases[0][1]);tmrId=setInterval(function(){tmrLeft--;d.textContent=fT(tmrLeft);if(tmrLeft<=0){stopAll();stopSpeak();p.textContent='完毕';o.textContent='✓';o.style.animation='none';speak('吐纳完毕');bell();setTimeout(nxt,1500)}},1e3)}
function togT(dur){var b=document.getElementById('tB'),d=document.getElementById('tD'),r=document.getElementById('rB');if(!tmrRun){if(!tmrLeft)tmrLeft=dur;tmrRun=1;b.textContent='暂停';r.style.display='inline-block';tmrId=setInterval(function(){tmrLeft--;d.textContent=fT(tmrLeft);if(tmrLeft<=0){stopAll();d.textContent='00:00';b.textContent='出定 ✓';b.onclick=nxt;speak('入定结束');bell()}},1e3)}else{clearInterval(tmrId);tmrRun=0;b.textContent='继续'}}
function rstT(dur){stopAll();tmrLeft=0;document.getElementById('tD').textContent=fT(dur);var b=document.getElementById('tB');b.textContent='入定';b.onclick=function(){togT(dur)};document.getElementById('rB').style.display='none'}
function startSc(){var tech=TECH[curMod],step=tech.steps[curStep],zones=step.z,per=Math.floor(step.dur/zones.length),idx=0;document.getElementById('scB').style.display='none';document.getElementById('z0').classList.add('cur');document.getElementById('sT').innerHTML='观照 <span style="color:'+tech.acc+'">'+zones[0]+'</span>';speak('观照'+zones[0]);tmrLeft=step.dur;tmrRun=1;tmrId=setInterval(function(){tmrLeft--;document.getElementById('tD').textContent=fT(tmrLeft);if(tmrLeft<=0)stopAll()},1e3);scanId=setInterval(function(){document.getElementById('z'+idx).classList.remove('cur');document.getElementById('z'+idx).classList.add('ok');idx++;if(idx>=zones.length){clearInterval(scanId);scanId=null;document.getElementById('sT').innerHTML='<span style="color:'+tech.acc+'">内视完毕 ✓</span>';speak('内视完毕');bell();setTimeout(nxt,1e3);return}document.getElementById('z'+idx).classList.add('cur');document.getElementById('sT').innerHTML='观照 <span style="color:'+tech.acc+'">'+zones[idx]+'</span>'},per*1e3)}
function subJ(n){var tech=TECH[curMod],step=tech.steps[curStep],empty=0;for(var i=0;i<n;i++){var el=document.getElementById('j'+i);if(!el||!el.value.trim())empty=1}if(empty){toast('请至少写点什么');return}addLog('修炼',tech.nm+'·'+step.l);nxt()}

function nxt(){stopAll();var tech=TECH[curMod];if(curStep<tech.steps.length-1){curStep++;renderMod()}else compMod()}
function compMod(){stopAll();stopA();var tech=TECH[curMod];var cnt=S.modCnt[tech.id]||0;var decay=Math.pow(0.6,cnt);var xpBase=Math.max(1,Math.round(tech.xp*decay));var isFirst=S.done.indexOf(tech.id)<0;if(isFirst){S.done.push(tech.id);if(S.done.length===1&&S.lastDate!==td())S.streak++}S.modCnt[tech.id]=cnt+1;S.total++;var got=gainXp(xpBase);S.demon=Math.max(0,S.demon-(isFirst?3:1));S.demonTs=Date.now();addLog('修炼','完成「'+tech.nm+'」'+(cnt>0?'第'+(cnt+1)+'遍':'')+' +'+got+'灵力');if(isFirst&&S.done.length===TECH.length){var b=gainXp(20);S.demon=Math.max(0,S.demon-10);addLog('修炼','日修圆满 +'+b+'灵力 魔气-10%','jade')}save();toast('✓ '+tech.nm+(cnt>0?' ×'+(cnt+1):'')+' +'+got+'灵力');exitMod()}

function loadProfile(){
  if(!sb||!sbUser)return;
  sb.from('profiles').select('*').eq('id',sbUser.id).single().then(function(r){

}
function createProfile(){
  if(!sb||!sbUser)return;
  var nm=sbUser.user_metadata&&sbUser.user_metadata.full_name?sbUser.user_metadata.full_name:'无名修士';
  var av=sbUser.user_metadata&&sbUser.user_metadata.avatar_url?sbUser.user_metadata.avatar_url:'';
  sbProfile={id:sbUser.id,display_name:nm,avatar_url:av,is_public:false,xp:S.xp,streak:S.streak,total:S.total,demon:S.demon,canwu_total:Object.values(S.cwCount).reduce(function(a,b){return a+b},0),composite:calcComposite()};
  sb.from('profiles').upsert(sbProfile).then(function(){syncToCloud()});
}

function calcComposite(){
  var cwTotal=0;Object.keys(S.cwCount).forEach(function(k){cwTotal+=S.cwCount[k]});
  var xpNorm=Math.min(S.xp/5000,1)*40;
  var streakNorm=Math.min(S.streak/30,1)*25;
  var totalNorm=Math.min(S.total/100,1)*20;
  var cwNorm=Math.min(cwTotal/50,1)*15;
  var demonPenalty=1-S.demon/200;
  return Math.round((xpNorm+streakNorm+totalNorm+cwNorm)*demonPenalty*100)/100;
}

function syncToCloud(){
  if(!sb||!sbUser)return;
  var cwTotal=0;Object.keys(S.cwCount).forEach(function(k){cwTotal+=S.cwCount[k]});
  var lv=getLvl(S.xp),r=RM[lv.ri];
  sb.from('profiles').update({
    xp:S.xp,streak:S.streak,total:S.total,demon:Math.round(S.demon),
    canwu_total:cwTotal,realm:lv.max?'元婴大圆满':r.n+r.ln(lv.li),
    composite:calcComposite(),updated_at:new Date().toISOString()
  }).eq('id',sbUser.id).then(function(){});
}
function syncFromCloud(){
  // Cloud has latest? Compare XP
  if(sbProfile&&sbProfile.xp>S.xp){
    // Cloud is ahead - use it (future: full state sync)
  }
  // Local is ahead - push to cloud
  syncToCloud();
}

  sb.from('profiles').select('display_name,avatar_url,xp,streak,realm,composite,is_public').eq('is_public',true).order('composite',{ascending:false}).limit(50).then(function(r){

    var el=document.getElementById('lbList');
    if(!el)return;
    if(!list.length){el.innerHTML='<div class="card" style="text-align:center;padding:20px"><div style="font-size:11px;color:var(--t3)">暂无公开修行者<br>在「我的」中开启公开模式即可上榜</div></div>';return}
    var h='';
    list.forEach(function(p,i){
      var rc=i===0?'g':i===1?'s':i===2?'b':'';
      var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      h+='<div class="lb-row fade"><div class="lb-rank '+rc+'">'+(medal||(i+1))+'</div><div class="lb-info"><div class="lb-name">'+(p.display_name||'无名修士')+'</div><div class="lb-sub">'+(p.realm||'练气')+' · 灵力'+p.xp+' · 连续'+p.streak+'天</div></div><div style="font-size:14px;font-weight:700;color:var(--gold)">'+p.composite+'</div></div>';
    });
    // Add self
    var lv=getLvl(S.xp),rm=RM[lv.ri],comp=calcComposite();
    h+='<div class="lb-row" style="border:2px solid rgba(74,158,117,.2);margin-top:10px"><div class="lb-rank" style="color:var(--jade)">你</div><div class="lb-info"><div class="lb-name" style="color:var(--jade)">'+(sbProfile?sbProfile.display_name:'你')+' · '+(lv.max?'元婴大圆满':rm.n+rm.ln(lv.li))+'</div><div class="lb-sub">灵力'+S.xp+' · 连续'+S.streak+'天</div></div><div style="font-size:14px;font-weight:700;color:var(--jade)">'+comp+'</div></div>';
    el.innerHTML=h;
  }).catch(function(){
    var el=document.getElementById('lbList');if(el)el.innerHTML='<div class="card" style="text-align:center;padding:20px;font-size:11px;color:var(--t3)">排行榜加载失败</div>';
  });
}

// ===== SHARE CARD =====
function genShareCard(){
  clickFx();
  var lv=getLvl(S.xp),r=RM[lv.ri],comp=calcComposite();
  var cwTotal=0;Object.keys(S.cwCount).forEach(function(k){cwTotal+=S.cwCount[k]});
  var realm=lv.max?'元婴大圆满':r.n+r.ln(lv.li);
  var cvs=document.createElement('canvas');cvs.width=640;cvs.height=960;
  var ctx=cvs.getContext('2d');
  // Background
  var grd=ctx.createLinearGradient(0,0,0,960);
  grd.addColorStop(0,'#f0ebe4');grd.addColorStop(0.5,'#e8e0d6');grd.addColorStop(1,'#d8d0c6');
  ctx.fillStyle=grd;ctx.fillRect(0,0,640,960);
  // Decorative circles
  ctx.fillStyle='rgba(74,158,117,0.06)';ctx.beginPath();ctx.arc(320,280,180,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(184,150,60,0.04)';ctx.beginPath();ctx.arc(320,280,240,0,Math.PI*2);ctx.fill();
  // Title
  ctx.fillStyle='#4A9E75';ctx.font='bold 18px "Noto Serif SC",serif';ctx.textAlign='center';
  ctx.fillText('人间修真模拟器',320,60);
  ctx.fillStyle='#9CA3AF';ctx.font='12px "Noto Serif SC",serif';
  ctx.fillText('基于王阳明心学·传习录',320,85);
  // Realm
  ctx.fillStyle='#4A9E75';ctx.font='bold 52px "Ma Shan Zheng",cursive';
  ctx.fillText(realm,320,280);
  // Stats
  ctx.fillStyle='#6B7280';ctx.font='16px "Noto Serif SC",serif';
  ctx.fillText('灵力 '+S.xp+' · 连续修行 '+S.streak+' 天',320,350);
  ctx.fillText('功法 '+S.total+' 次 · 参悟 '+cwTotal+' 遍',320,380);
  ctx.fillText('综合评分 '+comp,320,420);
  // Quote
  var jj=JINJU[Math.floor(Math.random()*JINJU.length)];
  ctx.fillStyle='#2D2D3A';ctx.font='18px "Noto Serif SC",serif';
  var qText='「'+jj[0]+'」';
  wrapText(ctx,qText,320,520,540,28);
  ctx.fillStyle='#9CA3AF';ctx.font='13px "Noto Serif SC",serif';
  ctx.fillText('— 王阳明·传习录 —',320,860);
  ctx.fillText('扫码或搜索「人间修真模拟器」开始修行',320,890);
  // Convert to image and show
  var imgUrl=cvs.toDataURL('image/png');
  var ovl=document.getElementById('shareOvl');
  ovl.innerHTML='<div style="max-width:340px;width:100%"><img src="'+imgUrl+'" style="width:100%;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.2);margin-bottom:12px"><div style="display:flex;gap:8px"><button class="btn bg" style="flex:1" onclick="dlShare()">保存图片</button><button class="btn bo" style="flex:1" onclick="document.getElementById(\'shareOvl\').style.display=\'none\'">关闭</button></div></div>';
  ovl.style.display='flex';
  ovl._img=imgUrl;
}
function wrapText(ctx,text,x,y,maxW,lineH){
  var chars=text.split('');var line='';
  for(var i=0;i<chars.length;i++){
    var test=line+chars[i];var w=ctx.measureText(test).width;
    if(w>maxW&&line){ctx.fillText(line,x,y);y+=lineH;line=chars[i]}
    else{line=test}
  }
  ctx.fillText(line,x,y);
}
function dlShare(){
  var a=document.createElement('a');
  a.href=document.getElementById('shareOvl')._img;
  a.download='修真成就卡.png';a.click();
  toast('✓ 图片已保存');
}

  }

  if(!sbUser&&SB_READY){

  }
  // Insert before reset button
  var resetBtn=el.innerHTML.lastIndexOf('重置修行');
  if(resetBtn>0){
    var insertPos=el.innerHTML.lastIndexOf('<div style="text-align:center;margin-top:16px">');

};

function togglePublic(el){
  clickFx();
  var isOn=el.classList.contains('on');
  if(isOn){el.classList.remove('on')}else{el.classList.add('on')}
  if(sb&&sbUser){
    sb.from('profiles').update({is_public:!isOn}).eq('id',sbUser.id).then(function(){
      if(sbProfile)sbProfile.is_public=!isOn;
      toast(!isOn?'✓ 已开启排行榜':'已关闭排行榜');
    });
  }else{toast('需要登录才能上排行榜')}
}
function changeName(){
  var nm=prompt('输入你的修行名号：',sbProfile?sbProfile.display_name:'');
  if(!nm||!nm.trim())return;nm=nm.trim().substring(0,12);
  if(sb&&sbUser){
    sb.from('profiles').update({display_name:nm}).eq('id',sbUser.id).then(function(){
      if(sbProfile)sbProfile.display_name=nm;toast('✓ 名号已更新');renderPF();
    });
  }
}
