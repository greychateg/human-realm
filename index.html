的。然而三代的学问，以彰明人伦为目的，并不先考量其样子是否像璧环，是否建在泮水边。孔子说：“人如果不仁爱，有礼的教化又能如何？人如果不仁爱，有乐的感化又能如何？”制礼作乐的人，必须具备中正平和的德性，以声为律、以身为度，才能做这类事。如果只是一些礼乐器具上的细枝末节，则是乐工和祝史的职责。所以曾子说：“君子所重视的道有三个方面……至于具体的祭祀礼仪，则由专人负责。”尧“命令羲氏、和氏遵从天道，观测推算日月星辰的运行”，他看重的是“尊敬地授予百姓天时”；舜“观测北斗七星的运行”，他看重的是“安排好七种政事”。这都是念念不忘以仁爱民众之心推行养育百姓的仁政。制定历法、明白时令的根本就在于此。\n\n羲氏、和氏在历法和算数上的才能，皋陶和契未必有，大禹和后稷也未必有。孟子说“尧、舜的智慧并不通晓万物”，可见即使圣明如尧、舜也未必能具有所有的知识。时至今日，按照羲、和二人的历法，加上每一个朝代的修改订正，即使一知半解、小有聪明的人，甚至思想浅薄的术士，都能够正确推算节气、占卜天下。难道后世一知半解、小有聪明的人比大禹、后稷，乃至尧和舜还要贤明吗？\n\n封禅的说法就更加荒诞不经了，这是后代阿谀奉承之徒为了在皇帝面前讨好献媚，怂恿鼓吹的迷惑君心、浪费国力的学说。这是欺天罔人，无耻之尤的行为，君子自然不屑去说。司马相如之所以被后世讥讽，便是这个原因。你却认为这是儒者们应当学习的，大概是没有仔细思考吧！\n\n圣人之所以为圣人，是因为他们生而知之。朱熹解释《论语》时说：“生而知之的是理和义。那些礼乐名物、古今事变，也还是要学习后才能检验其是否属实。”如果礼乐名物之类是圣人成圣的功夫，圣人也必须通过学习才能知晓，那么圣人就不能说是生而知之了。说圣人是生而知之，是专指理和义的方面而言的，不包括礼乐名物之类，因此礼乐名物与圣人成圣的功夫并无关系。所谓“学而知之”，也就是学习这个理和义而已；“困而知之”也就是困勉于这个理和义而已。如今为学之人学圣人，对于圣人能知道的部分不去学习，却对于那些圣人不能知道的部分十分渴求，这不是迷失了求做圣人的方向了吗？我说的这些仅仅是就你的困惑稍加分析解释，还不是正本清源的论断。\n\n正本清源的学说一日不彰明于天下，那么天下学习圣人的人便会一天天感到繁复艰难，甚至沦落到夷狄、禽兽的地步，还自以为是地学习圣人之学。我的学说虽然暂时彰明于天下，终究只是解一时之病，解了西边的冻，东边又结了冰，拨开前面的雾，后面又涌起了云，就算我不顾安危、喋喋不休地讲论说道，也终究不能救天下分毫。\n\n圣人的心与天地万物为一体，他看待天下的人，没有内外远近的区别，凡有血气生命的，都是自己的兄弟子女，都会使他们安全、教养他们，以成就他万物一体的念头。天下人的心，起初与圣人之心也并无不同，只是后来夹杂了私心，为物欲所蒙蔽，大的心变而为小，通达的心转而为塞，人人均有私心，甚至将父子兄弟视为仇人。圣人对此十分担忧，故而向天下之人推行万物一体之仁的教化，使人人都能够克制私欲、去除蒙蔽，恢复心体的本然状态。圣人教化的大体精神，就是尧、舜、禹一脉相承的“道心惟微，惟精惟一，允执厥中”；至于教化的细节，则是舜让契所规定的“父子有亲，君臣有义，夫妇有别，长幼有序，朋友有信”这五条而已。唐、虞，以及夏、商、周三代，教学仅仅是教这些内容，学习也仅仅是学这些内容。当时，人人的观点相同，家家的习惯相同，能自然去做这些事的人就是圣人，通过努力做到这些事的人就是贤人，违背于这些道理的人，即便像丹朱那样聪明，也不过是不肖之徒。下到田间、市井，从事农、工、商、贾的普通人，也都学习这些内容，都把成就自身的品德放在第一位。为什么呢？因为没有杂乱的见闻、烦琐的记诵、靡滥的辞章、功利的追逐，而只有孝顺双亲、友爱兄长、尊信朋友，以至于恢复心体的本然状态。这是人的天性所固有的，并非向外求得的东西，又有谁做不到呢？\n\n学校的作用主要也是培养人的品德。人的才能各异，有的擅长礼乐，有的擅长政教，有的擅长农事，便根据他们的德性，因材施教，使他们的才干在学校里进一步提高。根据个人的德性让他们终身担任某个职务。用人者只知道同心同德，共同努力使得天下百姓安宁，只看被任用者的才能是否称职，而不以身份高低分轻重，不以职业不同分好坏。被任用者也只知道同心同德，共同努力使得天下百姓安宁，如果所在的岗位合适，即便终身辛劳也不觉得辛苦，终身从事琐碎的工作也不觉卑贱。那时，所有的人都高高兴兴，亲如一家。那些才能较低下的人，则安于农、工、商、贾的本分，各自勤于本职工作，并且相互滋养，没有羡慕、攀比的想法。那些如皋陶、夔、后稷、契之类才能各异的人，则为天下出仕当官，各尽其能。好比一个家庭的内部事务，有人负责洗衣做饭，有人负责经商买卖，有人负责制造器具，众人出谋出力，才能实现赡养父母、教养子女的愿望，所有人都怕自己无法做好承担的事务，因而都尽心尽力。所以后稷勤劳地种庄稼，不以自己不知道教化为耻，将契善于教化视作为自己善于教化；夔负责音乐，不以自己不明白礼仪为耻，将伯夷精通礼仪视作为自己精通礼仪。因为他们的心中纯粹明白，具有完备的天地万物为一体的仁德。他们的精神周流贯通，志气相互通达，并不存在他人与自己的区分、外物与自我的间隔。好比一个人的身体，眼睛能看、耳朵能听、手可以拿、脚可以走，都是为了实现整个身体的作用。眼睛不会因为不能听而感到羞耻，耳朵听到声音的时候，眼睛一定会去看；脚不会因为不能拿东西感到羞耻，手伸到的地方，脚也会跟随。这是因为人的体内元气周流全身，血脉畅通，所以痛痒呼吸都能感觉到并做出自然而然的反应，其中有不言而喻的奥妙。圣人的学问之所以最简单也最明了，容易明白也容易遵从，容易学习也容易学成，正是因为圣学的根本在于恢复心体的本然状态，相比之下学习具体的知识或技能都没什么值得说的。\n\n夏、商、周三代下来，王道衰微，霸道盛行；孔子、孟子死后，圣学晦暗，邪说横行。教的人不教圣学，学的人不学圣学。主张霸道的人，暗地里用与三代先王相似的东西，借助外在的学问知识来满足自己的私欲，天下之人一时间都尊奉他们，圣人之道便荒废阻塞了。世人相互仿效，天天讨论富国强兵、权谋欺诈、攻城讨伐的学说，以及一切欺天罔人、只为追求一时声名利禄的技术，像管仲、商鞅、苏秦、张仪这样的人数不胜数。长此以往，人们相互争夺，祸患无穷，这些人沦为夷狄、禽兽，甚至连霸道之术都推行不下去了。\n\n世上的儒者有感于此，搜寻过去圣王的典章法制，把未被秦始皇焚毁的书拾掇修补出来。他们的目的诚然是为了挽回先王之道。然而，圣学晦暗已经很久远，霸道之术流传影响又十分深，即使是贤明睿智的人也难免有所习染。他们宣传、修饰圣学，并希望圣学发扬光大，实际上却是增加霸道之术的影响，圣学的踪影却再也看不到了。于是产生了解释字义的训诂学，传授课程以图虚名；产生了记诵圣学的学问，满口圣人之言冒充博学；产生了填词作诗的学问，以文字铺陈华丽为美。类似的学问纷纷扰扰，在世上群起争斗，不知道有多少家！他们流派众多，不知道该听谁的。世上的学者如同进了一百场戏同时在表演的戏场，只见到欢呼跳跃、争奇斗巧、献媚取悦的戏子从四面八方涌来，前前后后，应接不暇，使得人的耳目眩晕，精神恍惚，日日夜夜都浸淫其间，就会像丧心病狂的人一样，不知道自己的家在哪里。当时的君主也沉迷于这类学问，终身从事无用的虚文，都不知道自己在说些什么。偶尔有人能认识到这些学说空疏荒诞、杂乱不通，于是奋发努力，想干点实事，但他们所能做到的极致，也只不过是像春秋五霸那样富国强兵的功利事业罢了。\n\n圣人的学问日益疏远而晦暗，功利的习气却一日盛过一日。中间虽然有被佛家、道家蛊惑的人，但这两家的学问最终也无法战胜功利之心；虽然有人试图拿群儒的学说来居中调和，但群儒的学问也无法破除功利之心。时至今日，功利之心的毒害已经深入骨髓，经由习气成为人的本性已经几千年了。人们在知识上互相比较，在权势上互相倾轧，在利益上互相争夺，在技能上互相攀比，在声誉上互相竞争。那些围观的人，管理钱粮的还想兼管军事和司法，掌管礼乐的又想参与吏部的事务，在郡县做官的又想到省里做大官，位居监察之职的又垂涎着宰相的位置。原本没有某方面才能的人理应不能兼任这方面的官职，不知道某方面理论的人理应不能获得相应的名誉，而实际的情况却是：擅长记诵，正助长了他们的傲慢；知识丰富，正促使他们为恶；见闻广博，却使得他们肆意诡辩；文采富丽，正掩饰了他们的虚伪。所以皋陶、夔、后稷、契都不能兼任的事，而今天初学的小孩儿却都想通晓各种理论、探究各种方法。他们打出的名号都是“我想要完成天下人共同的事业”，他们的真实想法却是，不知道这些学问恐怕就不能满足自己的欲望。\n\n唉！在这样的积习影响下，存有着这样的心志，又讲求这样的学问，当他们听到我说圣人的教诲时，当然视为累赘和迂腐的学问。他们认为良知没什么可说的，圣人的学说没什么用处，这也是时势的必然啊！唉！生在这样的时代还要怎么探求圣人的学问呢！还要怎么谈论圣人的学问呢！生在这样一个时代却还想做学问的人，不是十分繁杂、困难吗！不是十分痛苦、艰险吗！唉，太可悲了！\n\n万幸的是天理自在人心，终究不会泯灭，良知的光明即便历经万古也不会变化。所以听了我的正本清源的论述，有识之士必当悲伤痛苦，奋然而起，就像决口的江河难以抵御。如果没有天下间豪杰之士的到来，我还能寄望于谁呢？\n\n启问道通\n书"],["中","一四三","诚意","吴、曾两生至，备道道通恳切为道之意，殊慰相念。若道通，真可谓笃信好学者矣。忧病中会，不能与两生细论，然两生亦自有志向肯用功者，每见辄觉有进。在区区诚不能无负于两生之远来，在两生则亦庶几无负其远来之意矣。临别以此册致道通意，请书数语。荒愦无可言者，辄以道通来书中所问数节，略于转语奉酬。草草殊不详细，两生当亦自能口悉也。\n\n来书云：“日用工夫只是立志，近来于先生诲言时时体验，愈益明白。然于朋友不能一时相离，若得朋友讲习，则此志才精健阔大，才有生意。若三五日不得朋友相讲，便觉微弱，遇事便会困，亦时会忘。乃今无朋友相讲之日，还只静坐，或看书，或游衍经行，凡寓目措身，悉取以培养此志，颇觉意思和适。然终不如朋友讲聚，精神流动，生意更多也。离群索居之人，当更有何法以处之？”\n\n此段足验道通日用工夫所得。工夫大略亦只是如此用，只要无间断，到得纯熟后，意思又自不同矣。大抵吾人为学，紧要大头脑，只是立志。所谓困、忘之病，亦只是志欠真切。今好色之人，未尝病于困忘，只是一真切耳。自家痛痒自家须会知得，自家须会搔摩得。既自知得痛痒，自家须不能不搔摩得，佛家谓之“方便法门”。须是自家调停斟酌，他人总难与力，亦更无别法可设也。","吴、曾两位年轻人到我这儿来，向我详细说明了你恳切求道的心意，令我十分欣慰。像你这样的人，真可以说是笃信好学的学生。我正为家父守丧，心情抑郁，未能与两位年轻人详谈，但他们也是有志向、能用功的人，每次见到都有所长进。于我而言，实在不能辜负两位远道而来的诚意；对两位而言，或许也没有辜负自己远道而来的心意。临别之时，他们以此书来转达对你的致意，要我写几句话。我此时脑袋糊涂，没太多想说的，就只好对你信中提到的几个问题略加解释，算是有一个交代。草草数语，不甚详细，他们两位会向你亲口转达的。\n\n来信写道：“先生平日教诲：‘平时用功只是立志’，近来时时对此加以体会验证，想得更加明白。然而我却不能一时一刻离开朋友，如果有朋友互相讨论讲习，志向便会强盛宏大，才会生气勃勃。如果三五天不和朋友们讨论讲习，便会觉得志向微弱，遇到事情就会困惑，有时甚至忘记了志向。如今没有朋友讨论讲习的日子，我就静坐沉思，或者看看书，或者到处走走，举手投足之间，都不忘记培养心志，深感心态平和舒适。但终究不如与朋友讲学时的精神奔流来得更有生意。离群索居之人，有什么更好的方法可以维持志向？”\n\n这段话充分验证了你平日功夫的收获。功夫大体上也就是如此，只要不间断，等到纯熟之后，自然会有所不同。一般而言，我们做学问最重要的就是立志，你所说的困惑、遗忘的毛病也只是志向还不真切。比如好色之徒，从来就没有困惑、遗忘的毛病，就是因为好色的欲念真切得很。自己的痛痒只有靠自己才能知道，靠自己去挠痒按摩。既然知道自己的痛痒，也就不得不挠痒按摩了，佛家所说的“方便法门”正是这个意思。必须自己考虑斟酌，别人很难帮得上忙，也没有别的方法可用。"],["中","一四四","事上磨练","来书云：“上蔡\n尝问‘天下何思何虑’，伊川云：‘有此理，只是发得太早。\n’\n在学者工夫，固是‘必有事焉而勿忘’，然亦须识得‘何思何虑’底气象，一并看为是。若不识得这气象，便有正与助长之病；若认得‘何思何虑’，而忘‘必有事焉’工夫，恐人堕于无也。须是不滞于有，不堕于无，然乎否也？”\n\n所论亦相去不远矣，只是契悟未尽。上蔡之问，与伊川之答，亦只是上蔡、伊川之意，与孔子《系辞》原旨稍有不同。《系》言“何思何虑”，是言所思所虑只是一个天理，更无别思别虑耳，非谓无思无虑也。故曰：“同归而殊途，一致而百虑，天下何思何虑？”云“殊途”，云“百虑”，则岂谓无思无虑邪？心之本体即是天理。天理只是一个，更有何可思虑得？天理原自寂然不动，原自感而遂通。学者用功，虽千思万虑，只是要复他本来体用而已，不是以私意去安排思索出来。故明道云：“君子之学，莫若廓然而大公，物来而顺应。”\n若以私意去安排思索便是“用智自私”\n矣。“何思何虑”正是工夫。在圣人分上，便是自然的：在学者分上，便是勉然的。伊川却是把作效验看了，所以有“发得太早”之说。既而云“却好用功”，则已自觉其前言之有未尽矣。濂溪主静之论亦是此意。今道通之言，虽已不为无见，然亦未免尚有两事也。","来信写道：“谢良佐先生曾问‘天下有什么可以思虑’，程颐先生说：‘有这个道理，但是你说得太早了。’从学者的功夫来说，固然应该是‘时刻在事上磨炼，时刻不要忘记’，然而却也需要认识到‘何思何虑’的气象，两者合并来看才对。如果不明白这种气象，就有孟子所说的‘拔苗助长’的毛病；如果明白‘何思何虑’，却忘记‘必有事焉’的功夫，恐怕又有堕入虚无的毛病了。必须既不滞留于有，也不堕落于无。这样说对吗？”\n\n你所说得也相差不远，只是还没有彻底领悟。谢良佐的问题和程颐先生的回答只是谢良佐和程颐的意思，与孔子《系辞》里的本意略有不同。《系辞》说“何思何虑”，是说所思所虑只是天理，没有别的思虑，并不是完全没有思虑的意思。所以说：“同归而殊途，一致而百虑，天下何思何虑？”说“殊途”，说“百虑”，又怎么能说“无思无虑”呢？心的本体就是天理，天理只有一个，还有什么别的可以思虑的吗？天理原本寂然不动，原来一感就通。学者下功夫，虽然反复思虑，也只是要恢复天理的本体与作用，并不是靠一己的私意思索安排个别的什么。所以程颢先生说：“君子之学，莫若廓然而大公，物来而顺应。”如果以自己的私意思索安排，便是“为私欲而耍小聪明”了。“何思何虑”正是为学的功夫，对圣人来说这是自然而然的，对学者来说则要勉力才能做到。程颐先生把它看作是功夫的结果，所以他说“发得太早”，接着又说“这正是所要下的功夫”，他已然觉察到前言尚有未尽之处。如今你的看法，虽然已经算是有所见识，但还是免不了将功夫和本体视作两件事。"],["中","一四五","致良知","来书云：“凡学者才晓得做工夫，便要识认得圣人气象。盖认得圣人气象，把做准的，乃就实地做工夫去，才不会差，才是作圣工夫。未知是否？”\n\n先认圣人气象，昔人尝有是言矣，然亦欠有头脑。圣人气象自是圣人的，我从何处识认？若不就自己良知上真切体认，如以无星之秤而权轻重，未开之镜而照妍媸。真所谓以小人之腹，而度君子之心矣。圣人气象何由认得？自己良知原与圣人一般，若体认得自己良知明白，即圣人气象不在圣人而在我矣。程子尝云；“觑着尧，学他行事，无他许多聪明睿智，安能如彼之动容周旋中礼？”又云，“心通于道，然后能辨是非。”\n今且说通于道在何处？聪明睿智从何处出来？","来信写道：“为学之人刚刚明白如何做功夫，便需要认识圣人的气象。大概认识圣人的气象之后，将之作为标准，脚踏实地下功夫才不会出差错，这才是学做圣人的功夫。不知这样对不对？”\n\n先去体认圣人的气象，以前也有人这样说，只是这样做的话便缺少了为学的宗旨。圣人的气象是圣人的，我从哪里去体认？如果不从自己的良知上真切地去体认，好比拿没有准星的秤去称重，拿没有磨过的镜子去照美丑。这是所谓以小人之心，度君子之腹了。圣人的气象从何处体认呢？我们自己的良知与圣人是一样的，如果能够明白体认自己的良知，那么圣人的气象便不在圣人，而在我们身上了。程颐先生曾说：“看着尧，学他做事，却不及他聪明睿智，如何能够像他那般一举一动都符合礼呢？”他又说，“心与天道相通，便能明辨是非。”现在你且说说心所通达于天道的地方在哪里呢？聪明睿智又从哪儿来呢？"],["中","一四六","致良知","来书云：“事上磨练。一日之内，不管有事无事，只一意培养本原。若遇事来感，或自己有感，心上既有觉，安可谓无事？但因事凝心一会，大段觉得事理当如此，只如无事处之，尽吾心而已。然仍有处得善与未善，何也？又或事来得多，须要次第与处，每因才力不足，辄为所困，虽极力扶起而精神已觉衰弱。遇此未免要十分退省\n，宁不了事，不可不加培养。如何？”\n\n所说工夫，就道通分上也只是如此用，然未免有出入在。凡人为学，终身只为这一事。自少至老，自朝至暮，不论有事无事，只是做得这一件，所谓“必有事焉”者也。若说“宁不了事，不可不加培养”，却是尚为两事也。“必有事焉而勿忘勿助”，事物之来，但尽吾心之良知以应之，所谓“忠恕违道不远”\n矣。凡处得有善有未善及有困顿失次之患者，皆是牵于毁誉得丧，不能实致其良知耳。若能实致其良知，然后见得平日所谓善者未必是善，所谓未善者却恐正是牵于毁誉得丧，自贼其良知者也。","来信写道：“先生说‘要在事上磨炼’，一天之内，无论有事无事，都要一心培养心的本体。如果遇到事情有所感动，或者自己心中生出感觉，心中既然有所感，怎能说是无事呢？但是根据事情再仔细思考一下，大概会觉得事情的道理也应当如此，只是当作没什么事一样对待，尽自己的本心罢了。但是仍然会有事情处理得好坏，为什么呢？另外，有时事情很多，需要依次解决，时常因为才力不足，总为事情所困，虽然极力坚持，但精神已然衰弱。遇到这样的情况，难免要退下来反省自己，宁可不做事，也不能不存养此心。这样说对吗？”\n\n你所说的功夫，对你这样天分的人来说，也就是这样了，然而难免还有一些出入。做学问的人，终身只做这一件事，从小到老，从早到晚，无论有事无事，都只做此一件事，这就是“必有事焉”的意思。如果说“宁可不做事，也不能不存养此心”，却变成两件事了。“必有事焉而勿忘勿助”，有事情发生便发挥心中的良知以应对，这便是所谓“忠恕违道不远”的意思。凡是处理得有好有坏，以及有困扰混乱的毛病，都是被毁誉得失所牵累，无法切实地致良知。如果能够切实地致良知，那么平日所谓处理得好的事情未必就是好，所谓处理得不好的事情未必就是不好，恐怕正是由于担心毁誉得失所致，自己毁去了良知吧。"],["中","一四七","格物","来书云：“致知之说，春间再承诲益，已颇知用力，觉得比旧尤为简易。但鄙心则谓与初学言之，还须带格物意思，使之知下手处。本来致知、格物一并下，但在初学未知下手用功，还说与格物，方晓得致知。”云云。\n\n格物是致知功夫，知得致知便已知得格物；若是未知格物，则是致知工夫亦未尝知也。近有一书\n与友人论此颇悉，今往一通，细观之，当自见矣。","来信写道：“关于致知的学说，春天再次蒙先生教诲，已经明白应该在何处用力，甚至觉得比旧说更为简明。但是我认为对初学者来说，还应该加上格物的意思，使得他们知道从何处下手。本来致知、格物就是统一的，但对于那些初学还不知道如何下功夫的人来说，还是应该先跟他们说格物，这样才能明白致知的意思吧。”等等。\n\n格物是致知的功夫，明白致知自然就能明白格物了。如果不明白格物，那么也无法明白致知的功夫。最近有一封给朋友的信对于这个问题讨论得颇为详细，现在也寄给你，你仔细看看自然会明白。"],["中","一四八","立志","来书云：“今之为朱、陆之辨者尚未已。每对朋友言，正学不明已久，且不须枉费心力为朱、陆争是非，只依先生‘立志’二字点化人。若其人果能辨得此志来，决意要知此学，已是大段明白了，朱、陆虽不辨，彼自能觉得。又尝见朋友中见有人议先生之言者，辄为动气。昔在朱、陆二先生所以遗后世纷纷之议者，亦见二先生工夫有未纯熟，分明亦有动气之病。若明道则无此矣。观其与吴涉礼\n论介甫\n之学云：‘为我尽达诸介甫，不有益于他，必有益于我也。’\n气象何等从容！尝见先生与人书\n中亦引此言，愿朋友皆如此，如何？”\n\n此节议论得极是极是，愿道通遍以告于同志，各自且论自己是非，莫论朱、陆是非也。以言语谤人，其谤浅。若自己不能身体实践，而徒入耳出口，呶呶度日，是以身谤也，其谤深矣。凡今天下之论议我者，苟能取以为善，皆是砥砺切磋我也，则在我无非譥惕修省进德之地矣。昔人谓“攻吾之短者是吾师”\n，师又可恶乎？","来信写道：“如今为朱熹、陆九渊争辩的人还未止息。我常常对学友们说，圣学不彰明已然很久了，不必枉费心思为朱陆争辩谁对谁错，只要按照先生‘立志’二字来点拨人。如果这人能够辨清志向，决心要了解圣学，那么他大体上已经明白了，朱、陆谁对谁错不必去争辩，他自己也能有所觉察。我曾经听闻学友中有人议论先生就十分生气。昔日朱熹、陆九渊二位先生给后世遗留下许多争议，这说明两位先生的功夫还未纯熟，明显还有意气用事的毛病。像程颢先生就没有这个毛病。他同吴师礼议论王安石的学问时说：‘请把我的观点全都告诉介甫，即便对他没有益处，对我却必然是有益的。’气度胸襟是何等地从容！我曾经看到先生在给别人的信中也引用过这句话，希望学友们都这样，对吗？”\n\n这段话说得太对、太好了，还望你告诉同道们，各自只反省自己的是非，不要议论朱、陆二人的是非。用言语毁谤别人，这种毁谤是肤浅的。如果自己不能亲身实践，只是左耳进右耳出，整天唠唠叨叨，这是用行动去毁谤自己，这样的毁谤就严重了。但凡天下间有议论我的人，假如有人能从中得到益处，那他们都是跟我切磋磨砺，对我来说也无非是警惕反省、修学进德之处。荀子说“攻击我缺点的人都是我的老师”，难道我要去厌恶自己的老师吗？"],["中","一四九","论学","来书云：“有引程子‘人生而静，以上不容说，才说性便已不是性。’\n何故不容说？何故不是性？晦庵答云：‘不容说者，未有性之可言；不是性者，已不能无气质之杂矣。’\n二先生之言皆未能晓，每看书至此，辄为一惑，请问。”\n\n“生之谓性”\n，生字即是气字，犹言“气即是性”也。气即是性，“人生而静，以上不容说”，才说“气即是性”，即已落在一边，不是性之本原矣。孟子性善，是从本原上说。然性善之端，须在气上始见得，若无气亦无可见矣。恻隐、羞恶、辞让、是非即是气。程子谓：“论性不论气，不备；论气不论性，不明。”\n亦是为学者各认一边，只得如此说。若见得自性明白时，气即是性，性即是气，原无性、气之可分也。","来信写道：“有人引用程子‘人天生就处于静中，静以上的状态都没法说，才说性时便已不是性’这句话问朱熹：为什么不能说？为什么不是性？朱熹回答说：‘不能说是没有性可说；不是性，是说已然有气质夹杂在性里头。’两人间的对话我都不明白，每次书读到这里，总会有疑惑，故向先生请教。”\n\n“生之谓性”，“生”字就是“气”字，也就是说“气”就是“性”。气就是性，“人天生就处于静中，这以上就不能说了”，才说“气即是性”，这样就把性落在一边，并非性的本来状态了。孟子所说的“性善”，是从性的本原上说的。然而性善的端倪，却要在气上才能看见，如果没有气也无法见到性。恻隐、羞恶、辞让、是非都是气。程颐说：“论性不论气就不全面；论气不论性就不明白。”这是由于为学之人各自只看到一边，只好这样说。如果能明白地看到自己的天性，那么气便是性，性便是气，原本没有性与气的区分。\n\n答陆原静书"],["中","一五〇","静与动","来书云：“下手工夫，觉此心无时宁静，妄心固动也，照心亦动也。心既恒动，则无刻暂停也。”\n\n是有意于求宁静，是以愈不宁静耳。夫妄心则动也，照心非动也。恒照则恒动恒静，天地之所以恒久而不已也。照心固照也，妄心亦照也。“其为物不二，则其生物不息。”\n有刻暂停则息矣，非至诚无息\n之学矣。","来信写道：“下功夫时，感觉心中没有一刻宁静，烦乱之心固然在动，澄明之心也在动。心既然一直在动，就没有一刻停息了。”\n\n你这是有意追求宁静，因此愈发不得宁静。烦乱之心自然是动，但澄明之心实则未动。一直维持心体的澄明，心就处于恒久的即动即静的状态，天地万物也正因此而恒久不息。澄明之心固然使得心体澄明，然而烦乱之心也能使得心体澄明。《中庸》说：“其为物不二，则其生物不息。”有一瞬的停息便会灭亡，便不是最为诚挚、没有丝毫止息的学问了。"],["中","一五一","致良知","来书云：“良知亦有起处。”云云。\n\n此或听之未审。良知者心之本体，即前所谓恒照者也。心之本体无起无不起。虽妄念之发，而良知未尝不在，但人不知存，则有时而或放耳；虽昏塞之极，而良知未尝不明，但人不知察，则有时而或蔽耳；虽有时而或放，其体实未尝不在也，存之而已耳；虽有时而或蔽，其体实未尝不明也，察之而已耳。若谓良知亦有起处，则是有时而不在也，非其本体之谓矣。","来信写道：“良知也有发端之处。”等等。\n\n这或许是你听得不明白。良知就是心的本体，就是前面提到的恒照。心的本体无所谓发端不发端。即使妄念生出来，良知也依然存在，但人们不知道要存养良知，所以有时会失去它；即使心体昏闭阻塞到了极致，良知也依然光明，只是人们不知要去体察，所以有时会被遮蔽。即便有时会失去良知，但其本体尚在，存养它就行了；即使有时会遮蔽良知，但良知本体还是明白的，只要下体察的功夫就可以了。如果说良知也有发端之处，就是认为它有时不存在，那就不是良知的本体了。"],["中","一五二","修行语录","“精一”之“精”以理言，“精神”之“精”以气言。理者气之条理，气者理之运用。无条理则不能运用，无运用则亦无以见其所谓条理者矣。精则精，精则明，精则一，精则神，精则诚；一则精，一则明，一则神，一则诚。原非有二事也，但后世儒者之说与养生之说各滞于一偏，是以不相为用。前日“精一”之论，虽为原静爱养精神而发，然而作圣之功，实亦不外是矣。","（来信写道：“前些日子先生谈到‘精一’，这是不是就是做圣人的功夫？”）\n\n“精一”的“精”是就理而言，“精神”的“精”是就气而言。理是气的条理，气是理的运用。没有条理则不能运用，没有运用则无法看到条理。做到了精，就可以精致、明白、专一、神妙、诚挚；做到专一，就可以精致、明白、神妙、诚挚。精和一实则是一回事，只是后世儒者的学说与道家的养生学说各执一偏，无法相互促进。前些日子我说的“精一”之论，虽然是针对你喜欢存养自己的精神而发的，不过做圣人的功夫，也不外乎此。"],["中","一五三","致良知","来书云：“元神、元气、元精，必各有寄藏发生之处。又有真阴之精、真阳之气。”云云。\n\n夫良知一也，以其妙用而言谓之“神”，以其流行而言谓之“气”，以其凝聚而言谓之“精”，安可以形象方所求哉？真阴之精，即真阳之气之母；真阳之气，即真阴之精之父。阴根阳，阳根阴\n，亦非有二也。苟吾良知之说明，即凡若此类，皆可以不言而喻。不然，则如来书所云三关、七返、九还之属\n，尚有无穷可疑者也。","来信写道：“元神、元气、元精，必然各有寄托、储藏、发生之处。又有真阴之精、真阳之气。”等等。\n\n良知只有一个，就它的妙用而言称之为“神”，就它的流动而言称之为“气”，就它的凝聚而言称之为“精”，怎么能够根据形象、方位和处所来把握呢？真阴之精就是真阳之气的母体；真阳之气就是真阴之精的父体。阴植根于阳，阳植根于阴，阴阳也是统一的。如果我的良知学说能够彰明于天下，类似的问题都能够不言自明。如若不然，就像你信中提到的三关、七返、九还之类的说法，还会有无穷无尽的疑问。\n\n又"],["中","一五四","致良知","来书云：“良知，心之本体，即所谓‘性善’也，未发之中也，寂然不动之体也，廓然大公也，何常人皆不能而必待于学邪？中也、寂也、公也，既以属心之体，则良知是矣。今验之于心，知无不良，而中、寂、大公实未有也，岂良知复超然于体用之外乎？”\n\n性无不善，故知无不良。良知即是未发之中，即是廓然大公、寂然不动之本体，人人之所同具者也。但不能不昏蔽于物欲，故须学以去其昏蔽。然于良知之本体，初不能有加损于毫末也。知无不良，而中、寂、大公未能全者，是昏蔽之未尽去，而存之未纯耳。体即良知之体，用即良知之用，宁复有超然于体用之外者乎？","来信写道：“良知是心的本体，就是所谓‘性善’，就是感情未发出来时的中正，就是寂然不动的本体，就是廓然大公，为何常人一定要经过学习才能达到呢？中和、寂静、公正的品德，既然属于心的本体，就是良知。如今在心中验证，良知都是好的，然而中和、寂静、公正的品德却没有，难道良知是超然于体用之外的吗？”\n\n性没有不善的，故而知没有不良的。良知就是未发之中、廓然大公、寂然不动的本体，人人都具备。但是良知不能不为物欲所昏蔽，因此需要通过学习去除昏蔽。不过这对于良知的本体不会有丝毫损害。知没有不良的，然而中和、寂静、公正的品德无法完全具备，是因为昏蔽没有除尽，良知存养还没有达到纯熟罢了。体就是良知的本体，用就是良知的作用，哪里有什么超然于体用之外的良知呢？"],["中","一五五","静与动","来书云：“周子曰‘主静’\n，程子曰‘动亦定，静亦定’，先生曰‘定者，心之本体’。是静、定也，决非不睹不闻、无思无为之谓，必常知、常存、常主于理之谓也。夫常知、常存、常主于理，明是动也，已发也，何以谓之静？何以谓之本体？岂是静、定也，又有以贯乎心之动静者邪？”\n\n理无动者也。常知、常存、常主于理，即不睹不闻、无思无为之谓也。不睹不闻、无思无为，非槁木死灰之谓也，睹闻思为一于理，而未尝有所睹闻思为，即是动而未尝动也。所谓“动亦定，静亦定”，体用一原者也。","来信写道：“周敦颐先生说‘主静’，程颢先生说‘动亦定，静亦定’，先生说‘定者，心之本体’。所谓静和定，绝不是不看不听、不想不做的意思，而是一定要时常认知、存养、遵从天理的意思。所谓认知、存养、遵从天理，明明就是动，属于已发的范畴，为何称之为静呢？为何称之为本体呢？难道这个静和定，是贯通心的动静的吗？”\n\n天理是不动的。时常认知、存养、遵循天理，就是不看不听、不思不做的意思。不看不听、不思不做，并不是说身如槁木、心如死灰，而是看、听、思、为都专注于天理，没有其他的看、听、思、为，这就是动却不曾动。程颢先生所说的“动亦定，静亦定”，是指本体和作用原本就是统一的意思。"],["中","一五六","致良知","来书云：“此心‘未发’之体，其在‘已发’之前乎？其在‘已发’之中而为之主乎？其无前后、内外而浑然之体者乎？今谓心之动静者，其主有事无事而言乎？其主寂然、感通而言乎？其主循理、从欲而言乎？若以循理为静，从欲为动，则于所谓‘动中有静，静中有动\n’\n‘动极而静，静极而动’者，不可通矣；若以有事而感通为动，无事而寂然为静，则于所谓‘动而无动，静而无静’\n者，不可通矣。若谓‘未发’在‘已发’之先，静而生动，是至诚有息也，圣人有复\n也，又不可矣；若谓‘未发’在‘已发’之中，则不知‘未发’‘已发’俱当主静乎？抑‘未发’为静而‘已发’为动乎？抑‘未发’‘已发’俱无动无静乎？俱有动有静乎？幸教。”\n\n“未发之中”，即良知也，无前后、内外而浑然一体者也。有事、无事可以言动、静，而良知无分于有事、无事也；寂然、感通可以言动、静，而良知无分于寂然、感通也。动、静者，所遇之时。心之本体固无分于动、静也。理无动者也，动即为欲。循理则虽酬酢万变而未尝动也；从欲则虽槁心一念而未尝静也。“动中有静，静中有动”，又何疑乎？有事而感通固可以言动，然而寂然者未尝有增也；无事而寂然固可以言静，然而感通者未尝有减也。“动而无动，静而无静”，又何疑乎？无前后内外而浑然一体，则至诚有息之疑不待解矣。“未发”在“已发”之中，而“已发”之中未尝别有“未发”者在；“已发”在“未发”之中，而“未发”之中未尝别有“已发”者存。是未尝无动、静，而不可以动、静分者也。\n\n凡观古人言语，在以意逆志而得其大旨，若必拘滞于文义，则“靡有孑遗”\n者，是周果无遗民也。周子“静极而动”之说，苟不善观，亦未免有病。盖其意从“太极动而生阳，静而生阴”说来。太极生生之理，妙用无息，而常体不易。太极之生生，即阴阳之生生。就其生生之中，指其妙用无息者而谓之动，谓之阳之生，非谓动而后生阳也；就其生生之中，指其常体不易者而谓之静，谓之阴之生，非谓静而后生阴也。若果静而后生阴，动而后生阳，则是阴阳、动静，截然各自为一物矣。阴阳一气也，一气屈伸而为阴阳；动静一理也，一理隐显而为动静。春夏可以为阳为动，而未尝无阴与静也；秋冬可以为阴为静，而未尝无阳与动也。春夏此不息，秋冬此不息，皆可谓之阳，谓之动也。春夏此常体，秋冬此常体，皆可谓之阴，谓之静也。自元、会、运、世、岁、月、日、时以至刻、秒、忽、微\n，莫不皆然。所谓“动静无端，阴阳无始”\n，在知道者默而识之，非可以言语穷也。若只牵文泥句，比拟仿像，则所谓“心从《法华》转，非是转《法华》”\n矣。","来信写道：“人心‘未发’的本体，是在‘已发’之前呢？还是在‘已发’之中并主导着‘已发’？或者是‘未发’‘已发’不分先后、内外，浑然一体？如今所说的心之动静，是就有事、无事来说的呢？还是就寂然不动、感应相通来说的呢？抑或是就遵循天理、迁就私欲来说的？如果以依循天理为静，迁就私欲为动，那么‘动中有静，静中有动’，‘动极而静，静极而动’就说不通了；如果以有事感通为动，无事寂然为静，那么‘动而无动，静而无静’就说不通了。如果说‘未发’在‘已发’之前，静而生动，那么最为诚挚的心体便会有所止息，圣人便要通过功夫才能恢复德性，这又说不通；如果说‘未发’在‘已发’之中，那么不知道‘未发’‘已发’都主于静呢，还是‘未发’为静、‘已发’为动呢？或者‘未发’‘已发’都是无动无静、有动有静呢？请先生赐教。”\n\n“感情未发出来时的中正”就是良知，是没有前后、内外的浑然一体的存在。有事、无事可以说是动、静，然而良知却不能分有事、无事；寂然、感通可以说是动、静，而良知却不能分寂然、感通。动与静是所处的时机，心的本体固然没有动与静的区分。天理不动，动就是私欲。只要依循天理，虽然处于人事万变之中却也未曾动；迁就私欲，即便心如槁木也未曾静。“动中有静，静中有动”，又有什么好怀疑的？有事时的感通固然可以说是动，然而寂然不动的心却也未曾增加；无事时的寂然固然可以说是静，然而感通运动的心也未曾减少。“动而无动，静而无静”，又有什么疑问呢？良知没有前后、内外的差别，浑然一体，那么对“至诚有息”的怀疑就不用解释了。“未发”在“已发”之中，但“已发”之中未尝还有一个“未发”存在；“已发”在“未发”之中，但“未发”之中未尝还有一个“已发”存在。由此可见，其实不能说没有动、静，只是不能用动、静来区分心体罢了。\n\n凡是看古人的言辞，在于用心体察、通晓其义，如果拘泥于文字，那么“靡有孑遗”这句就该理解为周朝确实没有遗民了。周敦颐“静极而动”的说法，如果不审慎看待，也难免会出错。大概他想要表达的意思是从“太极动而生阳，静而生阴”说下来的。太极生生不息的道理，妙用无穷，但本体却恒定不变。太极的生生不息，就是阴阳的生生不息。在其生生不息之中，就其妙用无穷来说就是动，阳在此运动中得以产生，而不是运动后才产生阳；在其生生不息之中，就其本体恒定不变来说就是静，阴在此静止中得以产生，而不是静止后才产生阴。如果真的是静止后才生阴，运动后才生阳，那么阴阳、动静就各自分别是不同的物了。阴阳是同一种气，气收缩则为阴，气伸展则为阳；动静是同一个道理，理隐蔽起来就是静，理显现出来就是动。春夏可以说是阳和动，但未尝没有阴和静；秋冬可以说是阴和静，但未尝没有阳和动。春夏秋冬变化不息，都可以称之为阳，称之为动；春夏秋冬的常定之态，都可以称之为阴，称之为静。从元、会、运、世、岁、月、日、时，到刻、秒、忽、微，全都是如此。所谓“动静无端，阴阳无始”，这个道理对于通晓大道的人可以默会而知，却无法用言语来表达、穷尽。如果只是拘泥于字句，比拟模仿，那就是所谓“《法华经》支配着心转，不是心支配着《法华经》转”。"],["中","一五七","致良知","来书云：“尝试于心，喜、怒、忧、惧之感发也，虽动气之极，而吾心良知一觉，即罔然消阻，或遏于初，或制于中，或悔于后。然则良知常若居优闲无事之地而为之主，于喜、怒、忧、惧若不与焉者，何欤？”\n\n知此，则知“末发之中”“寂然不动”之体，而有“发而中节”之和、“感而遂通”之妙矣。然谓“良知常若居于优闲无事之地”，语尚有病。盖良知虽不滞于喜、怒、忧、惧，而喜、怒、忧、惧亦不外于良知也。","来信写道：“我曾经在心中验证过喜、怒、忧、惧等感情的生发，即便特别动气的时候，只要我心中良知一有觉醒，就会慢慢消解，有时在一开始动气的时候就得到遏制，有时动气到一半了才得到制止，有时却会在事后再后悔。但是，良知好像时常在悠闲无事的地方主宰着自己的感情，与喜、怒、忧、惧的感情似乎没有什么关系，这是为什么呢？”\n\n你明白了这一点，就明白“未发之中”“寂然不动”的本体，就能体验到“发而中节”的平和，“感而遂通”的妙用了。然而，你却认为“良知好像时常在悠闲无事的地方主宰感情”，这话还有毛病。所谓良知虽然不滞留于喜、怒、忧、惧，然而喜、怒、忧、惧却也不外乎良知。"],["中","一五九","致良知","来书云：“先生又曰‘照心非动也’\n，岂以其循理而谓之静欤？‘妄心亦照也’，岂以其良知未尝不在于其中、未尝不明于其中，而视听言动之不过则者，皆天理欤？且既曰妄心，则在妄心可谓之照，而在照心则谓之妄矣。妄与息何异？今假妄之照以续至诚之无息，窃所未明，幸再启蒙。”\n\n“照心非动”者，以其发于本体明觉之自然，而未尝有所动也，有所动即妄矣；“妄心亦照”者，以其本体明觉之自然者，未尝不在于其中，但有所动耳，无所动即照矣。无妄、无照，非以妄为照，以照为妄也。照心为照，妄心为妄，是犹有妄、有照也。有妄、有照则犹二也。二则息矣。无妄、无照则不二，不二则不息矣。","来信写道：“先生又说‘澄明之心是不动的’，难道是因为遵循天理，所以说它是静的吗？‘烦乱之心也可以使心体澄明’，难道是因为良知未尝不在烦乱之心当中、未尝不澄明于烦乱之心当中，人的视听言动能够不越过准则，都是天理的作用吗？既然说是烦乱之心，那么良知对于它来说就是澄明的，而对于澄明之心来说就是烦乱的。妄动与停息有什么区别呢？现在把烦乱之心内有澄明与用心至诚没有停息联系起来，我还有不明白的地方，请先生再次指教。”\n\n“澄明之心是不动的”，是因为它来自心之本体的自然明觉，所以不曾动，动了便是妄；“烦乱之心也可以使心体澄明”，是因为心之本体的自然明觉未尝不在其中，只是有所动，不动便是照。说无妄、无照，并非将妄心当作照心，将照心当作妄心。把照心当作照，把妄心当作妄，这依然是有妄与照的区分。有妄与照的区分就是将心一分为二。把心一分为二，心体便有所停息。没有妄与照的区分就不会有二心，没有二心，心体就不会停息。"],["中","一六〇","格物","来书云：“养生以清心寡欲为要。夫清心寡欲，作圣之功毕矣。然欲寡则心自清，清心非舍弃人事而独居求静之谓也，盖欲使此心纯乎天理而无一毫人欲之私耳。今欲为此之功，而随人欲生而克之，则病根常在，未免灭于东而生于西。若欲刊剥洗荡于众欲未萌之先，则又无所用其力，徒使此心之不清。且欲未萌而搜剔以求去之，是犹引犬上堂而逐之也，愈不可矣。”\n\n必欲此心纯乎天理而无一毫人欲之私，此作圣之功也。必欲此心纯乎天理而无一毫人欲之私，非防于未萌之先而克于方萌之际不能也。防于未萌之先而克于方萌之际，此正《中庸》“戒慎恐惧”、《大学》“致知格物”之功，舍此之外，无别功矣。夫谓“灭于东而生于西”“引犬上堂而逐之”者，是自私自利、将迎意必之为累，而非克治洗荡之为患也。今曰“养生以清心寡欲为要”，只“养生”二字便是自私自利、将迎意必之根。有此病根潜伏于中，宜其有“灭于东而生于西”“引犬上堂而逐之”之患也。","来信写道：“养生的诀窍在于清心寡欲。能清心寡欲，做圣人的功夫也就到位了。然而，欲望少了心自然清净了，清净之心并不是说要舍弃人事、离群索居以求清净，而是说要使得心中纯粹都是天理而没有一丝一毫的私欲。现在想要做这样的功夫，但如果人欲一出现就克制它，这样的话病根并未除去，难免会克制了这里的私欲，别的私欲又冒出来。如果想要将各种私欲在还没有萌生出来的时候就扫除涤荡干净，却不知从何处下手，这样只会使得自己心中不得清净。况且想要在私欲萌生之前搜寻剔除干净，就好比是把狗牵到堂上再把它赶下去，这样就更做不到了。”\n\n务必要使自己心中纯粹都是天理、没有一丝一毫的私欲，才能算是做圣人的功夫。而要做到这一点，必须在私欲萌生之前就防范克制。而这正是《中庸》所谓“戒慎恐惧”、《大学》所谓“致知格物”的功夫，除此之外，没有别的功夫了。你所说的“制了这边的私欲，别的私欲又冒出来”“把狗牵到堂上再把它赶下去”，这是被自私自利、有意安排、刻意思索所牵累，并不是克制涤荡私欲本身的问题。如今你说“养生的诀窍在于清心寡欲”，单这“养生”两个字就是自私自利、有意安排、刻意思索的病根。只要这个病根潜伏在心中，自然会产生“这边的私欲克制了，别的私欲又冒出来”“把狗牵到堂上再把它赶下去”的毛病。"],["中","一六一","致良知","来书云：“佛氏于‘不思善、不思恶时认本来面目’\n，于吾儒‘随物而格’之功不同。吾若于不思善、不思恶时用致知之功，则已涉于思善矣。欲善恶不思而心之良知清静自在，惟有寐而方醒之时耳，斯正孟子‘夜气’之说。但于斯光景不能久，倏忽之际，思虑已生。不知用功久者，其常寐初醒而思未起之时否乎？今澄欲求宁静，愈不宁静；欲念无生，则念愈生。如之何而能使此心前念易灭，后念不生，良知独显而与造物者游\n乎？”\n\n“不思善、不思恶时认本来面目”，此佛氏为未识本来面目者设此方便。本来面目则吾圣门所谓良知。今既认得良知明白，即已不消如此说矣。“随物而格”，是致知之功，即佛氏之“常惺惺”\n，亦是常存他本来面目耳。体段功夫大略相似。但佛氏有个自私自利之心，所以便有不同耳。今“欲善恶不思而心之良知清静自在”，此便有自私自利、将迎意必之心，所以有“不思善、不思恶时用致知之功，则已涉于思善”之患。孟子说“夜气”，亦只是为失其良心之人指出个良心萌动处，使他从此培养将去，今已知得良知明白，常用致知之功，即已不消说“夜气”，却是得兔后不知守兔而仍去守株，兔将复失之矣。“欲求宁静”“欲念无生”，此正是自私自利、将迎意必之病，是以“念愈生”而“愈不宁静”。良知只是一个良知，而善恶自辨，更有何善何恶可思？良知之体本自宁静，今却又添一个求宁静；本自生生，今却又添一个欲无生。非独圣门致知之功不如此，虽佛氏之学亦未如此将迎意必也。只是一念良知，彻头彻尾，无始无终，即是前念不灭，后念不生。今却欲前念易灭，而后念不生，是佛氏所谓“断灭种性”\n，入于槁木死灰之谓矣。","来信写道：“佛家主张‘在不思善、不思恶的时候体认心的本来面目’，这与我们儒家‘在事物上格心’的功夫不同。我如果在不思善、不思恶时下致知的功夫，其实已经在思善了。想要不思善恶而心中良知清净自在，只有刚睡醒时才能做到，这是孟子所谓‘夜气’的学说。但是这个状态不能维持很久，瞬息之间思虑就产生了。不知道用功日久的人，能够常如睡醒时那样思虑不起吗？如今我想求宁静，却愈发不得宁静；想不生念头，却愈生出念头。怎样才能使得心中前念灭去、后念不生，只有良知与天地大道相合呢？”\n\n“不思善、不思恶时体认本来面目”，这是佛家为了让人认识本来面目而设立的方便法门。本来面目就是圣人所谓的良知。如今既然能明白体认良知，就不需要这么说了。“随物而格”，便是致知的功夫，就是佛家所说的“常惺惺”，也只是时常存养本来面目而已。佛、儒两家的功夫大体相似，但佛家有个自私自利的心，所以有“不思善、不思恶时用致知之功，则已涉于思善”的毛病。孟子说“夜气”，也只是为了给失去良心的人指出一个良心萌动之处，使他能够从此将良心培养起来。如今已然能清楚明白地知道良知，时常用致知的功夫，便不需要说“夜气”，否则就好比得到了兔子还去看着树桩，便会再次丢失兔子。“欲求宁静”“欲念无生”，这正是自私自利、刻意追求的毛病，故而“念愈生”“愈不宁静”。良知只是一个良知，自然分辨善恶，哪还有什么善恶可以思虑？良知的本体自然宁静，如今却又添上一个求宁静；良知的本体自然生生不息，如今却又添上一个欲念不生。并非只有圣学致知的功夫不是如此，即便佛家的学问也不会如此刻意追求。只要一心在良知上，彻头彻尾，无终无始，就是前念不灭、后念不生。如今你却想要前念断灭、后念不生，这是佛家所谓“断灭种性”，这是身如槁木、心如死灰的状态。"],["中","一六二","致良知","来书云：“佛氏又有‘常提念头’之说，其犹孟子所谓‘必有事’，夫子所谓‘致良知’之说乎？其即‘常惺惺’，常记得，常知得，常存得者乎？于此念头提在之时，而事至物来，应之必有其道。但恐此念头提起时少，放下时多，则功夫间断耳。且念头放失，多因私欲客气\n之动而始，忽然惊醒而后提。其放而未提之间，心之昏杂多不自觉。今欲日精日明，常提不放，以何道乎？只此常提不放即全功乎？抑于常提不放之中，更宜加省克之功乎？虽曰常提不放，而不加戒惧克治之功，恐私欲不去。若加戒惧克治之功焉，又为‘思善’之事，而于本来面目又未达一间也。如之何则可？”\n\n戒惧克治即是“常提不放”之功，即是“必有事焉”，岂有两事邪？此节所问，前一段已自说得分晓，末后却是自生迷惑，说得支离，及有“本来面目未达一间”之疑，都是自私自利、将迎意必之为病。去此病自无此疑矣。","来信写道：“佛家还有‘常提念头’的说法，这就好比是孟子所说的‘必有事’，先生所说的‘致良知’吗？也就是‘常惺惺’、常记得、常知道、常存养的意思吗？在提起这个念头的时候，事物来到面前，一定会有恰当的应对方法。但恐怕这个念头提起的时候少，放下的时候多，那样功夫便有中断。况且念头的丧失，大多是因为私欲和外在的气的发动所造成的，要突然惊醒后才能提起来。放下还未提起之前，人心昏暗杂乱且常常不自觉。如今想要心念日益精进明白，常提不放，应该用什么方法呢？只要这个念头常提不放就是全部的功夫吗？还是在常提不放的同时，还要增加反省克制的功夫？虽说常提不放，但不加戒慎恐惧、克制私欲的功夫，恐怕还无法清除私欲。如果加上戒慎恐惧、克制私欲的功夫，又成了“刻意思善”，与心体的本来面目又不能合一。到底该如何做才好？”\n\n戒慎恐惧和克制私欲就是“常提不放”的功夫，就是“必有事焉”，怎么会有两件事？你所问的问题，前面已经说清楚了，后来你自己又产生疑惑，说得支离破碎，才产生“与心体的本来面目不能合一”的疑问，这都是自私自利、刻意求之的弊病。去掉这个毛病，便没有什么疑问了。"],["中","一六三","致良知","来书云：“‘质美者明得尽，渣滓便浑化。’\n如何谓‘明得尽’？如何而能‘更\n浑化’？”\n\n良知本来自明。气质不美者，渣滓多，障蔽厚，不易开明。质美者，渣滓原少，无多障蔽，略加致知之功，此良知便自莹彻。些少渣滓如汤中浮雪，如何能作障蔽？此本不甚难晓，原静所以致疑于此，想是因一“明”字不明白，亦是稍有欲速之心。向曾面论“明善”之义，“明则诚矣”，非若后儒所谓“明善”之浅也。","来信写道：“程颢先生说：‘气质美好的人善德尽显，缺点也都融化消失了。’怎样才算善德‘尽显’？怎样才能使缺点‘融化消失’？”\n\n良知本就自然明白。本质较差的人，缺点较多，对于良知的遮蔽也就愈发厚实，良知便不易呈现明白。本质较好的人，缺点较少，没有太多的遮蔽，稍加致知的功夫，良知就能晶莹透彻。一点点毛病就好比汤中漂浮的雪花，怎能遮蔽良知呢？这本来不难明白，你之所以有疑问，想来是因为这个“明”字的意思不清楚，这也是你有急切的心思所致。以前我和你曾当面讨论过“明善”的含义，“明则诚矣”，并非像朱熹等人对“明善”的解释那样肤浅。"],["中","一六四","致良知","来书云：“聪明睿知，果质乎\n？仁义礼智，果性乎？喜怒哀乐，果情乎？私欲、客气，果一物乎？二物乎？古之英才，若子房、仲舒、叔度、孔明、文中、韩、范\n诸公，德业表著，皆良知中所发也，而不得谓之闻道者，果何在乎？苟曰此特生质之美耳，则生知安行者不愈于学知、困勉者乎？愚意窃云，谓诸公见道偏则可，谓全无闻则恐后儒崇尚记诵训诂之过也。然乎？否乎？”\n\n性一而已。仁义礼知，性之性也；聪明睿知，性之质也，喜怒哀乐，性之情也；私欲、客气，性之蔽也。质有清浊，故情有过、不及，而蔽有浅深也。私欲、客气，一病两痛，非二物也。张、黄、诸葛及韩、范诸公，皆天质之美，自多暗合道妙，虽未可尽谓之知学，尽谓之闻道，然亦自其有学违道不远者也。使其闻学知道，即伊、傅、周、召\n矣。若文中子则又不可谓之不知学者，其书虽多出于其徒，亦多有未是处，然其大略则亦居然可见。但今相去辽远，无有的然凭证，不可悬断其所至矣。\n\n夫良知即是道。良知之在人心，不但圣贤，虽常人亦无不如此。若无有物欲牵蔽，但循着良知发用流行将去，即无不是道。但在常人多为物欲牵蔽，不能循得良知。如数公者，天质既自清明，自少物欲为之牵蔽，则其良知之发用流行处，自然是多，自然违道不远。学者，学循此良知而已。谓之知学，只是知得专在学循良知。数公虽未知专在良知上用功，而或泛滥于多歧，疑迷于影响，是以或离或合而未纯。若知得时，便是圣人矣。后儒尝以数子者尚皆是气质用事，未免于行不著、习不察，此亦未为过论。但后懦之所谓著、察者，亦是狃于闻见之狭，蔽于沿习之非，而依拟仿象于影响形迹之间，尚非圣门之所谓著、察者也。则亦安得以己之昏昏，而求人之昭昭也乎\n？所谓生知安行，“知行”二字亦是就用功上说。若是知行本体，即是良知良能，虽在困勉之人，亦皆可谓之生知安行矣。“知行”二字更宜精察。","来信写道：“聪明睿智，真的是人的禀赋吗？仁义礼智，真的是人的天性吗？喜怒哀乐，真的是人的感情吗？私欲和客气，果真是一件东西，还是两件东西呢？古代的英才，像张良、董仲舒、黄宪、诸葛亮、王通、韩琦、范仲淹等人，功业卓著，都是从他们的良知所发用得来的，但又不能认为他们人人都得闻大道，这到底是为何？如果说他们天资卓著，那么生知安行的人难道不如学知利行和困知勉行的人吗？我猜想：如果说他们对道的认识不全面的话大概可以，但说他们完全没有对道的体认，恐怕就是后世儒者太过崇尚记诵训诂之学所形成的偏见了。对吗？”\n\n性只有一个。仁义礼智，是性的本质；聪明睿智，是性的禀赋；喜怒哀乐，是性的情感；私欲和客气，是性的蔽障。本质有清浊之分，所以情感有过与不及的差异，蔽障有浅和深的不同。私欲和客气，是一种毛病伴随的两种痛苦，并非两种事物。张良、黄宪、诸葛亮，以及韩琦、范仲淹等人，都有天纵的才智，自然与道多有妙合之处，虽然不能说他们完全明白圣学、大道，然而他们的学问离大道并不远。假如他们能够通晓圣学、得闻大道，便是伊尹、傅说、周公、召公了。至于王通，则又不能说他不明白圣学，他的书虽然多出自他弟子之手，也多有不当之处，然而他的学问大体上还是可以看得明白的。不过由于时日相去甚远，没有确实的凭证，无法凭空断定他的学问离圣道到底有多远。\n\n良知即是道。良知自在人心，无论是圣贤，还是常人都是如此。如果没有物欲的牵累、蒙蔽，只是依循良知的发用流行去行事，便无往而非道。但是常人大都为物欲所牵累、蒙蔽，无法依循良知。像上面谈到的那几位，天生的资质清纯明白，物欲牵累较少，良知发用流行之处自然较多，自然离道不远。“学”就是学习如何依循良知。所谓“知学”，就是明白应当一心一意学习依循良知。那几位虽然不明白一心在良知上用功，有的兴趣广泛，受到别的东西影响、迷惑，但假如他们明白这一点，就是圣人了。后世的儒者曾认为他们几个全凭天生的才智才能建功立业，恐怕是不察明事情原委的说法，这样评价他们并不过分。不过，后世的儒者所说的“著”和“察”，也是拘泥于狭隘的见闻，受到旧有的习惯蒙蔽，仿效圣人的影响和事迹，并不是圣学所谓的“著”和“察”。自己还没弄清楚，如何能够使别人通达明白呢？所谓生知安行，“知行”二字也是在功夫上说。如果是知行的本来面貌，就是良知良能，即便是困知勉行的人，也可以说是生知安行。“知行”二字更应该仔细体察。"],["中","一六五","论学","来书云：“昔周茂叔每令伯淳寻仲尼、颜子乐处\n。敢问是乐也，与七情之乐同乎？否乎？若同，则常人之一遂所欲，皆能乐矣，何必圣贤？若别有真乐，则圣贤之遇大忧、大怒、大惊、大惧之事，此乐亦在否乎？且君子之心常存戒惧，是盖终身之忧也\n，恶得乐？澄平生多闷，未尝见真乐之趣，令切愿寻之。”\n\n乐是心之本体，虽不同于七情之乐，而亦不外于七情之乐。虽则圣贤别有真乐，而亦常人之所同有，但常人有之而不自知，反自求许多忧苦，自加迷弃。虽在忧苦迷弃之中，而此乐又未尝不存，但一念开明，反身而诚，则即此而在矣。每与原静论，无非此意，而原静尚有“何道可得”之问，是犹未免于骑驴觅驴之蔽也！","来信写道：“从前周敦颐先生常常要程颢寻找孔子与颜回快乐的原因。敢问孔子、颜回的快乐与七情之乐是一样的吗？如果是一样的，那么常人依循自己的私欲便能快乐，何必还要学做圣贤？如果另外有真正的快乐，那么圣贤遇到大忧、大怒、大惊、大惧的事情，这个真正的快乐还存在吗？况且君子常怀戒慎恐惧之心，终身都怀有忧虑，哪里还有快乐可言？我素来多烦闷，不曾体会过真正的快乐，现在十分真切地想寻找它。”\n\n孔子、颜回的快乐是心的本体，虽然不同于七情之乐，但也不外乎七情之乐。虽然圣贤另有真乐，但也是常人同样具有的，只不过自己不知道，反而自寻许多苦恼，自行迷茫、遗弃真正的快乐。虽然在苦恼迷茫之中，但是真乐又时刻存在，只要一念开明，反求诸己，就能感受到这种快乐。我每次同你讲的都是这个意思，而你还问有何办法可寻，这未免是骑驴找驴啊！"],["中","一六六","致良知","来书云：“《大学》以心有好乐、忿懥、忧患、恐惧为不得其正，而程子亦谓‘圣人情顺万事而无情’\n。所谓有者，《传习录》中以病疟譬之\n，极精切矣。若程子之言，则是圣人之情不生于心而生于物也，何谓耶？且事感而情应，则是是非非可以就格。事或未感时，谓之有则未形也，谓之无则病根在。有无之间，何以致吾知乎？学务无情，累虽轻，而出儒入佛矣，可乎？”\n\n圣人致知之功，至诚无息。其良知之体，皦如明镜，略无纤翳，妍媸之来，随物见形，而明镜曾无留染，所谓“情顺万事而无情”也。“无所住而生其心”，佛氏曾有是言，未为非也。明镜之应物，妍者妍，媸者媸，一照而皆真，即是“生其心”处。妍者妍，媸者媸，一过而不留，即是“无所住”处。病疟之喻，既已见其精切，则此节所问可以释然。病疟之人，疟虽未发，而病根自在，则亦安可以其疟之未发，而遂忘其服药调理之功乎？若必待疟发而后服药调理，则既晚矣。致知之功，无间于有事无事，而岂论于病之已发未发邪？大抵原静所疑，前后虽若不一，然皆起于自私自利、将迎意必之为累。此根一去，则前后所疑，自将冰消雾释，有不待于问辨者矣。","来信写道：“《大学》以心有好乐、愤懑、忧患、恐惧为不得其正，而程颢先生又说‘圣人情顺万事而无情’。所谓有情，《传习录》曾以疟疾为比喻，十分精辟。如果像程颢先生所说，那么圣人之情不是产生于心，而是产生于物了，这是什么意思？况且受到事物的感发而相应地产生内在的感情，其中的是是非非才得以格正。如果没有感受到事物时，说有情则情还未显现，说无情却像是病根一般潜伏着。有情与无情之间，怎样才能实现自己的良知呢？学习一定要达到无情的境界，这样牵累虽然少了，却又离开儒学、遁入佛学了，这样可以吗？”\n\n圣人致知的功夫，是最为诚挚而没有一丝一毫停息的。圣人良知的本体，皎洁如明镜，不曾有纤毫染着，美丑随时在镜中显现出它的形象，而明镜本身也并未受到沾染，这就是所谓“情顺万事而无情”。“无所住而生其\n心”\n，佛家这一说法本来不错。明镜照物，美者自美，丑者自丑，一照便显出真相，便是“生其心”之处。美者自美，丑者自丑，一照而不曾滞留，便是“无所住”的意思。你对于疟疾的比喻已经理解得很透彻了，那么这里所问的问题便自然迎刃而解了。有疟疾的人，疟疾虽然没有发作，但病根却在，难道可以因为病没有发作就忘记吃药调理的功夫吗？如果一定要等待病发后才吃药调理，就为时已晚了。致知的功夫，有事无事都不曾间断，哪管病是发作还是没发作？你的疑问，虽然前后不一，大体上都是由于自私自利、刻意追求的心态在牵累。这一病根去除，那么前前后后许多疑问，自然冰消雾散，无须学问思辨了。\n\n答原静书出\n，读者皆喜澄善问，师善答，皆得闻所未闻。师曰：“原静所问只是知解上转，不得已与之逐节分疏。若信得良知，只在良知上用功，虽千经万典无不吻合，异端曲学一勘尽破矣，何必如此节节分解？佛家有‘扑人逐块’\n之喻：见块扑人，则得人矣；见块逐块，于块奚得哉？”在座诸友闻之，惕然皆有惺悟。此学贵反求，非知解可入也。"],["中","一六七","知行合一","崇一来书云：“师云：‘德性之良知，非由于闻见，若曰多闻择其善者而从之，多见而识之，则是专求之见闻之末，而已落在第二义。’窃意良知虽不由见闻而有，然学者之知，未尝不由见闻而发。滞于见闻固非，而见闻亦良知之用也。今曰‘落在第二义’，恐为专以见闻为学者而言，若致其良知而求之见闻，似亦知行合一之功矣。如何？”\n\n良知不由见闻而有，而见闻莫非良知之用。故良知不滞于见闻，而亦不离于见闻。孔子云：“吾有知乎哉？无知也。”\n良知之外别无知矣。故致良知是学问大头脑，是圣人教人第一义。今云专求之见闻之末，则是失却头脑，而已落在第二义矣。近时同志中，盖已莫不知有致良知之说，然其功夫尚多鹘突\n者，正是欠此一问。\n\n大抵学问功夫只要主意头脑是当。若主意头脑专以致良知为事，则凡多闻多见，莫非致良知之功。盖日用之间，见闻酬酢，虽千头万绪，莫非良知之发发用流行。除却见闻酬酢，亦无良知可致矣，故只是一事。若曰致其良知而求之见闻，则语意之间未免为二。此与专求之见闻之末者虽稍不同，其为未得精一之旨，则一而已。“多闻，择其善者而从之，多见而识之。”既云“择”，又云“识”，其良知亦未尝不行于其间，但其用意乃专在多闻多见上去择、识，则已失却头脑矣。崇一于此等处见得当已分晓，今日之问，正为发明此学，于同志中极有益，但语意未莹，则毫厘千里，亦不容不精察之也。","欧阳崇一来信写道：“先生说：‘德性的良知，并非由见闻产生，如果说听得多然后选择好的来遵从，见得多然后从中加以识别，则是专门在见闻细节上探求，已然落在次一等的层次了。’我以为良知虽然不来自见闻，然而学者的知识，未尝不是从见闻中所产生的。拘泥于见闻固然不对，然而见闻也是良知的作用。如今却说‘落在第二义’，恐怕是针对专门将见闻作为学问的人而言的。如果为了致良知的目的而在见闻上探求，似乎也是知行合一的功夫。这样说对吗？”\n\n良知并非由见闻所产生，然而见闻也是良知的作用。因此良知不滞留在见闻之上，却也离不开见闻。孔子说：“我有知识吗？没有啊。”良知之外别无其他知识。所以致良知是做学问的关键之处，是圣人教人为学的头等大事。如今说专注于探求见闻的细枝末节，这是失却了为学的宗旨，这便是落在了次一等的层次。这段时间，大家都已经知道致良知的学问了，然而功夫还有许多糊涂的地方，正是欠缺你的这一疑问。\n\n大体而言，做学问的功夫一定要把握宗旨。如果把致良知作为为学的宗旨，那么多见多闻也不过是致良知的功夫。日常生活中，见识应酬何其繁多，但也不过是良知的发用流行。除了见识应酬，也不存在别的良知可以实现，所以只是一件事。如果说致良知要从见闻上探求，言语之间就难免把良知和见闻分作两件事了。这固然与专门探求见闻的细枝末节的做法稍有不同，但两者都不明白精研专一的主旨却是相同的。“多闻，择其善者而从之，多见而识之。”既然说“择”，又说“识”，可见良知已经在其中发挥作用了，只是其用意还是在多见多闻上去选择、识别，已然失去为学的宗旨。你对于这些问题已然见得明白，今日一问，正是为了阐明致良知的学问，对于大家有很大的益处，只是因为语义表达尚不通透，便会差之毫厘、谬以千里，所以不能不审慎体察。"],["中","一六八","致良知","来书云：“师云：‘《系》言“何思何虑”，是言所思所虑只是天理，更无别思别虑耳，非谓无思无虑也。心之本体即是天理，有何可思虑得！学者用功，虽千思万虑，只是要复他本体，不是以私意去安排思索出来。若安排思索，便是自私用智矣。’\n学者之敝，大率非沉空守寂，则安排思索。德辛壬\n之岁着前一病，近又着后一病。但思索亦是良知发用，其与私意安排者何所取别？恐认贼作子，惑而不知也。”\n\n“思曰睿，睿作圣。”\n“心之官则思，思则得之。”\n思其可少乎？沉空守寂与安排思索，正是“自私用智”，其为丧失良知，一也。良知是天理之昭明灵觉处，故良知即是天理，思是良知之发用。若是良知发用之思，则所思莫非天理矣。良知发用之思，自然明白简易，良知亦自能知得；若是私意安排之思，自是纷纭劳扰，良知亦自会分别得。盖思之是非邪正，良知无有不自知者。所以认贼作子，正为致知之学不明，不知在良知上体认之耳。","来信写道：“先生说：‘《系辞》里说“何思何虑”，是指所思所虑只是天理，再没有别的思虑，并不是说完全没有思虑。心的本体就是天理，有什么别的可以思虑的！学者下功夫，即便千思万虑，也只是要恢复心之本体，而非凭借私意安排、穷索出来。如果安排思索所得，则是自私用智了。’为学之人的毛病，大多不是枯守空寂，就是去刻意思索。我在辛巳到壬午年间犯了前一个毛病，今日又犯了后一个毛病。但是思索也是良知的作用，这与私意安排的思考又有何区别？我害怕认贼作子却仍困惑而不自知。”\n\n“通过不断地思考可以成就智慧，而有智慧的人能够成为圣人。”“心的作用是思考，思考就能有所得。”思虑难道能少吗？枯守空寂与思索安排，正是“自私用智”，同样丧失了良知。良知是天理昭明灵觉之处，故而良知就是天理，思考就是良知的作用。如果是良知所发出来的思考，那么思考的对象无非是天理。良知发出来的思考，自然简单明了，良知也自然可以认清；如果是私意安排出来的思考，自然纷纷扰扰，良知也自然能够分辨。思考的是非、正邪，良知都能够知道。之所以出现认贼作子的情况，正是由于不明白致知的学问，不知道在良知上体察认知。"],["中","一六九","致良知","来书又云：“师云：‘为学终身只是一事，不论有事无事，只是这一件。若说宁不了事，不可不加培养，却是分为两事也。’窃意觉精力衰弱，不足以终事者，良知也；宁不了事，且加休养，致知也。如何却为两事？若事变之来，有事势不容不了，而精力虽衰，稍鼓舞亦能支持，则持志以帅气\n可矣。然言动终无气力，毕事则困惫已甚，不几于暴其气已乎？此其轻重缓急，良知固未尝不知，然或迫于事势，安能顾精力？或因于精力，安能顾事势？如之何则可？”\n\n“宁不了事，不可不加培养”之意，且与初学如此说亦不为无益。但作两事看了，便有病痛在。孟子言“必有事焉”，则君子之学终身只是“集义”一事。义者宜也，心得其宜之谓义。能致良知则心得其宜矣，故“集义”亦只是致良知。君子之酬酢万变，当行则行，当止则止，当生则生，当死则死，斟酌调停，无非是致其良知，以求自慊而已。故“君子素其位而行”“思不出其位”\n。凡谋其力之所不及，而强其知之所不能者，皆不得为致良知。而凡“劳其筋骨，饿其体肤，空乏其身，行拂乱其所为，\n动心忍性以增益其所不能”\n者，皆所以致其良知也。若云“宁不了事，不可不加培养”者，亦是先有功利之心，较计成败利钝而爱憎取舍于其间，是以将了事自作一事，而培养又别作一事，此便有是内非外之意，便是“自私用智”，便是“义外”，便有“不得于心，勿求于气”\n之病，便不是致良知以求自慊之功矣。\n\n所云“鼓舞支持，毕事则困惫已甚”，又云“迫于事势，困于精力”，皆是把作两事做了，所以有此。凡学问之功，一则诚，二则伪。凡此皆是致良知之意，欠诚一真切之故。《大学》言“诚其意者，如恶恶臭，如好好色，此之谓自慊。”曾见有恶恶臭、好好色而须鼓舞支持者乎？曾见毕事则困惫已甚者乎？曾有迫于事势，困于精力者乎？此可以知其受病之所从来矣。","来信又写道：“先生说：‘终身为学只有一件事，不论有事无事，只是这一件事。如果说宁可不做事，也不能不加存养的功夫，就是将为学的功夫分作两件事了。’我以为，感到精力衰弱，不能做完事的，是良知；宁可不做事，也要加以存养的，是致知。这怎么成了两件事呢？如果事情变化不能不处理，虽然精力衰弱，稍加振作也能坚持下来，只要保持意志统帅气力便可。然而言语行动终究有气无力，一旦做完事情就疲惫不堪，这不是滥用气力吗？这其中的轻重缓急，良知固然明白，但有时迫于形势，又怎么能顾及精力？有时精疲力竭，又怎么能顾及形势？该怎么办呢？”\n\n“宁可不做事，也不能不加存养的功夫”，对初学者这么说也不是没有好处。但将处理事情和存养心体分作两件事看待，就有弊端。孟子说“必有事焉”，君子终身的学问都在“集义”。义就是宜，心能够处事得宜便是义。能致良知，心就处事得宜，所以“集义”也就是致良知。君子待人接物、应对事变，当做则做，当止则止，当生则生，当死则死，斟酌思考，无非是致其良知，以求心安理得。所以“君子素其位而行”“思不出其位”。凡是谋求自己力所不及的事情，勉强干自己才智不能胜任的事情，都不能致其良知；凡是“劳其筋骨，饿其体肤，空乏其身，行拂乱其所为，动心忍性以增益其所不能”的，都是为了致其良知。如果说“宁可不做事，也不能不存养心体”，这也是先有功利之心，计较成败厉害，而以爱恶取舍，所以把做事与存养心体看作两件事了。这就是重视本心、忽视做事的心态，就是“自私用智”，就是把义看作为外在的东西，便会出现“心感受不到，便去气上探求”的毛病，这就不是致良知以求心安理得的功夫。\n\n所谓“振作坚持，做完事后就疲惫不堪”，又说“迫于形势，精疲力竭”，都是把做事和存养本心看作两件事，所以才会如此说。但凡学问功夫，精一就是诚，三心二意则是伪。这些都是因为致良知的心还不够真切的缘故。《大学》里说：“诚其意者，如恶恶臭，如好好色，此之谓自慊。”你何曾见过讨厌恶臭、喜欢美色需要振作坚持的吗？何曾见过做完这些事后疲惫不堪的人吗？由此可以知病根所在之处了。"],["中","一七〇","致良知","来书又有云：“人情机诈百出，御之以不疑，往往为所欺，觉则自入于逆、亿\n。夫逆诈，即诈也；亿不信，即非信也；为人欺，又非觉也。不逆不亿而常先觉，其惟良知莹彻乎？然而出入毫忽之间，背觉合诈者多矣。”\n\n不逆不亿而先觉，此孔子因当时人专以逆诈、亿不信为心，而自陷于诈与不信；又有不逆、不亿者，然不知致良知之功，而往往又为人所欺诈，故有是言。非教人以是存心，而专欲先觉人之诈与不信也。以是存心，即是后世猜忌险薄者之事。而只此一念，已不可与入尧、舜之道矣。不逆、不亿而为人所欺者，尚亦不失为善，但不如能致其良知，而自然先觉者之尤为贤耳。崇一谓“其惟良知莹彻”者，盖已得其旨矣，然亦颖悟所及，恐未实际也。\n\n盖良知之在人心，亘万古、塞宇宙而无不同。“不虑而知”“恒易以知险”“不学而能”\n“恒简以知阻”\n“先天而天不违。天且不违，而况于人乎？况于鬼神乎？”\n夫谓背觉合诈者，是虽不逆人，而或未能无自欺也；虽不亿人，而或未能果自信也。是或常有求先觉之心而未能常自觉也。常有求先觉之心，即已流于逆、亿而足以自蔽其良知矣，此背觉合诈之所以未免也。\n\n君子学以为己\n，未尝虞人之欺己也，恒不自欺其良知而已；未尝虞人之不信己也，恒自信其良知而已；未尝求先觉人之诈与不信也，恒务自觉其良而已。是故不欺则良知无所伪而诚，“诚则明”矣；自信则良知无所惑而明，“明则诚”矣。明、诚相生，是故良知常觉、常照。常觉、常照则如明镜之悬，而物之来者自不能遁其妍媸矣。何者？不欺而诚，则无所容其欺，苟有欺焉而觉矣；自信而明，则无所容其不信，苟不信焉而觉矣。是谓“易以知险，简以知阻”，子思所谓“至诚如神，可以前知”\n者也。然子思谓“如神”，谓“可以前知”，犹二而言之，是盖推言思诚者之功效，是犹为不能先觉者说也。若就至诚而言，则至诚之妙用即谓之“神”，不必言“如神”；至诚则无知而无不知，不必言“可以前知”矣。","来信又写道：“人情诡诈多变，如果不加疑问地对待，往往会被欺骗。若想发现别人的诡诈，自己便会先怀疑别人、猜测别人。逆诈就是欺诈，猜测就是不诚信，被人欺骗又是不觉悟。不怀疑、不猜测却又能事先察觉，只有良知晶莹透彻的人才能做到吗？然而欺诈与诚实的差别实在是太过细微，因此不能觉悟和欺诈不实的人都很多。”\n\n不怀疑、不猜测而能够事先觉察，这是孔子针对当时许多人欺诈别人、待人不诚信、深陷欺诈和不诚信的泥沼而说的；有些人不欺诈、不随意猜测别人，但他们并不知道致良知的功夫，常常被人欺骗，所以才这么说。孔子的话并不是教人存心去事先察觉他人的欺诈与不诚信。存心要事先觉察，便是后世猜测、阴险、狡诈、刻薄之人做的事。只要存有这个念头，就已然远离了尧、舜的圣人之道。不欺诈、不猜测而被人欺骗，还算没有丧失善良的本心，只是不如能够致良知、能够自然事先察觉的人更为贤明。你说“只有良知晶莹透彻的人才能做到”，基本上把握了孔子的宗旨，不过这也是你的聪明所领悟到的，在实际功夫上恐怕还没有达到。\n\n良知在人的心中，亘古不变、充塞宇宙。“不虑而知”“恒易以知险”“不学而能”“恒简以知阻”“先天而天不违。天且不违，而况于人乎？况于鬼神乎？”那些不能觉悟、欺诈不实的人，即便不欺诈别人，却也不能不自欺；即便不猜测别人，却也不能真有自信。这使得他们常常有寻求事先觉察的心，却不能常常自我觉察。常常有寻求事先觉察的心，便已堕入怀疑揣度别人欺诈和不诚信的心态之中，而这足以遮蔽他们的良知。这就是为什么他们免不了不能觉悟和欺诈的缘故。\n\n君子之学是为了提高自身的修养，从不担忧别人欺骗自己，只要永远不欺骗自己的良知便可；不担心别人对自己不诚实，只要永远相信自己的良知便可；不去寻求事先觉察别人的欺诈与不诚信，只要永远努力觉察自己的良知便可。所以君子不自欺，良知就诚敬而不虚伪，诚敬则能明白；君子能自信，良知不受蛊惑而明白，明白则能诚敬。明白与诚敬相互促进，所以良知能不断觉悟、不断澄明。不断觉悟、不断澄明的良知好比高悬的明镜，万事万物在它面前都无法隐藏其美丑。为什么呢？良知不欺诈便是真诚，故而无法容忍欺诈，遇到欺骗便能觉察；良知自信明白，故而无法容忍不诚信，遇到不诚信便能觉察。这就是所谓“易以知险，简以知阻”，以及子思所说得“至诚如神，可以前知”。不过子思说的“如神”“可以前知”，还是分作两件事来说，大概是因为他是从思诚的功效上而言，也还是给那些不能预先觉察的人说的。如果就至诚而言，那么至诚的妙用就叫“神”，不必说“如神”；至诚便是无知而无不知，不必说“可以前知”。\n\n答罗整庵少宰书"],["中","一七一","格物","某顿首启：昨承教及《大学》，发舟匆匆，未能奉答。晓来江行稍暇，复取手教而读之。恐至赣后人事复纷沓，先具其略以请。\n\n来教云：“见道固难，而体道尤难。道诚未易明，而学诚不可不讲。恐未可安于所见而遂以为极则也。”\n\n幸甚幸甚！何以得闻斯言乎？其敢自以为极则而安之乎？正思就天下之道以讲明之耳。而数年以来，闻其说而非笑之者有矣，诟訾之者有矣，置之不足较量辨议之者有矣，其肯遂以教我乎？其肯遂以教我而反复晓喻，恻然惟恐不及救正之乎？然则天下之爱我者，固莫有如执事之心深且至矣，感激当何如哉！夫“德之不修，学之不讲\n”\n，孔子以为忧。而世之学者稍能传习训诂，即皆自以为知学，不复有所谓讲学之求，可悲矣！夫道必体而后见，非已见道而后加体道之功也；道必学而后明，非外讲学而复有所谓明道之事也。然世之讲学者有二：有讲之以身心者，有讲之以口耳者。讲之以口耳，揣摸测度，求之影响者也；讲之以身心，行著习察，实有诸己者也。知此则知孔门之学矣。\n\n来教谓某：“《大学》古本之复，以人之为学但当求之于内，而程、朱格物之说不免求之于外，遂去朱子之分章，而削其所补之传。”\n\n非敢然也。学岂有内外乎？《大学》古本乃孔门相传旧本耳，朱子疑其有所脱误而改正补缉之；在某则谓其本无脱误，悉从其旧而已矣。失在于过信孔子则有之，非故去朱子之分章而削其传也。夫学贵得之心，求之于心而非也，虽其言之出于孔子，不敢以为是也，而况其未及孔子者乎？求之于心而是也，虽其言之出于庸常，不敢以为非也，而况其出于孔子者乎？且旧本之传数千载矣，今读其文词，即明白而可通，论其功夫，又易简而可入。亦何所按据而断其此段之必在于彼，彼段之必在于此，与此之如何而缺，彼之如何而补，而遂改正补缉之？无乃重于背朱而轻于叛孔已乎？\n\n来教谓：“如必以学不资于外求，但当反观内省以为务，则‘正心’‘诚意’四字亦何不尽之有？何必于入门之际，便困以‘格物’一段工夫也？”\n\n诚然诚然！若语其要，则“修身”二字亦足矣，何必又言“正心”？“正心”二字亦足矣，何必又言“诚意”？“诚意”二字亦足矣，何必又言“致知”，又言“格物”？惟其工夫之详密，而要之只是一事，此所以为“精一”之学，此正不可不思者也。夫理无内外，性无内外，故学无内外。讲习讨论，未尝非内也；反观内省，未尝遗外也。夫谓学必资于外求，是以己性为有外也，是“义外”也，“用智”者也；谓反观内省为求之于内，是以己性为有内也，是“有我”也，“自私”者也，是皆不知性之无内外也。故曰“精义入神，以致用也；利用安身，以崇德也”\n“性之德也，合内外之道也”\n，此可以知“格物”之学矣。\n\n“格物”者，《大学》之实下手处，彻首彻尾，自始学至圣人，只此工夫而已，非但入门之际有此一段也。夫“正心”“诚意”“致知”“格物”，皆所以“修身”，而“格物”者，其所用力日可见之地。故“格物”者，格其心之物也，格其意之物也，格其知之物也；“正心”者，正其物之心也；“诚意”者，诚其物之意也；“致知”者，致其物之知也。此岂有内外彼此之分哉？理一而已。以其理之凝聚而言则谓之性，以其凝聚之主宰而言则谓之心，以其主宰之发动而言则谓之意，以其发动之明觉而言则谓之知，以其明觉之感应而言则谓之物。故就物而言谓之格，就知而言谓之致，就意而言谓之诚，就心而言谓之正。正者，正此也；诚者，诚此也；致者，致此也；格者，格此也；皆所谓穷理以尽性也。天下无性外之理，无性外之物。学之不明，皆由世之儒者认理为外，认物为外，而不知“义外”之说，孟子盖尝辟之，乃至袭陷其内而不觉，岂非亦有似是而难明者欤？不可以不察也！\n\n凡执事所以致疑于“格物”之说者，必谓其是内而非外也，必谓其专事于反观内省之为，而遗弃其讲习讨论之功也，必谓其一意于纲领本原之约，而脱略于支条节目之详也，必谓其沉溺于枯槁虚寂之偏，而不尽于物理人事之变也。审如是，岂但获罪于圣门，获罪于朱子？是邪说诬民，叛道乱正，人得而诛之也，而况于执事之正直哉？审如是，世之稍明训诂，闻先哲之绪论者，皆知其非也，而况执事之高明哉？凡某之所谓“格物”，其于朱子九条\n之说，皆包罗统括于其中。但为之有要，作用不同，正所谓毫厘之差耳。然毫厘之差而千里之缪，实起于此，不可不辨。\n\n孟子辟杨、墨至于“无父无君”。二子亦当时之贤者，使与孟子并世而生，未必不以之为贤。墨子“兼爱”，行仁而过耳；杨子“为我”，行义而过耳。此其为说，亦岂灭理乱常之甚，而足以眩天下哉？而其流之弊，孟子至比于禽兽、夷狄，所谓以学术杀天下后世也。\n\n今世学术之弊，其谓之学仁而过者乎？谓之学义而过者乎？抑谓之学不仁、不义而过者乎？吾不知其于洪水、猛兽何如也！孟子云：“予岂好辩哉？予不得已也。”\n杨、墨之道塞天下，孟子之时，天下尊信杨、墨，当不下于今日之崇尚朱说。而孟子独以一人呶呶于其间。噫，可哀矣！韩氏云：“佛、老之害甚于杨、墨。”\n韩愈之贤不及孟子，孟子不能救之于未坏之先，而韩愈乃欲全之于已坏之后，其亦不量其力，且见其身之危莫之救以死也。呜呼！若某者，其尤不量其力，果见其身之危莫之救以死也矣！夫众方嘻嘻之中，而独出涕嗟若；举世恬然以趋，而独疾首蹙额以为忧。此其非病狂丧心，殆必诚有大苦者隐于其中。而非天下之至仁，其孰能察之？\n\n其为《朱子晚年定论》，盖亦不得已而然。中间年岁早晚，诚有所未考，虽不必尽出于晚年，固多出于晚年者矣。然大意在委曲调停，以明此学为重。平生于朱子之说，如神明蓍龟，一旦与之背驰，心诚有所未忍，故不得已而为此。“知我者谓我心忧，不知我者谓我何求？”\n盖不忍牴牾朱子者，其本心也，不得已而与牴牾者，道固如是，“不直则道不见”\n也。执事所谓“决与朱子异”者，仆敢自欺其心哉？夫道，天下之公道也；学，天下之公学也。非朱子可得而私也，非孔子可得而私也。天下之公也，公言之而已矣。故言之而是，虽异于己，乃益于己也；言之而非，虽同于己，适损于己也。益于己者，己必喜之；损于己者，己必恶之。然则某今日之论，虽或于朱子异，未必非其所喜也。“君子之过，如日月之食，其更也，人皆仰之”\n，而“小人之过也必文”\n。某虽不肖，固不敢以小人之心事朱子也。\n\n执事所以教，反复数百言，皆以未悉鄙人“格物”之说。若鄙说一明，则此数百言皆可以不待辨说而释然无滞。故今不敢缕缕，以滋琐屑之渎。然鄙说非面陈口析，断亦未能了了于纸笔间也。嗟乎！执事所以开导启迪于我者，可谓恳到详切矣。人之爱我，宁有如执事者乎！仆虽甚愚下，宁不知所感刻佩服？然而不敢遽舍其中心之诚然而姑以听受云者，正不敢有负于深爱，亦思有以报之耳。秋尽东还，必求一面，以卒所请，千万终教！","阳明顿首谨启：昨天承蒙教诲《大学》，匆匆上船，未能及时回答。今早趁行船空闲时，又将您的信拜读一遍。恐怕到了江西后杂务繁多，先在这里简单回复，请您指教。\n\n您信中说：“认识大道当然十分困难，然而体会大道就更为困难了。道的确不易明白，然而学问也确实不能不讲，恐怕不能满足于自己的所见所闻，认为这就是标准了。”\n\n荣幸之至！我从哪里能够听闻这样的教诲？我怎敢以为这就是最高的标准而心安理得呢？我正想着如何讲明天下的大道呢。然而，数年以来，听到我学说的人，有的嘲笑，有的谩骂，有的不屑一顾甚至懒得辩论，他们哪里肯开导、教诲我？他们肯教导我、反复开导我、心存恻隐之心，唯恐不能补救我的为学之偏吗？然而，天下关心爱护我的人中，没有谁像您一样，对我悉心指教，我该如何感激是好！所谓“德之不修，学之不讲”，孔子也为此担忧。后世的学者稍稍能够读经、训诂，就都自以为有学问，不再对学问讲求探索，这是多么可悲的事啊！大道必然要体会才能认知，并不是先看到大道，再去下体会道的功夫；大道必然要学习才能明白，并非在讲求学问之外还有其他明道的事业。然而世间讲学的人有两种：一种是用身心讲学，一种是用口耳讲学。用口耳讲学的人，依靠揣摩和猜测，讲求的都是捕风捉影的事；用身心讲学的人，能够把握事物的本质，讲求的都是为己的学问。明白这一点，便能通晓圣人之学了。\n\n您信中说我“之所以恢复《大学》旧本，是认为做学问只应向内求索，然而程朱格物之学未免向外探求了，所以否定了朱熹所分的章节，删掉他增补的格物补传”。\n\n我并不敢如此。学问难道有内外之分吗？《大学》旧本是孔门相传的旧本而已，朱子怀疑旧本有所脱误，所以就改正、补订；在我看来，旧本并没有脱误，所以才完全遵从旧本。我可能有过分相信孔子的过失，并不是刻意要否定朱子所分的章节，删掉他补充的补传。做学问贵在有得于心，如果求之于心而认为有误，即便是孔子说的话，也不敢认为是正确的，何况是不如孔子的人呢？如果求之于心而认为正确，即便是一般人说的话，也不敢认为是错误的，何况是出自孔子之口呢？况且《大学》旧本已经传世数千年了，如今读其文字，十分明白通畅，论其功夫，又简单明了。又有什么根据断定这一段一定在那里，那一段一定在这里，这里缺了什么，那里补了什么，于是加以纠正增补呢？这难道不是对违背朱熹十分在意，却对违背孔子毫不在意吗？\n\n您信中说：“如果认为做学问不必向外探求，只要反观内省便足够了，那么‘正心’‘诚意’四字还有没说明白的地方吗？为何在初学入门之时，还要用‘格物’的功夫来使人困惑呢？”\n\n是啊是啊！如果要说最关键的，“修身”二字也足够了，为何又要说“正心”？“正心”二字也足够了，为何又要说“诚意”？“诚意”二字也足够了，为何又要说“致知”？“致知”二字也足够了，为何又要说“格物”？之所以这样，是因为学问功夫详细周密，就其关键而言，只是一件事，这就是所谓“精研专一”的学问，对此不能不认真思考。天理无分内外，天性无分内外，故而学问也无分内外。讲习讨论，不能说不是内；反观内省，也未必就遗弃了外。如果认定学问必然是向外求，就是认为自己的天性有外在的部分，就是“义外”、就是“用智”；如果认为反观内省为向内探求，就是认为自己的性有内在的部分，就是“有我”、就是“自私”。这两种说法都不明白性无内外之分的道理。所以说“精义入神，以致用也。利用安身，以崇德也”“性之德也，合内外之道也”，由此便可明白“格物”的学问了。\n\n所谓“格物”，是《大学》切实下功夫的地方，彻头彻尾，从初学到成圣，只有这个功夫而已，并非只有入门之初才要用“格物”的功夫。“正心”“诚意”“致知”“格物”，都是为了“修身”，而“格物”正是每天下功夫所能看得见的地方。所以“格物”是纠正心中之物，纠正物的意念；“正心”是端正物的心；“诚意”是使关于物的念头诚敬；“致知”是实践关于物的知。何来内外、彼此的区分？天理只有一个。就天理凝聚在具体的对象上来说称之为性，就天理主宰这个凝聚的现象来说称之为心，就天理主宰心的作用来说称之为意，就心体作用的明白觉察之处来说称之为知，就知的明白觉察之处能够感应外在的对象来说称之为物。所以就物而言称之为格，就知而言称之为致，就意而言称之为诚，就心而言称之为正。正就是正心，诚就是诚意，致就是致知，格就是格物，都是为了达到天理、穷尽天性而已。天下没有性之外的天理，没有性之外的事物。圣人的学问之所以不彰明于天下，都是因为世俗的儒者认为理和物都是外在的东西，却不明白“义外”是孟子曾经批评过的学说，以至于沿袭、深陷其中而不自觉，这难道不是似是而非、难以明白吗？对此不能不认真体察！\n\n你怀疑我的格物学说，一定是认为我肯定内求而反对外求；认为我专注于反观内省，遗弃了讲习讨论的功夫；认为我只重视学问的头脑，却忽略细枝末节；认为我沉溺于枯槁空虚的偏执，却不务人情事变。如果真是这样，难道我仅仅获罪于孔门、获罪于朱子吗？这是用邪说来欺骗百姓，叛离纲常，扰乱正道，人人得而诛之，何况像您这般正直的人呢？如果真是这样，世间稍微懂得训诂的人，知道一些圣贤的言论，就知道我说的是错的，何况像您如此高明的人呢？我所说的格物，将朱熹所说的九条囊括其中。但是格物的功夫又有关键之处，作用和朱子所论也有所不同，正所谓差之毫厘、谬以千里，正是由此而起，不能不辨明。\n\n孟子批评杨朱、墨子是“无父无君”。然而这两人也是当时的贤人，如果与孟子同处一个时代，孟子也会认可他们的贤德。墨子“兼爱”，这是过分推行仁德的结果；杨朱“为我”，这是过分推行义道的结果。他们的学说，难道泯灭天理、搅乱纲常到如此地步，以至于能够迷惑天下之人吗？然而，孟子将他们的学说所产生的弊端比作夷狄、禽兽，这是在用学术杀害后世之人啊。\n\n当今学术的弊病，是在学仁太过呢？还是学义太过呢？还是说学不仁、学不义太过呢？我不知道它们同洪水猛兽有何不同！孟子说：“我难道喜欢辩论吗？我是不得已啊。”杨朱、墨子的学说充塞天下，孟子的时代，天下之人尊信杨朱、墨子的人，并不比如今尊崇朱子之说的人少，而孟子独自一人与众人抗辩。哎，真是可悲！韩愈说：“佛老的危害甚于杨墨。”韩愈的贤明不及孟子，孟子无法在世道人心败坏之前加以救治，韩愈却想恢复世道人心于败坏之后，真是不自量力，而且他身陷危险，也没有人救他。唉！像我这样的人更是不自量力，发现自己身陷危险，却没有人能够救我于死地！天下之人都在嘻嘻哈哈，而唯独我却痛哭哀叹；天下之人都趋炎附势，而唯独我却愁眉不展。如果不是我丧心病狂，就一定是我心中有极大的愁苦。如果不是世上最为仁爱之人，谁又能体察到我心中的愁苦呢？\n\n我写《朱子晚年定论》，也是不得已而为之。其中所采录的文字时间的早晚，确实有未加考证之处。虽然并不全是朱子晚年的文字，但大部分都是他晚年所作。我的主要目的在于调和朱子与陆子的学问，以彰明圣学为重任。我一生始终将朱子的学说奉若神明，一旦要与之背离，确实有诸多不忍，所以我是不得已为之。“知我者谓我心忧，不知我者谓我何求？”我本不忍心与朱子相矛盾，只是不得已才如此，因为圣人之道本就如此，“如果不直接，圣人之道便不会显现”。您说我是“决意要与朱子对立”，我怎敢如此欺骗自己？大道，是天下的公道；圣学，是天下的公学。并非朱子可以私有，也并非孔子可以私有。天下公有的东西，应当秉公而论。所以只要说得对，即便与自己不同，也是对自己有益；只要说得不对，即便与自己相同，也是损害自己。益于自己的，自己一定喜欢；损害自己的，自己必定讨厌。既然这样，那么我现在的观点，虽然可能与朱子相异，却未必不是朱子所喜欢的。“君子的过错好比日食、月食，他改正了过错，人人都会敬仰他”，然而“小人一定会掩饰自己的过错”。我虽然不贤明，也不敢用小人的心态对待朱子啊！\n\n您的教诲有数百言之多，都是因为不能完全明白我的格物学说。一旦明白了我的学说，那么这数百言不用辩论也可释然。所以我现在不敢再详细论述，以免过于琐碎。然而我的学说不是写信可以说清楚的，非要当面陈述才能明白。哎！您对我的开导启迪不能不说是恳切又详细的。爱护我的人，哪有像您这般对我好的！我虽然愚笨，难道不知道感恩、敬佩吗？但是我不敢放弃心中真诚的想法而轻易接受您的指教，这正是不敢辜负您的厚爱，并且希望能回报您一二。待得秋天过后我回来时，一定前去拜访您，当面向您请教，届时还希望您能够赐教！\n\n答聂文蔚"],["中","一七二","致良知","春间远劳迂途枉顾，问证惓倦，此情何可当也！已期二三同志，更处静地，扳留旬日，少效其鄙见，以求切劘之益。而公期俗绊，势有不能，别去极怏怏，如有所失。忽承笺惠，反复千余言，读之无任浣慰。中间推许太过，盖亦奖掖之盛心，而规砺真切，思欲纳之于贤圣之域。又托诸崇一以致其勤勤恳恳之怀，此非深交笃爱，何以及是？知感知愧，且惧其无以堪之也。虽然，仆亦何敢不自鞭勉，而徒以感愧辞让为乎哉？其谓“思、孟、周、程，无意相遭于千载之下。与其尽信于天下，不若真信于一人。道固自在，学亦自在，天下信之不为多，一人信之不为少”者，斯固君子“不见是而无闷”\n之心。岂世之谫谫屑屑者知足以及之乎？乃仆之情，则有大不得已者存乎其间，而非以计人之信与不信也。\n\n夫人者，天地之心，天地万物本吾一体者也。生民之困苦荼毒，孰非疾痛之切于吾身者乎？不知吾身之疾痛，无是非之心者也。是非之心，不虑而知，不学而能，所谓良知也。良知之在人心，无间于圣愚，天下古今之所同也。世之君子，惟务其良知，则自能公是非，同好恶，视人犹己，视国犹家，而以天地万物为一体，求天下无治不可得矣。古之人所以能见善不啻若己出，见恶不啻若己入，视民之饥溺犹己之饥溺\n，而一夫不获若己推而纳诸沟中者，非故为是而以蕲天下之信己也，务致其良知求自慊而已矣。尧、舜、三王之圣，言而民莫不信者，致其良知而言之也；行而民莫不说者，致其良知而行之也。是以其民熙熙皞皞，杀之不怨，利之不庸\n。施及蛮貊，而凡有血气者莫不尊亲，为其良知之同也。呜呼！圣人之治天下，何其简且易哉！\n\n后世良知之学不明，天下之人用其私智以相比轧。是以人各有心，而偏琐僻陋之见，狡伪阴邪之术，至于不可胜说。外假仁义之名，而内以行其自私自利之实；诡辞以阿俗，矫行以干誉；掩人之善而袭以为己长，讦人之私而窃以为己直；忿以相胜而犹谓之徇义，险以相倾而犹谓之疾恶；妒贤忌能而犹自以为公是非，恣情纵欲而犹自以为同好恶。相陵相贼，自其一家骨肉之亲，已不能无尔我胜负之意、彼此藩篱之形，而况于天下之大，民物之众，又何能一体而视之？则无怪于纷纷籍籍而祸乱相寻于无穷矣。\n\n仆诚赖天之灵，偶有见于良知之学，以为必由此而后天下可得而治。是以每念斯民之陷溺，则为之戚然痛心，忘其身之不肖，而思以此救之，亦不自知其量者。天下之人见其若是，遂相与非笑而诋斥之，以为是病狂丧心之人耳。呜呼，是奚足恤哉！吾方疾痛之切体，而暇计人之非笑乎？人固有见其父子兄弟之坠溺于深渊者，呼号匍匐，裸跣颠顿，扳悬崖壁而下拯之。士之见者，方相与揖让谈笑于其旁，以为是弃其礼貌衣冠而呼号颠顿若此，是病狂丧心者也。故夫揖让谈笑于溺人之旁而不知救，此惟行路之人，无亲戚骨肉之情者能之，然已谓之“无恻隐之心，非人矣”\n。若夫在父子兄弟之爱者，则固未有不痛心疾首，狂奔尽气，匍匐而拯之。彼将陷溺之祸有不顾，而况于病狂丧心之讥乎？而又况于蕲人信与不信乎？呜呼！今之人虽谓仆为病狂丧心之人，亦无不可矣。天下之人心，皆吾之心也。天下之人犹有病狂者矣，吾安得而非病狂乎？犹有丧心者矣，吾安得而非丧心乎？\n\n昔者孔子之在当时，有议其为谄者，有讥其为佞者，有毁其未贤，诋其为不知礼，而侮之以为“东家丘\n”\n者，有嫉且沮之者\n，有恶而欲杀之者\n。晨门、荷蒉之徒，皆当时之贤士，且曰：“是知其不可而为之者欤？”“鄙哉！硁硁乎！莫己知也，斯己而已矣。”虽子路在升堂之列，尚不能无疑于其所见，不悦于其所欲往，而且以之为迂。则当时之不信夫子者，岂特十之二三而已乎？然而夫子汲汲遑遑，若求亡子于道路，而不暇于暖席者，宁以蕲人之知我、信我而已哉？盖其天地万物一体之仁，疾痛迫切，虽欲已之而自有所不容已。故其言曰：“吾非斯人之徒与而谁与？”“欲洁其身而乱大伦。”“果哉，末之难矣！”\n呜呼！此非诚以天地万物为一体者，孰能以知夫子之心乎？若其“遁世无闷”“乐天知命”者，则固“无入而不自得”“道并行而不相悖”也。\n\n仆之不肖，何敢以夫子之道为己任？顾其心亦已稍知疾痛之在身，是以彷徨四顾，将求其有助于我者，相与讲去其病耳。今诚得豪杰同志之士，扶持匡翼，共明良知之学于天下，使天下之人皆知自致其良知，以相安相养，去其自私自利之蔽，一洗谗妒胜忿之习，以济于大同，则仆之狂病固将脱然以愈，而终免于丧心之患矣。岂不快哉！\n\n嗟乎！今诚欲求豪杰同志之士于天下，非如吾文蔚者而谁望之乎？如吾文蔚之才与志，诚足以援天下之溺者。今又既知其具之在我，而无假于外求矣，循是而充，若决河注海，孰得而御哉？文蔚所谓“一人信之不为少”，其又能逊以委之何人乎？\n\n会稽素号山水之区，深林长谷，信步皆是。寒暑晦明，无时不宜。安居饱食，尘嚣无扰。良朋四集，道义日新。优哉游哉！天地之间宁复有乐于是者！孔子云：“不怨天，不尤人，下学而上达。”\n仆与二三同志力将请事斯语，奚暇外慕？独其切肤之痛，乃有未能恝然者，辄复云云尔。\n\n咳疾暑毒，书札绝懒，盛使远来，迟留经月，临歧执笔，又不觉累纸。盖于相知之深，虽已缕缕至此，殊觉有所未能尽也。","有劳你春天绕道我这儿，不知疲倦地询问论证，这种情分我该如何承受呢！原来已约好几位同道，想找一个安静的处所，待上十来天，一起讨论我的学说，以便在切磋磨砺之中有所收获。但是你公务繁忙，不得不离开，我心中十分惆怅，若有所失。突然收到你的信件，洋洋千言，读后十分欣慰。信中对我十分推许，这也是对我的一片鼓舞嘉奖的心意，其中的规劝砥砺十分真切，希望我能够步入圣贤的行列。你又托付欧阳崇一转达对我恳切的关怀，若非深交厚爱之人，怎会如此呢？我既感动又惭愧，唯恐辜负了你的厚爱。虽然如此，我又怎敢不自我鞭策，仅仅感激、辞让呢？你说：“子思、孟子、周敦颐、程颢等人，并不期望千年以后为世人理解。与其让天下之人都相信你，不如被一个人笃信。大道自然而然地存在，圣学亦自然而然地存在，天下之人尽信也不算多，只有一人笃信也不算少。”这就是君子“不见是而无闷”的心态。这难道是世上浅薄琐碎的人所能知道的吗？对我来说，则有许多万不得已的苦衷，并不是计较他人相信与否。\n\n人就是天地的心，天地万物本与我为一体。百姓的所遭受的困苦与荼毒，哪一件不是自己的切肤之痛？不知道自身痛苦的人，便是没有是非之心。人的是非之心，无须思虑便可知道，无须学习便能具备，这就是所谓的良知。良知自在人心，无论圣人还是愚人，从古至今都是相同的。世上的君子，只要专心致其良知，自然能秉公判别是非，与人同好同恶，视他人如同自己，爱国如同爱家，甚至把天地万物视作与自己为一体，使得天下都得到治理。古人之所以能够看见别人行善如同自己行善，看到别人为恶如同自己为恶，看到百姓饥饿痛苦如同自己饥饿痛苦，有一个人没有过上好的生活，好像是自己把他推入深坑之中似的，这并不是因为他们故意表现出这些而想取信于天下，而是一心一意致其良知而自求心安理得而已。尧、舜、三王这样的圣贤，说的话百姓没有不相信的，这是因为他们的话是出于自己良知而说的话；他们做的事百姓没有不喜欢的，这是因为他们的行为是出于自己的良知而做的事。所以他们的老百姓和平安乐，就算被处死也无怨言，给好处也不答谢。把这样的教化推及到蛮荒之地，凡是有血气的人没有不孝敬双亲的，是因为人的良知是相通的。唉！圣人治理天下多么简单容易啊！\n\n后世良知的学说不再昌明，天下的人各用自己的私心才智互相倾轧。人人各有自己的私心，那些偏颇浅鄙的见解，阴险狡诈的手段，不可胜数。他们都假借仁义的名号，干着自私自利的勾当；用诡辩的言辞来迎合世俗的要求，用虚伪的行为来博取自己的名誉；把掩盖别人的善行作为自己的长处，用攻击别人的隐私来显示自己的正直；怨恨地相互争斗却认为是为了正义而献身，险恶地互相倾轧还认为这是嫉恶如仇；嫉贤妒能却认为自己是秉持公正，放纵情欲还认为这是与民同好同恶。互相欺凌、互相侵害，即使是一家之内的骨肉至亲，彼此间也要分出胜负、架起很高的藩篱，更何况天下广大、百姓名物众多，又如何能够将所有的百姓与名物与自己视为一体呢？这就难怪天下纷纷扰扰，祸乱频发无止了。\n\n我靠着上天的眷顾，偶然发现良知的学说，认为只有致良知天下才能得到治理。所以我一想到百姓的苦难就心痛不已，忘了自己才智浅薄，却想用良知的学说拯救天下，这也是不自量力的行为。世上之人看到我这样做，就纷纷嘲笑、诋毁我，认为我是丧心病狂之人。唉！这有什么可以顾忌的呢！我正感受到的是切肤之痛，哪里还有空去计较别人的诋毁、嘲笑？如果有人看到自己的父子、兄弟坠入深渊，一定会大喊着爬过去，鞋帽掉了也全然不在意，爬着悬崖峭壁而下，希望能够救人。而那些看到这一情况的读书人，却在一旁作揖、谈笑，认为这人丢弃衣帽、不顾礼节，大喊大叫，一定是一个丧心病狂之人。所以，一旁有人陷溺还在作揖谈笑，这是只有那些没有骨肉亲情的人才能做出来的事，是孟子所说的“没有恻隐之心就不是人”的人。如果是有父子兄弟亲情的人，就会感同身受、痛心疾首，尽力狂奔、连滚带爬地跑去救人。他们都能够不顾自己陷入危险之中，还害怕被人讥笑为丧心病狂吗？还会在意别人相信与否吗？哎！如今的人即使认为我是丧心病狂之人，也没有什么不可以的。天下人的心，都是我的心。天下之人有那么多得病发狂的，我又怎能不得病发狂呢？天下之人有那么多丧心的，我又怎么能不丧心呢？\n\n从前孔子在世时，有人说他谄媚，有人说他花言巧语，有人诋毁他的贤能，诽谤他不知礼，侮辱他是东家丘，有人嫉妒他、阻止他振兴鲁国，有人憎恶他甚至想杀他。即使是当时如晨门、荷蒉一般的贤者，也说：“孔子这是知其不可为而为之吗？”“见识浅陋！又固执得很！没有人了解自己那就算了吧。”虽然子路对于圣学已经十分明白，却还难免怀疑孔子，对他想去的地方不高兴，而且认为孔子迂腐。所以当时不信任孔子的人，难道仅仅是十之二三而已吗？但是孔子依旧积极奔走，像是在道路上寻找自己遗失的儿子一样整天奔波，无暇在温暖的席褥上睡上一觉，难道是为了让世人了解自己、相信自己而已吗？或许孔子有与天地万物为一体的仁爱之心，痛切至深，即使想不管也身不由己。所以他说：“我不和世人相处还能和谁在一起呢？”“想要洁身自好却扰乱了伦理纲常。”“好干脆啊！可他却不知道我的难处！”哎！除了真的把天地万物视作与己为一体的人，谁又能了解孔子的心思呢？至于那些“不见于世却不郁闷”“乐于天道安于天命”的人，当然可以做到“不自己了解便不会知道”“大道并行却不会相互违背”。\n\n我才疏学浅，怎敢以振兴孔子之道为己任？只是我的心也稍微知道一点身上的病痛，所以心中彷徨，茫然四顾，四处寻找能够有助于我的人，共同想办法去除身上的病痛。现在如果真有豪杰同道支持我、匡正我，共同努力，使得良知之学彰明于天下，使得天下之人都能致其良知，互相帮助、互相存养，除去自私自利的弊病，洗去诋毁、嫉妒、好胜、愤懑的习气，以实现天下大同，那么我的狂病将会立刻痊愈，最终免于丧心病狂的祸患。这得有多痛快啊！\n\n哎！现在果真要找到世上的豪杰志士，除了像文蔚你这样的人，还能指望谁呢？像你这样的才能和志向，必然可以拯救世人于苦难。如今又明白了良知就在自己心中，无须向外探求，只要依此扩充，就好比大河决口汇往大海，谁能抵御得住呢？像你所说的“只有一人笃信也不算少”，自然是你当仁不让，还能寄望于谁呢？\n\n会稽周围向来山清水秀，深林幽谷，随处可见。寒暑阴晴，气候宜人。生活安定而不受世俗干扰。好朋友相聚在一起，切磋道义、日日精进。多么悠闲自在！天地之间还有如这般的快乐吗！孔子说：“不抱怨上天，不归咎他人，通过慢慢学习知识最终通达天道。”我和几位同道想要努力遵循孔子的教诲，哪来的时间还能去外面探求呢？只是对于切肤之痛，无法漠不关心，于是写了这封信回复你。\n\n我因天气炎热，一直咳嗽，懒于写信，你派人远来，停留数月，临别提笔，没想到又写了这么多。我们相知颇深，虽然信中所论已经十分详细，却还是觉得有好多话没有说完。\n\n二"],["中","一七三","致良知","得书，见近来所学之骤进，喜慰不可言。谛视数过，其间虽亦有一二未莹彻处，却是致良知之功尚未纯熟，到纯熟时自无此矣。譬之驱车，既已由于康庄大道之中，或时横斜迂曲者，乃马性未调、衔勒不齐之故。然已只在康庄大道中，决不赚入旁蹊曲径矣。近时海内同志，到此地位者曾未多见，喜慰不可言，斯道之幸也！\n\n贱躯旧有咳嗽畏热之病，近入炎方，辄复大作。主上圣明洞察，责付甚重，不敢遽辞。地方军务冗沓，皆舆疾从事。今却幸已平定，已具本乞回养病，得在林下稍就清凉，或可瘳耳。人还，伏枕草草，不尽倾企，外惟浚\n一简，幸达致之。\n\n来书所询，草草奉复一二。\n\n近岁来山中讲学者，往往多说“勿忘勿助”工夫甚难。问之，则云：“才著意便是助，才不著意便是忘，所以甚难。”区区因问之云：“忘是忘个甚么？助是助个甚么？”其人默然无对，始请问。区区因与说，我此间讲学，却只说个“必有事焉”，不说“勿忘勿助”。“必有事焉”者只是时时去“集义”。若时时去用“必有事”的工夫，而或有时间断，此便是忘了，即须“勿忘”；时时去用“必有事”的工夫，而或有时欲速求效，此便是助了，即须“勿助”。其工夫全在“必有事焉”上用，“勿忘勿助”，只就其间提撕警觉而已。若是工夫原不间断，即不须更说“勿忘”；原不欲速求效，即不须更说“勿助”。此其工夫何等明白简易！何等洒脱自在！今却不去“必有事”上用工，而乃悬空守着一个“勿忘勿助”，此正如烧锅煮饭，锅内不曾渍水下米，而乃专去添柴放火，不知毕竟煮出个甚么物来！吾恐火候未及调停，而锅已先破裂矣。近日一种专在“勿忘勿助”上用工者，其病正是如此。终日悬空去做个“勿忘”，又悬空去做个“勿助”，渀渀荡荡，全无实落下手处，究竟工夫只做得个沉空守寂，学成一个痴呆汉。才遇些子事来，即便牵滞纷扰，不复能经纶宰制。此皆有志之士，而乃使之劳苦缠缚，担搁一生，皆由学术误人之故，甚可悯矣！\n\n夫“必有事焉”只是“集义”，“集义”只是致良知。说“集义”则一时未见头脑，说“致良知”即当下便有实地步可用工。故区区专说“致良知”。随时就事上致其良知，便是“格物”；著实去致良知，便是“诚意”；著实致其良知，而无一毫意必固我，便是“正心”。著实致真知，则自无忘之病；无一毫意必固我，则自无助之病。故说“格、致、诚、正”，则不必更说个“忘、助”。孟子说“忘、助”，亦就告子得病处立方。告子强制其心，是助的病痛，故孟子专说助长之害。告子助长，亦是他以义为外，不知就自心上“集义”，在“必有事焉”上用功，是以如此。若时时刻刻就自心上“集义”，则良知之体洞然明白，自然是是非非，纤毫莫遁，又焉有“不得于言，勿求于心；不得于心，勿求于气”之弊乎？孟子“集义”“养气”之说，固大有功于后学，然亦是因病立方，说得大段，不若《大学》“格、致、诚、正”之功，尤极精一简易，为彻上彻下，万世无弊者也。\n\n圣贤论学，多是随时就事，虽言若人殊，而要其工夫头脑，若合符节。缘天地之间，原只有此性，只有此理，只有此良知，只有此一件事耳。故凡就古人论学处说工夫，更不必搀和兼搭而说，自然无不吻合贯通者；才须搀和兼搭而说，即是自己工夫未明彻也。\n\n近时有谓“集义”之功，必须兼搭个致良知而后备者，则是“集义”之功尚未了彻也。“集义”之功尚未了彻，适足以为致良知之累而已矣。谓致良知之功，必须兼搭一个“勿忘勿助”而后明者，则是“致良知”之功尚未了彻也。“致良知”之功尚未了彻也，适足以为“勿忘勿助”之累而已矣。若此者，皆是就文义上解释牵附，以求混融凑泊，而不曾就自己实工夫上体验，是以论之愈精，而去之愈远。\n\n文蔚之论，其于“大本达道”既已沛然无疑，至于“致知”“穷理”及“忘助”等说，时亦有搀和兼搭处。却是区区所谓康庄大道之中，或时横斜迂曲者。到得工夫熟后，自将释然矣。\n\n文蔚谓“致知之说，求之事亲、从兄之间，便觉有所持循”者，此段最见近来真切笃实之功。但以此自为不妨，自有得力处；以此遂为定说教人，却未免又有因药发病之患，亦不可不一讲也。\n\n盖良知只是一个天理。自然明觉发见处，只是一个真诚恻怛，便是他本体。故致此良知之真诚恻怛以事亲便是孝，致此良知之真诚恻怛以从兄便是弟，致此良知之真诚恻怛以事君便是忠。只是一个良知，一个真诚恻怛。若是从兄的良知不能致其真诚恻怛，即是事亲的良知不能致其真诚恻怛矣；事君的良知不能致其真诚恻怛，即是从兄的良知不能致其真诚恻怛矣。故致得事君的知，便是致却从兄的良知；致得从兄的良知，便是致却事亲的良知。不是事君的良知不能致，却须又从事亲的良知上去扩充将来。如此，又是脱却本原，着在支节上求了。良知只是一个，随他发见流行处，当下具足，更无去来，不须假借。然其发见流行处，却自有轻重厚薄、毫发不容增减者，所谓“天然自有之中\n”\n也。虽则轻重厚薄毫发不容增减，而原又只是一个；虽则只是一个，而其间轻重厚薄、又毫发不容增减。若可得增减，若须假借，即已非其真诚恻怛之本体矣。此良知之妙用，所以无方体、无穷尽，“语大天下莫能载，语小天下莫能破”\n者也。\n\n孟氏“尧舜之道，孝弟而已”者，是就人之良知发见得最真切笃厚、不容蔽昧处提省人。使人于事君、处友、仁民、爱物、与凡动静语默间，皆只是致他那一念事亲、从兄真诚恻怛的良知，即自然无不是道。盖天下之事虽千变万化，至于不可穷诘，而但惟致此事亲、从兄一念真诚恻怛之良知以应之，则更无有遗缺渗漏者，正谓其只有此一个良知故也。事亲、从兄一念良知之外，更无有良知可致得者，故曰：“尧舜之道，孝弟而已矣。”此所以为“惟精惟一”之学，放之四海而皆准，施诸后世而无朝夕者也。\n\n文蔚云：“欲于事亲、从兄之间，而求所谓良知之学。”就自己用工得力处如此说，亦无不可。若曰致其良知之真诚恻怛以求尽夫事亲、从兄之道焉，亦无不可也。明道云：“行仁自孝弟始，孝弟是仁之一事，谓之行仁之本则可，谓是仁之本则不可。”\n其说是矣。\n\n“亿”“逆”“先觉”之说，文蔚谓“诚则旁行曲防，皆良知之用”，甚善甚善！间有搀搭处，则前已言之矣。惟浚之言亦未为不是。在文蔚须有取于惟浚之言而后尽，在惟浚又须有取于文蔚之言而后明。不然则亦未免各有倚着之病也。舜察迩言而询刍荛，非是以迩言当察、刍荛当询而后如此。乃良知之发见流行，光明圆莹，更无挂碍遮隔处，此所以谓之大知。才有执着意必，其知便小矣。讲学中自有去取分辨，然就心地上着实用工夫，却须如此方是。\n\n“尽心”三节，区区曾有生知、学知、困知之说，颇已明白，无可疑者。盖尽心、知性、知天者不必说存心、养性，事天不必说“夭寿不二，修身以俟”，而存心、养性与“修身以俟”之功已在其中矣。存心、养性、事天者，虽未到得尽心、知天的地位，然已是在那里做个求到尽心、知天的工夫，更不必说“夭寿不二，修身以俟”，而“夭寿不二，修身以俟”之功已在其中矣。\n\n譬之行路，尽心、知天者，如年力壮健之人，既能奔走往来于数千里之间者也；存心、事天者，如童稚之年，使之学习步趋于庭除之间者也；“夭寿不二，修身以俟”者，如襁抱之孩，方使之扶墙傍壁，而渐学起立移步者也。既已能奔走往来于数千里之间者，则不必更使之于庭除之间而学步趋，而步趋于庭除之间自无弗能矣；既已能步趋于庭除之间，则不必更使之扶墙傍壁而学起立移步，而起立移步自无弗能矣。然学起立移步，便是学步趋庭除之始，学步趋庭除，便是学奔走往来于数千里之基。固非有二事，但其工夫之难易则相去悬绝矣。\n\n心也，性也，天也，一也。故及其知之成功则一。然而三者人品力量自有阶级，不可躐等而能也。细观文蔚之论，其意以恐尽心、知天者，废却存心、修身之功，而反为尽心、知天之病。是盖为圣人忧工夫之或间断，而不知为自己忧工夫之未真切也。吾侪用工，却须专心致志，在“夭寿不二，修身以俟”上做，只此便是做尽心、知天工夫之始。正如学起立移步便是学奔走千里之始，吾方自虑其不能起立移步，而岂遽其不能奔走千里？又况为奔走千里者而虑其或遗忘于起立移步之习哉？\n\n文蔚识见本自超绝迈往，而所论云然者，亦是未能脱去旧时解说文义之习，是为此三段书分疏比合，以求融会贯通，而自添许多意见缠绕，反使用工不专一也。近时悬空去做勿忘勿助者，其意见正有此病，最能担误人，不可不涤除耳。\n\n所谓“尊德性而道问学”一节，至当归一，更无可疑。此便是文蔚曾着实用工，然后能为此言。此本不是险僻难见的道理，人或意见不同者，还是良知尚有纤翳潜伏。若除去此纤翳，即自无不洞然矣。\n\n已作书后，移卧檐间，偶遇无事，遂复答此。文蔚之学既已得其大者，此等处久当释然自解，本不必屑屑如此分疏。但承相爱之厚，千里差人远及，谆谆下问，而竟虚来意，又自不能已于言也。然直戆烦缕已甚，恃在信爱，当不为罪。惟浚处及谦之\n、崇一处，各得转录一通寄视之，尤承一体之好也。\n\n右南大吉录。","来信收悉，看到你近来学问骤进，欣慰之情难以言表。你的信我仔细读了几遍，中间有一两处还未能理解透彻，恐怕是因为致良知的功夫尚未纯熟，如果到了纯熟的境界，自然不会如此了。这就好比是驾车，已经走在康庄大道上了，有时出现迂回曲折的情况，是马性没有调好、缰绳没有勒齐的缘故。然而已经在康庄大道之上，决计不会再误入歧途了。近来海内同道达到你这种境界的还不多见，我高兴得说不出话来，这是圣人之道的万幸！\n\n我原有畏热咳嗽的毛病，来到炎热的南方后，就复发得很厉害。皇上圣明洞察，托付的责任十分重大，不敢立即推辞。地方的军务又十分冗杂，我不得不带病处理。好在叛乱已经平定，我已奏请皇上让我回家养病，如能在山林清凉之处养病，或许还能痊愈。来人就要回去，我趴在枕上草草写信，匆忙间难以诉说得尽。另外，给陈九川的信请你转交给他。\n\n你信中所询问的问题，我简单地回复一下。\n\n今年来到山中讲学的人，常常说“勿忘勿助”的功夫很难。我询问原因，他们就说：“稍有意念便是助长，一不留意便是忘记，所以很难。”我就问：“忘是忘记什么？助是助长什么？”他们默然无言，便向我请教。我对他们说，我在这里讲学，只讲“必有事焉”的功夫，不说“勿忘勿助”。“必有事焉”就是时时刻刻去“集义”。如果时时刻刻用“必有事”的功夫，其间有中断便是忘记，就需要“勿忘”的功夫；时时刻刻用“必有事”的功夫，求速之心切便是助长，就需要“勿助”的功夫。功夫全在“必有事焉”之上，“勿忘勿助”只是在其中起个提点警醒的作用。如果功夫原本就不间断，便不需说“勿忘”；功夫原本不求速效，那么便不需说“勿助”。如此功夫何等明白简单！何等洒脱自在！如今却不在“必有事”上用功，却悬空苦守着“勿忘勿助”，这好比是烧火做饭，锅里不添水加米，却专门去添柴加火，不知最终能煮出个什么东西！恐怕火候还没调好，锅已经先烧破了。近来专在“勿忘勿助”上用功的人，他们的毛病正是如此。整体凭空去做“勿忘勿助”的功夫，茫茫荡荡，全然没有落实下手之处，最终只落得个死守空寂的功夫，学成了个痴呆。刚遇到一点事，就会心绪纷乱，难以应对。这些人都是有志之士，却因此劳苦困扰，耽误一生，这都是由于学术的错误耽误人的缘故，真叫人可惜呢！\n\n“必有事焉”就是“集义”，“集义”就是致良知。说“集义”一时还未抓住主旨，说“致良知”那么当下便有切实用功之处。所以我专门说“致良知”的功夫。随时在事上致良知，便是“格物”；着实去致良知，便是“诚意”；着实去致良知，并且没有一丝一毫的私心妄意，便是“正心”。着实去致良知，便没有“忘”的毛病；没有一丝一毫的私心妄意，便没有“助”的毛病。所以说“格、致、诚、正”，便不需要再说“勿忘勿助”了。孟子说“勿忘勿助”，也是针对告子的毛病对症下药。告子通过强制的功夫来框定人心，是“助”的毛病，所以孟子专门说助长的危害。告子之所以犯助长的毛病，也是因为他将义看作外在的东西，不知道在自己心中“集义”，在“必有事焉”处用功，所以才会如此。如果时时刻刻在自己心中“集义”，那么良知本体便会豁然开朗，是是非非全都呈现，又何来的“不得于言，勿求于心；不得于心，勿求于气”的毛病？孟子“集义”“养气”的学说，固然对于后学有极大的功劳，然而也不过是对症下药，只说了个大概，不及《大学》中“格、致、诚、正”的功夫特别精研专一、简单明了，这实在是上下贯通，千秋万世永无弊病的功夫。\n\n圣贤讲学，大多是就事而论，虽然他们的说法不一，但功夫的主旨是一致的。这是由于天地间只有一个性，只有一个理，只有一个良知，只有这一件事。所以但凡就古人论学之处讨论功夫，没有必要掺杂着牵强附会地说，自然能够融会贯通；如果需要掺杂搭配，只是自己的功夫没有明白透彻罢了。\n\n近来有人说“集义”的功夫必须搭配致良知才算完备，这是“集义”的功夫尚未透彻的缘故。“集义”的功夫尚未明了透彻，恰好成了致良知的牵累。认为致良知的功夫必须搭配“勿忘勿助”才能明白，则是“致良知”的功夫尚未透彻。“致良知”的功夫尚未明了透彻，恰好成了“勿忘勿助”的牵累。像这类情况，都是从文义上牵强附会的解释，以求融会贯通，却没有自己切实地在功夫上体验，所以论证得愈精细，实则愈偏离大道。\n\n你的观点在“大本达道”方面已经没有疑问了，至于“致知”“穷理”以及“勿忘勿助”等说法，有时还是会有掺杂搭配之处。这就是我说的走在康庄大道之上，有时还会出现横斜曲折之处。等到功夫纯熟之后，这一情况自然会消失。\n\n你说“致知的学说，从侍奉双亲、遵从兄长上就应当有所持守、遵循”，此处最能看到你近来功夫的真切笃实。你自己从这里下功夫倒也无妨，有一个切实用力之处，但如果把此当作定论教给别人，却难免出现用药不当、导致疾病的情况，这不能不同你说明白。\n\n所谓良知只是一个天理。良知自然明觉的呈现就是真诚恻隐，就是良知的本体。所以在侍奉双亲上致良知的真诚恻隐就是孝，在遵从兄长上致良知的真诚恻隐就是悌，在侍奉君主上致良知的真诚恻隐就是忠。只有一个良知，只是一个真诚恻隐。如果遵从兄长的良知不能达到真诚恻隐，也就是侍奉双亲的良知不能达到真诚恻隐；如果侍奉君主的良知不能达到真诚恻隐，便是遵从兄长的良知不能达到真诚恻隐。所以，能致侍奉君主的良知，便能致遵从兄长的良知；能致遵从兄长的良知，便能致侍奉双亲的良知。并不是说辅佐君主的良知不能致，却要从侍奉双亲的良知上去扩充得来。如果这样，便是脱离了良知的本原，在细枝末节上探求了。良知只是一个，随它发挥呈现，自然完备，无来无去，无须假借于外。但是良知发挥呈现之处却有轻重厚薄的区别，丝毫不能增减，这就是所谓的“天然自有之中”。虽然轻重厚薄丝毫不能增减，但良知只有一个；虽然只是一个，但其中的轻重厚薄又丝毫不能增减。如果能够增减，如果需要向外假借，那么便已不是良知真诚恻隐的本体了。这就是良知的妙用，是良知之所以没有形体却无穷无尽的缘故，也是良知“说它大，天下任何东西都装载不了它；说它小，天下任何东西都没法攻破它”的原因。\n\n孟子说的“尧舜之道，孝悌而已”，这是从人的良知最真切笃厚、不容蒙蔽之处提醒人。使得人在事君、处友、仁民、爱物以及其他所有动静语默之间，都只是致自己那一念侍奉双亲、遵从兄长的真诚恻隐的良知，那就自然处处都符合大道了。天下的事物虽然千变万化，以至于不可穷尽，但是只要致此侍奉双亲、遵从兄长的一念真诚恻隐的良知来应对，便没有任何遗漏缺失之处，这正是只有一个良知的缘故。侍奉双亲、遵从兄长的一念良知之外，没有别的良知可以致，所以说：“尧舜之道，孝悌而已矣。”这就是“精研专一”的学问，就是放之四海而皆准，施于后世也不会过时的道理。\n\n你说：“想在侍奉双亲、遵从兄长之中，探求我所说的良知的学问。”从自己用功得力之处来说，这是可行的。如果说用致良知的真诚恻隐来探求侍奉双亲、遵从兄长的道理，也无不可。程颢先生说：“行仁从孝悌开始，孝悌是仁的一件事，说孝悌是践行仁的根本是可以的，说孝悌是仁的根本就不对了。”他说得对。\n\n关于“不亿不信”“不逆诈”“先觉”等观点，你认为“只要真诚，即便是旁门左道、刻意提防，也都是良知的运用”，这话说得很对！其中有掺杂搭配之处，前面已经讨论过了。陈九川的说法也未必是错的。对你而言，要吸取九川的观点才能完备；对九川而言，要吸取你的观点才能明白。否则你们免不了各自有偏倚的毛病。舜对浅近之言也要加以思考并向樵夫请教，并不是因为浅近之言值得思考，而是樵夫值得请教，舜才这样做。这是良知的发用呈现，自然光明莹透，毫无任何障碍，这就是所谓的大知。一有执着和私意，知就会变小。讲学中自然有取舍分辨，然而，只要心中踏实下功夫，就必须这样才对。\n\n“尽心”三节，我曾用生知、学知、困知的说法来解释，已经十分清楚，没有可怀疑的了。尽心、知性、知天的人不必说存心、养性，事天不必说“夭寿不二，修身以俟”，而存心、养性与“修身以俟”的功夫已经在其中了。存心、养性、事天的人，虽然没有到尽心、知天的境界，然而已经在那里做探求尽心、知天的功夫了，更不必说“夭寿不二，修身以俟”，“夭寿不二，修身以俟”的功夫已然包含在其中了。\n\n这就好比是走路，尽心、知天的人，如同年轻力壮之人，能够往返奔走于数千里之间；存心、事天的人，如同儿童，只能在院子里学习走走路；而“夭寿不二，修身以俟”的人，如同襁褓中的婴儿，只能使他扶着墙壁慢慢学习站立走动。已经往返奔走于数千里之间的人，就没有必要再让他在庭院中学习走路，因为学习走路已经不存在问题；已经能在院子里走路的人，就不必让他再扶着墙学习站立走动，因为站立走路已经不存在问题了。然而，学习站立走动是在院子里学习走路的开始；在院子里学习走路，是往来奔走于数千里之间的基础。本来就不是两件事，只不过功夫的难易程度相差悬殊。\n\n心、性、天的本质是一样的。所以等到这三类人各自修养成功后，便是相同的。然而这三类人的品行、才能存在差异，因此不能超越自身能力去修养。我仔细思考了你的观点，你的意思是害怕尽心、知天之人，荒废了存心、修身的功夫，反而成了尽心、知天的弊病。这大概是担心圣人的功夫会有间断，却不知道担忧自己的功夫尚未真切。我们这类人用功，必须专心致志在“夭寿不二，修身以俟”上，这样就是尽心、知天功夫的开始。正如同学习起立移步便是学习奔走于千里之间的开始，我正担心自己不能起立移步，又怎么会去担心不能奔走于千里呢？更何必去担心能够奔走千里的人忘了起立移步的功夫呢？\n\n你的见识原本就超凡脱俗，不过就你所论而言，也还是没能去掉过去讲求文义的习气，所以你才将知天、事天、夭寿不二当作三部分，进行分析综合，以求得融会贯通，结果自己添加了许多纠缠不清的想法，反而使得自己用功不够专一。近来凭空去做勿忘勿助的功夫的人正是犯了这个毛病，这个毛病最为耽误人，所以不能不彻底清除。\n\n你认为“尊德性而道问学”一节，应当统合为一，这没有什么可疑的。这是你切实用功之后说出来的话。这本来不是生僻难懂的道理，人们却有不同的意见，这还是因为良知中尚有灰尘潜伏的缘故。如果除去这些灰尘，良知便会豁然洞见了。\n\n信写完后，我躺在屋檐下，正好闲来无事，就再写几句。你的学问已然得到要领，这些问题时间久了也会自然明白，本不必我来细细讲解。但承蒙你的厚爱，不远千里派人请教，为了不辜负你的来意，我自然得有所回报。然而我所说的过于直白琐碎，你对我如此信任，应当不会怪罪于我吧！还请你把这封信抄几份，分别寄给九川、谦之、崇一，让他们共同分享你的一片善意。\n\n以上南大吉录。\n\n训蒙大意示教读刘伯颂等"],["中","一七四","论学","古之教者，教以人伦。后世记诵词章之习起，而先王之教亡。今教童子，惟当以孝、弟、忠、信、礼、义、廉、耻为专务。其栽培涵养之方，则宜诱之歌诗以发其志意，导之习礼以肃其威仪，讽之读书以开其知觉。今人往往以歌诗、习礼为不切时务，此皆末俗庸鄙之见，乌足以知古人立教之意哉？\n\n大抵童子之情，乐嬉游而惮拘检。如草木之始萌芽，舒畅之则条达，摧挠之则衰痿。今教童子，必使其趋向鼓舞，中心喜悦，则其进自不能已。譬之时雨春风，沾被卉木，莫不萌动发越，自然日长月化；若冰霜剥落，则生意萧索，日就枯槁矣。故凡诱之歌诗者，非但发其志意而已，亦所以泄其跳号呼啸于咏歌，宣其幽抑结滞于音节也；导之习礼者，非但肃其威仪而已，亦所以周旋揖让而动荡其血脉，拜起屈伸而固束其筋骸也；讽之读书者，非但开其知觉而已，亦所以沉潜反复而存其心，抑扬讽诵以宣其志也。凡此皆所以顺导其志意，调理其性情，潜消其鄙吝，默化其粗顽，日使之渐于礼义而不苦其难，入于中和而不知其故，是盖先王立教之微意也。\n\n若近世之训蒙稚者，日惟督以句读课仿，责其检束而不知导之以礼，求其聪明而不知养之以善，鞭挞绳缚，若待拘囚。彼视学舍如囹狱而不肯入，视师长如寇仇而不欲见，窥避掩覆以遂其嬉游，设诈饰诡以肆其顽鄙，偷薄庸劣，日趋下流。是盖驱之于恶而求其为善也，何可得乎？\n\n凡吾所以教，其意实在于此。恐时俗不察，视以为迂，且吾亦将去，故特叮咛以告。尔诸教读，其务体吾意，永以为训，毋辄因时俗之言，妀废其绳墨，庶成“蒙以养正”之\n功矣，念之念之！","古代的教育，是教人以人伦。后世记诵辞章的习气兴起之后，先王的教化便消亡了。如今教育儿童，应当专门将孝、悌、忠、信、礼、义、廉、耻作为重点。至于栽培涵养的具体方法，则应当以吟咏诗歌来激发他们的志趣，以学习礼仪来端庄他们的仪表，以劝勉读书来开发他们的心智。现在的人往往认为吟咏诗歌、学习礼仪是不务正业，这是鄙陋庸俗的见解，又怎么能明白古人立教的本意呢？\n\n大致说来，儿童的天性喜欢玩乐却害怕拘束。就好像草木开始萌芽时，让他舒展地生长就能枝叶茂盛，如果摧残阻挠就会衰败痿痹。现在教育儿童也应当积极鼓励天性，使得他们心中喜悦，这样就会不断进步。这就好比是时雨春风滋润花木，花木没有不萌芽生长的；如果花木受到冰霜的侵袭，就会生意萧索，不断枯萎。所以通过吟咏诗歌，不仅可以培养他们的志趣，也是为了在吟咏中宣泄他们的精力，在音律中抒发他们的抑郁之情；通过学习礼仪，不但可以端庄仪表，也是为了在打躬作揖之中活动血脉，在叩拜屈伸之间强健筋骨；通过劝勉读书，不但可以开发他们的心智，还可以在反复讨论中存养心体，在褒贬讽誉中宣扬志气。所有这一切都是顺导他们的志趣，调理他们的性情，消除他们的鄙陋吝啬，化去他们的粗劣顽皮，使得他们日渐符合礼仪而不会感到辛苦，心中中正平和而不知不觉，这就是先王立教的深刻含义。\n\n近世教育儿童，每天只知道督促句读的功课，严格约束却不知道用礼仪引导，只求耳聪目明却不知道用善来培养，用鞭子抽打、用绳子捆缚，像对待囚犯一样。孩子们将学校视作监狱而不肯去，将师长视如仇敌而不想见，想尽各种办法要逃学去嬉戏玩耍，弄虚作假肆意顽皮，变得庸俗低劣，日益堕落。这是驱使他们作恶却还要求他们向善，怎么做得到呢？\n\n我教学的主张就在于此。我恐怕世俗不能明白，认为我很迂腐，加上我就要离开了，所以特意叮嘱告知。诸位教读务必体察我的用意，以此为终身的教训，不要因为世俗的言论就改辕易辙，废除我所订立的规矩，也许可以收到“在童蒙时就培养儿童纯正的品格”的功效吧！诸位务必切记！\n\n教 约"],["中","一七五","修行语录","每日清晨，诸生参揖毕，教读以次偏询诸生：在家所以爱亲敬长之心，得无懈忽未能真切否？温凊定省之仪，得无亏缺未能实践否？往来街衢步趋礼节，得无放荡未能谨饬否？一应言行心术，得无欺妄非僻未能忠信笃敬否？诸童子务要各以实对，有则改之，无则加勉。教读复随时就事，曲加诲谕开发，然后各退，就席肄业。","每天清晨，学生参拜行礼完毕，教读应依次提问学生：在家时热爱亲人、尊敬长辈之心，是否真切而没有懈怠？在使得父母冬暖夏凉、早晚请安的礼节上，是否能够躬身实践而没有遗漏？在街上行走时，是否注意礼节而没有放荡不羁？一切言行心思，是否欺天罔人未能做到忠信笃敬？每位学生都应如实以对，有则改之，无则加勉。教读要随时根据情况，委婉地加以启发引导，然后让他们各自退回座位上学习。"],["中","一七六","修行语录","凡歌诗，须要整容定气，清朗其声音，均审其节调，毋躁而急，毋荡而嚣，毋馁而慑。久则精神宣畅，心气和平矣。每学量童生多寡，分为四班。每日轮一班歌诗，其余皆就收敛容肃听。每五日则总四班递歌于本学，每朔望集各学会歌于书院。","凡是吟诵诗歌，必须整理仪容，平定呼吸，使得声音清晰明朗，节奏均匀，不急不躁，不散漫不嘈杂，不气馁不畏难。时间久了，就会感到精神舒畅，心平气和。每个学校应当根据学生的多少分为四个班。每天轮流一个班吟诵诗歌，其余的学生收敛仪容，认真聆听。每五天让四个班依次吟诵诗歌，每月初一、十五组织各学堂到书院集体吟诵。"],["中","一七七","修行语录","凡习礼，需要澄心肃虑。审其仪节，度其容止。毋忽而惰，毋沮而怍，毋径而野，从容而不失之迂缓，修谨而不失之拘局。久则体貌习熟，德性坚定矣。童生班次皆如歌诗，每间一日则轮一班习礼，其余皆就席敛容肃观。习礼之日，免其课仿。每十日则总四班递习于本学。每朔望则集各学会习于书院。","但凡学习礼仪时，必须澄明内心，排除杂虑。老师要认真审察学生的礼仪细节，容貌举止。不疏忽不懈怠，不拘谨不害羞，不随便不粗野，从容而不缓慢，谨慎而不紧张。时间久了，体态仪貌练习得熟练了，德性的培养也就坚定了。学生的班次同吟诵诗歌一样，每隔一天轮流一个班练习礼仪，其余的班收敛仪容，认真观看。练习礼仪的那一天，免去其他的课业。每隔十天，集合四个班在本校依次练习礼仪。每月初一、十五组织各学堂到书院练习礼仪。"],["中","一七八","修行语录","凡授书不在徒多，但贵精熟。量其资禀，能二百字者止可授以一百字，常使精神力量有余，则无厌苦之患，而有自得之美。讽诵之际，务令专心一志，口诵心惟，字字句句，紬绎反复。抑扬其音节，宽虚其心意。久则义礼浃洽，聪明日开矣。","老师讲课不在多，贵在精熟。根据学生的资质，能认识两百字的只教一百字，让学生的精神力量有所富余，便不会产生辛苦厌烦的情绪，反而会有收获的喜悦。在诵读之时，一定要专心致志，口中所读、心中所想，字字句句，反复体会。音节要抑扬顿挫，心胸要宽广虚静。时间久了，学生就能明白礼仪，日益聪明了。"],["中","一七九","论学","每日工夫，先考德，次背书诵书，次习礼或作课仿，次复诵书讲书，次歌诗。凡习礼歌诗之类，皆所以常存童子之心，使其乐习不倦，而无暇及于邪僻。教者如此，则知所施矣。虽然，此其大略也，“神而明之，则存乎其人”\n。","每天的功夫，先考察学生的品德，其次是背书、诵读，再次是练习礼仪或其他课业，再次是读书、讲课，最后是吟诵诗歌。凡是练习礼仪、吟诵诗歌，都是为了使孩童的天性能够长存，使他们乐于学习而不感到疲倦，这样就没心思去干歪门邪道之事。老师们了解了这一点，就知道该如何教育学生了。当然，这里所说的也只是个大概，“至于要明白领悟其中的神妙之处，就在于各自的努力了”。"],["下","一八〇","致良知","正德乙亥，九川\n初见先生于龙江。先生与甘泉\n先生论“格物”之说。甘泉持旧说。先生曰：“是求之于外了。”甘泉曰：“若以格物理为外，是自小其心也。”九川甚喜旧说之是。先生又论“尽心”一章，九川一闻却遂无疑。\n\n后家居，复以“格物”遗质。先生答云：“但能实地用功，久当自释。”山间乃自录《大学》旧本读之，觉朱子“格物”之说非是，然亦疑先生以意之所在为物，物字未明。\n\n己卯，归自京师，再见先生于洪都\n。先生兵务倥偬，乘隙讲授。首问：“近年用功何如？”\n\n九川曰：“近年体验得‘明明德’功夫只是‘诚意’。自‘明明德于天下’，步步推入根源，到‘诚意’上再去不得，如何以前又有格致工夫？后又体验，觉得意之诚伪必先知觉乃可，以颜子‘有不善未尝不知，知之未尝复行’\n为证，豁然若无疑，却又多了格物功夫。又思来吾心之灵何有不知意之善恶？只是物欲蔽了，须格去物欲，始能如颜子未尝不知耳。又自疑功夫颠倒，与‘诚意’不成片段。后问希颜\n，希颜曰：‘先生谓格物、致知是诚意功夫，极好。’九川曰：如何是诚意功夫？希颜令再思体看。九川终不悟，请问。”\n\n先生曰：“惜哉！此可一言而悟，惟浚所举颜子事便是了。只要知身、心、意、知、物是一件。”\n\n九川疑曰：“物在外，如何与身、心、意、知是一件？”\n\n先生曰：“耳、目、口、鼻、四肢，身也，非心安能视、听、言、动？心欲视、听、言、动，无耳、目、口、鼻、四肢亦不能。故无心则无身，无身则无心。但指其充塞处言之谓之身，指其主宰处言之谓之心，指心之发动处谓之意，指意之灵明处谓之知，指意之涉着处谓之物，只是一件。意未有悬空的，必着事物，故欲诚意，则随意所在某事而格之，去其人欲而归于理，则良知之在此事者，无蔽而得致矣。此便是诚意的功夫。”\n\n九川乃释然破数年之疑。\n\n又问：“甘泉近亦信用《大学》古本，谓‘格物’犹言‘造道’，又谓穷如穷其巢穴之穷，以身至之也，故格物亦只是随处体认天理。似与先生之说渐同。”\n\n先生曰：“甘泉用功，所以转得来。当时与说‘亲民’字不须改，他亦不信。今论‘格物”亦近，但不须换‘物’字作‘理’字，只还他一物字便是。”\n\n后有人问九川曰：“今何不疑‘物’字？”\n\n曰：“《中庸》曰‘不诚无物’，程子曰‘物来顺应’，又如‘物各付物’‘胸中无物’之类，皆古人常用字也。”他日先生亦云然。","正德十年（1515年），我在龙江第一次见到先生。当时先生正与湛甘泉先生讨论“格物”学说。甘泉先生坚持朱子之说。先生说：“这是向外探求。”甘泉先生说：“如果认为探求物理是外，那是把心看小了。”我本来十分赞同朱子的旧说。先生又讲了《孟子》中“尽心”一章，我听后才对先生之学没有怀疑。\n\n后来先生在家闲居，我又向先生请教“格物”学说。先生回答说：“只要你能踏实用功，时日久了自会明白。”在山中居住的时间，我就抄录了《大学》旧本阅读，觉得朱子“格物”之说不对，但也怀疑先生将意的所在之处当作物的说法，认为这个“物”字的含义不明白。\n\n正德十四年（1519年），我从京城归来，于江西南昌再次拜见先生。先生当时军务繁忙，只能抽空讲学。他首先问我：“近年来用功如何？”\n\n我说：“近年来体会到‘明明德’的功夫只是‘诚意’。从‘明明德于天下’，一步一步追根溯源，到‘诚意’上就推不下去了，为何‘诚意’之前还有格物、致知的功夫？又经过一番体验，觉得意的诚伪必须先有知觉才行，颜回‘有不善未尝不知，知之未尝复行’可以为证。于是我豁然开朗，没有疑问，却又多了一个格物的功夫。又想到，凭借心的灵明怎会不知道意念的善恶？只是被物欲遮蔽了，须格去物欲，才能像颜回那样善恶都能知道。我又开始怀疑功夫的次序是否颠倒了，使得‘诚意’的功夫脱节。后来我问希颜，希颜说：‘先生说格物、致知是诚意的功夫，说得极好。’我又问：‘为何是诚意的功夫？’希颜让我再仔细体察看看。但是我终究未能领悟，请先生指点。”\n\n先生说：“真是可惜啊！这用一句话就能说明白，你所举的颜回的例子就可以说明问题。只要知道身、心、意、知、物是一件事就可以了。”\n\n我疑惑地问：“物在身外，怎么能够和身、心、意、知是一件事呢？”\n\n先生说：“耳、目、口、鼻、四肢，是身体的部分，但是没有心又怎能视、听、言、动呢？心要视、听、言、动，没有耳、目、口、鼻、四肢也不行。所以没有心就没有身，没有身就没有心。就其充塞于形体而言称之为身，就其主宰行动而言称之为心，就其发动作用而言称之为意，就其意念灵明处而言称之为知，就意念指涉之处而言称之为物，只是一件事。意念不能悬空存在，必然指向事物。所以要诚意就要随着意所指向的事物去格，摈弃人欲使其归于天理，那么良知在这件事上就不会被蒙蔽，就可以致知了。这就是诚意的功夫。”\n\n我几年的疑惑豁然开朗。\n\n我又接着问：“甘泉先生近来也相信《大学》旧本，认为‘格物’就是‘造道’，又说穷理的穷就是穷其巢穴的穷，是亲身进去的意思，所以格物也只是随处体认天理，这似乎与先生的学说有些相同。”\n\n先生说：“甘泉肯用功，所以他能转过弯来。当时我对他说‘亲民’不必改为‘新民’，他也不相信。如今所论的‘格物’同我的观点却相近了。不过在我看来，不必把‘物’字改为‘理’字，仍然用‘物’字就可以了。”\n\n后来有人问我：“现在为何不怀疑‘物’字了？”\n\n我说：“《中庸》说‘不诚无物’，程颢说‘物来顺应’‘物各付物’‘胸中无物’等等，都是古人常用的字。”后来先生也这样说。"],["下","一八一","静与动","九川问：“近年因厌泛滥之学，每要静坐，求屏息念虑，非惟不能，愈觉扰扰。如何？”\n\n先生曰：“念如何可息？只是要正。”\n\n曰：“当自有无念时否？”\n\n先生曰：“实无无念时。”\n\n曰：“如此却如何言静？”\n\n曰：“静未尝不动，动未尝不静。戒谨恐惧即是念，何分动静。”\n\n曰：“周子何以言‘定之以中正仁义而主静’\n？”\n\n曰：“‘无欲故静’\n，是‘静亦定，动亦定’的‘定’字。‘主’，其本体也。戒惧之念是活泼泼地，此是天机不息处，所谓‘维天之命，于穆不已’\n。一息便是死。非本体之念即是私念。”","九川问：“近年来因为讨厌流行的泛滥学问，每次要静坐，屏息凝神，不但做不到，反而觉得更为困扰。为何会这样？”\n\n先生说：“念头怎么能够止息？只是要让念头中正而已。”\n\n九川说：“那就不存在没有念头的时候了吗？”\n\n先生说：“确实没有。”\n\n九川说：“如果这样，又该如何理解静呢？”\n\n先生说：“静中未尝没有动，动中未尝没有静。戒谨恐惧就是念头，怎能区分动静呢？”\n\n九川说：“周敦颐先生为何说‘定之以中正仁义而主静’？”\n\n先生说：“‘无欲故静’，周敦颐先生所说的‘静’，就是程子所说的‘静亦定，动亦定’的‘定’字。‘主’是指本体。戒慎恐惧的念头是活泼的，这正是天机流动不息之处，所谓‘维天之命，于穆不已’。一旦停息就是死亡。不是从本体发出来的念头便是私念。”"],["下","一八二","静与动","又问：“用功收心时，有声、色在前，如常闻见，恐不是专一？”\n\n曰：“如何欲不闻见？除是槁木死灰，耳聋目盲则可。只是虽闻见而不流去便是。”\n\n曰：“昔有人静坐，其子隔壁读书，不知其勤惰。程子称其甚敬\n。何如？”\n\n曰：“伊川恐亦是讥他。”","九川又问：“当用功专心的时候，如果有声色在面前，还一如往常去看、去听，恐怕就不是专一了？”\n\n先生说：“怎么能够想不看、不听呢？除非是身如槁木、心如死灰、耳聋目盲的人才能够做到。只要心不随着所看、所听的东西流转就是了。”\n\n九川说：“从前有人静坐，他的儿子在隔壁读书，他却不知道儿子是勤奋还是懒惰。程颐先生称赞他能够持敬，为何？”\n\n先生说：“伊川先生恐怕是在讥讽他。”"],["下","一八三","格物","又问：“静坐用功，颇觉此心收敛。遇事又断了，旋起个念头去事上省察。事过又寻旧功，还觉有内外，打不作一片。”\n\n先生曰：“此‘格物’之说未透。心何尝有内外？即如惟浚今在此讲论，又岂有一心在内照管？这听讲说时专敬，即是那静坐时心。功夫一贯，何须更起念头？人须在事上磨炼，做功夫乃有益。若只好静，遇事便乱，终无长进。那静时功夫亦差似收敛，而实放溺也。”\n\n后在洪都，复与于中\n、国裳\n论内外之说，渠皆云：“物自有内外，但要内外并着功夫，不可有间耳。”以质先生。\n\n曰：“功夫不离本体，本体原无内外。只为后来做功夫的分了内外，失其本体了。如今正要讲明功夫不要有内外，乃是本体功夫。”是日俱有省。","九川又问：“静坐用功，颇能感到内心的收敛。遇到事情又中断了，马上起个念头到事上反省体察。事情过后又寻找以前的功夫，仍然觉得内与外有差别，无法融为一体。”\n\n先生说：“这是对格物的学说理解得不透彻。心何曾区分内外？就像你现在在这里讲论学问，难道还有一个心在里面起作用吗？在这里听讲时专心恭敬，就是静坐时的心。功夫是一以贯之的，何必再起一个念头？人必须在事情上磨炼，功夫才会有长进。如果一味地喜欢静守，遇到事情便乱了方寸，终究没有长进。那种一味求静的功夫看似在收敛，其实却在放纵心体。”\n\n后来在南昌，我又和于中、国裳讨论内与外的学说，他俩都说：“事物原本有内外之分，只是要内外一起用功，不能有所间隔。”九川就此请教先生。\n\n先生说：“功夫离不开本体，本体原无分内外。只是后来做功夫的人将其区分为内外，故而失却了功夫的本然面貌。现在正是要讲清楚，功夫不必有内外，才是有本体的功夫。”这一天大家都有所领悟。"],["下","一八四","论学","又问：“陆子之学何加？”\n\n先生曰：“濂溪、明道之后，还是象山，只是粗些。”\n\n九川曰：“看他论学，篇篇说出骨髓，句句似针膏肓，却不见他粗。”\n\n先生曰：“然。他心上用过功夫，与揣摹依仿、求之文义自不同，但细看有粗处，用功久当见之。”","九川又问：“陆九渊先生的学问如何？”\n\n先生说：“周敦颐、程颢以后，还数陆九渊的学问最得圣道，只是粗糙了些。”\n\n九川说：“我看他讨论学问，篇篇都道出了精髓，句句都是针砭膏肓，并没有看出粗糙之处。”\n\n先生说：“是的。他在心体上下过功夫，与只是揣摩效仿、在字义上探求的学问当然不同，但仔细看看还是有粗糙之处的，你用功久了自然看得到。”"],["下","一八五","致良知","庚辰往虔州\n再见先生，问：“近来功夫虽若稍知头脑，然难寻个稳当快乐处。”\n\n先生曰：“尔却去心上寻个天理，此正所谓‘理障\n’\n。此间有个诀窍。”\n\n曰：“请问如何？”\n\n曰：“只是致知。”\n\n曰：“如何致？”\n\n曰：“尔那一点良知，是尔自家底准则。尔意念着处，他是便知是、非便知非，更瞒他一些不得。尔只不要欺他，实实落落依着他做去，善便存、恶便去，他这里何等稳当快乐！此便是‘格物’的真诀，‘致知’的实功。若不靠着这些真机，如何去格物？我亦近年体贴出来如此分明，初犹疑只依他恐有不足，精细看，无些小欠阙。”","正德十五年（1520年），我到虔州再次拜见先生，问：“近来我下功夫虽然稍微知道些关键，却很难找到一个安心愉悦的境界。”\n\n先生说：“你要在心上寻找天理，这就是所谓‘理障’。这当中有个诀窍。”\n\n九川问：“请问是什么诀窍？”\n\n先生说：“就是致知。”\n\n九川说：“要如何致知？”\n\n先生说：“你那一点良知，是你自己的准则。你的意念所到之处，对就是对、错就是错，一点不得隐瞒。你只要不欺骗它，踏踏实实地按照它的指示去做，善念便存、恶念便去，这是何等的安心愉悦！这便是‘格物’的秘诀，便是‘致知’的实在功夫。如果不依靠这真正的关键，要怎么去格物？我也是近年来才体会得这样明白，刚开始还怀疑仅仅依靠良知恐怕还不够，仔细体察后才发现丝毫不曾欠缺。”"],["下","一八六","致良知","在虔与于中、谦之同侍。先生曰：“人胸中各有个圣人，只自信不及，都自埋倒了。”因顾于中曰，“尔胸中原是圣人。”\n\n于中起，不敢当。\n\n先生曰：“此是尔自家有的，如何要推？”\n\n于中又曰：“不敢。”\n\n先生曰：“众人皆有之，况在于中？却何故谦起来？谦亦不得。”\n\n于中乃笑受。\n\n又论：“良知在人，随你如何，不能泯灭。虽盗贼亦自知不当为盗。唤他作贼，他还忸怩。”\n\n于中曰：“只是物欲遮蔽。良心在内，自不会失。如云自蔽日，日何尝失了？”\n\n先生曰：“于中如此聪明，他人见不及此。”","在虔州时，九川与于中、谦之一起陪同先生。先生说：“每个人胸中都有圣人，只因自信不够，自己把心中的圣人给埋没了。”于是先生看着于中说，“你胸中本来有个圣人。”\n\n于中站起来，表示不敢当。\n\n先生说：“这是你自己本就有了，为何要推辞呢？”\n\n于中又说：“不敢。”\n\n先生说：“大家都有，何况你于中？为何要谦让起来？这是谦让不得的。”\n\n于中才笑着接受。\n\n先生又说：“良知在人心中，无论你如何做，都无法泯灭它。即便是盗贼也知道不应当作盗贼。喊他是贼，他还不好意思。”\n\n于中说：“这只是由于物欲遮蔽。良知在心中，自然不会丧失。好比乌云蔽日，太阳又何曾丧失？”\n\n先生说：“于中你如此聪明，别人未必有你这样的见识。”"],["下","一九〇","致良知","先生问：“九川于致知之说体验如何？”\n\n九川曰：“自觉不同。往时操持常不得个恰好处，此乃是恰好处。”\n\n先生曰：“可知是体来与听讲不同。我初与讲时，知尔只是忽易，未有滋味。只这个要妙，再体到深处，日见不同，是无穷尽的。”\n\n又曰：“此‘致知’二字，真是个千古圣传之秘，见到这里，‘百世以俟圣人而不惑’。”","先生问：“九川你对致良知的学说体会得怎样了？”\n\n九川说：“感觉同以前不一样了。以前操持时常常不能恰到好处，现在可以了。”\n\n先生说：“由此可知体会到的与听到的不一样。我刚同你讲的时候，知道你稀里糊涂，体会不到什么。从恰到好处再往下深入，每天都会有所不同，没有穷尽。”\n\n先生又说：“这‘致知’二字，真是千百年来圣贤流传的秘密，懂得这个道理，便能‘百年以后圣人复出也不会有疑惑’。”"],["下","一九一","致良知","九川问曰：“伊川说到‘体用一原，显微无间’处，门人已说是泄天机\n。先生致知之说，莫亦泄天机太甚否？”\n\n先生曰：“圣人已指以示人，只为后人掩匿，我发明耳，何故说泄？此是人人自有的，觉来甚不打紧一般。然与不用实功人说，亦甚轻忽，可惜彼此无益；与实用功而不得其要者提撕之，甚沛然得力。”","九川问：“程颐先生谈到‘体用一原，显微无间’时，学生说他泄露天机。先生致知的学说，莫不是泄露了太多天机？”\n\n先生说：“圣人早已把致知的学问指示给人看，只是被后人掩盖了，我不过是把它揭示出来罢了，怎么能说是泄露天机呢？良知是人人具有的，只是人们无知无觉罢了。如果对那些不肯切实下功夫的人说，他们对此肯定十分轻视，对彼此都没有益处；如果对那些肯切实用功却不得要领的人讲明白，对他们就大有裨益了。”"],["下","一九五","致良知","九川问：“自省念虑，或涉邪妄，或预料理天下事，思到极处，井井有味，便缱绻难屏。觉得早则易，觉迟则难。用力克治，愈觉扞格。惟稍迁念他事，则随两忘。如此廓清亦似无害。”\n\n先生曰：“何须如此，只要在良知上着功夫。”\n\n九川曰：“正谓那一时不知。”\n\n先生曰：“我这里自有功夫，何缘得他来？只为尔功夫断了，便蔽其知。既断了，则继续旧功便是。何必如此？”\n\n九川曰：“直是难鏖。虽知，丢他不去。”\n\n先生曰：“须是勇。用功久，自有勇。故曰‘是集义所生者’。胜得容易，便是大贤。”","九川问：“我反省自己的念头思虑，有时涉及邪恶妄念，有时又思考平治天下，想得最深的时候，感觉到津津有味，难以摈去。发现得早还容易去除，发现得晚就很难去除。用力克制，愈发觉得难以抵挡。只有去想别的事才能忘掉。这样清除思虑好像也没什么害处。”\n\n先生说：“何须如此？只需要在良知上下功夫。”\n\n九川说：“我说的正是良知不在的时候。”\n\n先生说：“我这里自然是有功夫的，怎么会出现你说的这种情况呢？只因为你的功夫间断了，蒙蔽了良知。既然功夫间断了，继续原来的功夫便可。何必要那样做呢？”\n\n九川说：“那真是一场鏖战。虽然知道却又去不掉。”\n\n先生说：“这需要勇气。用功久了，自然勇敢。所以说‘是集义所生者’。如果能轻易战胜思虑，便是大贤人了。”"],["下","一九七","格物","有一属官，因久听讲先生之学，曰：“此学甚好，只是簿书讼狱繁难，不得为学。”\n\n先生闻之，曰：“我何尝教尔离了簿书讼狱悬空去讲学？尔既有官司之事，便从官司的事上为学，才是真格物。如问一词讼，不可因其应对无状，起个怒心；不可因他言语圆转，生个喜心；不可恶其嘱托，加意治之；不可因其请求，屈意从之；不可因自己事务烦冗，随意苟且断之；不可因旁人谮毁罗织，随人意思处之。这许多意思皆私，只尔自知，须精细省察克治，惟恐此心有一毫偏倚，杜人是非。这便是格物、致知。簿书讼狱之间，无非实学。若离了事物为学，却是着空。”","有一位先生的属官，长期听先生讲学，说道：“先生您的学问十分好，可是文书、断案繁杂困难，无暇去学习。”\n\n先生听到这句话，说：“我何时教你离开文书、断案凭空去做学问？你既然要处理官司，便在处理官司上做学问，这才是真正的格物。比如断案，不能因当事人回答时无礼就发怒；不能因其言辞婉转就高兴；不能因厌恶其说情就故意惩罚；不能因其苦苦哀求就屈意答应；不能因自己事务繁冗就随意糊弄；不能因旁人诋毁、罗织罪名就听之任之。这许多的情况都是私意在作祟，只有你自己知道，必须精细体察、反省克制，唯恐心中有一丝一毫的偏移就错断了案件的是非。这就是格物，就是致知。文书、断案之间，无非都是实实在在的学问。如果离开了事物去做学问，反而会落空。”"],["下","一九八","致良知","虔州将归，有诗别先生云：“良知何事系多闻，妙合当时已种根。好恶从之为圣学，将迎无处是乾元。”\n\n先生曰：“若未来讲此学，不知说‘好恶从之’从个甚么。”\n\n敷英在座，曰：“诚然。尝读先生《大学古本序》，不知所说何事。及来听讲许时，乃稍知大意。”","我将要离开虔州时，写了一首诗向先生告别：“良知何事系多闻，妙合当时已种根。好恶从之为圣学，将迎无处是乾元。”\n\n先生说：“你如果没有来此讨论学问，那么就不知道‘好恶从之’的‘从’说的是什么意思。”\n\n敷英也在座，说：“是啊！我曾经读先生的《大学古本序》，不知道说的是什么。在这里听讲了一段时日，才稍稍明白其中的大意。”"],["下","二〇〇","致良知","先生曰：“圣人亦是‘学知’，众人亦是‘生知’。”\n\n问曰：“何如？”\n\n曰：“这良知人人皆有，圣人只是保全无些障蔽，兢兢业业、亹亹翼翼，自然不息，便也是学。只是生的分数多，所以谓之‘生知安行’。众人自孩提之童，莫不完具此知，只是障蔽多，然本体之知自难泯息，虽问学克治，也只凭他。只是学的分数多，所以谓之‘学知利行’。”","先生说：“圣人也是‘学而知之’，众人也是‘生而知之’。”\n\n九川问：“怎么理解？”\n\n先生说：“良知人人具有，圣人只是保全得好而没有受到任何蒙蔽，兢兢业业、勤勤恳恳，良知自然不息，这也是学。只是天生的成分多，所以说圣人‘生知安行’。常人从孩提时代也都具有完备的良知，只是遮蔽得多，然而本体的良知难以泯灭、止息，虽然通过学问克制的功夫，但也只是凭借天生的良知。只是通过学习的成分多，所以才说常人是‘学知利行’。”"],["下","二〇一","致良知","黄以方\n问：“先生格致之说，随时格物以致其知，则知是一节之知，非全体之知也，何以到得‘溥博如天，渊泉如渊’地位？”\n\n先生曰：“人心是天、渊。心之本体无所不该，原是一个天，只为私欲障碍，则天之本体失了；心之理无穷尽，原是一个渊，只为私欲窒塞，则渊之本体失了。如今念念致良知，将此障碍窒塞一齐去尽，则本体已复，便是天、渊了。”乃指天以示之曰，“比如面前见天是昭昭之天，四外见天也只是昭昭之天，只为许多房子墙壁遮蔽，便不见天之全体。若撤去房子墙壁，总是一个天矣。不可道跟前天是昭昭之天，外面又不是昭昭之天也。于此便见一节之知即全体之知，全体之知即一节之知，总是一个本体。”\n\n以下门人黄直录。","黄直问：“先生格物致知的学说，是随时格物来实现其良知，这样就使得知只是一部分的知，而非全体的知。这如何能够达到《中庸》所说的‘溥博如天，渊泉如渊’的境界呢？”\n\n先生说：“人心就是天、就是渊。心的本体无所不括，它原本就是一个天，只是被私欲蒙蔽，才丧失了天的本来面目；心中的天理无穷无尽，原本就是一个渊，只是被私欲阻塞，才失去了作为渊的本体。现在念念不忘致良知，将这些障碍一并去除，恢复心的本体，便是天和渊了。”先生就指着天接着说，“比如面前的天是晴朗的天，在外面看到的天也是晴朗的天，只是被许多房子墙壁遮蔽了，便看不见天的全体。如果撤去房子墙壁，就是一个天而已。不能说眼前的天是晴朗的天，外面的天就不是晴朗的天了。由此可见，部分的良知就是全体的良知，全体的良知就是部分的良知，总之只是一个本体。”\n\n此条及以下内容是弟子黄直所录。"],["下","二〇四","致良知","先生曰：“我辈致知，只是各随分限所及。今日良知见在如此，只随今日所知扩充到底；明日良知又有开悟，便从明日所知扩充到底。如此方是精一功夫。与人论学，亦须随人分限所及。如树有这些萌芽，只把这些水去灌溉，萌芽再长，便又加水。自拱把以至合抱，灌溉之功皆是随其分限所及。若些小萌芽，有一桶水在，尽要倾上，便浸坏他了。”","先生说：“我们致良知也只是各人尽各人的力。今天良知认识到这个程度，就根据今天的认识扩充到底；明天良知又进一步领悟，就根据明天的认知扩充到底。这就是精研专一的功夫。与别人讨论学问，也必须根据对方的能力所及。好比树木刚刚萌芽，只用一点水去灌溉，树芽长大些，便加些水。树木从两手合握的大小到双臂合抱的大小，灌溉的多少都是根据树的大小来决定的。如果只是小小的树芽，却把一桶水都浇上去，就会把树给浸坏了。”"],["下","二〇五","知行合一","问知行合一。\n\n先生曰：“此须识我立言宗旨。今人学问，只因知行分作两件，故有一念发动，虽是不善，然却未曾行，便不去禁止。我今说个知行合一，正要人晓得一念发动处便即是行了。发动处有不善，就将这不善的念克倒了，须要彻根彻底，不使那一念不善潜伏在胸中。此是我立言宗旨。”","有人向先生请教知行合一。\n\n先生说：“这就必须了解我的立言宗旨。今人的学问，把知与行分作两件事，所以有一个念头发动，即便是不善的，只因为没有去实行，就不去禁止它。我如今说知行合一，正是要人晓得一念发动之处便已经是实行了。意念发动之处有不善，就要将这个不善的念头克去，需要彻底根除，使得不善之念不能在心中潜伏。这就是我的立言宗旨。”"],["下","二〇六","心体","“圣人无所不知，只是知个天理；无所不能，只是能个天理。圣人本体明白，故事事知个天理所在，便去尽个天理。不是本体明后，却于天下事物都便知得，便做得来也。天下事物，如名物度数、草木鸟兽之类，不胜其烦，圣人须是本体明了，亦何缘能尽知得？但不必知的，圣人自不消求知；其所当知的，圣人自能问人，如‘子入太庙，每事问’\n之类。先儒谓‘虽知亦问，敬谨之至’\n，此说不可通。圣人于礼乐名物不必尽知，然他知得一个天理，便自有许多节文度数出来。不知能问，亦即是天理节文所在。”","先生说：“圣人无所不知，知只是知道天理；圣人无所不能，能也只是能发扬天理。圣人之心本都明白，所以在每一件事上都知道天理的所在，就去穷尽其中的天理。并不是心的本体明白后，对于天下的事物都能懂得、都能做得。天下的事物，如名物度数、草木鸟兽等等，不计其数，就算圣人的心体再明白，但又怎能全都知道呢？只是那些不必去知道的，圣人不必去知；对于那些应当知道的，圣人自然会向人请教，比如‘孔子进入太庙，每件事都要问’等等。朱熹先生引用尹和靖的话，说‘孔子虽然知道也还要问，这是极其虔敬谨慎的表现’，这种说法说不通。圣人对于礼乐名物不必都知道，但是他知道一个天理，就自然会明白许多规矩法则。不知就问，这也是天理的法则。”"],["下","二〇七","心体","问：“先生尝谓善恶只是一物。善恶两端，如冰炭相反，如何谓只一物？”\n\n先生曰：“至善者，心之本体。本体上才过当些子，便是恶了。不是有一个善，却又有一个恶来相对也。故善恶只是一物。”\n\n直因闻先生之说，则知程子所谓“善固性也，恶亦不可不谓之性”\n，又曰“善恶皆天理。谓之恶者本非恶，但于本性上过与不及之间耳\n”\n，其说皆无可疑。","黄直问：“先生曾说善恶只是一个东西。然而善与恶就如同冰与炭，相互对立，怎么能说只是一个东西？”\n\n先生说：“至善是心的本体。本体上稍稍过分一些，便是恶。并不是有一个善，还有一个恶与善相对。所以善恶只是一个东西。”\n\n黄直听了先生的解释，就明白了程颐先生所说的“善固然是性，恶也不能不说是性”，以及“善恶都是天理使然。即便说它是恶也并非本来就是恶的，只是在本性上稍稍有过或不及罢了”，黄直对于这些说法都没有疑问了。"],["下","二〇八","修行语录","先生尝谓：“人但得好善如好好色，恶恶如恶恶臭，便是圣人。”\n\n直初时闻之，觉甚易，后体验得来，此个功夫着实是难。如一念虽知好善恶恶，然不知不觉，又夹杂去了。才有夹杂，便不是好善如好好色、恶恶如恶恶臭的心。善能实实的好，是无念不善矣；恶能实实的恶，是无念及恶矣。如何不是圣人？故圣人之学，只是一诚而已。","先生曾说：“人只要像喜欢美色那样喜欢善德，讨厌恶臭那样讨厌恶行，便是圣人了。”\n\n黄直刚听闻时，觉得这很容易，后来仔细体会才觉得，这个功夫着实很难。比如心里的念头虽然知道好善恶恶，然而不知不觉间有会夹杂别的意念。一旦夹杂了别的意念，就不是如喜欢美色那般喜欢善德、如讨厌恶臭那样讨厌恶行的心了。能切实地喜欢善德，那么就没有念头是不善了；能切实地厌恶恶行，就没有念头是恶的了。这样怎么不是圣人呢？所以圣人的学说，只是一个诚罢了。"],["下","二〇九","修行语录","问《修道说》\n言“率性之谓道”属圣人分上事、“修道之谓教”属贤人分上事。\n\n先生曰：“众人亦率性也，但率性在圣人分上较多，故‘率性之谓道’属圣人事。圣人亦修道也，但修道在贤人分上多，故‘修道之谓教’属贤人事。”\n\n又曰：“《中庸》一书，大抵皆是说修道的事，故后面凡说君子，说颜渊，说子路，皆是能修道的；说小人，说贤、知、愚、不肖，说庶民，皆是不能修道的。其它言舜、文、周公、仲尼，至诚至圣之类，则又圣人之自能修道者也。”","有人就先生的《修道说》中所讲的“率性之谓道”属于圣人的分内事、“修道之谓教”属于贤人的分内事请教先生。\n\n先生说：“常人也能率性，但率性在圣人处表现得多，所以‘率性之谓道’属于圣人之事。圣人也能修道，但修道在贤人处表现得多，所以‘修道之谓教’属于贤人之事。”\n\n先生又说：“《中庸》这本书，大体上都是讲修道的事，所以后面但凡说到君子，说颜回、子路，都是指能修道的人；说到小人，说贤、知、愚、不肖，说百姓，都是不能修道的人。其他诸如说道舜、文王、周公、孔子，都是至诚至圣的人，这些人又是圣人之中能够自然而然修道的人。”"],["下","二一〇","省察克治","问：“儒者到三更时分，扫荡胸中思虑，空空静静，与释氏之静只一般。两下皆不用，此时何所分别？”\n\n先生曰：“动静只是一个。那三更时分空空静静的，只是存天理，即是如今应事接物的心。如今应事接物的心，亦是循此天理，便是那三更时分空空静静的心。故动静只是一个，分别不得。知得动静合一，释氏毫厘差处亦自莫掩矣。”","有人问：“儒者到了三更时分，扫清胸中的思虑，空空荡荡，与佛家所说的静是一样的。这时儒佛两家的功夫都不发挥作用，又要如何区别它们呢？”\n\n先生说：“动和静只是一回事。三更时分心中空空荡荡，也只是存养天理，即是现在待人接物的心。现在待人接物的心，也只是依循这个天理，也就是那三更时分空空荡荡的心。所以动和静是一回事，没法分别。明白动静合一的道理，佛家与儒家的细微差别就能自然明白了。”"],["下","二一一","论学","门人在座，有动止甚矜持者。先生曰：“人若矜持太过，终是有弊。”\n\n曰：“矜持太过，如何有弊？”\n\n曰：“人只有许多精神，若专在容貌上用功，则于中心照管不及者多矣。”\n\n有太直率者。先生曰：“如今讲此学，却外面全不检束，又分心与事为二矣。”","在座学生中，有人举止过于矜持。先生说：“人如果过于矜持，终究是有弊端。”\n\n那人问：“过于矜持，有什么弊端？”\n\n先生说：“人只有这些精神，如果专门在容貌上用功，就会无暇顾及照管心体了。”\n\n有的学生十分粗率。先生说：“现在讲求这个学问，却在容貌礼仪上不加检点，又是将心与事一分为二了。”"],["下","二一二","朋友之道","门人作文送友行，问先生曰：“作文字不免费思，作了后又一二日常记在怀。”\n\n曰：“文字思索亦无害，但作了常记在怀，则为文所累，心中有一物矣，此则未可也。”\n\n又作诗送人。先生看诗毕，谓曰：“凡作文字要随我分限所及，若说得太过了，亦非‘修辞立诚’\n矣。”","有一位学生写文章为朋友送行，问先生：“写文章难免费心思，写完之后一两天又时时记得。”\n\n先生说：“思索写文章也没什么害处，只是写完之后时时记得，则确实被文字所拖累。心中滞留着一个事物，这就不太好。”\n\n又有人写诗送人。先生看完说：“凡是写作诗文都要量力而行，如果说得太过，也就不是‘以诚挚之心修文立辞’了。”"],["下","二一四","心体","问“有所忿懥”\n一条。\n\n先生曰：“忿懥几件，人心怎能无得，只是不可有所耳。凡人忿懥，着了一分意思，便怒得过当，非廓然大公之体了。故有所忿懥，便不得其正也。如今于凡忿懥等件，只是个物来顺应，不要着一分意思，便心体廓然大公，得其本体之正了。且如出外见人相斗，其不是的，我心亦怒。然虽怒，却此心廓然，不曾动些子气。如今怒人，亦得如此，方才是正。”","有人向先生请教《大学》中“有所忿懥”一节。\n\n先生说：“愤怒等情绪，人心中怎会没有，只是不应该留驻而已。常人在愤怒时，多加了一分意思，便愤怒过当，不是公正宽广的心体。所以心中有所愤怒，心就无法维持中正。现在对于愤怒等情绪，只要物来而顺应便可，不要添加自己的一分意思，就是心体的广阔公正，得到心体本然的中正了。就好比外出看见有人在打斗，对于错的一方，我也会愤怒。然而我虽然愤怒，但心中却是公正的，不会动气。现在对他人发怒时，也应如此，这才是心体的中正。”"],["下","二一五","修行语录","先生尝言：“佛氏不着相\n，其实着了相。吾儒着相，其实不着相。”\n\n请问。\n\n曰：“佛怕父子累，却逃了父子；怕君臣累，却逃了君臣；怕夫妇累，却逃了夫妇。都是为个君臣、父子、夫妇着了相，便须逃避。如吾儒，有个父子，还他以仁；有个君臣，还他以义；有个夫妇，还他以别。何曾着父子、君臣、夫妇的相？”","先生曾说：“佛家不执着于相，实则执着于相。我们儒家貌似执着于相，实则不执着于相。”\n\n黄直向先生请教。\n\n先生说：“信佛的人害怕被父子关系牵累，就抛弃父子之情；害怕被君臣关系牵累，就抛弃君臣之义；害怕被夫妇关系连累，就抛弃夫妇之别。这都是执着于君臣、父子、夫妇的相，所以才想逃避。像我们儒家，有父子关系，便待之以仁；有君臣关系，便待之以义；有夫妇关系，便待之以别。何尝执着于父子、君臣、夫妇的相呢？”"],["下","二一六","心体","黄勉叔问：“心无恶念时，此心空空荡荡的，不知亦须存个善念否？”\n\n先生曰：“既去恶念，便是善念，便复心之本体矣。譬如日光被云来遮蔽，云去光已复矣。若恶念既去，又要存个善念，即是日光之中添燃一灯。”\n\n以下门人黄修易\n录\n。","黄修易问：“心中没有恶念时，空空荡荡，不知道是否需要存养善念呢？”\n\n先生说：“既然去除了恶念，自然就是善念，就是恢复心的本体了。好比太阳的光芒被乌云遮住，乌云过后光又重现了。如果恶念已经除去，又要存个善念，就像是在阳光下去点一盏灯。”\n\n此条及以下内容是弟子黄修易所录。"],["下","二一七","致良知","问：“近来用功，亦颇觉妄念不生，但腔子里黑窣窣的，不知如何打得光明？”\n\n先生曰：“初下手用功，如何腔子里便得光明？譬如奔流浊水，才贮在缸里，初然虽定，也只是昏浊的。须俟澄定既久，自然渣滓尽去，复得清来。汝只要在良知上用功，良知存久，黑窣窣自能光明矣。今便要责效，却是助长，不成功夫。”","黄修易问：“近来用功，颇有妄念不生的感觉，但心里漆黑一片，不知如何使它光明起来？”\n\n先生说：“起初用功，怎么能使得心里光明？好比汹涌的浊水，才贮藏在缸里，虽然静止不动了，也还是浑浊的。必须澄定的时间长了，水中的渣滓才会沉淀下来，才会变为清水。你只要在良知上下功夫，良知存养久了，漆黑的地方自然能光明起来。如今你要求速效，却有揠苗助长的毛病，不是真正的功夫。”"],["下","二一八","致良知","先生曰：“吾教人致良知，在格物上用功，却是有根本的学问，日长进一日，愈久愈觉精明。世儒教人事事物物上去寻讨，却是无根本的学问。方其壮时，虽暂能外面修饰，不见有过，老则精神衰迈，终须放倒。譬如无根之树，移栽水边，虽暂时鲜好，终久要憔悴。”","先生说：“我教人致良知，要在格物上下功夫，这是有根的学问，一天比一天进步，用功越久就越精进、明白。俗儒教人在事事物物上探求，这是没有根的学问。当他年轻力壮时，虽然能暂时修饰外表，看不出有什么过错，但年老时精神衰败，就会支持不住。好比无根之木，移栽到水边，虽然暂时生机勃勃，但终究会憔悴枯死。”"],["下","二一九","立志","问“志于道”\n一章。\n\n先生曰：“只‘志道’一句便含下面数句功夫，自住不得。譬如做此屋，‘志于道’是念念要去择地鸠材，经营成个区宅；‘据德’却是经画已成，有可据矣；‘依仁’却是常常住在区宅内，更不离去；‘游艺’却是加些画采，美此区宅。艺者，义也，理之所宜者也。如诵诗、读书、弹琴、习射之类，皆所以调习此心，使之熟于道也。苟不志道而游艺，却如无状小子，不先去置造区宅，只管要去买画挂、做门面，不知将挂在何处。”","有人向先生请教《论语》“志于道”这一节。\n\n先生说：“只‘志于道’一句话便涵盖了下面几句的功夫，自然不能停留在‘志于道’上。好比盖房子，‘志于道’是去挑选木材，改成房屋；‘据德’则是房屋建成后，可以居住、依靠了；‘依仁’是要常常住在房子里，不再离开；‘游艺’则是装点、美化这个房子。艺就是义，是天理的合宜之处。比如诵诗、读书、弹琴、射箭等，都是为了调养本心，使其能够熟稔于道。如果不先‘志于道’就去‘游于艺’，就像是一个毛头小子，不先去盖房子，只管去买画来装点门面，却不知道要将画挂在何处。”"],["下","二二〇","致良知","问：“读书所以调摄此心，不可缺的。但读之之时，一种科目意思牵引而来，不知何以免此？”\n\n先生曰：“只要良知真切，虽做举业，不为心累。总有累，亦易觉，克之而已。且如读书时，良知知得强记之心不是，即克去之；有欲速之心不是，即克去之；有夸多斗靡之心不是，即克去之。如此亦只是终日与圣贤印对，是个纯乎天理之心。任他读书，亦只是调摄此心而已，何累之有？”\n\n曰：“虽蒙开示，奈资质庸下，实难免累。窃闻穷通有命，上智之人恐不屑此；不肖为声利牵缠，甘心为此，徒自苦耳。欲屏弃之，又制于亲，不能舍去，奈何？”\n\n先生曰：“此事归辞于亲者多矣，其实只是无志。志立得时，良知千事万事为只是一事。读书作文，安能累人？人自累于得失耳！”因叹曰，“此学不明，不知此处担搁了几多英雄汉！”","有人问：“读书是为了调节内心，是不可或缺的。然而读书的时候，科举的念头又被牵扯进来，不知道该如何避免？”\n\n先生说：“只要良知真切，即便参加科举，也不会是心的牵累。即便有了牵累，也容易察觉，克服即可。好比读书时，良知明白有强记的心是不对的，就克制它；知道有求速的心是不对的，就克制它；知道有争强好胜的心是不对的，就克制它。如此这般，整天只是和圣贤相印证，就是一个纯然天理的心。不管如何读书，也都是调节本心罢了，何来的牵累？”\n\n那人问：“承蒙先生开导，奈何我资质愚钝，实在难以免除牵累。听说穷困与通达都由命运决定，天资卓著的人恐怕对科举的事业不屑一顾；而资质驽钝的人则会为声名利禄所牵绊，心甘情愿为科举而读书，却又为此痛苦。如果想要放弃科举，又迫于父母的压力，无法舍弃，这该如何是好？”\n\n先生说：“把科举之累归罪于父母的人太多了，说到底只是自己没有志向。志向立得定，良知即便主宰了千万件事，其实也只有一件事。读书写文章，又怎么牵累人呢？是人自己为得失之心所牵累啊！”先生因此感慨道，“良知的学说不彰明，不知道在这里耽误了多少英杰！”"],["下","二二一","致良知","问：“‘生之谓性’，告子亦说得是，孟子如何非之？”\n\n先生曰：“固是性，但告子认得一边去了，不晓得头脑。若晓得头脑，如此说亦是。孟子亦曰：‘形色，天性也。’这也是指气说。”\n\n又曰：“凡人信口说、任意行，皆说‘此是依我心性出来’，此是所谓‘生之谓性’，然却要有过差。若晓得头脑，依吾良知上说出来、行将去，便自是停当。然良知亦只是这口说、这身行，岂能外得气，别有个去行去说？故曰：‘论性不论气不备，论气不论性不明。’气亦性也，性亦气也。但须认得头脑是当。”","有人问：“告子说‘生之谓性’，未必有错，孟子为何要否定他？”\n\n先生说：“生固然是性，然而告子只认识了一个方面，不知道性的本质。如果知道性的本质，这么说也不错。孟子也说：‘形色，天性也。’这也是针对气而说的。”\n\n先生又说：“但凡是一个人信口说的、随意做的，都说‘这是依照我的心性而为’，这就是所谓‘生之谓性’，然而这样做会有许多过错。如果知道性的本质，依照自己的良知去说、去做，便自然得当。然而良知也只是依靠嘴巴来说、身体来行，又怎能撇开气，另外有个东西去说、去行呢？所以程颐先生说：‘论性不论气不备，论气不论性不明。’气即是性，性即是气。只是必须明白性的本质方可。”"],["下","二二二","致良知","又曰：“诸君功夫，最不可助长。上智绝少，学者无超入圣人之理。一起一伏，一进一退，自是功夫节次。不可以我前日用得功夫了，今却不济，便要矫强做出一个没破绽的模样，这便是助长，连前些子功夫都坏了。此非小过，譬如行路的人遭一蹶跌，起来便走，不要欺人，做那不曾跌倒的样子出来。诸君只要常常怀个‘遁世无闷，不见是而无闷’之心，依此良知，忍耐做去，不管人非笑，不管人毁谤，不管人荣辱，任他功夫有进有退，我只是这致良知的主宰不息，久久自然有得力处，一切外事亦自能不动。”\n\n又曰：“人若着实用功，随人毁谤，随人欺慢，处处得益，处处是进德之资。若不用功，只是魔也，终被累倒。”","先生又说：“诸位用功，切不可揠苗助长。天资卓著的人极少，为学之人没有一步登天成为圣人的道理。在起起伏伏、进进退退之间，才是功夫的次序。不能因为我前些日子用功了，今天却不管用，就故做一副没有破绽的样子，这就是揠苗助长，连以前的功夫都被败坏了。这不是小的过错，好比走路的人摔了一跤，爬起来便走，不要欺骗别人，装出一副没有跌倒过的样子。诸位只要时常怀揣着‘避世而内心没有忧虑，不被人赏识内心也没有烦闷’的心态，按照良知切实用功，无论他人讥笑也好、诽谤也罢，不管别人赞誉也好、辱骂也罢，任凭功夫有进有退，只是坚持自己致良知的心念不停息，久而久之自然会感到有力，自然能够不为外物所动。”\n\n先生又说：“人如果能够切实用功，随便他人如何诋毁、诽谤、欺辱、轻慢，都是自己的受益之处，都是可以助长德性的资本。如果自己不用功，他人的意见就好比是妖魔，终究会被拖累倒。”"],["下","二二三","致良知","先生一日出游禹穴\n，顾田间禾，曰：“能几何时，又如此长了！”\n\n范兆期\n在旁曰：“此只是有根。学问能自植根，亦不患无长。”\n\n先生曰：“人孰无根？良知即是天植灵根，自生生不息，但着了私累，把此根戕贼蔽塞，不得发生耳。”","先生有一天去禹穴游玩，看到田间的禾苗，说：“这么短的时间，又长得如此高了！”\n\n一旁的范兆期说：“这是因为禾苗有根。做学问如果能够自己种下根，也不怕学问没有进步。”\n\n先生说：“人又怎么会没有根呢？良知就是人天生的灵根，自然生生不息，只是被私意牵累，将这个根戕害、蒙蔽了，不能生发出来罢了。”"],["下","二二四","谦卑","一友常易动气责人。先生警之曰：“学须反己。若徒责人，只见得人不是，不见自己非；若能反己，方见自己有许多未尽处，奚暇责人？舜能化得象的傲\n，其机括只是不见象的不是。若舜只要正他的奸恶，就见得象的不是矣。象是傲人，必不肯相下，如何感化得他？”\n\n是友感悔。\n\n曰：“你今后只不要去论人之是非，凡当责辩人时，就把做一件大己私，克去方可。”","一位学友时常容易生气，指责别人。先生警告他说：“做学问必须反求诸己。如果只是指责别人，就只看到他人的不是，看不到自己的过错；如果能够反省自己，便能看到自己许多做得不到位的地方，哪有空指责别人？舜之所以能感化象的傲慢，关键在于不去理会象的不是。如果舜只是想要纠正象的奸恶，就只会看到象的许多不是了。象是个傲慢的人，肯定不会服气，又怎能感化得了呢？”\n\n这个学友有所感悟，十分后悔。\n\n先生说：“你今后不要去议论他人的是非，但凡当你想要指责别人的时候，就把它当作一个大的私意，只有克服掉才行。”"],["下","二二六","天理人欲","问：“《易》，朱子主卜筮\n，程《传》主理\n，何如？”\n\n先生曰：“卜筮是理，理亦是卜筮。天下之理孰有大于卜筮者乎？只为后世将卜筮专主在占卦上看了，所以看得卜筮似小艺。不知今之师友问答、博学、审问、慎思、明辨、笃行之类，皆是卜筮。卜筮者，不过求决狐疑，神明吾心而已。《易》是问诸天，人有疑，自信不及，故以《易》问天。谓人心尚有所涉，惟天不容伪耳。”","有人问：“朱子认为《易经》重在卜筮，程颐先生则认为《易经》重在阐明天理，怎么理解？”\n\n先生说：“卜筮也是天理，天理也是卜筮。天下的道理难道有比卜筮还大的吗？只是后世之人将卜筮专门理解为占卦，所以将卜筮看作雕虫小技了。却不知如今师友之间的问答、博学、审问、慎思、明辨、笃行等等，都是卜筮。卜筮不过是解决疑惑，使得人心变得神妙、明白而已。《易经》是向天请教，人有疑问，缺乏自信，所以用《易经》请教天。所以说，人心或许还有偏倚，只有天不容得任何虚假。”"],["下","二二七","致良知","黄勉之问：“‘无适也，无莫也，义之与比。’\n事事要如此否？”\n\n先生曰：“固是事事要如此，须是识得个头脑乃可。义即是良知，晓得良知是个头脑，方无执着。且如受人馈送，也有今日当受的，他日不当受的；也有今日不当受的，他日当受的。你若执着了今日当受的，便一切受去；执着了今日不当受的，便一切不受去。便是‘适’‘莫’，便不是良知的本体。如何唤得做义？”\n\n以下门人黄省曾\n录\n。","黄勉之问：“《论语》有言：‘没有绝对的肯定，也没有绝对的否定，符合义即可。’难道每件事都要如此吗？”\n\n先生说：“当然每件事都要如此，只是必须先认识到宗旨才行。义就是良知，知道良知就是宗旨，才不会执着。好比接受别人的馈赠，有的今天可以接受，而其他时间不能接受；也有今天不能接受，而其他时间可以接受的。如果你执着于今天可以接受，就接受所有的馈赠；执着于今天不能接受，就拒绝一切馈赠。这就是‘适’和‘莫’，就不是良知的本体。怎么能叫作义呢？”\n\n此条及以下内容是弟子黄省曾所录。"],["下","二三〇","论学","问：“‘中人以下，不可以语上。’\n愚的人，与之语上尚且不进，况不与之语，可乎？”\n\n先生曰：“不是圣人终不与语，圣人的心忧不得人人都做圣人，只是人的资质不同，施教不可躐等。中人以下的人，便与他说性、说命，他也不省得，也须慢慢琢磨他起来。”","有人问：“《论语》说：‘中人以下，不可以语上。’资质愚钝的人，与他讲高深的学问都无法进步，何况不给他们讲呢？”\n\n先生说：“不是圣人不给他们讲，圣人恨不得人人都能做得圣人，只是由于人的资质不同，施教时不能乱了次序。中等以下资质的人，即便给他讲性与命的道理，他也不明白，还是需要慢慢启发他。”"],["下","二三三","论学","问“志士仁人”\n章。\n\n先生曰：“只为世上人都把生身命子看得太重，不问当死不当死，定要宛转委曲保全，以此把天理却丢去了。忍心害理，何者不为？若违了天理，便与禽兽无异，便偷生在世上百千年，也不过做了千百年的禽兽。学者要于此等处看得明白。比干、龙逢\n，只为也看得分明，所以能成就得他的人。”","有人向先生请教《论语》中“志士仁人”一节。\n\n先生说：“只是因为世人都将自己的身家性命看得太重了，不问是否应当赴死，都想保全自己的性命，却把天理给丢了。忍心残害天理，还有什么事做不出来呢？如果违背了天理，与禽兽有什么区别，即便苟且偷生千百年，也不过是做了千百年的禽兽。为学之人在此处必须看得明白。比干、龙逢，只因为他们看得明白，所以能够做到他的为人之本。”"],["下","二三四","论学","问：“叔孙、武叔毁仲尼\n，大圣人如何犹不免于毁谤？”\n\n先生曰：“毁谤自外来的，虽圣人如何免得？人只贵于自修，若自己实实落落是个圣贤，纵然人都毁他，也说他不着。却若浮云掩日，如何损得日的光明？若自己是个象恭色庄、不坚不介的，纵然没一个人说他，他的恶慝终须一日发露。所以孟子说：‘有求全之毁，有不虞之誉。’\n毁誉在外的，安能避得，只要自修何如尔。”","有人问：“《论语》中记载叔孙、武叔诋毁孔子，大圣人为何也免不了被诽谤呢？”\n\n先生说：“诽谤都从外面来，即便是圣人又怎能避免？人贵在自我修养，如果自己实实在在是个圣贤，纵然他人都诽谤他，也没有什么损害。好比浮云遮住了太阳，又怎能损害太阳的光明呢？如果自己只是做出个恭敬端庄的样貌，内心却没有任何坚定的意志，纵然没有一个人诽谤他，内心的恶念终究会有一天爆发出来。所以孟子说：‘想保全声誉却遭到毁谤，在预料不到的时候反而受到称誉。’毁誉都是外在的，如何能避免，只要加强自身修养即可。”"],["下","二三六","立志","王汝中\n、省曾侍坐。\n\n先生握扇命曰：“你们用扇。”\n\n省曾起对曰：“不敢。”\n\n先生曰：“圣人之学，不是这等捆缚苦楚的，不是妆做道学的模样。”\n\n汝中曰：“观‘仲尼与曾点言志’\n一章略见。”\n\n先生曰：“然。以此章观之，圣人何等宽洪包含气象！且为师者问志于群弟子，三子皆整顿以对。至于曾点，瓢飘然不看那三子在眼，自去鼓起瑟来，何等狂态！及至言志，又不对师之问目，都是狂言。设在伊川，或斥骂起来了。圣人乃复称许他，何等气象！圣人教人，不是个束缚他通做一般，只如狂者便从狂处成就他，狷者便从狷处成就他。人之才气如何同得？”","王汝中和黄省曾陪着先生。\n\n先生拿着扇子说：“你们也用扇子吧。”\n\n黄省曾站起来说：“学生不敢。”\n\n先生说：“圣人的学问不是这样拘束痛苦的，不是要装作道学家的样子。”\n\n王汝中说：“这从《论语》中‘仲尼与曾点言志’一节便大概可以看到。”\n\n先生说：“是的。从这章来看，圣人是何等宽宏包容的气象！老师问学生们的志向，子路、冉有、公西华三人都正颜色、整仪容，认真回答。到了曾点，却飘飘然全然不把三人放在眼里，独自弹起瑟来，这是怎样的狂态！他谈到志向时，又不针对老师的问题，满口狂言。要是换作程颐，恐怕早就责骂他了。孔子却称许他，这是怎样的气象！圣人教人，并非束缚人，使得人人做得一样，而是对狂放不羁的人要在其狂处成就他，对洁身自好的人要在其狷处成就他。人的才能、习气又怎会相同呢？”"],["下","二三九","致良知","何廷仁\n、黄正之\n、李侯璧\n、汝中、德洪侍坐。先生顾而言曰：“汝辈学问不得长进，只是未立志。”\n\n侯璧起而对曰：“珙亦愿立志。”\n\n先生曰：“难说不立，未是‘必为圣人’之志耳。”\n\n对曰：“愿立‘必为圣人’之志。”\n\n先生曰：“你真有圣人之志，良知上更无不尽。良知上留得些子别念挂带，便非‘必为圣人’之志矣。”\n\n洪初闻时心若未服，听说到此，不觉悚汗。","何廷仁、黄弘纲、李珙、王畿、钱德洪等人陪同先生。先生看着大家说：“你们的学问没有进步，原因只是没有立志。”\n\n李珙站起来回答：“我愿意立志。”\n\n先生说：“也不能说你没有立志，只是你立的不是‘一定要做圣人’的志向罢了。”\n\n李珙回答说：“我愿意立‘一定要做圣人’的志向。”\n\n先生说：“你如果真的有做圣人的志向，在致良知时就一定会竭尽全力。如果良知上还留有别的私心杂念，就不是‘一定要做圣人’的志向了。”\n\n钱德洪刚听闻时心中不服，听到这里，不禁浑身是汗。"],["下","二四一","致良知","一友静坐有见，驰问先生。\n\n答曰：“吾昔居滁时，见诸生多务知解口耳异同，无益于得，姑教之静坐。一时窥见光景，颇收近效；久之，渐有喜静厌动、流入枯槁之病。或务为玄解妙觉，动人听闻。故迩来只说‘致良知’。良知明白，随你去静处体悟也好，随你去事上磨练也好，良知本体原是无动无静的。此便是学问头脑。我这个话头，自滁州到今，亦较过几番，只是‘致良知’三字无病。医经折肱，方能察人病理。\n”","一位学友在静坐中有所领悟，就跑来向先生请教。\n\n先生回答说：“我过去在滁州时，看到学生们大多注重口耳间的知识理解，争辩同异，没有什么收获，所以姑且教他们静坐。他们很快就能看到一些道理的大概，短时间内收获不错；久而久之，却渐渐有喜静厌动、沦入枯槁的毛病。有的人只追求那种神妙的感觉，借此夸耀于人。所以近来我只讲致良知。良知明白了，随你在静坐中体悟也好，在事上磨炼也罢，良知的本体原本就是不分动静的。这就是做学问的宗旨。我说的这番话，从滁州以来，也经过了几番思考，只是‘致良知’三字没有任何弊病。好比医生要自己骨折过，才能了解骨折的病理一样。”"],["下","二四二","致良知","一友问：“功夫欲得此知时时接续，一切应感处反觉照管不及。若去事上周旋，又觉不见了。如何则可？”\n\n先生曰：“此只认良知未真，尚有内外之间。我这里功夫不由人急心，认得良知头脑是当，去朴实用功，自会透彻。到此便是内外两忘，又何心事不合一？”","一位学友问：“下功夫想让良知不间断，但是在应付事物时却又觉得良知照管不到。如果在事情上周旋，又感觉不到良知了。如何是好？”\n\n先生说：“这只是对良知认识不够真切，还存在内与外的区分。我的功夫不能以求速之心去做，知道致良知的宗旨，踏踏实实用功，自然会体察明澈。到了那一步自然将内与外的区分给忘记了，又何愁心与事不能合一呢？”"],["下","二四四","致良知","先生曰：“‘天命之谓性’，命即是性；‘率性之谓道’，性即是道；‘修道之谓教’，道即是教。”\n\n问：“如何道即是教？”\n\n曰：“道即是良知。良知原是完完全全，是的还他是，非的还他非，是非只依着他，更无有不是处，这良知还是你的明师。”","先生说：“‘天命之谓性’，天命就是本性；‘率性之谓道’，本性就是天道；‘修道之谓教’，天道就是教化。”\n\n有人问：“为何说天道就是教化？”\n\n先生说：“天道就是良知。良知本是完完全全的，是就是是，非就是非，是非只依此来判断，更不会有差错，这良知就是你的明师。”"],["下","二四五","心体","问：“‘不睹不闻’是说本体，‘戒慎恐惧’是说功夫否？”\n\n先生曰：“此处须信得本体原是‘不睹不闻’的，亦原是‘戒慎恐惧’的。‘戒慎恐惧’不曾在‘不睹不闻’上加得些子。见得真时，便谓‘戒慎恐惧’是本体，‘不睹不闻’是功夫亦得。”","有人问：“《中庸》里‘不闻不睹’说的是本体，‘戒慎恐惧’说的是功夫吗？”\n\n先生说：“这里必须相信本体原来就是‘不闻不睹’的，也原来就是‘戒慎恐惧’的。‘戒慎恐惧’并不是在‘不闻不睹’中再加一些什么。想明白时，即便说‘戒慎恐惧’是本体，‘不闻不睹’是功夫也没错。”"],["下","二四六","致良知","问“通乎昼夜之道而知”\n。\n\n先生曰：“良知原是知昼知夜的。”\n\n又问：“人睡熟时，良知亦不知了。”\n\n曰：“不知，何以一叫便应？”\n\n曰：“良知常知，如何有睡熟时？”\n\n曰：“向晦宴息，此亦造化常理。夜来天地混沌，形色俱泯，人亦耳目无所睹闻，众窍俱翕，此即良知收敛凝一时；天地既开、庶物露生，人亦耳目有所赌闻，众窍俱辟，此即良知妙用发生时。可见人心与天地一体。故‘上下与天地同流’\n。今人不会宴息，夜来不是昏睡，即是妄思魇寐。”\n\n曰：“睡时功夫如何用。”\n\n先生曰：“知昼即知夜矣。日间良知是顺应无滞的，夜间良知即是收敛凝一的，有梦即先兆。”","有人向先生请教《周易》中“通乎昼夜之道而知”一句。\n\n先生说：“良知原本就知道昼夜。”\n\n那人又问：“人熟睡时，良知就不知道了。”\n\n先生说：“不知道的话，怎能一叫就有反应？”\n\n那人问：“既然良知常知，为何还有睡熟的时候？”\n\n先生说：“晚上需要休息是天地中的常理。夜晚天地混沌，事物的形色都看不见，人的耳目也看不见、听不到，所有器官都停止运作，这就是良知收敛凝聚的时刻；白昼到来，万物生长，人的耳目也可以看、可以听了，其他器官也都运作起来，这便是良知发生妙用的时刻。由此可见，人心与天地原本就是一体的。所以孟子说‘上下与天地同流’。如今的人不会休息，夜间不是昏睡，就是胡思乱想做噩梦。”\n\n那人问：“睡觉时如何下功夫？”\n\n先生说：“知道白天就通晓夜晚了。白天的良知畅行无阻，夜间的良知收敛凝聚，有梦就是先兆。”"],["下","二四八","致良知","先生曰：“仙家说到‘虚’，圣人岂能‘虚’上加得一毫‘实’？佛氏说到‘无’，圣人岂能‘无’上加得一毫‘有’？但仙家说‘虚’从养生上来，佛氏说‘无’从出离生死苦海上来。却于本上加却这些子意思在，便不是他‘虚’‘无’的本色了，便于本体有障碍。圣人只是还他良知的本色，更不着些子意在。良知之‘虚’便是天之太虚，良知之‘无’便是太虚之无形。日、月、风、雷、山、川、民、物，凡有貌象形色，皆在太虚无形中发用流行，未尝作得天的障碍。圣人只是顺其良知之发用，天地万物俱在我良知的发用流行中，何尝又有一物超于良知之外，能作得障碍？”","先生说：“道家讲‘虚’，圣人又怎能在‘虚’上增加一丝‘实’？佛家说‘无’，圣人又怎能在‘无’上增加一丝‘有’？然而道家说‘虚’是从养生上说的，\n佛家说‘无’是从脱离生死苦海\n上说的。佛道两家在本体上却加了一些意思，就不是‘虚’‘无’的本体了，便对本体有所妨碍了。圣人只是还良知的本来面目，不添加任何意思。良知的‘虚’就是天的太虚，良知的无就是太虚的无形\n。日、月、风、雷、山、川、民、物等，但凡有样貌、形色的东西，都是太虚无形中的发用流行，从未是天的障碍。圣人只是顺应良知的发用，天地万物都在我良知的发用流行之中，何曾有一件事物在良知的外部发生，成为良知的障碍的？”"],["下","二五一","心体","先生曰：“孟子不动心与告子不动心，所异只在毫厘间。告子只在不动心上着功，孟子便直从此心原不动处分晓。心之本体原是不动的，只为所行有不合义便动了。孟子不论心之动与不动，只是‘集义’，所行无不是义，此心自然无可动处。若告子只要此心不动，便是把捉此心，将他生生不息之根反阻桡了，此非徒无益，而又害之。孟子‘集义’工夫，自是养得充满，并无馁歉，自是纵横自在，活泼泼地，此便是浩然之气。”","先生说：“孟子的不动心与告子的不动心，差别仅仅在毫厘之间。告子只是在不动心上用功，孟子则是从心原本不动处用功。心的本体原本不动，只在所作所为不合于义时才会妄动。孟子不讨论心的动或不动，只是去‘集义’，所以所作所为没有不义的，心自然没什么可动的。而告子只是要心不动，便抓住了心不放，反而将心中生生不息的根给阻挠了，这非但没有益处，反而损害了心。孟子‘集义’的功夫，是把心存养得充实，没有任何气馁、亏欠之处，自由自在，生动活泼，这就是浩然之气。”"],["下","二五二","修行语录","又曰：“告子病源，从性无善无不善上见来。性无善无不善，虽如此说，亦无大差。但告子执定看了，便有个无善无不善的性在内。有善有恶，又在物感上看，便有个物在外。却做两边看了，便会差。无善无不善，性原是如此。悟得及时，只此一句便尽了，更无有内外之间。告子见一个性在内，见一个物在外，便见他于性有未透彻处。”","先生又说：“告子的病根，在于他认为性无善无不善。性无善无不善，这么说虽然没有大错，但告子执着于此，便有一个无善无不善的性滞留在心里。认为性有善有恶，是在事物的感觉上看，这就把物视作外了。将心与物视作两边，便会有差错。无善无不善，性本就是如此。领悟得及时，只此一句话便够了，没有什么内外之分。告子看见一个性在内，一个物在外，便知道他对于性的理解还不透彻。”"],["下","二五三","致良知","朱本思\n问：“人有虚灵，方有良知。若草木瓦石之类，亦有良知否？”\n\n先生曰：“人的良知，就是草木瓦石的良知。若草木瓦石无人的良知，不可以为草木瓦石矣。岂惟草木瓦石为然？天地无人的良知，亦不可为天地矣。盖天地万物与人原是一体，其发窍之最精处，是人心一点灵明，风雨露雷，日月星辰，禽兽草木，山川土石，与人原只一体。故五谷、禽兽之类皆可以养人，药石之类皆可以疗疾，只为同此一气，故能相通耳。”","朱本思问：“人有灵性，所以才会有良知。像草木瓦石等东西，也有良知吗？”\n\n先生说：“人的良知，就是草木瓦石的良知。如果草木瓦石没有人的良知关注，便不是草木瓦石了。难道只有草木瓦石是这样吗？天地如果没有人的良知关注，也不是天地了。概而言之，天地万物与人原本是一体的，它最精妙、最开窍之处，是人心的一点知觉灵明，风雨露雷、日月星辰、禽兽草木、山川土石，与人原本就是一体的。所以五谷、禽兽等都可以滋养人的身体，药石等东西可以治疗疾病，是因为人与万物所禀的气是相同的，所以能够相通。”"],["下","二五四","修行语录","先生游南镇\n。一友指岩中花树问曰：“天下无心外之物，如此花树，在深山中自开自落，于我心亦何相关？”\n\n先生曰：“你未看此花时，此花与汝心同归于寂。你来看此花时，则此花颜色一时明白起来，便知此花不在你的心外。”","先生游览南镇。一位学友指着岩石中的花树问道：“先生说天下间没有心外的事物，像这花树，在深山中自开自落，与我的心有什么关系？”\n\n先生说：“你未见到这花时，这花与你的心同归于寂静。你来看这花时，这花的颜色一下子就鲜明起来，由此可知，这花并不在你的心外。”"],["下","二五五","致良知","问：“大人与物同体，如何《大学》又说个厚薄\n？”\n\n先生曰：“惟是道理自有厚薄。比如身是一体，把手足捍头目，岂是偏要薄手足？其道理合如此。禽兽与草木同是爱的，把草木去养禽兽，又忍得？人与禽兽同是爱的，宰禽兽以养亲与供祭祀、燕宾客，心又忍得？至亲与路人同是爱的，如箪食豆羹，得则生，不得则死\n，不能两全，宁救至亲，不救路人，心又忍得？这是道理合该如此。及至吾身与至亲，更不得分别彼此厚薄。盖以仁民爱物皆从此出，此处可忍，更无所不忍矣。《大学》所谓厚薄，是良知上自然的条理，不可逾越，此便谓之义；顺这个条理，便谓之礼；知此条理，便谓之智；终始是这条理，便谓之信。”","有人问：“大人与万物同为一体，为何《大学》却要分厚薄来说？”\n\n先生说：“只是因为道理本就有厚薄。比如人的身体是一个整体，为何要用手足保护头部和眼睛，难道是故意轻视手足吗？是道理本该如此。人对于禽兽与草木同样热爱，又怎么忍心用草木去供养禽兽呢？人对于人与禽兽同样热爱，又怎能忍心宰杀禽兽供养亲人、祭祀先祖、招待宾客呢？人对于至亲和路人同样热爱，如果只有一碗饭、一碗汤，得到就活，得不到就死，无法两全，又怎么忍心只救亲人而不救路人呢？这是因为道理本该如此。至于对自己和对亲人，更不会区分彼此厚薄。仁民爱物都源于亲情，对此都能忍心，便没有什么不能忍心的了。《大学》所说的厚薄，是良知自然的条理，不能逾越，这就是义；顺着这个条理，就是礼；知道这个条理，就是智；始终坚持这个条理，就是信。”"],["下","二五七","论学","问“夭寿不二”。\n\n先生曰：“学问功夫，于一切声利嗜好俱能脱落殆尽，尚有一种生死念头毫发挂带，便于全体有未融释处。人于生死念头，本从生身命根上带来，故不易去。若于此处见得破、透得过，此心全体方是流行无碍，方是尽性至命之学。”","有人向先生请教“夭寿不二”。\n\n先生说：“学问功夫能够摆脱一切名利嗜好，然而只要有一丝贪生怕死的念头，就是心的本体还有未能融通之处。人对于生死的念头，本来是从生命的根子上带来的，所以要清除并不容易。如果对此能够看得破、想得透，整个心体就会畅通无碍，这才是尽性至命的学问。”"],["下","二五八","静与动","一友问：“欲于静坐时，将好名、好色、好货等根逐一搜寻，扫除廓清，恐是剜肉做疮否？”\n\n先生正色曰：“这是我医人的方子，真是去得人病根。更有大本事人，过了十数年亦还用得着。你如不用，且放起，不要作坏我的方子！”\n\n是友愧谢。\n\n少间曰：“此量非你事，必吾门稍知意思者，为此说以误汝\n。”\n\n在坐者皆悚然。","一位学友问：“我想在静坐时，将好名、好色、好货等病根逐一找出来，扫除干净，恐怕这是割肉补疮的做法吧？”\n\n先生严肃地说：“这是我治病的方子，确实能去掉人的病根。即便有再大本事的人，过了十几年也还用得着。你如果不用就放下，不要糟蹋了我的方子！”\n\n这位学友十分惭愧地道了歉。\n\n过了一会儿，先生说：“我猜这也不是你的想法，一定是我那些略通皮毛的弟子这样说，误导了你。”\n\n在座的学生都十分惊恐。"],["下","二五九","致良知","一友问功夫不切。\n\n先生曰：“学问功夫，我已曾一句道尽。如何今日转说转远，都不着根？”\n\n对曰：“致良知盖闻教矣，然亦须讲明。”\n\n先生曰：“既知致良知，又何可讲明？良知本是明白，实落用功便是。不肯用功，只在语言上转说转糊涂。”\n\n曰：“正求讲明致之之功。”\n\n先生曰：“此亦须你自家求，我亦无别法可道。昔有禅师，人来问法，只把麈尾提起。一日，其徒将其麈尾藏过，试他如何设法。禅师寻麈尾不见，又只空手提起。我这个良知就是设法的麈尾，舍了这个，有何可提得？”\n\n少间，又一友请问功夫切要。\n\n先生旁顾曰：“我麈尾安在？”\n\n一时在坐者皆跃然。","一位学友问先生，功夫不真切应该怎么办。\n\n先生说：“学问功夫我已经一句话和你说明白了。为何现在越说越远，找不到学问的根了呢？”\n\n那位学友回答说：“我已听你讲过致良知的功夫，但还需要进一步说明。”\n\n先生说：“既然知道致良知，又有什么需要说明的呢？良知本就明白，实实在在下功夫即可。不肯用功，只在言语上说来说去，越说越糊涂。”\n\n那人说：“我正是想请教讲明致良知的功夫。”\n\n先生说：“这也必须你自己去探求，我也没有别的方法可讲。过去有一位禅师，有人来问佛法，他就把拂尘提起来。有一天，他的徒弟将拂尘藏了起来，想看看他用什么方法说法。禅师找不到拂尘，只好徒手做了个提拂尘的样子。我说的良知就是这个说法的拂尘，除了它，还有什么可以提起的呢？”\n\n不一会儿，又有一位学友来请教功夫的要领。\n\n先生看看旁边的学生，说：“我的拂尘哪儿去了？”\n\n一时间在座的人哄堂大笑。"],["下","二六〇","致良知","或问“至诚”“前知”\n。\n\n先生曰：“诚是实理，只是一个良知。实理之妙用流行就是神，其萌动处就是几。‘诚、神、几，曰圣人’\n。圣人不贵前知，祸福之来虽圣人有所不免，圣人只是知几，遇变而通耳。良知无前后，只知得见在的几，便是一了百了。若有个‘前知’的心，就是私心，就有趋避利害的意。邵子\n必于前知，终是利害心未尽处。”","有人向先生请教《中庸》里的“至诚”“前知”。\n\n先生说：“诚是实在的道理，只是一个良知。实在的道理妙用流行就是神，它的萌动之处就是几。所以周敦颐说‘具备诚德、感悟神化、通晓几微，即是圣人’。圣人并不注重事先知道，即便是圣人也无法免于祸福，圣人只是知道事物的前兆，遇到事情变化能够通达而已。良知则没有前后，只要知道事物的前兆，便能解决所有问题。如果有一个要想事先知道的心，就是私心，就有趋利避害的念头。邵雍硬要追求事先知道，终究是利害之心没有除尽。”"],["下","二六三","致良知","问：“孔子所谓‘远虑’\n，周公‘夜以继日’，与‘将迎’\n不同。何如？”\n\n先生曰：“‘远虑’不是茫茫荡荡去思虑，只是要存这天理。天理在人心，亘古亘今，无有终始。天理即是良知，千思万虑，只是要致良知。良知愈思愈精明，若不精思，漫然随事应去，良知便粗了。若只着在事上茫茫荡荡去思，教做远虑，便不免有毁誉、得丧、人欲搀入其中，就是‘将迎’了。周公终夜以思，只是‘戒慎不睹，恐惧不闻’的功夫。见得时，其气象与‘将迎’自别。”","有人问：“孔子所说的‘远虑’，周公的‘夜以继日’思考，这与程颢所谓‘将迎’有何不同？”\n\n先生说：“‘远虑’不是空空荡荡去思虑，是要存养天理。天理自在人心，从古至今，无始无终。天理即是良知，千思万虑只是要致良知。良知越思考越精细明白，如果不认真思考，漫不经心地随事而应，良知就会粗疏了。如果将在事上空空荡荡去思虑叫作‘远虑’，则免不了有毁誉、得失、私欲掺杂其中，这就是‘将迎’。周公整夜思索的，只是‘戒慎不睹，恐惧不闻’的功夫。明白这一点，就能明白周公的境界与‘将迎’的区别了。”"],["下","二六四","省察克治","问：“‘一日克己复礼，天下归仁’，朱子作效验\n说，如何？”\n\n先生曰：“圣贤只是为己之学，重功夫不重效验。仁者以万物为一体，不能一体，只是己私未忘。全得仁体，则天下皆归于吾仁，就是‘八荒皆在我闼’\n意。天下皆与，其仁亦在其中。如‘在邦无怨，在家无怨’，亦只是自家不怨，如‘不怨天，不尤人’之意。然家邦无怨，于我亦在其中，但所重不在此。”","有人问：“朱熹认为《论语》所谓‘一日克己复礼，天下归仁’是从效验上说，如何理解？”\n\n先生说：“圣贤的学问只是为了自己，重视功夫本身而非效验。仁者以天地万物为一体，不能一体的话，只是因为自己的私意未能忘尽。全然都是仁的本体，那么天下都归于我仁的本体了，就是‘天下万物全在我心’的意思。天下都归于我的仁，那么仁也就包含在天下之中了。比如《论语》中的‘在邦无怨，在家无怨’，也只是在自己家没有可怨的，就如同‘不怨天，不尤人’的意思。然而如果在家、在邦都无可怨，我自然也在其中，只是重点不在于效验而已。”"],["下","二六五","心体","问：“孟子‘巧、力、圣、智’\n之说，朱子云‘三子力有余而巧不足’\n，何如？”\n\n先生曰：“三子固有力，亦有巧。巧、力实非两事，巧亦只在用力处，力而不巧，亦是徒力。三子譬如射：一能步箭，一能马箭，一能远箭。他射得到俱谓之力，中处俱可谓之巧。但步不能马，马不能远，各有所长，便是才力分限有不同处。孔子则三者皆长。然孔子之和只到得柳下惠而极，清只到得伯夷而极，任只到得伊尹而极，何曾加得些子？若谓三子力有余而巧不足，则其力反过孔子了。巧、力只是发明圣、知之义，若识得圣、知本体是何物，便自了然。”","有人问：“孟子‘巧、力、圣、智’的说法，朱熹认为‘伯夷、伊尹、柳下惠三人力有余而巧不足’，对吗？”\n\n先生说：“这三人当然有力，但也有巧。巧与力并非两回事，巧也体现在用力之处，有力而不巧，只是蛮力。以射箭来比喻三人：一个能够步行射箭，一个能够骑马射箭，一个能够很远射箭
