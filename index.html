var CXL=[["上","传习录上 · 序","格物","传习录上\n\n先生于《大学》\n“格物”诸说，悉以旧本\n为正，盖先儒\n所谓“误本”\n者也。爱\n始闻而骇，既而疑，已而殚精竭思，参互错纵，以质于先生。然后知先生之说，若水之寒，若火之热，断断乎百世以俟圣人而不惑者也。先生明睿天授，然和乐坦易，不事边幅。人见其少时豪迈不羁，又尝泛滥于词章，出入二氏\n之学。骤闻是说，皆目以为立异好奇，漫不省究。不知先生居夷三载，处困养静，精一\n之功，固已超入圣域，粹然大中至正之归矣。\n\n爱朝夕炙门下，但见先生之道，即之若易而仰之愈高，见之若粗而探之愈精，就之若近而造之愈益无穷。十余年来，竟未能窥其藩篱。世之君子，或与先生仅交一面，或犹未闻其謦欬，或先怀忽易愤激之心，而遽欲于立谈之间，传闻之说，臆断悬度，如之何其可得也！从游之士，闻先生之教，往往得一而遗二，见其牝牡骊黄，而弃其所谓千里者。故爱备录平日之所闻，私以示夫同志，相与考而正之。庶无负先生之教云。\n\n门人徐爱书","先生对《大学》中“格物”等观点，都以旧本为准，即二程、朱熹所谓有误的版本。我刚听到时很吃惊，进而有些怀疑，后来竭力思考，参详比照两个版本，并向先生请教，才知道先生的学说如同水性清寒、火性炙热，就像《中庸》所说，百世之后出现的圣人也绝对不会怀疑的道理。先生有天赋的智慧，为人却和蔼亲近，平日里不修边幅。人们只看到他年少时豪迈不羁，曾经又热衷诗词文章，沉溺佛、道之学，故而突然听到先生的学说，都认为是标新立异、散漫而不加考究的学说。但他们却没有看到先生贬谪至贵州待了三年，时刻于困苦中修养静思，精研专一的功夫已经进入圣人的领域，达到纯粹中正的境界了。\n\n我每日于先生门下求学，深知先生的学说乍看起来简单、粗疏，但钻研探究后却觉得十分高深、精妙，了解得越深入就愈发能够体会其没有止境。这十多年来，我竟不得入门。今世的学者君子，有的与先生仅一面之交，有的从未听过先生的教诲，有的先入为主地怀有轻视、愤懑的情绪，稍加交谈便急不可待地想要根据传闻与猜测妄加揣度，这样怎么能了解先生的学说呢！跟随先生游学的弟子们，聆听先生的教诲，时常学得少而忘得多，如同相马时，只关注马的性别和颜色，却忽略了马驰骋千里的特性。因此，我将平时所受的教诲记录下来，私下里给同学们看，相互考据订正。希望能够不辜负先生的教诲。\n\n学生徐爱书"],["上","一","修行语录","爱问：“‘在亲民’，朱子谓当作‘新民’，后章‘作新民’之文似亦有据。先生以为宜从旧本作‘亲民’，亦有所据否？”\n\n先生曰：“‘作新民’之‘新’，是‘自新之民’，与‘在新民’之‘新’不同，此岂足为据！‘作’字却与‘亲’字相对，然非‘亲’\n字义。下面‘治国平天下’处，皆于‘新’字无发明。如云‘君子贤其贤而亲其亲，小人乐其乐而利其利’‘如保赤子’‘民之所好好之，民之所恶恶之，此之谓民之父母’之类\n，皆是‘亲’字意。‘亲民’犹《孟子》‘亲亲仁民’之谓，‘亲之’即‘仁之’也。‘百姓不亲’，舜使契为司徒\n，‘敬敷五教\n’\n，所以亲之也。《尧典》‘克明峻德’便是‘明明德\n’\n，‘以亲九族’至‘平章’‘协和’\n，便是‘亲民’，便是‘明明德于天下’。又如孔子言‘修己以安百姓’，‘修己’便是‘明明德’，‘安百姓’便是‘亲民’。说‘亲民’便是兼教养意，说‘新民’便觉偏了。”","徐爱问：“‘在亲民’，朱熹认为应当写作‘新民’，后面一章有‘作新民’的文字似乎可以作为依据。先生认为应当按照旧本写作‘亲民’，有什么根据吗？”\n\n先生说：“‘作新民’的‘新’字，是自新之民的意思，与‘在新民’的‘新’字含义不同，这怎么能作为依据呢！‘作’字与‘亲’字相对应，但却不是‘新’的意思。下面‘治国平天下’等处，对于‘新’字均未阐发。例如‘君子贤其贤而亲其亲，小人乐其乐而利其利’‘如保赤子’‘民之所好好之，民之所恶恶之，此之谓民之父母’之类的话，都是‘亲’的意思。‘亲民’就如同是《孟子》所谓‘亲亲仁民’，‘亲之’就是爱他的意思。百姓不仁爱，舜就让契任司徒之职，恭敬地施行五种伦理规范，让百姓互相亲爱。《尧典》中说的‘克明俊德’即是‘明明德’，‘以亲九族’到‘平章’‘协和’，就是‘亲民’，就是‘明明德于天下’。又像孔子所说的‘修己以安百姓’，‘修己’便是‘明明德’，‘安百姓’便是‘亲民’。说到‘亲民’，便是兼有了养育教化百姓的意思，说‘新民’就有偏颇了。”"],["上","二","心体","爱问：“‘知止而后有定’，朱子以为‘事事物物皆有定理’\n，似与先生之说相戾。”\n\n先生曰：“于事事物物上求至善，却是义外\n也。至善是心之本体，只是‘明明德’到‘至精至一’处便是。然亦未尝离却事物。\n本注所谓‘尽夫天理之极而无一毫人欲之私’者得\n之。”","徐爱问：“‘知止而后有定’，朱熹认为这句话讲的是‘万事万物都有确定的道理’，似乎与先生您的说法相悖。”\n\n先生说：“如果在万事万物上追求至善，就是把义视作外在的东西了。至善只是心的本然面貌，只要通过‘明明德’的功夫达到‘精深专一’的境界便是至善了。不过，至善也从未脱离具体的事物。朱熹《大学章句》中说‘穷尽天理而使得心中无一丝一毫人欲私心’的说法就颇为在理。”"],["上","三","心即理","爱问：“至善只求诸心，恐于天下事理有不能尽。”\n\n先生曰：“心即理也。天下又有心外之事、心外之理乎？”\n\n爱曰：“如事父之孝、事君之忠、交友之信、治民之仁，其间有许多理在，恐亦不可不察。”\n\n先生叹曰：“此说之蔽久矣，岂一语所能悟！今姑就所问者言之。且如事父不成，去父上求个孝的理；事君不成，去君上求个忠的理；交友、治民不成，去友上、民上求个信与仁的理，都只在此心。心即理也，此心无私欲之蔽，即是天理，不须外面添一分。以此纯乎天理之心，发之事父便是孝，发之事君便是忠，发之交友、治民便是信与仁。只在此心去人欲、存天理上用功便是。”\n\n爱曰：“闻先生如此说，爱已觉有省悟处。但旧说缠于胸中，尚有未脱然者。如事父一事，其间温清定省\n之类，有许多节目，不亦须讲求否？”\n\n先生曰：“如何不讲求？只是有个头脑。只是就此心去人欲、存天理上讲求。就如讲求冬温，也只是要尽此心之孝，恐怕有一毫人欲间杂；讲求夏清，也只是要尽此心之孝，恐怕有一毫人欲间杂，只是讲求得此心。此心若无人欲，纯是天理，是个诚于孝亲的心，冬时自然思量父母的寒，便自要去求个温的道理。夏时自然思量父母的热，便自要去求个凊的道理。这都是那诚孝的心发出来的条件。却是须有这诚孝的心，然后有这条件发出来。譬之树木，这诚孝的心便是根，许多条件便是枝叶。须先有根，然后有枝叶。不是先寻了枝叶，然后去种根。《礼记》言：‘孝子之有深爱者，必有和气。有和气者，必有愉色。有愉色者，必有婉容。’须是有个深爱做根，便自然如此。”","徐爱问：“如果至善只向心中去求，恐怕天底下那么多事物的道理没法穷尽吧？”\n\n先生说：“心即是理。天底下何来心外的事物、心外的道理呢？”\n\n徐爱说：“譬如说侍奉父亲的孝、辅佐君主的忠、与朋友交往的信、治理百姓的仁，这些具体的事里有许多道理，恐怕不能不去仔细研究。”\n\n先生感慨道：“这一说法已蒙蔽世人很久了，一句话怎么能说明白呢？现在姑且就你所问的来讨论一下。比如说侍奉父亲，不能从父亲身上去探求个孝的道理；辅佐君主，不能去君主身上探求个忠的道理；与朋友交往、治理百姓等事，也不能去朋友、百姓这些人身上求个信与仁的道理。这些道理全都在心里，心即是理。如果这个心没有被私欲阻隔，便是天理，不需要再从外面添加一分。凭借此纯粹都是天理的心，作用在侍奉父亲上便是孝，作用在辅佐君主上便是忠，作用在交友、治民上便是信与仁。只要在心中努力摒弃人欲、存养天理即可。”\n\n徐爱说：“听闻先生这么说，我好像有所觉悟了。但以前那套说辞缠绕于胸中，尚有不解之处。以侍奉父亲来说，例如使父亲冬暖夏凉、早晚请安等细节，不还是需要讲求的吗？”\n\n先生说：“怎么能不讲求呢？只是要先有一个宗旨。只要一心在摒弃人欲、存养天理上讲求即可。例如讲求冬天保暖，也仅仅是要尽孝心，唯恐有一丝一毫的人欲夹杂其间；讲求夏天纳凉，也仅仅是要尽孝心，唯恐有一丝一毫人欲夹杂其间，仅仅是讲求这个心而已。这个心若是没有人欲，纯粹都是天理，是一颗诚敬于孝亲的心，那么一到冬天，自然会想到父母是否会冷，便去考虑给父母保暖的事；一到夏天自然会想到父母是否会热，便会去考虑给父母纳凉的事。这些全都是那颗诚敬于孝亲的心自然生发出来的具体行动。只要有这颗诚敬于孝的心，自然而然会考虑到这些具体的事。用树木来打比方，这诚敬于孝的心便是树根，许多具体行动便是枝叶，需要先有个根然后才会有枝叶，而不是先去寻求枝叶，然后再考虑种这个根。《礼记》说道：‘如果孝子对父母有深切的感情，那么对待父母必然很和气；而有和气的态度，则必然会有愉悦的气色；有愉悦的气色，必定会有让父母高兴安心的仪容。”而所有这些，必须有颗真诚的心来作为根，然后自然而然就能如此。”"],["上","四","论学","郑朝朔\n问：“至善亦须有从事物上求者？”\n\n先生曰：“至善只是此心纯乎天理之极便是，更于事物上怎生求？且试说几件看。”\n\n朝朔曰：“且如事亲，如何而为温清之节，如何而为奉养之宜，须求个是当，方是至善。所以有学问思辩\n之功。”\n\n先生曰：“若只是温清之节、奉养之宜，可一日二日讲之而尽，用得甚学问思辩！惟于温凊时，也只要此心纯乎天理之极；奉养时，也只要此心纯乎天理之极。此则非有学问思辩之功，将不免于毫厘千里之缪。所以虽在圣人，犹加‘精一’之训。若只是那些仪节求得是当，便谓至善，即如今扮戏子，扮得许多温凊奉养的仪节是当，亦可谓之至善矣。”\n\n爱于是日又有省。","郑朝朔问道：“至善也需要从具体事物上去求得吗？”\n\n先生回答：“至善只是使自己的心达到纯粹都是天理的境界便可以了，在具体事物上又能怎么探求呢？你倒举几个例子看看。”\n\n朝朔说：“比如说侍奉双亲，怎样才能为他们取暖纳凉，怎样才能侍奉赡养，必须做到恰到好处才是至善，所以才有学问思辨的功夫。”\n\n先生说：“如果只是取暖纳凉、侍奉赡养得宜这些事，一两天就可以讲完，用得了什么学问思辨？只要在帮父母取暖纳凉时，让自己的心思纯粹都在天理上即可；侍奉赡养父母时，让自己的心思纯粹都在天理上即可。这一点才是必须用学问思辨的功夫来求索的，否则不免‘差之毫厘，谬以千里’了。所以，即便是圣人，仍然要持守‘精研专一’的功夫。如果只认为将那些具体礼节做得恰到好处就是至善，那就好比是扮作戏子，将帮父母取暖纳凉等事一一表演得当，也可以叫至善了。”\n\n徐爱在这天又有所省悟。"],["上","五","知行合一","爱因未会先生“知行合一”之训，与宗贤\n、惟贤\n往复辩论，未能决，以问于先生。\n\n先生曰：“试举看。”\n\n爱曰：“如今人尽有知得父当孝、兄当弟者，却不能孝、不能弟。便是知与行分明是两件。”\n\n先生曰：“此已被私欲隔断，不是知行的本体了。未有知而不行者。知而不行，只是未知。圣贤教人知行，正是要复那本体。不是着你只恁的便罢。故《大学》指个真知行与人看，说‘如好好色，如恶恶臭’\n。见好色属知，好好色属行。只见那好色时，已自好了。不是见了后又立个心去好。闻恶臭属知，恶恶臭属行。只闻那恶臭时，已自恶了。不是闻了后别立个心去恶。如鼻塞人虽见恶臭在前，鼻中不曾闻得，便亦不甚恶，亦只是不曾知臭。就如称某人知孝、某人知弟，必是其人已曾行孝、行弟，方可称他知孝、知弟。不成只是晓得说些孝弟的话，便可称为知孝弟。又如知痛，必已自痛了方知痛；知寒，必已自寒了；知饥，必已自饥了。知行如何分得开？此便是知行的本体，不曾有私意隔断的。圣人教人必要是如此，方可谓之知。不然，只是不曾知。此却是何等紧切着实的工夫，如今苦苦定要说知行做两个，是甚么意？某要说做一个，是甚么意？若不知立言宗旨，只管说一个两个，亦有甚用？”\n\n爱曰：“古人说知行做两个，亦是要人见个分晓，一行做知的功夫，一行做行的功夫，即功夫始有下落。”\n\n先生曰：“此却失了古人宗旨也。某尝说知是行的主意，行是知的功夫。知是行之始，行是知之成。若会得时，只说一个知，已自有行在；只说一个行，已自有知在。古人所以既说一个知，又说一个行者，只为世间有一种人，懵懵懂懂地任意去做，全不解思惟省察，也只是个冥行妄作，所以必说个知，方才行得是。又有一种人，茫茫荡荡悬空去思一索，全不肯着实躬行，也只是个揣摸影响，所以必说一个行，方才知得真。此是古人不得已，补偏救弊的说话，若见得这个意时，即一言而足。今人却就将知行分作两件去做，以为必先知了，然后能行。我如今且去讲习讨论做知的工夫，待知得真了，方去做行的工夫，故遂终身不行，亦遂终身不知。此不是小病痛，其来已非一日矣。某今说个知行合一，正是对病的药，又不是某凿空杜撰，知行本体原是如此。今若知得宗旨时，即说两个亦不妨，亦只是一个。若不会宗旨，便说一个，亦济得甚事？只是闲说话。”","徐爱因未能明白先生“知行合一”的教导，与宗贤、惟贤反复辩论，仍未能明白，于是向先生请教。\n\n先生说：“举几个例子看看。”\n\n徐爱说：“现如今许多人知道应当孝顺父母、友爱兄弟，却做不到孝顺、友爱，这样看来知和行分明是两件事。”\n\n先生说：“这是因为心已为私欲蒙蔽，不是知与行的本来面貌了。没有知道了却不去做的情况，知道了而不去做，那就是不知道。圣贤教人去知、去行，用意正在于使得知与行复归其本来的面貌，不只是简单告诉你怎么去知、去做就可以了。所以《大学》里给出个真知、真行的例子，‘就像喜欢美色，就像讨厌恶臭’。见到美色属于知，去喜欢就是行，只要一见到美色便自然而然地喜欢上了，并不是看到美色后又起个念头去喜欢；闻到恶臭属于知，去讨厌便是行，只要一闻到恶臭便自然而然地讨厌上了，并不是闻到恶臭后又起个念头去讨厌。就像一个鼻塞的人虽然看到眼前恶臭的东西，但鼻子闻不到恶臭的气味，便不会十分讨厌它，这也只是因为不曾了解到它的臭而已。例如，称某人知道孝顺父母、友爱兄弟，必然是因为这个人已有孝顺父母、友爱兄弟的行为，才可以称他为知道孝顺父母、友爱兄弟。如若不然，只是说些知道孝顺父母、友爱兄弟的话，怎么可以称之为懂得孝顺父母、友爱兄弟呢？又比如，知道痛，一定是自己痛了才知道痛；知道寒，一定是自己冷了才知道寒；知道饿，一定是自己已经饿了才知道饿。知和行如何分得开？这便是知与行的本然面貌，不曾被私心杂念所隔断。圣人教导世人，一定是要这样才可以称之为知，否则就是还没有真正的知。这是多么紧迫而实在的功夫啊！如今硬要说知和行分作两件事是什么意思？而我将知与行说成一回事，又是什么意思？如果不知道我为何要如此说，只是去分辨知与行究竟是两回事还是一回事，又有什么用呢？”\n\n徐爱说：“古人把知和行分作两件事，也只是要世人明白，一方面去做知的功夫，另一方面做行的功夫，这样功夫才能有着落之处。”\n\n先生说：“你这样的理解反而是背离了古人的意思了。我曾经说过，知是行的宗旨，行是知的落实；知是行的开端，行是知的结果。如果能够领会，只要说到知，行便包含在里面了；只要说到行，知也包含在里面了。古人之所以将知和行分开来说，只是因为世间有一类人，懵懵懂懂、任意而为，完全不加思考，只是任意妄为，因此才要提出知的概念，这样才能让他们做得恰当；还有一类人，整天空想，不肯切实躬行，全凭主观臆测，因此才要提出行的概念，这样才能让他们知得真切。这是古人不得已而提出的补偏救弊之说，如果能够领会真意，只要一句话便已足够。现如今的人却将知与行分作两边，认为必然是先知道了才能去做。如今我若只是讲习讨论如何去做知的功夫，等到知得真切之后才去行，必然会导致终身一无所成，也终身一无所知。这不是小病小痛，而是由来已久。我今日提出‘知行合一’，正是对症下药。但‘知行合一’的说法也并非我凭空杜撰出来，而是知与行的本来面貌即是如此。如今你若能明白我为何如此说，即便将知行说成两回事也无妨，本质上则还是一回事；如若不明白我为何这么说，即便将知行说成一回事，又有什么用呢？只不过是说些无用的话罢了。”"],["上","六","知行合一","爱问：“昨闻先生‘止至善’\n之教，已觉功夫有用力处，但与朱子‘格物’之训\n，思之终不能合。”\n\n先生曰：“‘格物’是‘止至善’之功。既知‘至善’，即知‘格物’矣。”\n\n爱曰：“昨以先生之教推之‘格物’之说，似亦见得大略。但朱子之训，其于《书》之‘精一’，《论语》之‘博约’\n，《孟子》之‘尽心知性’\n，皆有所证据，以是未能释然。”\n\n先生曰：“子夏笃信圣人，曾子反求诸己\n。笃信固亦是，然不如反求之切。今既不得于心，安可狃于旧闻，不求是当？就如朱子亦尊信程子，至其不得于心处，亦何尝苟从？‘精一’‘博约’‘尽心’本自与吾说吻合，但未之思耳。朱子‘格物’之训，未免牵合附会，非其本旨。精是一之功，博是约之功。曰仁既明知行合一之说，此可一言而喻。‘尽心知性知天’，是‘生知安行’事，‘存心养性事天’，是‘学知利行’事。‘夭寿不二，修身以俟’是‘困知勉行’事\n。朱子错训‘格物’，只为倒看了此意，以‘尽心知性’为‘物格知至’，要初学便去做‘生知安行’事，如何做得？”\n\n爱问：“‘尽心知性’，何以为‘生知安行’？”\n\n先生曰：“性是心之体，天是性之原，尽心即是尽性\n。惟天下至诚，为能尽其性，知天地之化育。‘存心’者，心有未尽也。‘知天’如知州、知县之‘知’，是自己分上事，己与天为一。‘事天’如子之事父，臣之事君，须是恭敬奉承，然后能无失，尚与天为二，此便是圣贤之别。至于夭寿不二其心，乃是教学者一心为善，不可以穷通夭寿之故，便把为善的心变动了，只去修身以俟命，见得穷通寿夭有个命在，我亦不必以此动心。‘事天’虽与天为二，已自见得个天在面前；‘俟命’便是未曾见面，在此等候相似，此便是初学立心之始，有个困勉的意在。今却倒做了，所以使学者无下手处。”\n\n爱曰：“昨闻先生之教，亦影影见得功夫须是如此、今闻此说，益无可疑。爱昨晓思‘格物’的‘物’字，即是‘事’字，皆从心上说。”\n\n先生曰：“然。身之主宰便是心，心之所发便是意，意之本体便是知，意之所在便是物。如意在于事亲，即事亲便是一物；意在于事君，即事君便是一物；意在于仁民爱物，即仁民爱物便是一物；意在于视听言动，即视听言动便是一物。所以某说无心外之理，无心外之物。《中庸》言‘不诚无物’，《大学》‘明明德’之功，只是个‘诚意’。‘诚意’之功，只是个‘格物’。”","徐爱问：“昨天听闻先生‘止至善’的教诲，已然觉得功夫有所着落，但思前想后，觉得与朱子‘格物’之说有所不合。”\n\n先生说：“‘格物’是‘止至善’的功夫，既然知道‘至善’了，那么也就知道‘格物’了。”\n\n徐爱说：“昨天以先生的教诲推及‘格物’之说，似乎也能通晓个大概。但朱子之说，有《尚书》中的‘精一’、《论语》中的‘博约’、《孟子》中的‘尽心知性’作为依据，所以我还是不明白。”\n\n先生说：“子夏虔敬地相信圣人，曾子则切实地反省自身。相信圣人固然不错，但不如反省自身来得好。而今你既然没有想清楚，怎么可以拘泥于旧的学说，而不去探求真正的道理呢？如同朱子虽然尊信二程，但在义理上有不得于心之处，又何尝盲从了呢？‘精一’‘博约’‘尽心’，本来与我的学说也是吻合的，只是你未曾认真思考。朱熹‘格物’的说法，不免有牵强附会之嫌，不是《大学》的本义。‘精研’是‘专一’的功夫，‘博文’是‘约礼’的功夫。你既然能够明白‘知行合一’之说，这些话我一说你应该就能懂。‘尽心知性知天’是‘生知安行’的人能够做的事，‘存心养性事天’是‘学知利行’的人能够做的事，‘夭寿不二，修身以俟’是‘困知勉行’的人做的事。朱熹错解了‘格物’，只是因为将之倒过来看了，认为‘尽心知性’就是‘格物致知’，要求初学者就去做‘生知安行’的事，这怎么可能做到呢？”\n\n徐爱问：“‘尽心知性’怎么就是‘生知安行’了呢？”\n\n先生说：“性是心的本体，天理是性的本原，尽心便是尽性。《中庸》说：‘只有天下最为诚挚的人，才能真正尽性，才能通晓天地造化。’‘存心’，是因为心有未尽之处。知晓天道的知，如同知州、知县的知，是将此作为自己分内的事，所以知天就是与天合一。‘事天’，如同儿子侍奉父亲、臣子辅佐君主，必须是恭敬小心侍奉，才能够没有过失，然而却是与天分离了。这便是圣人与贤者的区别。至于‘夭寿不二’的心，是教人一心行善，不可因为处境顺逆、寿命长短的缘故改变行善的心，而要时刻修养自身、以待天命。只要领悟到处境顺逆、寿命长短都是命中注定的，我也能够做到不为此改变心意。‘事天’虽然与天分离，但已然看到有个天道。‘俟命’则是尚未看见天道，好比是在等候自己与天道相见。这便是初学者确立其心的开端，是要其于困苦中勉力。如今却倒过来去做，所以使得学者无从下手。”\n\n徐爱说：“昨日听闻先生教诲，于隐约之间体会到应当怎样用功了。今日听闻先生此言，更没有什么可怀疑的。我昨天早上想，‘格物’的‘物’字，即是‘事’字，都是从人的心上说的。”\n\n先生说：“是的。身体的主宰便是心，心的作用便是意，意的本体便是知，意所指的对象便是物。如果意念作用于侍奉双亲，那么侍奉双亲便是一件事物；意念作用于辅佐君主，那么辅佐君主便是一件事物；意念作用于友爱百姓、善待万物，那么友爱百姓、善待万物便是一件事物；意念作用于视、听、言、动，那么视、听、言、动便是一件事物。所以我才说‘不存在心之外的道理和心之外的事物’。《中庸》里说‘不诚无物’，《大学》里说‘明明德’的功夫，都是要教人‘诚意’，而‘诚意’的功夫就是‘格物’。”"],["上","七","格物","先生又曰：“‘格物’如《孟子》‘大人格君心’之‘格’，是去其心之不正，以全其本体之正。但意念所在，即要去其不正，以全其正，即无时无处不是存天理，即是穷理。‘天理’即是‘明德’。‘穷理’即是‘明明德’。”","先生又说：“‘格物’的‘格’，如同孟子所说的‘大人格君心’的‘格’，是去除心中不正的念头，使心之全体归于正当。只要意念所到之处，均要革除其不正之处而使心的全体归于正当，即是无时无刻不存养天理，即是穷尽事物的道理。‘天理’就是‘明德’，‘穷理’就是‘明明德’。”"],["上","八","致良知","又曰：“知是心之本体，心自然会知。见父自然知孝，见兄自然知弟，见孺子入井自然知恻隐。此便是良知，不假外求。若良知之发，更无私意障碍，即所谓‘充其恻隐之心，而仁不可胜用矣’。然在常人不能无私意障碍，所以须用致知格物之功，胜私复理。即心之良知更无障碍，得以充塞流行，便是致其知。知致则意诚。”","先生又说：“知是心的本体，心自然会去知。见到父亲自然知道孝顺，见到兄弟自然知道友爱，见到小孩儿坠入井中自然会有所不忍。这便是良知，不需要往外去求。如果良知能够发用，且没有私意的障碍，就是所谓‘只要能够扩充悲悯同情的心，那么仁的作用便可用之不竭’。然而，一般人恐怕不能没有私心妄意的障碍，所以才须要用‘致知’‘格物’的功夫，克除私意、复归天理。这样心中的良知才能没有障碍，才能充塞、周流于心间，这便是致良知。良知得以恢复，那么意念也得以诚敬了。”"],["上","九","省察克治","爱问：“先生以‘博文’为‘约礼’功夫，深思之未能得，略请开示。”\n\n先生曰：“‘礼’字即是‘理’字。理之发见可见者谓之文，文之隐微不可见者谓之理\n，只是一物。‘约礼’只是要此心纯是一个天理。要此心纯是天理，须就理之发见处用功。如发见于事亲时，就在事亲上学存此天理；发见于事君时，就在事君上学存此天理；发见于处富贵贫贱时，就在处富贵贫贱上学存此天理；发见于处患难夷狄时，就在处患难夷狄上学存此天理；至于作止语默，无处不然，随他发见处，即就那上面学个存天理。这便是‘博学之于文’，便是‘约礼’的功夫。‘博文’即是‘惟精’，‘约礼’即是‘惟一’。”","徐爱问：“先生将‘博文’视作‘约礼’的功夫，仔细思考后，还是不能领悟，请先生稍加提点。”\n\n先生说：“‘礼’字就是‘理’字。‘理’表现出来被人看见就是‘文’，‘文’隐藏起来不为人所见就是‘理’，两者是一个东西。‘约礼’是要让人的心中纯粹都是天理。要做到这一点，就需要在‘理’能被人所看见的地方下功夫。例如，呈现在侍奉双亲上，就要在侍奉双亲上学习如何存养天理；呈现在辅佐君主上，就要在辅佐君主上学习如何存养天理；呈现在身处富贵贫贱的境遇中，就要在富贵贫贱的境遇中学习如何存养天理；呈现在身处患难、身处荒蛮之地时，就要在身处患难、身处荒蛮之地中学习如何存养天理。无论有所作为还是无所事事，与人交谈还是处于静默之中，没有一处不是这样，随着天理呈现于具体的事物，就要在具体的事物上去学习存养天理。这便是‘博学之于文’的含义，便是‘约礼’的功夫。‘博学于文’就是‘精研’的功夫，‘约之以礼’就是‘专一’的功夫。”"],["上","一〇","天理人欲","爱问：“‘道心常为一身之主，而人心每听命\n’\n，以先生精一之训推之，此语似有弊。”\n\n先生曰：“然。心一也，未杂于人谓之道心。杂以人伪谓之人心。人心之得其正者即道心，道心之失其正者即人心，初非有二心也。程子谓‘人心即人欲，道心即天理’，语若分析，而意实得之。今曰‘道心为主，而人心听命’，是二心也。天理人欲不并立，安有天理为主，人欲又从而听命者？”","徐爱问：“朱子说‘道心常为一身之主，而人心每听命’，如果以先生‘精研专一’的教诲来推断，这一说法似乎有弊端。”\n\n先生说：“是的。心只是一个心，不夹杂着人欲便是道心，夹杂着人的伪饰就是人心。人心如果能够使其归于正道，则是道心；道心如果失去正当，即是人心。起初并非有两个心。程颐先生认为‘人心即人欲，道心即天理’，这话乍听之下像是将心分开来说了，实则是一个心的意思。如朱熹所说‘道心为主，而人心听命’，则认为有两个心了。天理与人欲从来不能并立共存，哪有以天理为主宰，而人欲听命于天理的道理呢？”"],["上","一一","省察克治","爱问文中子\n、韩退之\n。\n\n先生曰：“退之，文人之雄耳；文中子，贤儒也。后人徒以文词之故，推尊退之，其实退之去文中子远甚。”\n\n爱问：“何以有拟经之失？”\n\n先生曰：“拟经恐未可尽非。且说后世儒者著述之意与拟经如何？”\n\n爱曰：“世儒著述，近名之意不无，然期以明道。拟经纯若为名。”\n\n先生曰：“著述以明道，亦何所效法？”\n\n曰：“孔子删述《六经》\n以明道也。”\n\n先生曰：“然则拟经独非效法孔子乎？”\n\n爱曰：“著述即于道有所发明，拟经似徒拟其迹，恐于道无补。”\n\n先生曰：“子以明道者，使其反朴还淳而见诸行事之实乎？抑将美其言辞，而徒以譊譊于世也？天下之大乱，由虚文胜而实行衰也。使道明于天下，则《六经》不必述。删述《六经》，孔子不得已也。自伏羲画卦，至于文王、周公\n。其间言《易》，如《连山》《归藏》\n之属，纷纷籍籍，不知其几，《易》道大乱。孔子以天下好文之风日盛，知其说之将无纪极，于是取文王、周公之说而赞之，以为惟此为得其宗。于是纷纷之说尽废，而天下之言《易》者始一。《书》《诗》《礼》《乐》《春秋》皆然。《书》自“典谟”\n以后，《诗》自“二南”\n以降，如《九丘》《八索》\n，一切淫哇逸荡之词，盖不知其几千百篇。礼乐之名物度数，至是亦不可胜穷。孔子皆删削而述正之，然后其说始废。如《书》《诗》《礼》《乐》中，孔子何尝加一语？今之《礼记》诸说，皆后儒附会而成，已非孔子之旧。至于《春秋》，虽称孔子作之，其实皆鲁史旧文。所谓‘笔’者，笔其旧；所谓‘削’者，削其繁。是有减无增。孔子述《六经》，惧繁文之乱天下，惟简之而不得，使天下务去其文以求其实，非以文教之也。《春秋》以后，繁文益盛，天下益乱。始皇焚书得罪\n，是出于私意，又不合焚《六经》。若当时志在明道，其诸反经叛理之说，悉取而焚之，亦正暗合删述之意。自秦、汉以降，文又日盛，若欲尽去之，断不能去。只宜取法孔子，录其近是者而表章之，则其诸怪悖之说，亦宜渐渐自废。不知文中子当时拟经之意如何？某切深有取于其事，以为圣人复起，不能易也。天下所以不治，只因文盛实衰，人出己见，新奇相高，以眩俗取誉。徒以乱天下之聪明，涂天下之耳目，使天下靡然，争务修饰文词以求知于世，而不复知有敦本尚实，反朴还淳之行。是皆著述者有以启之。”\n\n爱曰：“著述亦有不可缺者，如《春秋》一经，若无《左传》\n，恐亦难晓。”\n\n先生曰：“《春秋》必待《传》而后明，是歇后谜语矣。圣人何苦为此艰深隐晦之词？《左传》多是鲁史旧文。若《春秋》须此而后明，孔子何必削之？”\n\n爱曰：“伊川亦云：‘《传》是案，《经》是断。’如书弒某君、伐某国，若不明其事，恐亦难断。”\n\n先生曰：“伊川此言，恐亦是相沿世儒之说，未得圣人作经之意。如书‘弒君’，即弒君便是罪，何必更问其弒君之详？征伐当自天子出，书‘伐国’，即伐国便是罪，何必更问其伐国之详？圣人述《六经》，只是要正人心。只是要存天理、去人欲。于存天理、去人欲之事则尝言之。或因人请问，各随分量而说。亦不肯多道，恐人专求之言语。故曰‘予欲无言\n’\n。若是一切纵人欲、灭天理的事，又安肯详以示人？是长乱导奸也。故孟子云：‘仲尼之门，无道桓、文之事者，是以后世无传焉。’\n此便是孔门家法。世儒只讲得一个伯者的学问，所以要知得许多阴谋诡计，纯是一片功利的心，与圣人作经的意思正相反，如何思量得通？”\n\n因叹曰：“此非达天德者未易与言此也！”\n\n又曰：“孔子云：‘吾犹及史之阙文也。’\n孟子云：‘尽信《书》，不如无《书》，吾于《武成》取二三策而已。’\n孔子删《书》，于唐、虞、夏四五百年间，不过数篇，岂更无一事，而所述止此？圣人之意可知矣。圣人只是要删去繁文，后儒却只要添上。”\n\n爱曰：“圣人作经，只是要去人欲，存天理，如五伯\n以下事，圣人不欲详以示人，则诚然矣。至如尧舜以前事，如何略不少见？”\n\n先生曰：“羲黄之世\n，其事阔疏，传之者鲜矣。此亦可以想见其时全是淳庞朴素，略无文采的气象。此便是太古之治，非后世可及。”\n\n爱曰：“如《三坟》\n之类，亦有传者，孔子何以删之？”\n\n先生曰：“纵有传者，亦于世变渐非所宜。风气益开，文采日胜，至于周末，虽欲变以夏、商之俗，已不可挽，况唐虞乎？又况羲黄之世乎？然其治不同，其道则一。孔子于尧舜则祖述之，于文武则宪章之。文武之法，即是尧舜之道，但因时致治，其设施政令，已自不同，即夏商事业，施之于周，已有不合。故‘周公思兼三王\n，其有不合，仰而思之，夜以继日。’况太古之治，岂复能行？斯固圣人之所可略也。”\n\n又曰：“专事无为，不能如三王之因时致治，而必欲行以太古之俗，即是佛老的学术。因时致治，不能如三王之一本于道，而以功利之心行之，即是伯者以下事业。后世儒者，许多讲来讲去，只是讲得个伯术。”","徐爱问先生，如何评价王通和韩愈二人。\n\n先生说：“韩愈是文人中的佼佼者，王通则是贤者大儒。后世之人仅从文章诗词方面考量两人，推崇韩愈，实则韩愈相较于王通差得远了。”\n\n徐爱问：“那么，王通为何会犯仿作经书的过失呢？”\n\n先生说：“仿作经书恐怕也不能全盘否定。你来说说，后世儒者著书立说、阐述经典，与仿作经书相比怎么样？”\n\n徐爱说：“后世儒者著书讲经，当然有追求名利的私意，然而主要的目的却在于阐明圣贤之道，而仿作经书就纯粹是为了个人的名声。”\n\n先生说：“以著书的方式来阐述经典，又是效仿谁呢？”\n\n徐爱说：“效仿的是孔子通过删述《六经》来阐明圣贤之道。”\n\n先生说：“那么王通仿作经书就不是效法孔子了吗？”\n\n徐爱说：“著书阐述经典对于圣贤之道总会有所发扬，而仿作经书则只是在形迹上模仿，对于圣贤之道恐怕没有任何补正。”\n\n先生说：“你认为阐明圣贤之道，是使得道理返璞归真，见之于平常生活呢？还是用美艳的言辞哗众取宠呢？天下大乱的原因，就是由于空洞的言辞泛滥，而切实的行为却衰败了。如果圣贤之道彰明于天下，孔子就不必删述《六经》了。而孔子之所以如此做，实在是因为不得已而为之。自从伏羲画八卦，到文王演卦、周公作辞，中间阐释《易》的著述，如《连山》《归藏》等，数不胜数，可是《易》中的道理却变得混乱。孔子发现世上崇尚文辞的风气日盛，知道《易》的学说将没有穷尽，故而采用文王、周公的学说加以阐发，并将之作为《易》之正宗。从此，纷繁复杂的学说均被废弃，而天下阐述《易》的学说得以统一。其余《五经》的情况，也是如此。《尚书》从《典》《谟》之后，《诗》从《周南》《召南》之后，像《九丘》《八索》这类浮夸的辞章，多达上千篇。《礼经》《乐经》中关于事物以及规则的解释更是多到数不甚数。孔子对此也都进行了删削、订正，然后奇谈怪说才得以废止。像《尚书》《诗经》《礼经》《乐经》等典籍，孔子何曾在其中加过一句话？而现在《礼经》中的许多阐释，大都是后世的儒者穿凿附会所加，早已不是孔子所删定的版本了。至于《春秋》，虽然都说是由孔子所作，但其实是鲁国史书中的一些旧的文献。所谓‘笔’，也就是抄录旧文；所谓‘削’，就是删除繁杂。都是有所删减但并无增加的。孔子删述《六经》，是害怕繁杂的文辞惑乱天下，想要简易却很难做到，使天下之人务必去其繁文而求其实质，而不是用文辞来教化天下。《春秋》以后，各种繁杂的文辞日益盛行，天下也就更加混乱。秦始皇因焚书得罪了天下的读书人，固然是出于一己的私心，也确实不应该焚毁《六经》。但如果当时秦始皇的目的在于彰明圣贤之道，把那些离经叛道的书籍统统焚毁，倒正合了孔子删述《六经》的用意。自从秦汉以来，崇尚文辞的风气又日益盛行，要想根除这一风气恐怕不可能了。只能效法孔子，选取那些与《六经》的道理接近的加以宣传表彰，这样其他异端邪说就会慢慢自行灭绝。我不知道王通当时为何要仿作经书，却对这一事迹深有同感，认为即便圣人重生，也不会改变王通的做法。天下没有治理好的原因，就在于文辞盛行而实行衰败。每个人都提出自己的见解，新奇的观点竞相高下，眩惑人的耳目以得到名声。而这只能混淆天下人的视听，使得天下靡乱相争、崇尚文辞，以求得在世上出名，却不再知道还有实事求是、返璞归真的做法。这都是由那些著作阐述经典的人所开的风气。”\n\n徐爱说：“著述也有不能缺少的理由，例如《春秋》这部典籍，如果没有《左传》作为注脚，恐怕也很难理解。”\n\n先生说：“《春秋》的微言大义如果必须要有《左传》才能明白，那就变成猜谜语了。圣人为何要写这些晦涩难懂的文章呢？《左传》大多是鲁国史书的旧文，如果读《春秋》必须参考《左传》才能明白，那孔子又何苦要把鲁国史书删改成《春秋》呢？”\n\n徐爱说：“程颐先生也曾说过：‘《左传》就好比一个一个的案子，而《春秋》则是对案子的裁断。’比如《春秋》记载着杀某个国君、征伐某个国家，如果不明白这些事情的经过，恐怕也很难做出裁断。”\n\n先生说：“程颐先生这句话恐怕也是沿袭后世儒者的说法，没有真正领会圣人写这些经典的本意。比如写‘弑君’，那么杀害国君本身就是大罪，何必要问他杀害国君的详情？征战讨伐的命令应当由天子发布，书中写‘伐国’，就是诸侯擅自讨伐某国，这本身便是大罪，何必要问讨伐某国的详情？圣人阐述《六经》，只是为了端正人的心思，只是要存养天理、去除人欲。对于存养天理、去除人欲的事情，孔子曾经就说过。有时候学生来请教，就因人而异来讲解。但也不肯多说，因为担心学生们专注于言辞表达。所以孔子说‘我不想说什么了’。如果《春秋》里都是一些放纵私欲、泯灭天理的事情，又怎么能够详细地告诉世人呢？这岂不是教导人去作奸犯科吗？所以孟子说：‘孔子的门下不记述齐桓公、晋文公的事迹，所以他们征战侵伐的事情就没有流传后世。’这是孔子一派的家法。后世的儒者只是去讨论霸道的学问，所以他们要去了解许多阴谋诡计的事情。这全都是出于功利之心，与孔子删述《六经》的宗旨背道而驰，怎么能够想得明白呢？”\n\n先生接着感慨道：“除非是与天同德的人，否则不能轻易和他们讲这些道理！”\n\n先生又说：“孔子说：‘我还能见到史书上有存疑而未记录的地方。’孟子说：‘完全相信《尚书》，还不如不看《尚书》。我只从《武成》篇里取两三卷来读读而已。’孔子删述《尚书》，对于尧舜以及夏朝四五百年的历史也不过保存了数篇，这难道是因为没有更多的事情可以记述了吗？但孔子只记述了这么几件事，他的目的和用意可想而知。圣人只是要删掉那些繁杂的文字，后世的儒者却硬生生地又把繁文添了上去。”\n\n徐爱说：“孔子删述《六经》，只是要去除人欲、存养天理。比如春秋五霸以后的事，孔子不想详细告诉世人，固然是这个道理。至于尧舜以前的事，为何也记载得十分简略呢？”\n\n先生说：“上古时代离孔子已经很久远了，事迹也十分模糊，流传下来的很少。这也是可以理解的。那时的民风淳朴，没有浮夸文饰的风气，这就是上古时代的社会状况，不是后世所能比拟的。”\n\n徐爱说：“像《三坟》一类的书，也有流传下来的，孔子为什么都删掉了呢？”\n\n先生说：“即使有传下来的，也与时事的变革有所不合了。社会风气更加开放，文采更胜以往，到了周朝末年，即便想要恢复夏商时期的淳朴风俗，也已经不可能了，何况恢复到尧舜的时代呢？更不必说恢复到上古时代的风俗了！虽然各个时代的社会治理有所不同，但所遵循的道理却是一致的。孔子遵循尧舜之道，效法周文王、周武王之制。文王、武王之道即是尧舜之道。只是因为时代不同，社会治理也有所不同，所施的教化与所设的政令自然也不同。即便把夏商时代的制度政令在周代推行，恐怕也不合时宜了。所以周公对于大禹、商汤及周文王的制度都有所研究，遇到有不合时宜的地方就反复琢磨，以至于夜以继日地思考。更何况上古时代的典章制度，又怎么能够恢复施行呢？这就是孔子为何要删述上古时代之事的缘由了。”\n\n先生又说：“只采取无为而治的措施，不如像三王那样因时制宜地治理。如果一定要恢复实行上古时代的典章制度，就是佛家和道家的观点。如果能因时制宜地治理，但不能像三王那样本于大道，而是出于功利的心态来推行治理，则是春秋五霸以后的社会治理了。后世的儒者讨论来讨论去，只是讲如何实行霸道而已。”"],["上","一三","修行语录","爱曰：“先儒论《六经》，以《春秋》为史。史专记事，恐与《五经》事体终或稍异。”\n\n先生曰：“以事言谓之史，以道言谓之经。事即道，道即事。《春秋》亦经，《五经》亦史。《易》是包牺氏之史，《书》是尧、舜以下史，《礼》《乐》是三代史。其事同，其道同，安有所谓异？”","徐爱说：“以前的儒者讨论《六经》，认为《春秋》是史书。而史书专门记载具体的历史，恐怕与其余《五经》的题材体例有所不同。”\n\n先生说：“从记事的角度来说就是史书，从论道的角度来说就是经典。历史就是大道的具体呈现，大道就是历史的根本缘由。《春秋》也是经典，其余《五经》也是史书。《易》是伏羲时的史书，《尚书》是尧舜以后的史书，《礼经》《乐经》是三代的史书。其中的史实并无区别，其中的大道更是一致，怎么会有所谓的区别呢？”"],["上","一四","格物","又曰：“《五经》亦只是史。史以明善恶，示训戒。善可为训者，特存其迹以示法；恶可为戒者，存其戒而削其事以杜奸。”\n\n爱曰：“存其迹以示法，亦是存天理之本然。削其事以杜奸，亦是遏人欲于将萌否？”\n\n先生曰：“圣人作经，固无非是此意，然又不必泥着文句。”\n\n爱又问：“恶可为戒者，存其戒而削其事以杜奸，何独于《诗》而不删郑、卫？先儒谓‘恶者可以惩创人之逸志’，然否？”\n\n先生曰：“《诗》非孔门之旧本矣。孔子云：‘放郑声，郑声淫。’又曰：‘恶郑声之乱雅乐也。’‘郑卫之音，亡国之音也。’此是孔门家法。孔子所定三百篇，皆所谓雅乐，皆可奏之郊庙，奏之乡党，皆所以宣畅和平、涵泳德性、移风易俗，安得有此！是长淫导奸矣。此必秦火之后，世儒附会，以足三百篇之数。盖淫泆之词，世俗多所喜传，如今闾巷皆然。恶者可以惩创人之逸志，是求其说而不得，从而为之辞。”","先生又说：“《五经》也只是史书。史书的目的是辨明善恶，将经验教训告诉世人。历史上可以作为示范的善行，就记录具体的事迹让后世效法；历史上可以作为教训的恶行，就记录教训而删去具体的事迹，杜绝类似的奸恶之事。”\n\n徐爱说：“保存善行的具体事迹让后世效法，自然也是存养天理。删去恶行杜绝奸恶，也是为了把人欲遏制在将要萌芽的时候吗？”\n\n先生说：“孔子删编《六经》，当然就是这个用意，但也不必拘泥于具体的词句。”\n\n徐爱问：“可以作为教训的恶行，要保存其教训而删去恶行以杜绝奸恶，那为何不删除《诗经》中的《郑风》《卫风》呢？朱熹认为‘恶行可以惩戒人们散漫安逸的心志’，是这样的吗？”\n\n先生说：“现在的《诗经》已不是孔子删定的旧本了。孔子说：‘要远离郑国的音乐，郑国的音乐十分淫靡。’孔子还说：‘我厌恶郑国的音乐扰乱了典雅的音乐。’‘郑国、卫国的音乐是亡国的音乐。’这是孔子一派的家法。孔子所删定的三百篇，都是典雅的音乐，都是可以在祭祖的时候，或是在乡村中演奏的，都可以起到使人的心志舒畅平和、涵养德性、改变社会风化风俗的作用，怎么会有淫荡的音乐呢？那样只会助长淫靡之风，倡导奸邪啊！《郑风》《卫风》等淫逸的诗肯定是秦始皇焚书之后，世间的俗儒为了补足三百篇之数而穿凿附会的。所谓淫逸的歌曲，民间有很多人喜欢传唱，如今的街头巷尾也是如此。恶行可以惩戒人们散漫安逸的心志，只是无法解释清楚，不得已才这么说的。”\n\n爱因旧说汩没，始闻先生之教，实是骇愕不定，无入头处。其后闻之既久，渐知反身实践，然后始信先生之学为孔门嫡传，舍是皆傍蹊小径、断港绝河矣。如说“格物”是“诚意”的工夫，“明善”是“诚身”的工夫，“穷理”是“尽性”的工夫，“道问学”是“尊德性”的工夫，“博文”是“约礼”的工夫，“惟精”是“惟一”的工夫。诸如此类，始皆落落难合，其后思之既久，不觉手舞足蹈。\n\n右曰仁所录。"],["上","一九","修行语录","孟源\n有自是好名之病，先生屡责之。一日，警责方已，一友自陈日来工夫请正。源从旁曰：“此方是寻着源旧时家当。”\n\n先生曰：“尔病又发。”源色变，议拟欲有所辨。\n\n先生曰：“尔病又发。”因喻之曰，“此是汝一生大病根！譬如方丈地内，种此一大树，雨露之滋，土脉之力，只滋养得这个大根。四旁纵要种些嘉谷，上面被此树叶遮覆，下面被此树根盘结，如何生长得成？须用伐去此树，纤根勿留，方可种植嘉种。不然，任汝耕耘培壅，只是滋养得此根。”","孟源有自以为是、爱好虚名的毛病，先生曾多次批评他。有一天，先生刚刚批评过他，一位学友来谈自己修养的近况，请先生指正。孟源在旁边说：“你才刚刚达到我以前修行的水平。”\n\n先生说：“你的毛病又发了。”孟源脸色通红，想要为自己辩解。\n\n先生说：“你的毛病又发了。”先生借此教导孟源，“这是你人生中最致命的病根！就像方圆一丈的地里种了一棵大树，雨露滋润，土壤栽培，只是滋养这棵大树的根。如果在这棵大树周围种些好的庄稼，上面的阳光被树叶遮蔽，下面的土壤为树根缠绕，这些庄稼怎么长得成呢？只有砍去这棵大树，将树根拔得一干二净，才可以种植这些好庄稼。如若不然，任凭你如何努力耕耘栽培，也不过是滋养这个树根罢了。”"],["上","二〇","论学","问：“后世著述之多，恐亦有乱正学？”\n\n先生曰：“人心天理浑然，圣贤笔之书，如写真传神，不过示人以形状大略，使之因此而讨求其真耳；其精神意气，言笑动止，固有所不能传也。后世著述，是又将圣人所画，摹仿誊写，而妄自分析加增，以逞其技，其失真愈远矣。”","陆澄问：“后世的著述汗牛充栋，恐怕也会扰乱儒家的正宗吧？”\n\n先生说：“人心与天理本就浑然一体，圣贤将之写进书里，就像给人画像一般，只不过是给人看一个基本的轮廓，使得人们能够据此探求真正的心体；至于所画之人的精神相貌、言谈举止，本来就不太能表现出来。后世的许多著述，是将圣人所画的像再描摹誊写，又在里面加入许多妄自尊大的理解，试图展示自己才能，这样就离真正的圣学越来越远了。”"],["上","二一","论学","问：“圣人应变不穷，莫亦是预先讲求否？”\n\n先生曰：“如何讲求得许多？圣人之心如明镜。只是一个明，则随感而应，无物不照。未有已往之形尚在，未照之形先具者。若后世所讲，却是如此，是以与圣人之学大背。周公制礼作乐，以文天下，皆圣人所能为。尧舜何不尽为之，而待于周公？孔子删述《六经》以诏万世，亦圣人所能为，周公何不先为之，而有待于孔子？是知圣人遇此时，方有此事。只怕镜不明，不怕物来不能照。讲求事变，亦是照时事。然学者却须先有个明的工夫。学者惟患此心之未能明，不患事变之不能尽。”\n\n曰：“然则所谓‘冲漠无朕，而万象森然已具\n’\n者，其言何如？”\n\n曰：“是说本自好，只不善看，亦便有病痛。”","陆澄问：“圣人能够随机应变以至于无穷，难道不是因为预先都研究过吗？”\n\n先生说：“怎么可能预先研究那么多事呢？圣人的心就如同一面明亮的镜子。正是因为镜子明亮，一旦有东西出现在镜子前面就能有所感应，没有东西能够不被照到。镜子过去所照的东西不会滞留在镜子里，未曾照过的东西也不可能事先就存留在镜子里，这是后世儒者的说法，与圣人的学问相悖甚远。周公制礼作乐、教化世人，这是任何一个圣人都能够做到的事。尧和舜为何不如此做，却非要等周公来做呢？孔子删述《六经》流传万世，也是圣人都能做的，周公为何不先做，非要等孔子来做？这是因为圣人只是在特定的时机，才会应对特定的事情。因此，做学问的人只要担心镜子是否明亮，不需要考虑事物出现在镜子前面时能否照见。探究时事的变化，也就像是拿镜子来照。然而，为学之人必须先下功夫，使得自己的心如明镜。为学之人只要担心自己的心不能明亮，而不必担心时事之变化无法穷尽。”\n\n陆澄说：“那么程颐先生说‘天地浑然未分时，万事万物的理就已经在冥冥之中’，这句话怎么样呢？”\n\n先生说：“这句话本身没错，只是后人并未好好地加以领会，也就有所偏颇了。”"],["上","二二","修行语录","“义理无定在，无穷尽。吾与子言，不可以少有所得，而遂谓止此也。再言之十年、二十年、五十年，未有止也。”\n\n他日又曰：“圣如尧舜，然尧舜之上善无尽；恶如桀纣，然桀纣之下恶无尽。使桀纣未死，恶宁止此乎？使善有尽时，文王何以‘望道而未之见”","先生说：“义理没有固定的处所，没有穷尽的可能。我与你讲学，不能因为稍有所得，便觉得满足。即便与你再讲个十年、二十年、五十年，也没有止境。”\n\n一天，先生又说：“圣人做到像尧和舜一样就足够了，但在尧舜之上，善也还未穷尽；恶人做到像桀和纣那样就十分可恶了，但在桀和纣之下，恶也并未穷尽。假如桀和纣不死，恶难道到他们那儿就终止了吗？假如善有尽头，周文王为何会‘看到大道，却还像没有见到一样’呢？”"],["上","二四","论学","问上达\n工夫。\n\n先生曰：“后儒教人，才涉精微，便谓‘上达’未当学，且说‘下学’。是分‘下学’‘上达’为二也。夫目可得见，耳可得闻，口可得言，心可得思者，皆下学也；目不可得见，耳不可得闻，口不可得言，心不可得思者，‘上达’也。如木之栽培灌溉，是‘下学’也；至于日夜之所息，条达畅茂，乃是‘上达’。人安能预其力哉？故凡可用功、可告语者皆‘下学’，‘上达’只在‘下学’里。凡圣人所说，虽极精微，俱是‘下学’。学者只从‘下学’里用功，自然‘上达’去，不必别寻个‘上达’的工夫。”","陆澄向先生请教如何通达天道的功夫。\n\n先生说：“后世的儒者教导人，才涉及精深细微之处，就说这是‘上达’的学问，现在还不到学习的时候，然后就去讲‘下学’的功夫。这是将‘下学’与‘上达’分开了。眼睛能看到、耳朵能听到、嘴上能表达、心里能想到的学问，都是‘下学’；眼睛看不到、耳朵听不到、嘴上说不出、心里没法想的学问，都是‘上达’。就好比是种树，栽培、灌溉即是‘下学’；树木日夜生长、枝叶繁茂，即是‘上达’。人又怎能强制干预呢？所以，那些可以用功、可以言说的都是‘下学’的功夫，而‘上达’就包含在‘下学’里。但凡圣人所说的道理，即便再精深、微妙，也都是‘下学’的功夫。为学之人只要在‘下学’上用功，自然能够‘上达’，不必去别处寻找‘上达’的功夫。”"],["上","二六","格物","问：“‘惟精’‘惟一’，是如何用功？”\n\n先生曰：“‘惟一’是‘惟精’主意，‘惟精’是‘惟一’功夫。非‘惟精’之外复有‘惟一’也。‘精’字从‘米’，姑以米譬之：要得此米纯然洁白，便是‘惟一’意。然非加舂簸筛拣‘惟精’之工，则不能纯然洁白也。舂簸筛拣是‘惟精’之功，然亦不过要此米到纯然洁白而已。博学、审问、慎思、明辨、笃行者，皆所以为‘惟精’而求‘惟一’也。他如‘博文’者即‘约礼’之功、‘格物致知’者即‘诚意’之功、‘道问学’即‘尊德性’之功、‘明善’即‘诚身’之功，无二说也。”","陆澄问：“如何做‘精研’和‘专一’的功夫？”\n\n先生说：“‘专一’是‘精研’所要达到的目的，‘精研’是‘专一’的实现手段。不是在‘精研’之外另有‘专一’。‘精’字是米字旁，姑且就用米来做比喻：要使得大米纯净洁白，便是‘专一’的意思；但是如果不对米进行舂簸筛拣精选，那么大米便不能纯净洁白。舂簸筛拣便是‘精研’的功夫，其目的也只不过是使大米纯净洁白罢了。博学、审问、慎思、明辨、笃行，都是通过‘精研’来达到‘专一’的目的。其他诸如‘博文’是‘约礼’的功夫、‘格物致知’是‘诚意’的功夫、‘道问学’是‘尊德性’的功夫、‘明善’是‘诚身’的功夫，其中的道理都是一致的。”"],["上","二九","省察克治","问：“宁静存心时，可为‘未发之中’\n否？”\n\n先生曰：“今人存心，只定得气。当其宁静时，亦只是气宁静，不可以为‘未发之中’。”\n\n曰：“‘未’便是‘中’，莫亦是求‘中’功夫？”\n\n曰：“只要去人欲、存天理，方是功夫。静时念念去人欲、存天理，动时念念去人欲、存天理，不管宁静不宁静。若靠那宁静，不惟渐有喜静厌动之弊，中间许多病痛，只是潜伏在，终不能绝去，遇事依旧滋长。以循理为主，何尝不宁静？以宁静为主，未必能循理。”","陆澄问：“在宁静之中存心养性，这算不算是‘感情未发出来时的中正’呢？”\n\n先生说：“现在的人存心养性，只是使气不动。当他平静的时候，也只不过是气得到平静，不能认为是‘未发之中’。”\n\n陆澄说：“未发出来便是中道，这不也是求‘中’的功夫吗？”\n\n先生说：“只有摒弃私欲、存养天理，才能算是功夫。在平静时心心念念要摒弃私欲、存养天理，在行动中也要心心念念摒弃私欲、存养天理，无论外在是否平静都要如此。如果只一味依靠外在的平静，不但会逐渐养成喜静厌动的弊病，还会有许多其他的毛病，只是潜伏着，终究不能根除，一遇到事情便会滋长。只要内心时刻依循天理，又怎会不平静呢？然而仅仅追求平静，却未必能够依循天理。”"],["上","三〇","修行语录","问：“孔门言志，由、求任政事，公西赤任礼乐，多少实用。及曾皙说来，却似耍的事，圣人却许他，是意何如？”\n曰：“三子是有意必，有意必便偏着一边，能此未必能彼。曾点这意思却无意必，便是‘素其位而行，不愿乎其外，素夷狄行乎夷狄，素患难行乎患难，无入而不自得矣’\n。三子所谓‘汝，器也’\n，曾点便有‘不器’\n意。然三子之才各卓然成章，非若世之空言无实者，故夫子亦皆许之。”","陆澄问：“孔门的弟子各谈志向，子路、冉有想从政，公西赤想从事礼乐教化，多少有点实际用处。等到曾皙来说，却跟玩耍似的，但圣人却偏偏赞许他，这是何意？”\n\n先生说：“其他三人的志向多少都有些主观和绝对，而有了这两种心态的影响就会偏执于一个方面，能做这件事就未必能做那件事。曾皙的志向却没有主观和绝对的意思，这就是‘在其位而谋其政，不做超出自己分限的事，身处荒蛮之地便做身处荒蛮之地该做的事，身处患难之时便做身处患难时该做的事，无论何种情况都能恰当自处。’其他三人是孔子所说的具有某种才能的人，而曾点便有点不拘泥于某种特定才能的意思。不过其余三人的才能也各有过人之处，并非当今许多只会空谈却无实干的人，所以孔子也都认可他们。”"],["上","三一","格物","问：“知识不长进，如何？”\n\n先生曰：“为学须有本原，须从本原上用力，渐渐‘盈科而进’\n。仙家说婴儿，亦善譬。婴儿在母腹时，只是纯气，有何知识？出胎后，方始能啼，既而后能笑，又既而后能识认其父母兄弟，又既而后能立、能行、能持、能负，卒乃天下之事无不可能，皆是精气日足，则筋力日强，聪明日开，不是出胎日便讲求推寻得来。故须有个本原。圣人到‘位天地，育万物’\n，也只从‘喜怒哀乐未发之中’上养来。后儒不明格物之说，见圣人无不知、无不能，便欲于初下手时讲求得尽。岂有此理！”\n\n又曰：“立志用功，如种树然。方其根芽，犹未有干；及其有干，尚未有枝；枝而后叶；叶而后花实。初种根时，只管栽培灌溉，勿作枝想，勿作叶想，勿作花想，勿作实想。悬想何益？但不忘栽培之功，怕没有枝叶花实？”","陆澄问：“知识没有长进，该怎么办？”\n\n先生说：“为学必须有个本源，从本源上下功夫，循序渐进。道家用婴儿作比喻，也十分精辟。婴儿在母亲腹中，只是一团气，有什么知识？出生后，一开始能哭，继而能笑，再然后可以认得父母兄弟，再然后可以站立行走，能拿东西能负重，最后世上各种事情都能做。这都是因为婴儿的精气日益充足，筋骨力量日益增强，耳目的聪明日益增长。并不是婴儿一出生就可以推究到这个地步。因此才需要有个本源。圣人达到‘天地各安其位、万物生长繁育’的境界，也只是从‘喜怒哀乐未发之中’培养出来。后世的儒者不明白格物的学问，看到圣人无所不知、无所不能，便想在初学时就达到这样的境界。哪有这样的道理呢！”\n\n先生又说：“立志下功夫，就像种树一样。刚有根芽的时候，还没有树干；等到有树干了，还没有树枝；有了树枝之后，才会发叶；发叶之后才会开花、结果。起初种下根芽的时候，只需要栽培灌溉，不必想到往后的枝、叶、花、实。空想这些有什么用？只要不忘栽培灌溉的功夫，何必担心没有枝、叶、花、实？”"],["上","三二","论学","问：“看书不能明，如何？”\n\n先生曰：“此只是在文义上穿求，故不明。如此，又不如为旧时学问。他到看得多，解得去。只是他为学虽极解得明晓，亦终身无得。须于心体上用功，凡明不得、行不去，须反在自心上体当，即可通。盖《四书》《五经》不过说这心体。这心体即所谓道，心体明即是道明，更无二。此是为学头脑处。”","陆澄问：“看书却不能明白其中的含义，该怎么办？”\n\n先生说：“这是因为仅仅在文字意思上探求，所以才不能明白。要是这样，还不如专做朱子的学问。朱子的学问看得多了，意思自然能理解得明白。只是朱子的学问虽然讲得十分明白，但对于自己却终其一生而了无所获。所以必须在自己的心体上用功，凡是不明白、行不通的地方，需要返回自己的心中去体会，这样自然会想得通。《四书》《五经》也不过是说这个心体。这个心体便是道，心体明白，即是大道彰明，两者是一致的。这即是为学的宗旨。”"],["上","三八","情绪","澄尝问象山\n在人情事变上做工夫之说。\n\n先生曰：“除了人情事变，则无事矣。喜怒哀乐非人情乎？自视、听、言、动以至富贵、贫贱、患难、死生，皆事变也。事变亦只在人情里，其要只在‘致中和’，‘致中和’只在 ‘谨独’\n。”","陆澄曾经向先生请教陆九渊在人情世变上下功夫的学说。\n\n先生说：“除却人情世变，就没有别的事了。喜怒哀乐难道不是人情吗？从视、听、言、动到富贵、贫贱、患难、生死，都是事变。事变也都体现在人情里，关键是要维持心绪的中正平和，而要维持心绪的中正平和关键在于独处时要恪守本己。”"],["上","三九","论学","澄问：“仁、义、礼、智之名，因已发而有？”\n\n曰：“然。”\n\n他日，澄曰：“恻隐、羞恶、辞让、是非\n，是性之表德\n邪？”\n\n曰：“仁、义、礼、智也是表德。性一而已。自其形体也，谓之天；主宰也，谓之帝；流行也，谓之命；赋于人也，谓之性；主于身也，谓之心。心之发也，遇父便谓之孝，遇君便谓之忠，自此以往，名至于无穷，只一性而已。犹人一而已，对父谓之子，对子谓之父。自此以往，至于无穷，只一人而已。人只要在性上用功，看得一性字分明，即万理灿然。”","陆澄问：“仁、义、礼、智的名称，是不是由发见于外的感情而得名的？”\n\n先生说：“是的。”\n\n又一天，陆澄说：“恻隐、羞恶、辞让、是非这四种感情，是性的别名吗？”\n\n先生说：“仁、义、礼、智也是性的别名。性只有一个。就其具有形体而言，称之为天；就其主宰万物而言，称之为帝；就其流动于天地而言，称之为命；就其赋予人而言，称之为性；就其主宰人之身体而言，称之为心。心则有其作用，表现在事亲上便称之为孝，表现在事君上便称之为忠，以此类推，各种名称没有穷尽，其实只是一个性而已。好比同一个人，对父亲而言称之为子，对儿子而言称之为父，以此类推，也没有穷尽，但只是一个人而已。所以，为学只要在性上下功夫，只要能够把握这个性字，那么一切道理都能明白了。”"],["上","四〇","省察克治","一日，论为学工夫。\n\n先生曰：“教人为学，不可执一偏。初学时心猿意马，拴缚不定，其所思虑多是人欲一边。故且教之静坐，息思虑。久之，俟其心意稍定。只悬空静守，如槁木死灰，亦无用。须教他省察克治。省察克治之功则无时而可间，如去盗贼，须有个扫除廓清之意。无事时，将好色好货好名等私逐一追究搜寻出来，定要拔去病根，永不复起，方始为快。常如猫之捕鼠，一眼看着，一耳听着，才有一念萌动，即与克去。斩钉截铁，不可姑容、与他方便，不可窝藏，不可放他出路，方是真实用功，方能扫除廓清。到得无私可克，自有端拱时在。虽曰‘何思何虑’，非初学时事，初学必须思。省察克治即是思诚，只思一个天理，到得天理纯全，便是‘何思何虑’\n矣。”","一天，大家讨论做学问的功夫。\n\n先生说：“教人做学问，不能偏执于一边。人在刚开始学习的时候，容易心猿意马，不能集中心思，而且所考虑的更多是私欲方面的东西。故而要先教他静坐，使其停止思虑。久而久之，待得心思稍能安定。但如果只悬空静坐，身如槁木、心如死灰一般，也没有作用。这时需要教他内省体察、克制私欲的功夫。省察克制的功夫在任何时候都要持守，就像铲除盗匪，必须要有彻底扫除的决心。闲来无事的时候，要将好色、贪财、求名的心思逐一省察，务必要拔去病根，使它永不复起，才算是痛快。就好比猫捉老鼠，一边用眼睛盯着，一边用耳朵听着，私心妄念一起，就要克制它。态度必须坚决，不能姑息纵容、给它方便，不能窝藏它，不能放它生路，这才算是真真切切地下苦功，才能够将私欲扫除干净。等到没有任何私欲可以克制的时候，自然可以安安心心地坐着。虽然说‘何思何虑’，但这不是初学时的功夫，初学的时候必须去思考。内省体察、克制私欲就是使念头诚敬，只要心念所思均是天理，等到心中纯然都是天理，就是‘何思何虑’的境界了。”"],["上","四一","修行语录","澄问：“有人夜怕鬼者，奈何？”\n\n先生曰：“只是平日不能‘集义’\n，而心有所慊，故怕。若素行合于神明，何怕之有？”\n\n子莘\n曰：“正直之鬼不须怕，恐邪鬼不管人善恶，故未免怕。”\n\n先生曰：“岂有邪鬼能迷正人乎？只此一怕，即是心邪！故有迷之者，非鬼迷也，心自迷耳。如人好色，即是色鬼迷；好货，即是货鬼迷；怒所不当怒，是怒鬼迷；惧所不当惧，是惧鬼迷也。”","陆澄问：“有的人晚上怕鬼，怎么办？”\n\n先生说：“只是因为平时不能积德行善，心中有所愧疚，才会怕鬼。如果平日里做事都能合乎神明的意志，那又有什么好怕的？”\n\n子莘说：“正直的鬼不需要怕，怕的是恶鬼，不管好人坏人都要加害，所以才会害怕。”\n\n先生说：“哪里有恶鬼可以迷惑正直的人的？仅仅有这个怕的感情在，心就已经不正了！所以有被鬼迷的人，不是真正被鬼所迷惑，而是被自己内心迷惑。比如喜欢美色的人就被色鬼所迷；贪财的人就被贪财鬼所迷；易怒的人就被怒鬼所迷；胆小的人就被胆小鬼所迷。”"],["上","四四","改过","问：“孔子正名\n。先儒说上告天子、下告方伯、废辄立郢\n，此意如何？”\n\n先生曰：“恐难如此。岂有一人致敬尽礼待我而为政，我就先去废他，岂人情天理？孔子既肯与辄为政，必已是他能倾心委国而听。圣人盛德至诚，必已感化卫辄，使知无父之不可以为人，必将痛哭奔走，往迎其父。父子之爱，本于天性，辄能悔痛真切如此，蒯聩岂不感动底豫？蒯聩既还，辄乃致国请戮。聩已见化于子，又有夫子至诚调和其间，当亦决不肯受，仍以命辄。群臣百姓又必欲得辄为君。辄乃自暴其罪恶，请于天子，告于方伯诸侯，而必欲致国于父。聩与群臣百姓亦皆表辄悔悟仁孝之美，请于天子，告于方伯诸侯，必欲得辄而为之君。于是集命于辄，使之复君卫国。辄不得已，乃如后世上皇故事，率群臣百姓尊聩为太公，备物致养，而始退复其位焉。则君君、臣臣、父父、子子，名正言顺，一举而可为政于天下矣。孔子正名，或是如此。”","陆澄问：“孔子主张正名分。朱熹说孔子是上报天子、下告诸侯、废黜公孙辄而拥立公子郢，这样解释对吗？”\n\n先生说：“恐怕不是这样。哪有一个人待我恭敬有礼，希望我帮他治理国家，我还想要废黜他的，这符合人情和天理吗？孔子既然愿意帮助公孙辄治理国家，一定是公孙辄愿意将国家托付给孔子、听孔子的指教。孔子的德性隆盛、内心诚挚，一定已经感化了公孙辄，使他明白不孝顺父亲的人不可以称之为人，故而公孙辄才会痛哭，亲自去迎接父亲。父子之间的感情是出于人的天性，公孙辄能如此真切地悔悟，蒯聩又怎会不被感动呢？蒯聩既然归国了，公孙辄便将国事交予父亲，并请求以死谢罪。蒯聩已经为儿子的行为所感动，又有孔子从中斡旋，当然绝对不肯接受，仍然要让公孙辄担任国君。群臣和百姓也想让公孙辄继续担任国君。公孙辄向天下昭告自己的罪行，请示天子，告知诸侯，坚持把国君之位还给父亲。蒯聩和群臣、百姓也都赞扬公孙辄改过、仁孝的美德，请示天子，告知诸侯，坚持让公孙辄担任国君。所有的因素都决定了公孙辄必须出任国君，才使他再次主掌卫国。公孙辄不得已，只能像后世帝王一样，率领群臣和百姓尊蒯聩为太上皇，让他得到尊崇的奉养，这才重新出任卫国之君。这样君臣父子才各得其位，名正而言顺，天下才得到治理。孔子所说的正名分，大概就是这个意思吧。”"],["上","四五","心体","澄在鸿胪寺仓居\n，忽家信至，言儿病危，澄心甚忧闷，不能堪。\n\n先生曰：“此时正宜用功，若此时放过，闲时讲学何用？人正要在此等时磨炼。父之爱子，自是至情，然天理亦自有个中和处，过即是私意。人于此处多认做天理当忧，则一向忧苦，不知已是‘有所忧患，不得其正’\n。大抵七情所感，多只是过，少不及者。才过便非心之本体。必须调停适中始得。就如父母之丧，人子岂不欲一哭便死，方快于心？然却曰‘毁不灭性’\n，非圣人强制之也，天理本体自有分限，不可过也。人但要识得心体，自然增减分毫不得。”","陆澄跟随先生在南京鸿胪寺居住，突然收到家书，说儿子病危，陆澄十分担心、郁闷，难以纾解。\n\n先生说：“此时正是修养的好时机，如若放过这个机会，平时讲学讨论又有什么用呢？人就是要在这样的时刻多加磨炼。父亲爱儿子，是十分真切的感情，不过天理告诉我们应当适度，超过合适的度就是人欲。许多人在这种时候往往认为按照天理应当有所忧虑，于是就一味地忧愁痛苦，却不知道如此已经是‘过度忧患，心绪已然不正了’。大致而言，人有七种感情，感情流露得太多即是过度，流露得太少则是不够。才超过一点就已不是心的本然状态了。所以必须通过调节，使得心绪中正平和才可以。以子女哀悼父母的丧事为例，作为父母的孝子，难道不想一下哭死才能纾解悲痛之心？然而圣人却说‘哀伤不能害了性命’，这不是圣人要强人所难，只是天理的本来状态规定了一定的限度，因此不能超过。人只要能够认识心的本来状态，自然一丝一毫都不会有所增减。”"],["上","四九","静与动","澄问“操存舍亡\n”\n章。\n\n曰：“‘出入无时，莫知其乡。’此虽就常人心说，学者亦须是知得心之本体亦元是如此，则操存功夫始没病痛。不可便谓出为亡，入为存。若论本体，元是无出无入的。若论出入，则其思虑运用是出。然主宰常昭昭在此，何出之有？既无所出，何入之有？程子所谓‘腔子’\n，亦只是天理而已。虽终日应酬而不出天理，即是在腔子里。若出天理，斯谓之放，斯谓之亡。”\n\n又曰：“出入亦只是动静，动静无端，岂有乡邪？”","陆澄问先生关于《孟子》“操存舍亡”那一章。\n\n先生说：“‘心的出入并没有规律，也不知道它的方向。’这虽然是针对常人的心而言，为学之人应当明白心的本体也是如此，操持与存守时才不会出问题。不能随随便便认为出就是亡，入就是存。就心的本然状态而言，原本并无出和入。就出和入而言，则人的思虑运用就是出。然而人心明明就在里面，怎么能叫出呢？既然没有所谓出，那又何来的入呢？程颐先生所说的‘腔子’，也只是天理而已。虽然每天应酬，也不外乎天理，那么心体就在胸腔里。如若超出天理，便是放纵心体，放纵心体就是失去了心体了。”\n\n先生又说：“心的出入也只是动和静，动和静并无端倪，怎么会有方向呢？”"],["上","五〇","立志","王嘉秀\n问：“佛以出离生死诱人入道，仙以长生久视诱人入道，其心亦不是要人做不好。究其极至，亦是见得圣人上一截\n，然非入道正路。如今仕者，有由科、有由贡、有由传奉，一般做到大官，毕竟非入仕正路，君子不由也。仙佛到极处，与儒者略同。但有了上一截，遗了下一截，终不似圣人之全。然其上一截同者，不可诬也。后世儒者又只得圣人下一截，分裂失真，流而为记诵、词章、功利、训诂，亦卒不免为异端。是四家者，终身劳苦，于身心无分毫益，视彼仙佛之徒清心寡欲、超然于世累之外者，反若有所不及矣。今学者不必先排仙佛，且当笃志为圣人之学。圣人之学明，则仙佛自泯。不然，则此之所学，恐彼或有不屑，而反欲其俯就，不亦难乎？鄙见如此。先生以为何如？”\n\n先生曰：“所论大略亦是。但谓上一截、下一截，亦是人见偏了如此。若论圣人大中至正之道，彻上彻下，只是一贯，更有甚上一截、下一截？‘一阴一阳之谓道’，但‘仁者见之便谓之仁，知者见之便谓之智，百姓又日用而不知，故君子之道鲜矣\n’\n。仁智岂可不谓之道？但见得偏了，便有弊病。”","王嘉秀问道：“佛家用超脱生死轮回来引诱人信佛，道家以长生不老来引诱人修道，他们的本心也并非要人去作恶。究其根本，他们两家也都能看到圣人之教的‘上达’功夫，但不是入道的正途。好比如今为官的人，有的通过科考、有的通过举荐、有的通过继承，同样做到了大官，但如果不是为官的正途，君子是不会去做的。道家与佛家到达极致，与儒家有相同之处。然而有了‘上达’的功夫，却失去了‘下学’的功夫，终究不像圣人的学问全体兼备。然而佛与道在‘上达’方面与儒家的相同，这点不能随便否认。后世的儒者又都只得到了圣人之学‘下达’的功夫，分割了圣学，使之失去本真，沦落为记诵、词章、功利、训诂的学问，最终也难免沦为异端邪说。从事这四种学问的人，一生劳苦，却于自家的身心没有丁点益处，相比佛家、道家那些清心寡欲、超脱于世俗牵累之外的人，反而有所不及。如今的学者，不必起先就排斥佛、道，而应当笃志于圣人之学。圣人之学发扬光大了，佛道的学说自然就会消亡。如若不然，对于儒者所学的东西，佛、道两家恐怕不屑一顾，还想使佛、道两家拜服儒学，不是很难吗？这是我的浅见，先生认为如何？”\n\n先生说：“你的看法大体上正确。但你区分了‘下学’和‘上达’，也只是一般人的见识罢了。如若讲到圣人大中至正的道，则是通天彻地，一贯而下，哪里有上与下的区分呢？‘一阴一阳之谓道’，然而‘仁者见仁，智者见智。百姓与大道日日相处却视若无睹，故而君子所遵循的大道很少有人能够明白’。仁爱与睿智不也是道吗？但理解的片面就会有弊病。”"],["上","五二","修行语录","问：“孔子谓武王未尽善\n，恐亦有不满意？”\n\n先生曰：“在武王自合如此。”\n\n曰：“使文王未没，毕竟如何？”\n\n曰：“文王在时，天下三分已有其二\n。若到武王伐商之时，文王若在，或者不致兴兵，必然这一分亦来归了。文王只善处纣，使不得纵恶而已。”","陆澄问：“孔子说周武王还没有达到至善，恐怕是孔子对武王伐纣的行为有所不满吧？”\n\n先生说：“作为周武王来说，自然应当如此做。”\n\n陆澄接着问：“假如周文王没有死，那会如何？”\n\n先生说：“文王在世时，三分之二的诸侯已归顺了周。如果武王伐纣时文王还在，或许不需要兴兵，另外三分之一也会归顺。文王只是善于与纣王相处，使他不能肆意为恶罢了。”"],["上","六二","修行语录","问《律吕新书》\n。\n\n先生曰：“学者当务为急，算得此数熟亦恐未有用，必须心中先具礼乐之本方可。且如其书说，多用管以候气\n，然至冬至那一刻时，管灰之飞或有先后，须臾之间，焉知那管正值冬至之刻？须自心中先晓得冬至之刻始得。此便有不通处。学者须先从礼乐本原上用功。”","陆澄向先生请教《律吕新书》。\n\n先生说：“学者以确立礼乐的根本为当务之急，否则将乐律算得再熟也未必有用，心中必须有礼乐的根本才行。就像《律吕新书》中所说，一般用律管来查看阴阳二气的变化，但是到冬至那一刻，律管中的芦苇灰飞扬或许有先后，顷刻之间，怎么能确定是哪根律管中芦苇灰的飞扬表示了冬至的到来呢？必须心中事先知道冬至的时刻才行。所以这是说不通的。学者必须从礼乐的根本上下功夫。”"],["上","六六","诚意","问：“知至然后可以言诚意，今天理、人欲知之未尽，如何用得克己工夫？”\n\n先生曰：“人若真实切己用功不已，则于此心天理之精微，日见一日，私欲之细微，亦日见一日。若不用克己工夫，终日只是说话而已，天理终不自见，私欲亦终不自见。如人走路一般，走得一段方认得一段；走到歧路处，有疑便问，问了又走，方渐能到得欲到之处。今人于已知之天理不肯存，已知之人欲不肯去，且只管愁不能尽知，只管闲讲，何益之有？且待克得自己无私可克，方愁不能尽知，亦未迟在。”","陆澄问：“致知的功夫实现了才可以谈诚意的，如今天理和人欲还没弄明白，如何去做克制私欲的功夫呢？”\n\n先生说：“一个人如果自己切实不断地下功夫，那么对于心中天理的体会认识必然日益精微，而对私欲的认识也日益精微。如若不去做克制私欲的功夫，整天只是嘴上说说，终究看不清天理和私欲。好比人学习走路，走过一段路才认识这段路；走到分岔路口时，有疑问便问，问了再走，才能慢慢到达目的地。现如今有些人，对于已经体会到的天理不愿存养，对于已经认识到的人欲不肯除去，自顾自地去担心是否能够全部弄明白，只顾空谈，又有什么作用？等到克己的功夫下到无私欲可克的地步，再去担心不能全部弄明白，也还不算迟。”"],["上","六七","心体","问：“道一而已，古人论道往往不同，求之亦有要乎？”\n\n先生曰：“道无方体\n，不可执着，却拘滞于文义上求道，远矣。如今人只说天，其实何尝见天？谓日、月、风、雷即天，不可。谓人、物、草、木不是天，亦不可。道即是天。若识得时，何莫而非道？人但各以其一隅之见，认定以为道止如此，所以不同。若解向里寻求，见得自己心体，即无时无处不是此道，亘古亘今，无终无始，更有甚同异？心即道，道即天，知心则知道、知天。”\n\n又曰：“诸君要实见此道，须从自己心上体认，不假外求，始得。”","陆澄问：“道只有一个，古人所谈论的大道却往往有所不同，求道也有要领吗？”\n\n先生说：“道没有具体的形体，无法把捉，所以不能执着，若拘泥于文字意思上探求大道，实则差得远了。好比现如今的人们谈论天，他们又何曾真正见到过天？将日、月、风、雷等天象视作天，不对。认为人、物、草、木就不是天，却也未必如此。道就是天。如果体会到这层意思，那还有什么不能认为是道的呢？人们只是各自依据自己的偏见，就认为道只不过如此，因而所见才会有所不同。如若不断向内探求，体认到自己的心体，道便会周流于任何时间与地点，从古至今，自始至终，哪有什么不同呢？心即是道，道即是天，体认心体即是体认道、体认天。”\n\n先生又说：“诸位要想真正体认大道，必须从自己的心上去体认，不能向外去探求，这样才能有所发现。”"],["上","六八","心体","问：“名物度数，亦须先讲求否？”\n\n先生曰：“人只要成就自家心体，则用在其中。如养得心体，果有‘未发之中’，自然有‘发而中节之和’，自然无施不可。苟无是心，虽预先讲得世上许多名物度数，与己原不相干，只是装缀，临时自行不去。亦不是将名物度数全然不理，只要‘知所先后则近道’\n。”\n\n又曰：“人要随才成就，才是其所能为。如夔之乐、稷之种\n，是他资性合下便如此。成就之者，亦只是要他心体纯乎天理，其运用处，皆从天理上发来，然后谓之才。到得纯乎天理处，亦能‘不器’，使夔、稷易艺而为，当亦能之。”\n\n又曰：“如‘素富贵行乎富贵，素患难行乎患难’，皆是‘不器’。此惟养得心体正者能之。”","陆澄问：“事物的名称与度量，是否需要预先讲究？”\n\n先生说：“人只要能存养自己的心体，具体的作用便自然在心体之中了。如果存养心体能够达到‘感情未发出来时的中正’状态，自然会有‘发而中节之和”的作用，自然无所不到、无事不可。如果没有确立心体，即便预先探求许多事物的知识，与自己的心体也毫无关系，只是装点门面的功夫，遇到事情没有任何作用。当然，也并非全然不讲究事物的知识，只是‘要知道何者为先、何者为后，就接近道了。’”\n\n先生又说：“人要根据自己的才能去成就事业，才能有所作为。如同夔之于音乐、稷之于农事一样，是他们的天性适合做这样的事情才能如此。要有所成就，就是要让心体纯粹都是天理，心的运动作用，都是从天理上发见出来，方能称之为才。等到心里纯粹都是天理，甚至可以不为具体的才能所束缚，让夔和稷互换工作，他们也能够做好。”\n\n先生又说：“像《中庸》所说，‘身处富贵则做富贵时该做的事；身处患难则做患难时该做的事’，都是不为具体的才能所束缚。而这只有心体达到中正的人才能够做到。”"],["上","七一","修行语录","问：“心要逐物，如何则可？”\n\n先生曰：“人君端拱清穆，六卿分职，天下乃治。心统五官，亦要如此。今眼要视时，心便逐在色上；耳要听时，心便逐在声上。如人君要选官时，便自去坐在吏部；要调军时，便自去坐在兵部。如此，岂惟失却君体，六卿亦皆不得其职。”","陆澄问：“心要去追逐外物，该怎么办？”\n\n先生说：“君主庄严肃穆，垂拱而坐，六卿各司其职，天下才能得到治理。心统摄五官，也要如此。如果眼睛要看时，心便在追逐颜色上；耳朵要听时，心便在追逐声音上。就好比君主要选任官员时，便去吏部；要调用军队时，又去兵部。如果这样，不但君主失去了君主的体统，六卿也无法各司其职。”"],["上","七三","心体","澄曰：“好色、好利、好名等心固是私欲，如闲思杂虑，如何亦谓之私欲？”\n\n先生曰：“毕竟从好色、好利、好名等根上起，自寻其根便见。如汝心中决知是无有做劫盗的思虑，何也？以汝元无是心也。汝若于货、色、名、利等心，一切皆如不做劫盗之心一般都消灭了，光光只是心之本体，看有甚闲思虑？此便是‘寂然不动’，便是‘未发之中’，便是‘廓然大公’。自然‘感而遂通’\n，自然‘发而中节’，自然‘物来顺应’\n。”","陆澄说：“好色、贪财、求名等心固然是私欲，而那些闲思杂念为何也叫私欲呢？”\n\n先生说：“这是因为闲思杂念也是从好色、贪财、求名这些根上生发出来的，找到其根源你就能明白了。比如你心中知道自己绝对不会去做抢劫、盗窃之事，为什么？因为你原本就没有这个念头。如果你贪财、好色、追求名利的念头像不做抢劫、盗窃之事的念头一般都消灭殆尽，恢复到心体的本然状态，那还有什么闲思杂念？这便是心体寂静不动，便是一切情感未发时的中正平和，便是心胸广阔、公正。这样的心体自然能够感遇外物而无所不通，心体的发用也自然能够符合中正节制，有事物呈现于心体也自然能够顺应了。”"],["上","七五","谦卑","问：“先儒曰：‘圣人之道，必降而自卑；贤人之言，则引而自高。’\n如何？”\n\n先生曰：“不然，如此却乃伪也。圣人如天。无往而非天：三光之上，天也；九地之下，亦天也。天何尝有降而自卑？此所谓大而化之也。贤人如山岳，守其高而已。然百仞者不能引而为千仞，千仞者不能引而为万仞。是贤人未尝引而自高也，引而自高则伪矣。”","陆澄问：程颐先生说：“‘圣人之道，必然谦逊而朴素；贤人的言说，则自我抬高。’这话如何？”\n\n先生说：“不对，如果这样就是作假了。圣人像天一般。没有什么不是天：日月星辰之下是天；九泉之下也是天。天何尝需要自己降低自己、让自己显得谦卑呢？这是孟子所谓‘大而化之’的含义。贤人则像高山，固守其高处而已。然而百仞的高山不能抬高自己到千仞，千仞的高山不能抬高自己到万仞。所以贤人也并未抬高自己，若是这样便是作假了。”"],["上","七六","省察克治","问：“伊川谓‘不当于喜怒哀乐未发之前求中’\n，延平\n却教学者看未发之前气象，何如？”\n\n先生曰：“皆是也。伊川恐人于未发前讨个中，把中做一物看，如吾向所谓认气定时做中，故令只于涵养省察上用功。延平恐人未便有下手处，故令人时时刻刻求未发前气象，使人正目而视惟此，倾耳而听惟此，即是‘戒慎不睹，恐惧不闻’\n的工夫。皆古人不得已诱人之言也。”","陆澄问：“程颐先生说‘不该在喜怒哀乐未发之前追求中正之道’，李侗先生却教导学者要体会情感未发之前的境界，他们的说法对吗？”\n\n先生说：“都对。程颐先生唯恐人们在感情未发之前追求中正，把中正看作一件事物，就如同我曾经说的把气的安定当作中正平和一般，所以才让学者只在涵养省察上下功夫。延平先生害怕人们一开始找不到下手之处，所以要人时刻观察体会感情未发前的境界，使人全神贯注地去听、去看这个未发前的境界。这就是‘戒慎不睹，恐惧不闻’的功夫。这都是古人不得已，引导别人做学问的话头罢了。”"],["上","七七","心体","澄问：“喜怒哀乐之中和，其全体常人固不能有。如一件小事当喜怒者，平时无喜怒之心，至其临时，亦能中节，亦可谓之中和乎？”\n\n先生曰：“在一时一事，固亦可谓之中和，然未可谓之大本、达道\n。人性皆善，中和是人人原有的，岂可谓无？但常人之心既有所昏蔽，则其本体虽亦时时发见，终是暂明暂灭，非其全体大用矣。无所不中，然后谓之大本。无所不和，然后谓之达道。惟天下之至诚，然后能立天下之大本。”\n\n曰：“澄于中字之义尚未明。”\n\n曰：“此须自心体认出来，非言语所能喻。中只是天理。”\n\n曰：“何者为天理？”\n\n曰：“去得人欲，便识天理。”\n\n曰：“天理何以谓之中？”\n\n曰：“无所偏倚。”\n\n曰：“无所偏倚是何等气象？”\n\n曰：“如明镜然，全体莹彻，略无纤尘染着。”\n\n曰：“偏倚是有所染着，如着在好色、好利、好名等项上，方见得偏倚；若未发时，美色、名、利皆未相着，何以便知其有所偏倚？”\n\n曰：“虽未相着，然平日好色、好利、好名之心，原未尝无。既未尝无，即谓之有。既谓之有，则亦不可谓无偏倚。譬之病疟之人，虽有时不发，而病根原不曾除，则亦不得谓之无病之人矣。须是平日好色、好利、好名等项一应私心扫除荡涤，无复纤毫留滞，而此心全体廓然，纯是天理，方可谓之喜怒哀乐‘未发之中’，方是天下之大本。”","陆澄问：“喜怒哀乐等感情中正平和的状态，要全体皆备，常人固然很难做到。比如遇到一件应当高兴或愤怒的小事，平时没有喜怒之心，等遇到事情也能使感情符合中正的标准，这是否也能算是中正平和呢？”\n\n先生说：“于一时一事上可以说达到了中正平和，然而并未真正实现中道的根本、平和的大道境界。人性都是善的，中和也是人人俱有的，怎么能说没有呢？不过常人的心有所蒙蔽，心之本体虽然时不时地显现，终究断断续续，并非心之全备之体、广大之用。时时刻刻都是中正，就是‘大本’，时时刻刻都是平和，即是‘达道’。只有天下最真诚的人，才能确立中道的根本。”\n\n陆澄说：“我对‘中’字的含义还不甚明白。”\n\n先生说：“这必须从自己的心体上体会出来，不是言语所能说清楚的。‘中’其实就是天理。”\n\n陆澄问：“什么是天理？”\n\n先生说：“摒弃私欲，便能体认天理。”\n\n陆澄说：“天理为什么被称为‘中’呢？”\n\n先生说：“因为天理不偏不倚。”\n\n陆澄说：“没有偏倚是怎样的呢？”\n\n先生说：“就好比是明镜，通体晶莹剔透，无纤尘沾染。”\n\n陆澄说：“偏倚就是有所沾染，如沾染上好色、好名、好利等事，便是有所偏倚；如果感情并未萌发，美色、名利等都未显现，如何知道它是否有所偏倚呢？”\n\n先生说：“虽然没有表现出来，但平日里好色、好名、好利的念头并非没有。既然并非没有，那就是有这些念头。既然有这些念头，便不能没有偏倚。比如患疟疾的人，虽然有时病未发作，但病根却没有根除，那么也不能认为他是没有病的人。必须把平日里好色、好利、好名等事一一扫除干净，丝毫不留，而心里纯然都是天理，才可以称之为喜怒哀乐‘未发出来时的中正’，这才是天地间中道的根本。”"],["上","七八","论学","问：“‘颜子没而圣学亡\n’\n，此语不能无疑。”\n\n先生曰：“见圣道之全者惟颜子，观‘喟然一叹’\n可见。其谓‘夫子循循然善诱人，博我以文，约我以礼’，是见破后如此说。‘博文’‘约礼’如何是善诱人？学者须思之。道之全体，圣人亦难以语人，须是学者自修自悟。颜子‘虽欲从之，末由也已’，即文王‘望道未见’意。望道未见，乃是真见。颜子没而圣学之正派遂不尽传矣。”","陆澄问：“先生您曾说‘颜渊死后孔子之学便衰亡了’，对此我有疑问。”\n\n先生说：“能够全部领会孔子圣学的，只有颜回一人，这从颜渊‘喟然一叹’便可以看出。他说‘孔子善于循序渐进引导学生，以文教扩充我的学识，以礼仪约束我的行为’，这是他全部领会孔子之学后才能说的话。‘博文’‘约礼’怎么能够善于教导人呢？为学之人必须认真思考。对于道的全体，即便是圣人也很难告诉人，必须是为学之人自己去修行、去体悟。颜回‘想要再向前迈进一步，却又不知怎样着手’，也就是文王‘见到大道却如同没有见到一样渴求’的意思。见到大道而如同未见到一般渴求，才是真正的见到。颜回死后，孔子的学说正宗便无法尽数流传下来。”"],["上","八二","谦卑","尚谦\n问孟子之“不动心”与告子异\n。\n\n先生曰：“告子是硬把捉着此心，要他不动。孟子却是集义到自然不动。”\n\n又曰：“心之本体原自不动。心之本体即是性，性即是理。性元不动，理元不动。集义是复其心之本体。”","薛侃问孟子所说的“不动心”与告子所说的“不动心”有何差别。\n\n先生说：“告子的不动心是强行把捉住心，使心不动。孟子的不动心则是通过不断修养德性使心自然不动。”\n\n先生又说：“心的本体原本是不动的。心的本体便是性，性便是理。性原本不动，理也原本不动。不断修养德性，即是复归心的本体。”"],["上","八五","格物","先生曰：“今为吾所谓格物之学者，尚多流于口耳，况为口耳之学者，能反于此乎？天理、人欲，其精微必时时用力，省察克治，方日渐有见。如今一说话之间，虽只讲天理，不知心中倏忽之间，已有多少私欲。盖有窃发而不知者，虽用力察之，尚不易见，况徒口讲而可得尽知乎？今只管讲天理来顿放着不循，讲人欲来顿放着不去，岂格物致知之学？后世之学，其极至，只做得个‘义袭而取’\n的工夫。”","先生说：“现在许多学习我的格物之学的人，大多停留在口耳之间，何况那些喜欢空谈学问的人，怎能不如此呢？天理和人欲的分辨，在精微之处必须时刻下功夫，反省体察，时时克制，才能逐渐有所得。就我们现在说话的这点时间，虽然讲的只是天理，却不知心里一瞬间又夹杂了多少的私欲。对于那些偷偷地发生而无法察觉的私欲，虽然下苦功去体察，也不容易发觉，何况仅仅口头上说说，又如何能够全部发现呢？如今空讲天理，却放着它不去遵循，空讲人欲，却放着它不去摒弃，这怎么是格物之学呢？后世的学问，即便做到极致，也不过是个‘不通过积累便想获得成就’的功夫。”"],["上","九三","修行语录","问：“知至善即吾性，吾性具吾心。吾心乃至善所止之地，则不为向时之纷然外求，而志定矣。定则不扰扰而静，静而不妄动则安，安则一心一意只在此处。千思万想，务求必得此至善，是‘能虑而得’\n矣。如此说是否？”\n\n先生曰：“大略亦是。”","陆澄问：“明白至善是人的本性，而本性就包含在人的心中。人的本心即是至善的所在，明白这个道理就不会像以前那样去外面探求至善，这样意志才能确定。意志确定之后就可以不受干扰、内心平静，内心平静就不会心念妄动、就会感到心安，心安就能够一心一意只关注至善。思来想去，都是要探求这个至善，这样便是‘能虑而得’了。这样理解可以吗？”\n\n先生说：“大体上不错。”"],["上","九四","天理人欲","问：“程子云：‘仁者以天地万物为一体。’何墨氏兼爱\n，反不得谓之仁？”\n\n先生曰：“此亦甚难言，须是诸君自体认出来始得。仁是造化生生不息之理，虽弥漫周遍，无处不是，然其流行发生，亦只有个渐，所以生生不息。如冬至一阳生，必自一阳生，而后渐渐至于六阳\n，若无一阳之生，岂有六阳？阴亦然。惟有渐，所以便有个发端处；惟其有个发端处，所以生；惟其生，所以不息。譬之木，其始抽芽，便是木之生意发端处；抽芽然后发干，发干然后生枝生叶，然后是生生不息。若无芽，何以有干有枝叶？能抽芽，必是下面有个根在。有根方生，无根便死。无根何从抽芽？父子兄弟之爱，便是人心生意发端处。如木之抽芽，自此而仁民、而爱物，便是发干、生枝、生叶。墨氏兼爱无差等，将自家父子兄弟与途人一般看，便自没了发端处。不抽芽，便知得他无根，便不是生生不息，安得谓之仁？孝弟为仁之本，却是仁理从里面发生出来。”","陆澄问：“程颢先生说：‘有仁德的人将天地万物视为一个整体。’为何墨子的兼爱之说，反而不能认为是仁德呢？”\n\n先生说：“这很难说清楚，必须诸位自己体会才能明白。仁德是造化万物、生生不息的天理，虽然弥散流动在天地之间、无所不在，然而它的流动变化、作用发生，也都是逐渐发生的过程，因此才能够生生不息。好比冬至的时候，阳气刚刚生发出来，阳气慢慢积聚才会旺盛，如果没有一开始阳气的发生，哪里来后面旺盛的阳气呢？阴气的变化也是同样的道理。正因为仁德的作用是一个过程，所以才会有一个发端之处；正因其有个发端之处，所以才能生出万物；正因其能生出万物，所以才能不停不歇。例如树木，一开始发芽，就是树木生生之意的发端之处；发芽后长出树干，继而长出树枝、树叶，才得以生生不息。如果没有发芽，何来的树枝、树叶？而树木之所以能够发芽，是因为下面有一个树根。有树根才能够生，没有树根就会枯死。没有树根如何发芽呢？父子、兄弟之间的感情，便是人心中生生之意的发端之处。就像树木发芽一样，从孝悌之情开始，渐渐能发展成仁民和爱物的感情，就好比是树木长出树干、树枝和树叶。墨子的兼爱之说提倡没有差别的感情，将自己的父亲兄弟视作与路人相同，这就没有了发端之处。无法发芽，就知道墨子的兼爱是没有根的感情，便无法生生不息，这样怎能称其为仁德呢？孝悌之情是仁德的根本，而仁德正是从孝悌之情中生发出来。”"],["上","九五","心即理","问：“延平云：‘当理而无私心。’\n‘当理’与‘无私心’如何分别？”\n\n先生曰：“心即理也，‘无私心’即是‘当理’，未‘当理’便是‘私心’。若析心与理言之，恐亦未善。”\n\n又问：“释氏于世间一切情欲之私都不染着，似无私心。但外弃人伦，却是未当理。”\n\n曰：“亦只是一统事，都只是成就他一个私己的心。”","陆澄问：“延平先生说：‘合乎天理而没有私心。’合乎天理与没有私心如何区别？”\n\n先生说：“心就是天理，没有私心就是合乎天理，不合乎天理就是有私心。如果将心和理分开来说，恐怕不太好。”\n\n陆澄接着问：“佛家对于世间一切情欲私心都不沾染，似乎没有私心。但将一切外在的人伦关系全都抛弃，却也不合乎天理。”\n\n先生说：“佛家和世人都是一回事，都只是要成就自己的一己私心而已。”"],["上","九七","省察克治","侃问：“专涵养而不务讲求，将认欲作理，则如之何？”\n\n先生曰：“人须是知学，讲求亦只是涵养。不讲求，只是涵养之志不切。”\n\n曰：“何谓知学？”\n\n曰：“且道为何而学？学个甚？”\n\n曰：“尝闻先生教，学是学存天理。心之本体即是天理。体认天理，只要自心地无私意。”\n\n曰：“如此则只须克去私意便是，又愁甚理欲不明？”\n\n曰：“正恐这些私意认不真。”\n\n曰：“总是志未切。志切，目视耳听皆在此，安有认不真的道理！‘是非之心，人皆有之’\n，不假外求。讲求亦只是体当自心所见，不成去心外别有个见。”","薛侃问：“专注于涵养德性而不注重讲究求索的功夫，把私欲认作天理，应该怎么办？”\n\n先生说：“人必须知道如何学习，讲究求索也只是涵养德性。不做讲究求索的功夫，只是涵养德性的意志不够坚定。”\n\n薛侃问：“什么叫知道如何学习？”\n\n先生说：“你且说说为何要学习？学些什么东西？”\n\n薛侃说：“以前曾听闻先生说过，学只是学习如何存养天理。心的本体就是天理。体认天理，就是要使得心中没有私欲。”\n\n先生说：“如果是这样，就只需要克除私欲便可，又何愁不明白天理和私欲呢？”\n\n薛侃说：“我正是担心辨认不清哪些是私欲。”\n\n先生说：“说到底还是意志不够坚定的缘故。如果意志坚定，眼睛、耳朵都在察觉私欲上，怎么会认不清呢！‘辨别是非的能力，是人天生所具备的’，不需要向外去求。讲究求索也只是体会内心的感受，并非向外去求别的认识。”"],["上","九八","天理人欲","先生问在坐之友：“比来工夫何似？”\n\n一友举虚明意思。先生曰：“此是说光景。”\n\n一友叙今昔异同。先生曰：“此是说效验。”\n\n二友惘然，请是。\n\n先生曰：“吾辈今日用功，只是要为善之心真切。此心真切，见善即迁，有过即改，方是真切工夫。如此，则人欲日消，天理日明。若只管求光景，说效验，却是助长外驰病痛，不是工夫。”","先生问在座的学友：“近来功夫有何进展？”\n\n一位学友说自己心中感到清澈明亮。先生说：“这是说做功夫的情景。”\n\n一位学友叙述了自己过去和现在的区别。先生说：“这是说做功夫的效果。”\n\n两位学友一片茫然，向先生求教。\n\n先生说：“我们现在下功夫，只是要使得为善之心更加真切。为善之心真切了，见到善就自然会贴近，有过错就会改正，这才是真切的功夫。只有这样，才能使得人欲日渐消弭，天理日渐明白。如果只是探求做功夫的情景和效果，反而会助长向外求的毛病，不是真正的功夫。”"],["上","一〇〇","省察克治","希渊\n问：“圣人可学而至，然伯夷、伊尹于孔子才力终不同，其同谓之圣者\n安在？”\n\n先生曰：“圣人之所以为圣，只是其心纯乎天理而无人欲之杂。犹精金之所以为精，但以其成色足而无铜铅之杂也。人到纯乎天理方是圣，金到足色方是精。然圣人之才力，亦有大小不同。犹金之分两有轻重。尧舜犹万镒\n，文王、孔子犹九千镒，禹、汤、武王犹七八千镒，伯夷、伊尹犹四五千镒。才力不同，而纯乎天理则同，皆可谓之圣人。犹分两虽不同，而足色则同，皆可谓之精金。以五千镒者而入于万镒之中，其足色同也。以夷尹而厕之尧、孔之间，其纯乎天理同也。盖所以为精金者，在足色而不在分两；所以为圣者，在纯乎天而不在才力也。故虽凡人而肯为学，使此心纯乎天理，则亦可为圣人，犹一两之金，比之万镒，分两虽悬绝，而其到足色处，可以无愧。故曰‘人皆可以为尧舜\n’\n者以此。学者学圣人，不过是去人欲而存天理耳，犹炼金而求其足色。金之成色所争不多，则煅炼之工省而功易成；成色愈下，则煅炼愈难。人之气质清浊粹驳；有中人以上、中人以下；其于道，有生知安行，学知利行。其下者必须人一己百，人十己千\n，及其成功则一。后世不知作圣之本是纯乎天理，却专去知识才能上求圣人，以为圣人无所不知、无所不能，我须是将圣人许多知识才能，逐一理会始得。故不务去天理上看工夫，徒弊精竭力，从册子上钻研，名物上考索，形迹上比拟。知识愈广而人欲愈滋，才力愈多而天理愈蔽。正如见人有万镒精金，不务煅炼成色，求无愧于彼之精纯，而乃妄希分两，务同彼之万镒。锡、铅、铜、铁杂然而投，分两愈增而成色愈下，既其梢末，无复有金矣。”\n\n时曰仁在旁，曰：“先生此喻足以破世儒支离\n之惑，大有功于后学。”\n\n先生又曰：“吾辈用力，只求日减，不求日增。减得一分人欲，便是复得一分天理，何等轻快脱洒！何等简易！”","希渊问：“圣人可以通过学习来达到，然而伯夷、伊尹与孔子相比，才学与能力终究不同，为什么孟子均称其为圣人呢？”\n\n先生说：“圣人之所以为圣人，只是心中纯粹都是天理而不夹杂着人欲。好比纯金之所以是纯金，只是因其成色足而没有铜和铅等杂质。人达到心中纯然是天理就是圣人，金达到成色十足就是纯金。然而圣人的才学能力也有大小的区别，好比金的分量有轻有重。尧舜好比是万镒的黄金，文王、孔子好比是九千镒的黄金，大禹、商汤、武王好比是七八千镒的黄金，伯夷、伊尹好比是四五千镒的黄金。他们的才学与能力虽然不同，但心中纯粹都是天理这一点是相同的，因此都可以称之为圣人。这就好比黄金的分量虽然不同，但成色十足是相同的，故而都可以称之为纯金。将五千镒的纯金融入一万镒的纯金中，成色还是相同的。以伯夷、伊尹的圣德与尧、孔子的圣德相比较，心中纯粹都是天理是相同的。因此纯金之所以为纯金，在于成色是否十足而不在于分量的多少；圣人之所以为圣人，在于心中是否纯粹都是天理，而不在于才学和能力的大小。因此，即便是一般人，只要肯用功学习，使得心中纯粹都是天理，也可以成为圣人，好比一镒的纯金，相比于万镒的纯金，虽然分量上相差悬殊，但就其作为足色的黄金而言并没有可以挑剔的地方。正因为如此，孟子才说‘人人都可以成为尧舜’。为学之人向圣人学习，也不过是学习摒弃人欲、存养天理的功夫，好比学习炼金也就是学习如何将黄金炼到纯净。如果原料成色本身就比较足，冶炼的功夫就相对省力，炼成足金也相对容易；成色越差的原料，冶炼起来也就越难。人的气质禀赋有清澈浑浊、纯粹驳杂的差异；有一般人以上、一般人以下的才能差异；对于道的体悟，有生而知之、安而行之，学而知之、践而行之的差别。各方面较差的人，必须比别人多下数倍，甚至数十倍、数百倍的功夫，然而一旦功夫做成了就都是一样的。后世的学者不理解学做圣人的根本在于心中纯粹都是天理，却专门在知识与才能上下功夫，认为圣人无所不知、无所不能，认为自己必须将圣人的许多知识和才能都逐一掌握，才能成为圣人。故而，这些人不务求在存养天理上下功夫，却费尽心思钻研书本、考究事物、追求形迹。知识愈发广博，人欲也日益滋长；才能愈发增进，天理却日益遮蔽。好比看到有人有万镒的黄金，就不去冶炼黄金的成色、不求在成色上无可挑剔，却妄想在分量上与他人相同。锡、铅、铜、铁等杂质一并投下去，分量是增长了，但成色却下来了，炼到最后，连黄金都不是了。”\n\n这时徐爱在旁边，说：“先生这个比喻足以破除现今儒者唯恐学问支离破碎的困惑，对后世的学者大有裨益。”\n\n先生又说：“我们做功夫，只求每日减少，不求每日增加。减去一分人欲，便恢复得一分天理，多么轻快洒脱、多么简单的功夫！”"],["上","一〇一","格物","士德\n问曰：“格物之说，如先生所教，明白简易，人人见得。文公\n聪明绝世，于此反有未审，何也？”\n\n先生曰：“文公精神气魄大，是他早年合下便要继往开来，故一向只就考索著述上用功。若先切己自修，自然不暇及此。到得德盛后，果忧道之不明，如孔子退修六籍，删繁就简，开示来学，亦大段不费甚考索。文公早岁便着许多书，晚年方悔\n，是倒做了。”\n\n士德曰：“晚年之悔，如谓‘向来定本之误’，又谓‘虽读得书，何益于吾事’，又谓‘此与守书籍、泥言语，全无交涉’\n，是他到此方悔从前用功之错，方去切己自修矣。”\n\n曰：“然。此是文公不可及处，他力量大，一悔便转。可惜不久即去世，平日许多错处皆不及改正。”","杨骥问：“格物的学说，确实像先生所讲的那样明白简单，人人都能理解。但为何像朱子那样绝世聪明的人，却对此不能明白呢？”\n\n先生说：“朱子的精神气魄十分宏大，他早年就下决心要做继往开来的学问事业，所以一心一意都在考据学问和著书立说上下功夫。如果他能先切实地修养自身，自然就无暇顾及考据与著述的事业。等到他德业鼎盛之后，如果真的担忧大道无法昌明，就会像孔子那样删述《六经》，去繁就简，启示后学，也就不必花费大量精力去考据求索了。朱子早年写下许多书，到了晚年才悔悟到自己是将功夫做颠倒了。”\n\n杨骥问：“朱子晚年的悔悟，比如他说‘当初确定根本的错误’‘虽然读了那么多书，但对我的事业又有何帮助’‘这与固守书本、拘泥词句没有关系’等话，说明朱子到此时才后悔过去功夫下错了，才开始认真地切己修养。”\n\n先生说：“是的。这就是朱子的过人之处，他的才能高，一旦悔悟就能转到正道上。可惜不久之后就去世了，过去的许多错误还没来得及改正。”"],["上","一〇二","格物","侃去花间草，因曰：“天地间何善难培，恶难去？”\n\n先生曰：“未培未去耳。”少间曰，“此等看善恶，皆从躯壳起念，便会错。”\n\n侃未达。\n\n曰：“天地生意，花草一般，何曾有善恶之分？子欲观花，则以花为善，以草为恶。如欲用草时，复以草为善矣。此等善恶，皆由汝心好恶所生，故知是错。”\n\n曰：“然则无善无恶乎？”\n\n曰：“无善无恶者理之静，有善有恶者气之动。不动于气，即无善无恶，是谓至善。”\n\n曰：“佛氏亦无善无恶，何以异？”\n\n曰：“佛氏着在无善无恶上，便一切都不管，不可以治天下。圣人无善无恶，只是‘无有作好’‘无有作恶’，不动于气。然‘遵王之道’‘会其有极’\n，便自一循天理，便有个裁成辅相\n。”\n\n曰：“草既非恶，即草不宜去矣？”\n\n曰：“如此却是佛老意见。草若是碍，何妨汝去？”\n\n曰：“如此又是作好作恶。”\n\n曰：“不作好恶，非是全无好恶，却是无知觉的人。谓之不作者，只是好恶一循于理，不去又着一分意思。如此，即是不曾好恶一般。”\n\n曰：“去草如何是一循于理，不着意思？”\n\n曰：“草有妨碍，理亦宜去，去之而已；偶未即去，亦不累心。若着了一分意思，即心体便有贻累，便有许多动气处。”\n\n曰：“然则善恶全不在物？”\n\n曰：“只在汝心。循理便是善，动气便是恶。”\n\n曰：“毕竟物无善恶？”\n\n曰：“在心如此，在物亦然。世儒惟不知此，舍心逐物，将‘格物’之学错看了，终日驰求于外，只做得个‘义袭而取’，终身行不著、习不察\n。”\n\n曰：“‘如好好色，如恶恶臭’则如何？”\n\n曰：“此正是一循于理，是天理合如此，本无私意作好作恶。”\n\n曰：“如好好色，如恶恶臭，安得非意？”\n\n曰：“却是诚意，不是私意。诚意只是循天理。虽是循天理，亦着不得一分意。故有所忿懥好乐，则不得其正。须是‘廓然大公’，方是心之本体。知此，即知‘未发之中’。”\n\n伯生\n曰：“先生云‘草有妨碍，理亦宜去’，缘何又是躯壳起念？”\n\n曰：“此须汝心自体当。汝要去草，是甚么心？周茂叔窗前草不除\n，是甚么心？”","薛侃在花园里除草，问道：“天地间为何善难以培养，恶难以除去呢？”\n\n先生说：“只是因为没去真正去做培养善、去除恶的功夫罢了。”过了一会又说，“像你这样看待善和恶，都是因为从自己的身体出发来思考，这样就会出错。”\n\n薛侃没有理解。\n\n先生说：“天地间的生命，比如花和草，又有什么善恶之分？你想要赏花，就认为花是好的，草是坏的。如你想要用草，又会认为草是好的了。像这样的善恶之分，都来自你心中喜欢与厌恶的感情，所以我才知道这是错的。”\n\n薛侃说：“难道世间就没有善恶之分了吗？”\n\n先生说：“无善无恶是天理的静止状态，有善有恶的是气化的流动。气如果不动，便没有善与恶的区分，这就是至善。”\n\n薛侃说：“佛家也说无善无恶，如何与之区别开来呢？”\n\n先生说：“佛家执着于无善无恶，一切人事都不管不顾，不能用来治理天下。圣人所说的无善无恶，只是让人‘别刻意去为善为恶’，不为气所动。然而‘遵循王道’‘归于标准’，就是自然遵循天理，自然会有帮助天地万物各得其所的力量。”\n\n薛侃说：“既然草并不是坏的，那也没有除去的必要了。”\n\n先生说：“这样说的话就又是佛、道的观点了。草如果有所妨碍，去掉又何妨？”\n\n薛侃说：“那这样又是刻意地为善为恶了。”\n\n先生说：“不刻意去为善为恶，并不是要你完全没有好恶之心，要是这样就成了没有知觉的人了。所谓不刻意，只是说好恶都依循天理，不夹杂一点私意。做到这样，就好像自己没有了好恶一样。”\n\n薛侃说：“去除杂草怎样才能算是依循天理，不夹杂一点私意？”\n\n先生说：“草有妨碍，理当去除，去除便是；即便并未去除，也不要放在心上。如若夹杂了一点私意，那么心就会受到拖累，就会为气所动。”\n\n薛侃说：“那么善恶完全与事物无关吗？”\n\n先生说：“善恶只在你自己的心上。依循天理就是善，为气所动就是恶。”\n\n薛侃说：“事物本身终究没有善恶吗？”\n\n先生说：“对于心而言是如此，对事物而言也是这样。世俗之儒就是因为不知道这个道理，舍弃本心去追逐外物，将格物的意思理解错了，整日向外去求，只是妄想‘不通过积累便获得成就’，刚开始做时不明白其所以然，习惯后更不明白其所以然。”\n\n薛侃说：“‘好比喜欢美色，好比厌恶恶臭’，要如何理解呢？”\n\n先生说：“这正是依循天理，是天理要求人应当如此，并非刻意而为。”\n\n薛侃说：“喜欢美色、厌恶恶臭，如何不是刻意的行为呢？”\n\n先生说：“这是因为其中的意念是诚挚的意念，而非私意。诚意只是依循天理。依循天理，便是没有一丝一毫私意。故而有愤怒、怨恨、喜欢、快乐的感情，心便无法保持中正。必须使得心胸广阔公正，才是心的本体。了解到这个层面，就能知道什么是感情未发时的中正了。”\n\n孟源说：“先生说‘草如果有妨碍，理当去除’，为何又说是从自己身上产生的念头呢？”\n\n先生说：“这需要你自己去心中体会。你要除草，是出于什么用心？周敦颐窗前的草不除去，又是什么用心？”"],["上","一〇三","论学","先生谓学者曰：“为学须得个头脑，工夫方有着落。纵未能无间，如舟之有舵，一提便醒。不然，虽从事于学，只做个‘义袭而取’，只是行不著、习不察，非大本、达道也。”\n\n又曰：“见得时，横说竖说皆是。若于此处通，彼处不通，只是未见得。”","先生对学生们说：“做学问必须有个宗旨，功夫才有着落之处。即便功夫与宗旨之间有所阻断，但就好比船有舵一样，只要一提就能明白。如若不然，虽然还是做学问，却只是做个‘不通过积累便想获得成就’的功夫，刚开始做时不明白其所以然，习惯后更不明白其所以然，这不是学习的根本，也不是通往大道的路径。”\n\n先生又说：“如果能够明白为学的宗旨，怎么说都能明白。如果这里懂了，那里却不懂，那只是因为还没把握为学的宗旨。”"],["上","一〇五","修行语录","崇一\n问：“寻常意思多忙，有事固忙，无事亦忙，何也？”\n\n先生曰：“天地气机，元无一息之停。然有个主宰，故不先不后，不急不缓。虽千变万化，而主宰常定。人得此而生。若主宰定时，与天运一般不息，虽酬酢万变，常是从容自在，所谓‘天君泰然，百体从令\n’\n。若无主宰，便只是这气奔放，如何不忙？”","欧阳德问：“平常思想意念多忙乱，有事时固然忙乱，无事时却也忙乱，这是为何？”\n\n先生说：“天地万物生生不息，没有一刻停止。然而天地之间有一个主宰，所以天地万物才不会乱了秩序。虽然有千变万化，但主宰不变。人正是因这个主宰才得以产生的。主宰恒定不变，与天地运动不息一起存在，即便万物运动变化不止，主宰还是能够从容自在，这就是所谓‘天君泰然不动，百体遵令而从’。如果没有主宰，只是气的奔放流窜，怎么能够不忙乱呢？”"],["上","一〇六","省察克治","先生曰：“为学大病在好名。”\n\n侃曰：“从前岁自谓此病已轻，此来精察，乃知全未。岂必务外为人？只闻誉而喜，闻毁而闷。即是此病发来？”\n\n曰：“最是。名与实对。务实之心重一分，则务名之心轻一分。全是务实之心，即全无务名之心。若务实之心如饥之求食，渴之求饮，安得更有工夫好名？”\n\n又曰：“‘疾没世而名不称\n’\n，‘称’字去声读，亦‘声闻过情，君子耻之’\n之意。实不称名，生犹可补，没则无及矣。‘四十五十而无闻’\n，是不闻道，非无声闻也。孔子云：‘是闻也，非达也。’\n安肯以此望人？”","先生说：“做学问最大的毛病在于爱好虚名。”\n\n薛侃说：“从去年起，我认为我的这个毛病已经减轻了，现在认真省察，才知道并非如此。难道我真的十分在意外人的看法吗？只是听到赞誉便高兴，听到诋毁便郁闷罢了。想必这就是这个毛病发作时的表现？”\n\n先生说：“正是如此。虚名与实务相对。务实之心多一分，务名之心就少一分。如果全都是务实之心，就没有务名之心了。如果务实之心像饿了要吃饭、渴了要喝水一样迫切，哪里还有工夫爱好虚名呢？”\n\n先生又说：“‘疾没世而名不称’中的“称”字读第四声，也就是‘声名超过实情，君子感到羞耻’的意思。实情与声名不相称，在世时还可以弥补，过世后便没有办法了。‘四十五十而无闻’是指没有听闻大道，并不是没有声名在外的意思。孔子说过‘这是声名，并非贤达’的话，他又怎么会用声名来评价人呢？”"],["上","一〇八","致良知","德章\n曰：“闻先生以精金喻圣，以分两喻圣人之分量，以煅炼喻学者之工夫，最为深切。惟谓尧舜为万镒，孔子为九千镒，疑未安。”\n\n先生曰：“此又是躯壳上起念，故替圣人争分两。若不从躯壳上起念，即尧舜万镒不为多，孔子九千镒不为少。尧舜万镒，只是孔子的，孔子九千镒，只是尧舜的，原无彼我。所以谓之圣，只论‘精一’，不论多寡，只要此心纯乎天理处同，便同谓之圣，若是力量气魄，如何尽同得？后儒只在分两上较量，所以流入功利。若除去了比较分两的心，各人尽着自己力量精神，只在此心纯天理上用功，即人人自有，个个圆成，便能大以成大，小以成小，不假外慕，无不具足。此便是实实落落明善诚身的事。后儒不明圣学，不知就自己心地‘良知良能’\n上体认扩充，却去求知其所不知，求能其所不能，一味只是希高慕大，不知自己是桀纣心地，动辄要做尧舜事业，如何做得？终年碌碌，至于老死，竟不知成就了个甚么，可哀也已！”","刘德章说：“听闻先生用纯金比喻圣人，用金的分量比喻圣人的才力，用炼金比喻学习，十分深刻。只是说到尧舜是万镒的纯金，孔子是九千镒的纯金，似乎不妥。”\n\n先生说：“你这又是从外在的事物上起念头，所以才要替圣人去争些分量。如果不从外在的事物上起念头，就不会认为把尧舜比作万镒纯金太多、把孔子比作九千镒纯金太少。尧舜的万镒也是孔子的，孔子的九千镒也是尧舜的，原本没有彼此之分。圣人之所以为圣人，只看心体是否‘精研专一’，不论才力多寡，只要心中纯粹都是天理这一点相同，便都可以称之为圣人。如果在才力气魄上比较，如何能够相同呢？后世的儒者只是在分量上计较，所以才流于功利。如果去除计较分量的心思，每个人尽力让心中纯粹是天理，那么人人都能有所成就，才力大的人成就大，才力小的人成就小，无须向外追求就都能完备。这便是实实在在、明于至善、以诚立身的事业。后世的儒者不明白圣人之学，不知道在自己心里的‘良知良能’上去体认扩充，却去追求那些自己所不知道的知识，学自己所不会的技艺，一味地希求高远、羡慕博大，不知道自己依然是桀纣的心思，却动不动想做尧舜的事业，这又怎么办得到呢？一年到头忙忙碌碌，等到老死，却不知道自己做成了什么事业，可哀可叹！”"],["上","一一二","省察克治","子仁\n问：“‘学而时习之，不亦说乎？’\n先儒以学为‘效先觉之所为’\n，如何？”\n\n先生曰：“学是学去人欲、存天理。从事于去人欲、存天理，则自正诸先觉。考诸古训，自下许多问辨思索、存省克治工夫，然不过欲去此心之人欲，存吾心之天理耳。若曰‘效先觉之所为’，则只说得学中一件事，亦似专求诸外了。‘时习’者‘坐如尸’\n，非专习坐也，坐时习此心也；‘立如斋’，非专习立也，立时习此心也。‘说’是‘理义之说我心’之‘说’。人心本自说理义，如目本说色、耳本说声，惟为人欲所蔽所累，始有不说。今人欲日去，则理义日洽浃，安得不说？”","子仁问：“孔子说：‘学习并时时练习，不是很愉快的事情吗？’朱熹认为学习是后觉者效法先觉者的过程，对吗？”\n\n先生说：“学是学习摒弃人欲、存养天理。只要专注于摒弃人欲、存养天理，便自然是效法先觉者了。推究古人的遗训，许多学问思辨、存养省察克制的功夫，也不过是为了去除心中的私欲、存养心中的天理罢了。说‘效法先觉者的行为’，其实只说了为学的一件事，而且也还是向外求索。‘时习’的时候‘像受祭者一样端坐’，并不是专门学习静坐，而是在静坐时修习本心；‘像斋戒那样恭敬地站着’也不是专门学习站立，而是在站立时修习本心。‘悦’是‘天理道义愉悦我心’的‘悦’。人心原本就会对天理道义感到愉悦，好比眼睛喜好美色、耳朵喜好美声，只是被私欲遮蔽牵累，才会不愉悦。如今人欲日益去除，天理道义日渐滋养，岂会不愉悦呢？”"],["上","一一三","论学","国英\n问：“曾子三省\n虽切，恐是未闻一贯\n时工夫？”\n\n先生曰：“一贯是夫子见曾子未得用功之要，故告之。学者果能忠恕上用力，岂不是一贯？‘一’如树之根本，‘贯’如树之枝叶，未种根，何枝叶之可得？体用一源，体未立，用安从生？谓‘曾子于其用处盖已随事精察而力行之，但未知其体之一’\n，此恐未尽。”","陈桀问：“曾子每日多次反省自身，虽然真诚，恐怕还是没有领会一以贯之的功夫吧？”\n\n先生说：“一以贯之是孔子看到曾子没有掌握下功夫的关键才告诉他的。为学之人如果能在忠和恕上下功夫，不就是一以贯之吗？‘一’好比树木的根，‘贯’好比树木的枝叶，没有根，何来的枝叶？本体与作用本就同源，本体未能确立，作用如何生发出来？朱熹说‘曾子在体会心的作用方面，已经能够做到随事情精确体察并努力践行了，只是还不知道心的本体和作用是合一的道理’，这样说恐怕不全面。”"],["上","一一六","立志","“种树者必培其根，种德者必养其心。欲树之长，必于始生时删其繁枝；欲德之盛，必于始学时去夫外好。如外好诗文，则精神日渐漏泄在诗文上去。凡百外好皆然。”\n\n又曰：“我此论学，是无中生有的工夫。诸公须要信得及，只是立志。学者一念为善之志，如树之种，但勿助勿忘，只管培植将去，自然日夜滋长。生气日完，枝叶日茂。树初生时，便抽繁枝，亦须刊落，然后根干能大。初学时亦然。故立志贵专一。”","先生说：“种树必须先培育树根，培养德性必须先存养本心。想要树木生长，必须在初生时就删剪繁枝；想要德性隆盛，必须在初学时就摒弃外在的爱好。如果除此之外还喜好诗文，那么精神就会渐渐转到诗文上去。凡是各种外在的喜好，都是这样的。”\n\n先生又说：“我这样论述学问，是无中生有的功夫。诸位如果相信，便要立志。为学之人有一个为善的念头，就像是树的种子，既不要去助长它，也不要忘却它，只管慢慢培育，自然会日渐生长起来。生机一天天旺盛，枝叶一天天繁茂。树木初生时，便会长出多余的繁枝，必须加以剪去，然后根干才能粗壮。初学的时候也是一样的道理。所以立志贵在专一。”"],["上","一一八","论学","梁日孚\n问：“居敬、穷理是两事，先生以为一事\n，何如？”\n\n先生曰：“天地间只有此一事，安有两事？若论万殊，‘礼仪三百，威仪三千’，又何止两？公且道居敬是如何？穷理是如何？”\n\n曰：“居敬是存养工夫，穷理是穷事物之理。”\n\n曰：“存养个甚？”\n\n曰：“是存养此心之天理。”\n\n曰：“如此，亦只是穷理矣。”曰，“且道如何穷事物之理？”\n\n曰：“如事亲便要穷孝之理，事君便要穷忠之理。”\n\n曰：“忠与孝之理，在君亲身上？在自己心上？若在自己心上，亦只是穷此心之理矣。且道如何是敬？”\n\n曰：“只是主一。”\n\n“如何是主一？”\n\n曰：“如读书便一心在读书上，接事便一心在接事上。”\n\n曰：“如此则饮酒便一心在饮酒上，好色便一心在好色上。却是逐物，成甚居敬功夫？”\n\n日孚请问。\n\n曰：“一者，天理。主一是一心在天理上。若只知主一，不知一即是理，有事时便是逐物，无事时便是着空。惟其有事无事，一心皆在天理上用功。所以居敬亦即是穷理。就穷理专一处说，便谓之居敬；就居敬精密处说，便谓之穷理。却不是居敬了别有个心穷理，穷理时别有个心居敬。名虽不同，功夫只是一事。就如《易》言‘敬以直内，义以方外’，敬即是无事时义，义即是有事时敬，两句合说一件。如孔子言‘修己以敬’，即不须言义；孟子言‘集义’，即不须言敬。会得时，横说竖说，工夫总是一般。若泥文逐句，不识本领，即支离决裂，工夫都无下落。”\n\n问：“穷理何以即是尽性？”\n\n曰：“心之体，性也，性即理也。穷仁之理真要仁极仁，穷义之理真要义极义。仁义只是吾性，故穷理即是尽性。如孟子说‘充其恻隐之心至仁不可胜用’，这便是穷理工夫。”\n\n日孚曰：“先儒谓‘一草一木亦皆有理，不可不察’\n，如何？”\n\n先生曰：“‘夫我则不暇。’\n公且先去理会自己性情，须能尽人之性，然后能尽物之性。”\n\n日孚悚然有悟。","梁日孚问：“朱熹认为居敬和穷理是两件事，而先生认为两者是一件事，为何？”\n\n先生说：“天地之间只有一件事，何来的两件？如果从万物分殊的角度来看，《中庸》说‘礼仪有三百条，威仪有三千条’，又何止两件事？你且说说看，居敬是怎么一回事，穷理又是怎么一回事？”\n\n梁日孚说：“居敬是存养的功夫，穷理则是穷究事物的道理。”\n\n先生说：“存养是存养什么呢？”\n\n梁日孚说：“存养是存养心中的天理。”\n\n先生说：“如果是这样，那存养也就是穷理了。”先生接着问，“你再说说如何穷究事物的道理？”\n\n梁日孚说：“例如侍奉双亲便要穷究孝的道理，辅佐君主便要穷究忠的道理。”\n\n先生说：“忠和孝的道理是在君主和双亲的身上，还是在自己的心上呢？如果在自己的心上，也只是穷究自己心中的理罢了。你且说说看什么是敬？”\n\n梁日孚说：“专一就是敬。”\n\n“怎样才是专一呢？”\n\n梁日孚说：“好比读书便一心在读书上，做事便一心在做事上。”\n\n先生说：“如果是这样，那么喝酒便一心在喝酒上，好色便一心在好色上，这是追逐物欲，怎能算是居敬的功夫呢！”\n\n梁日孚向先生请教。\n\n先生说：“专一的一指的是天理。专一便是一心在天理上。如果只知道专一，而不知道一就是天理，有事时就会追逐事物，无事时就会心中空空落落。只有无论有事无事，一心都在天理上用功才可以。所以居敬也就是穷理。就穷理的专一之处而言，便称之为居敬；就居敬的精密之处而言，便称之为穷理。并不是在居敬之外还有个穷理的功夫，在穷理之外还有个居敬的功夫。两者的名称虽然不同，其实只是一个功夫。好比《易》中所说的‘恭敬可以使人的内心正直，道义可以规范人的外在行为’，恭敬就是没有事情时候的道义，道义就是有事情时候的恭敬，两句话说的是同一件事。例如孔子说‘以恭敬之心修养自己’，便不需要再说道义了；孟子说‘积累道义’，便不需要再说恭敬了。如果能够领会，随便怎么说，功夫都是一致的。如果拘泥于词句，不知道功夫的根本，就会支离破碎，功夫也没有下手处。”\n\n梁日孚问：“那么穷理为何就是尽性呢？”\n\n先生说：“心的本体就是天性，而天性就是天理。穷尽仁的道理，就是要使得仁达到极致；穷尽义的道理，就是要使得义达到极致。仁与义是人的天性，所以穷理就是尽性。如孟子所说的‘扩充恻隐之心，仁的作用便会源源不竭’，这就是穷理的功夫。”\n\n梁日孚说：“程颐先生说‘一草一木也都有各自的道理，不能不仔细研究’，对吗？”\n\n先生说：“‘要是我就没空去做这个功夫。’你姑且先去修养自己、体会自己的性情，只有先穷尽人的本性，然后才能穷尽事物的本性。”\n\n梁日孚猛然有所省悟。"],["上","一一九","致良知","惟乾\n问：“知如何是心之本体？”\n\n先生曰：“知是理之灵处，就其主宰处说，便谓之心；就其禀赋处说，便谓之性。孩提之童，无不知爱其亲，无不知敬其兄，只是这个灵能不为私欲遮隔，充拓得尽，便完完是他本体，便与天地合德。自圣人以下，不能无蔽，故须‘格物’以致其知。”","惟乾问：“知为什么是心的本体？”\n\n先生说：“知是天理的灵动之处，就其作为天地的主宰而言，就称之为心；就天所赋予人而言，就称之为性。孩童没有不知道亲爱父母、尊敬兄长的，只是由于心的灵动之处能够不被私欲蒙蔽、充分地发挥出来的缘故，就是完完全全的心的本体，就能与天地同德。除了圣人，所有人的心体都多多少少被蒙蔽了，所以必须通过‘格物’的功夫来致良知。”"],["上","一二〇","格物","守衡问：“《大学》工夫只是‘诚意’，‘诚意’工夫只是‘格物’。‘修齐治平’，只‘诚意’尽矣。又有‘正心’之功，‘有所忿懥好乐则不得其正’，何也？”\n\n先生曰：“此要自思得之，知此则知‘未发之中’矣。”\n\n守衡再三请。\n\n曰：“为学工夫有浅深，初时若不看实用意去好善恶恶，如何能为善去恶？这着实用意，便是‘诚意’。然不知心之本体原无一物，一向着意去好善恶恶，便又多了这分意思，便不是廓然大公。《书》所谓‘无有作好、作恶’，方是本体。所以说‘有所忿懥好乐，则不得其正’，‘正心’只是‘诚意’工夫里面体当自家心体，常要鉴空衡平\n，这便是‘未发之中’。”","守衡问：“《大学》的功夫就是‘诚意’，而‘诚意’的功夫就是‘格物’。‘修身、齐家、治国、平天下’的含义，一个‘诚意’便囊括了。然而《大学》中还有‘正心’的功夫，认为‘心中有怨恨、愤怒、喜好、快乐的感情，便会使得心体失去中正’，这是为什么？”\n\n先生说：“这需要你自己思考才能明白，明白其中的道理就能体会到‘感情未发出来时的中正’了。”\n\n守衡再三请教。\n\n先生说：“做学问的功夫有浅有深，开始学习的时候如果不切实用功去让自己喜欢善、讨厌恶，怎么能够积累善、去除恶呢？这个切实的意念，就是‘诚意’。然而，如果不知道心的本体原本就是纯粹无物的，时时刻意地让自己喜欢善、讨厌恶，就会凭空多出一分意念，就不是心体开阔公正了。《尚书》中说‘不刻意为善，不刻意为恶’，这就是心的本体。所以说‘有怨恨、愤怒、喜好、快乐的感情，会使得心体失去中正’，‘正心’只是在‘诚意’的功夫中去体会自己的心体，使自己的心体像镜子一般空明、像秤一样平衡，这就是‘感情未发出来时的中正之道’。”"],["上","一二一","修行语录","正之\n问：“戒惧是己所不知时工夫，慎独是己所独知时工夫，此说如何？”\n\n先生曰：“只是一个工夫。无事时固是独知\n，有事时亦是独知。人若不知于此独知之地用力，只在人所共知处用功，便是作伪，便是‘见君子而后厌然’\n。此独知处便是诚的萌芽，此处不论善念恶念，更无虚假，一是百是，一错百错，正是王霸、义利、诚伪、善恶界头。于此一立立定，便是端本澄源，便是立诚\n。古人许多诚身的工夫，精神命脉，全体只在此处，真是莫见莫显，无时无处，无终无始，只是此个工夫。今若又分戒惧为己所不知，即工夫便支离，亦有间断。既戒惧即是知，己若不知，是谁戒惧？如此见解，便要流入断灭禅定\n。”\n\n曰：“不论善念恶念，更无虚假，则独知之地，更无无念时邪？”\n\n曰：“戒惧亦是念。戒惧之念，无时可息。若戒惧之心稍有不存，不是昏聩，便已流入恶念。自朝至暮，自少至老，若要无念，即是己不知。此除是昏睡，除是槁木死灰。”","黄弘纲问：“戒惧是在自己不知道的时候下的功夫，慎独是独处时下的功夫，这么说对吗？”\n\n先生说：“两者只是同一个功夫。无事时固然是独处，有事时也是独处。人如果不在独处时下功夫，只在与他人共处时用功，就是作假，就是‘见到君子然后收敛恶行’。独处的时候便是诚的萌芽，这时无论善念恶念，没有丝毫作假，一对都对，一错都错，这正是王道与霸道、义和利、诚和伪、善与恶的分界处。在此时坚定志向，就是正本清源，就是确立诚德。古人所说的许多至诚修身的功夫，精神实质也都在此，真是看不见也不显现，不知在何处，也不知从何处开始的功夫。如今若把戒惧看成是自己不知道的时候的功夫，便把功夫分开来看了，中间多出了隔断。戒惧就是知，如果自己不知，那么是谁在戒惧？如果持这种见解，就会沦入断灭禅定了。”\n\n黄弘纲说：“不管善念恶念，毫无虚假，那么独处时，就没有无思无虑的时候了吗？”\n\n先生说：“戒惧便是意念。戒惧的意念一时一刻都不能间断。如果戒惧的心有片刻不在，不是人心昏聩，就是已然流入恶念了。从早到晚，从小到老，如果想要没有意念，就是使得自己没有知觉。这种情况要么是昏睡，要么是身如槁木、心如死灰。”"],["上","一二二","诚意","志道\n问：“荀子云‘养心莫善于诚’\n，先儒非之\n，何也？”\n\n先生曰：“此亦未可便以为非。诚字有以工夫说者。诚是心之本体，求复其本体，便是思诚的工夫。明道说‘以诚敬存之’，亦是此意。《大学》‘欲正其心，先诚其意’，荀子之言固多病，然不可一例吹毛求疵。大凡看人言语，若先有个意见，便有过当处。‘为富不仁’之言，孟子有取于阳虎\n，此便见圣贤大公之心。”","志道问：“荀子说‘养心最好的方法就是培养诚德’，程子认为不妥，为何？”\n\n先生说：“倒也不是不对。‘诚’字可以就功夫上来理解。诚是心的本体，恢复心的本体，就是思诚的功夫。程颢先生说‘用诚敬之心来存养它’，也是这个意思。《大学》里说‘要端正人心，先诚敬其意’，荀子的话固然有毛病，但不能一概吹毛求疵。但凡看待他人的话，如果有先入之见，就会失之过当。‘为富不仁’，是孟子征引阳虎的话，这便足以看到圣贤大公无私的心了。”"],["上","一二三","省察克治","萧惠\n问：“己私难克，奈何？”\n\n先生曰：“将汝己私来，替汝克。”先生曰，“人须有为己之心，方能克己。能克己，方能成己。”\n\n萧惠曰：“惠亦颇有为己之心，不知缘何不能克己。”\n\n先生曰：“且说汝有为己之心是如何。”\n\n惠良久曰：“惠亦一心要做好人，便自谓颇有为己之心。今思之，看来亦只是为得个躯壳的己，不曾为个真己。”\n\n先生曰：“真己何曾离着躯壳？恐汝连那躯壳的己也不曾为。且道汝所谓躯壳的己，岂不是耳目口鼻四肢？”\n\n惠曰：“正是为此。目便要色，耳便要声，口便要味，四肢便要逸乐，所以不能克。”\n\n先生曰：“‘美色令人目盲，美声令人耳聋，美味令人口爽，驰骋田猎令人发狂。’\n这都是害汝耳目口鼻四肢的，岂得是为汝耳目口鼻四肢？若为着耳目口鼻四肢时，便须思量耳如何听、目如何视、口如何言、四肢如何动。必须非礼勿视听言动\n，方才成得个耳目口鼻四肢，这个才是为着耳目口鼻四肢。汝今终日向外驰求，为名为利，这都是为着躯壳外面的物事。汝若为着耳目口鼻四肢，要非礼勿视听言动时，岂是汝之耳目口鼻四肢自能勿视听言动？须由汝心。这视听言动皆是汝心。汝心之视，发窍于目；汝心之听，发窍于耳；汝心之言，发窍于口；汝心之动，发窍于四肢。若无汝心，便无耳目口鼻。所谓汝心，亦不专是那一团血肉。若是那一团血肉，如今已死的人，那一团血肉还在，缘何不能视听言动？所谓汝心，却是那能视听言动的，这个便是性，便是天理。有这个性，才能生。这性之生理，便谓之仁。这性之生理，发在目便会视，发在耳便会听，发在口便会言，发在四肢便会动，都只是那天理发生。以其主宰一身，故谓之心。这心之本体，原只是个天理，原无非礼。这个便是汝之真己，这个真己是躯壳的主宰。若无真己，便无躯壳。真是有之即生，无之即死。汝若真为那个躯壳的己，必须用着这个真己，便须常常保守着这个真己的本体。戒慎不睹，恐惧不闻，惟恐亏损了他一些。才有一毫非礼萌动，便如刀割、如针刺，忍耐不过，必须去了刀、拔了针。这才是有为己之心，方能克己。汝今正是认贼作子，缘何却说有为己之心、不能克己？”","萧惠问：“自己的私意难以克除，怎么办？”\n\n先生说：“把你的私意说出来，我来帮你克。”又说，“人必须有为自己考虑的心才能克除自己的私意。能克除自己的私意，才能成为真正的自己。”\n\n萧惠说：“我也挺有为自己考虑的心的，不知为何还是无法克去己私。”\n\n先生说：“且说说你为自己考虑的心是怎样的。”\n\n萧惠想了很久，说：“我一心想做好人，便自认为挺为自己考虑的。如今想来，恐怕也只是为了自己的身体考虑，并不是为了真正的自己。”\n\n先生说：“真正的自己又怎能离得开身体呢？恐怕你都不曾真正为自己的身体考虑。你且说说，你所谓的为了自己的身体考虑，不就是为了自己的耳、目、口、鼻、四肢吗？”\n\n萧惠说：“正是这样。眼睛要看美色，耳朵要听美声，口舌要尝美味，四肢要享安逸，所以才不能克己。”\n\n先生说：“《老子》里说过：‘美色令人目盲，美声令人耳聋，美味令人口爽，驰骋田猎令人心发狂。’这些都是对你耳、目、口、鼻、四肢有害的东西，怎么是为了你的耳、目、口、鼻、四肢好呢？如果真正为了耳、目、口、鼻、四肢好，便要考虑耳朵如何去听、眼睛如何去看、嘴巴如何去说、四肢如何去动。必须做到‘非礼勿视、非礼勿听、非礼勿言、非礼勿动’，这才是成就耳、目、口、鼻、四肢的作用，才是真正为了耳、目、口、鼻、四肢好。你现在终日向外追求，为名为利，都是为了自己的身外之物。如果你为了耳、目、口、鼻、四肢的好，要非礼勿视、听、言、动时，难道是你的耳、目、口、鼻、四肢自己能够不视、听、言、动的吗？归根到底还是通过你的心才能做到的。视、听、言、动都是心的作用。心通过眼睛而看，通过耳朵而听，通过口舌而说，通过四肢而动。如果没有心，就没有耳、目、口、鼻、四肢。所谓心，并不是指那一团血肉。如果只是那一团血肉，如今已经死掉的人，那一团血肉还在，为何不能视、听、言、动了？所谓心是指那个使得视、听、言、动得以可能的东西，也就是天性，就是天理。有了这个天性，才会产生与性相对应的生生之理，这就是仁。天性的生生之理，表现于眼睛便能看，表现于耳朵便能听，表现于口舌便能说，表现于四肢便能动，这都是天理的作用。而天理就其主宰具体的身体而言，便称之为心。心的本体就是天理，原来就没有不合乎礼仪之处。这才是你真正的自己，这个真正的自己才是身体的主宰。如果没有真正的自己，就没有身体。可以说是得之便生，失之便死。如果真的为了自己的身体着想，必须时刻在真正的自己上下功夫，必须时刻保持着这个真己的本体。独处时也持守德性，唯恐对其造成一点伤害。稍有一点非礼的念头萌动，就像刀割、针刺一般难以忍受，必须将刀去掉、针拔除。这才是真正为自己考虑，才能克除私欲。现在你就好比是认贼作子，为何还说有为自己考虑的心，还说不能克除私欲呢？”"],["上","一二五","论学","萧惠好仙释。\n\n先生警之曰：“吾亦自幼笃志二氏，自谓既有所得，谓儒者为不足学。其后居夷三载，见得圣人之学若是其简易广大，始自叹悔错用了三十年气力。大抵二氏之学，其妙与圣人只有毫厘之间。汝今所学，乃其土苴，辄自信自好若此，真鸱鸮窃腐鼠\n耳。”\n\n惠请问二氏之妙。\n\n先生曰：“向汝说圣人之学简易广大，汝却不问我悟的，只问我悔的！”\n\n惠惭谢，请问圣人之学。\n\n先生曰：“汝今只是了人事问，待汝办个真要求为圣人的心，来与汝说。”\n\n惠再三请。\n\n先生曰：“已与汝一句道尽\n，汝尚自不会！”","萧惠喜欢谈论佛、道。\n\n先生提醒他，说：“我小时候也笃信佛、道的学问，自以为颇有见地，认为儒家不值得学习。然后在贵州龙场待了三年，体悟到圣人的学问如此简易广大，才叹息悔恨，浪费了三十年的时间和精力。大概来说，这两家的学问在精妙之处与圣人的学问相差不多。你如今所学的不过是两家的糟粕，却还自信欢喜到如此程度，真像是猫头鹰捉住一只腐烂的老鼠。”\n\n萧惠向先生请教两家的妙处。\n\n先生说：“刚和你说圣人的学问简易广大，你不问我所领悟的学问，却只问我后悔的学问！”\n\n萧惠向先生道歉，请教圣人之学。\n\n先生说：“你现在是为了应付我才问的，等你真正有了探求圣人之学的心时，我再和你说。”\n\n萧惠再三请教。\n\n先生说：“我已经用一句话跟你说完了，你却还是不明白！”"],["上","一二六","心体","刘观时\n问：“‘未发之中’是如何？”\n\n先生曰：“汝但戒慎不睹，恐惧不闻，养得此心纯是天理，便自然见。”\n\n观时请略示气象。\n\n先生曰：“哑子吃苦瓜，与你说不得。你要知此苦，还须你自吃。”\n\n时曰仁在旁，曰：“如此才是真知，即是行矣。”\n\n一时在座诸友皆有省。","刘观时问：“‘感情未发出来时的中正’是怎样的？”\n\n先生说：“你只要在别人看不见、听不到的时候保持戒慎恐惧，存养心体到达纯粹都是天理的境界，自然就能明白了。”\n\n刘观时请先生略微开示“未发之中”的境界。\n\n先生说：“哑巴吃苦瓜，与你说不得。你要知此苦，还须你自吃。”\n\n这时，徐爱在旁边说：“这才是真正的知，才是真正的行。”\n\n一时间在座的同学都有所省悟。"],["上","一二七","天理人欲","萧惠问死生之道。\n\n先生曰：“知昼夜即知死生。”\n\n问昼夜之道。\n\n曰：“知昼则知夜。”\n\n曰：“昼亦有所不知乎？”\n\n先生曰：“汝能知昼？懵懵而兴、蠢蠢而食，行不著、习不察，终日昏昏，只是梦昼。惟‘息有养，瞬有存’\n，此心惺惺明明，天理无一息间断，才是能知昼。这便是天德，便是通乎昼夜之道而知，更有甚么死生？”","萧惠向先生请教生死的道理。\n\n先生说：“明白昼夜的变化就知道生死的道理了。”\n\n于是萧惠向先生请教昼夜变化的道理。\n\n先生说：“知道白天就是知道黑夜。”\n\n萧惠说：“白天也有不知道的吗？”\n\n先生说：“你难道能知道白天？迷迷糊糊起床、傻乎乎地吃饭，刚开始做时不明白其所以然，习惯后更不明白其所以然，终日昏昏沉沉，只是在做白日梦。只有做到‘时时刻刻都有所存养’，心中清醒明白，天理没有片刻的间断，才算是知道白天。这就是与天相同的德性，就是通达昼夜之道才领悟的知，除此之外哪里还有什么生和死的道理？”"],["上","一二八","心体","马子莘问：“‘修道之教’\n，旧说谓圣人品节吾性之固有\n，以为法于天下，若礼乐刑政之属。此意如何？”\n\n先生曰：“道即性即命，本是完完全全，增减不得，不假修饰的，何须要圣人品节？却是不完全的物件。礼乐刑政是治天下之法，固亦可谓之教，但不是子思本旨。若如先儒之说，下面由教入道的，缘何舍了圣人礼乐刑政之教，别说出一段戒慎恐惧工夫？却是圣人之教为虚设矣。”\n\n子莘请问。\n\n先生曰：“子思性、道、教皆从本原上说，天命于人则命便谓之性，率性而行则性便谓之道，修道而学则道便谓之教。率性是诚者事，所谓‘自诚明，谓之性’也；修道是诚之者事，所谓‘自明诚，谓之教’\n也。圣人率性而行即是道；圣人以下，未能率性，于道未免有过不及，故须修道。修道则贤知者不得而过，愚不肖者不得而不及，都要循着这个道，则道便是个教。此‘教’字与‘天道至教’\n‘风雨霜露，无非教也’\n之‘教’同。‘修道’字与‘修道以\n仁’\n同。人能修道，然后能不违于道，以复其性之本体，则亦是圣人率性之道矣。下面‘戒慎恐惧’便是修道的工夫，‘中和’便是复其性之本体。如《易》所谓‘穷理尽性，以至于命’‘中和位育’便是尽性至命。”","马子莘问：“《中庸》说‘修道之谓教’，朱熹将这句话理解为圣人对世人进行评价分类并规定相应的德性，作为世人所需要遵守的规范，例如礼、乐、刑、政等，这种说法对吗？”\n\n先生说：“道就是天性、就是天命，本来就十分完备，不能增减，也不需要修饰，哪里还需要圣人来评价规范？又不是什么不完备的东西。礼、乐、刑、政是治理天下的法度，固然可以称之为教，但这并不是子思的本意。如果像朱熹所说的，天资较下者通过教化得以领悟大道，为何舍弃圣人礼、乐、刑、政的教化，却另外讲一个‘戒慎恐惧’的功夫呢？这是将圣人的教诲当作摆设了。”\n\n马子莘继续向先生请教。\n\n先生说：“子思所说的性、道和教都是从本原上说的。天授命于人，那么命就是人的性；人率性而行，那么性就是人所行的道；人修道而学，那么道就是人所施的教。率性是‘自然而然真诚的人’的事业，所谓‘通过诚挚之心明白通达，是天性使然’；修道是‘想要做到真诚的人’的事业，所谓‘由明白通达养成诚挚之心，是教化使然’。圣人率性而行就是大道；圣人以下的人做不到率性，对于道的理解难免有过或不及，所以才需要修道。修道就可以使贤者、智者不会过分，愚者、不肖者不会欠缺，所有人都要遵循这个道，在这个道之中便蕴含教化的意思了。此处的‘教’与‘天道至教’‘风雨霜露，无非教也’的‘教’是同一个意思。‘修道’与‘修道以仁’的意思相同。人能够修道，就能够不违背大道，恢复天性的本然，也就是圣人率性而行的大道了。《中庸》后文所说的‘戒慎恐惧’，就是修道的功夫，‘中和’就是恢复本来的天性。就像《易经》所说的‘穷理尽性以至于命’‘中和位育’，都是穷尽天性、通达天命的意思。”"],["上","一二九","省察克治","黄诚甫问：“先儒以孔子告颜渊为邦\n之问，是立万世常行之道\n，如何？”\n\n先生曰：“颜子具体圣人，其于为邦的大本大原都已完备，夫子平日知之已深，到此都不必言，只就制度文为上说。此等处亦不可忽略，须要是如此方尽善。又不可因自己本领是当了，便于防范上疏阔，须是要‘放郑声，远佞人’。盖颜子是个克己向里、德上用心的人，孔子恐其外面末节或有疏略，故就他不足处帮补说。若在他人，须告以‘为政在人，取人以身，修身以道，修道以仁’‘达道’‘九经’\n及‘诚身’许多工夫，方始做得，这个方是万世常行之道。不然，只去行了夏时，乘了殷辂，服了周冕，作了韶舞，天下便治得？后人但见颜子是孔门第一人，又问个为邦，便把做天大事看了。”","黄诚甫问：“朱熹认为孔子回答颜渊关于治理邦国问题的话，是为万世确立治国的原则，对吗？”\n\n先生说：“颜回大体上具备圣人的品质，对于治国安邦的大体方略也都已掌握，孔子对此也十分了解，当颜渊提问时也就没必要再多说，只是就典章制度稍稍谈一下。不过这方面也不能忽略，必须各方面全都具备才算完善。也不能因为自己的能力已经足够担当治理邦国的责任，就疏于防范，必须‘禁止郑国的靡靡之音，远离阿谀奉承的小人’。颜回是一个严于克己、韬光养晦的人，孔子担心他在制度文章等外在的问题上会有所疏漏，才针对他的不足之处加以补充说明。如果别人问到治理邦国的问题，孔子肯定会告诉他‘为政在人，取人以身，修身以道，修道以仁’‘达道’‘九经’以及‘诚身’等许多道理，这样才能将国家治理好，这才是万世常行的准则。如若不然，只是去推行夏朝的历法，乘坐商朝的辂车，穿上周朝的冠冕，听《韶》《武》的音乐，天下就能治理好吗？后世的学者只看到颜回是孔子最出色的弟子，又去问如何治理国家的道理，就认为孔子讲的是完备无疑的道理了。”"],["上","一三〇","格物","蔡希渊问：“文公《大学》新本，先‘格致’而后‘诚意’工夫，似与首章次第相合。若如先生从旧本之说，即‘诚意’反在‘格致’之前，于此尚未释然。”\n\n先生曰：“《大学》工夫即是‘明明德’，‘明明德’只是个‘诚意’，‘诚意’的工夫只是‘格物致知’。若以‘诚意’为主，去用‘格物致知’的工夫，即工夫始有下落。即为善去恶，无非是‘诚意’的事。如新本先去穷格事物之理，即茫茫荡荡，都无着落处，须用添个‘敬’字，方才牵扯得向身心上来，然终是没根源。若须用添个‘敬’字，缘何孔门倒将一个最紧要的字落了，直待千余年后要人来补出？正谓以‘诚意’为主，即不须添‘敬’字。所以提出个‘诚意’来说，正是学问的大头脑处。于此不察，真所谓‘毫厘之差，千里之缪’。大抵《中庸》工夫只是‘诚身’，‘诚身’之极便是‘至诚’。《大学》工夫只是‘诚意’，‘诚意’之极便是‘至善’。工夫总是一般。今说这里补个‘敬’字，那里补个‘诚’字，未免画蛇添足。”","蔡希渊问：“朱熹《大学》新本，先有‘格物致知’，然后才是‘诚意’的功夫，似乎与《大学》首章的次序不合。如果遵从先生旧本的说法，‘诚意’应当在‘格物致知’之后，对此我还有点不明白。”\n\n先生说：“《大学》的功夫就是‘明明德’，‘明明德’就是‘诚意’，‘诚意’的功夫就是‘格物致知’。如果以‘诚意’为主，再去‘格物致知’，功夫才有着落之处。所谓为善去恶，无非都是‘诚意’的功夫。如果像朱熹新本的次序，先去穷尽事物的道理，便会空空荡荡，没有着落，必须再加一个‘敬’字，才能与自己的身心关联起来，然而这终究是缺乏根源的。如果必须加一个‘敬’字，为何《大学》的作者却将这个最紧要的字落下了，等到千余年后的人补出来？所以我才说以‘诚意’为主，就不需要添加一个‘敬’字。之所以提出‘诚意’，正是因为这是做学问的根本宗旨。对此没有体察，真是‘差之毫厘，谬之千里’了。大体而言，《中庸》的功夫只是‘诚身’，‘诚身’的功夫做到极致就是‘至诚’。《大学》的功夫只是‘诚意’，‘诚意’的功夫做到极致就是‘至善’。功夫总是相同的。现在在这里补一个‘敬’字，那里补一个‘诚’字，未免画蛇添足了。”"],["中","传习录中 · 序","致良知","传习录中\n\n德洪\n曰：昔南元善\n刻《传习录》于越，凡二册，下册摘录先师手书，凡八篇。其答徐成之\n二书，吾师自谓：“天下是朱非陆，论定既久，一旦反之为难。二书姑为调停两可之说，便人自思得之。”故元善录为下册之首者，意亦以是欤？今朱、陆之辩明于天下久矣，洪刻先师《文录》\n，置二书于《外集》者，示未全也，故今不复录。\n\n其余指知、行之本体，莫详于答人论学与答周道通、陆清伯、欧阳崇一四书；而谓格物为学者用力日可见之地，莫详于答罗整庵一书。平生冒天下之非诋推陷，万死一生，遑遑然不忘讲学，惟恐吾人不闻斯道，流于功利机智，以日堕于夷狄禽兽而不觉。其一体同物之心，譊譊终身，至于毙而后已。此孔、孟以来贤圣苦心，虽门人子第，未足以慰其情也。是情也，莫见于答聂文蔚之第一书。此皆仍元善所录之旧。而揭“必有事焉”即“致良知”功夫，明白简切，使人言下即得入手，此又莫详于答文蔚之第二书，故增录之。\n\n元善当时汹汹，乃能以身明斯道，卒至遭奸被斥，油油然惟以此生得闻斯学为庆，而绝无有纤芥愤郁不平之气。斯录之刻，人见其有功于同志甚大，而不知其处时之甚艰也。今所去取，裁之时义则然，非忍有所加损于其间也。","钱德洪记：以前南元善在浙江刊刻《传习录》上、下两册，下册收录先生的八篇书信。在回答徐成之的两封信中，先生强调：“天下间肯定朱熹否定陆九渊的论断已经确定很久了，难以一下子就改变。这两封信姑且作为调停二说的尝试，使世人能够通过自己的思考得出结论。”南元善将这两封信放在下册的卷首，大概就是由于这个原因吧？而今朱陆之争早已大白于天下，我刊刻《文录》，则将这两封信放在《外集》之中，以表明信中的思想还不完备，本次刊印就不再收录了。\n\n其他关于知与行本来面貌的讨论，最详细的莫过于回答顾东桥、周道通、陆原静、欧阳崇一的四封信；讨论格物为学以及每日用功可见之处最详细的，是回答罗整庵的信。先生一生不顾天下之人的非难、诋毁，在九死一生中始终不忘讲学，唯恐我辈不了解他的学说，沦落于功利和机巧之中，堕落得像愚昧之徒和禽兽一样。他为他那万物一体的思想奔走一生，至死才停下脚步。这种孔孟以来圣贤所独有的良苦用心，就算是先生有如此多的门人弟子也无法宽慰他的苦心。这一用心，最可见于回答聂文蔚的第一封信中。这些都是南元善旧本就刊录的。讨论“必有事焉”就是“致良知”的功夫，简单明了，使学者可以一听便能领悟的，莫过于在回答聂文蔚的第二封信里，所以此次增补进来。\n\n南元善正处在天下人对先生群起而攻之的时代，他能够以身明道，遭到奸佞排挤被罢了官，但依旧以此生能够听闻先生的学说感到庆幸，没有丝毫愤怒、抑郁、不平的情绪。他刊印《传习录》，一般人只看到它对同学们的帮助很大，却不知道他当时处境的艰难。我这次刊印对他的版本所做的取舍，是出于目前情况的考量，并非刻意要做增减。\n\n答顾东桥书"],["中","一三一","诚意","来书云：“近时学者务外遗内，博而寡要。故先生特倡‘诚意’一义，针砭膏肓，诚大惠也！”\n\n吾子洞见时弊如此矣，亦将何以救之乎？然则鄙人之心，吾子固已一句道尽，复何言哉！复何言哉！若“诚意”之说，自是圣门教人用功第一义，但近世学者乃作第二义看，故稍与提掇紧要出来，非鄙人所能特倡也。","来信写道：“近些日子，学者治学注重外在而忽视内心，追求博学却不得要领。所以先生特别提倡‘诚意’的说法，来治疗那些病入膏肓的人，实在是大有裨益！”\n\n你对时弊颇有洞见，又想用什么来补救时弊呢？我的用心你已一语道破，我还用说什么呢！我还用说什么呢！至于“诚意”之说，固然是圣人之学教人用功的根本出发点，然而近世的学者却放到第二位了，所以我才稍稍将它的重要性提出来，这并不是我本人所独自提倡的。"],["中","一三二","格物","来书云：“但恐立说太高，用功太捷，后生师传，影响谬误，未免坠于佛氏明心见性\n、定慧顿悟\n之机，无怪闻者见疑。”\n\n区区格、致、诚、正之说，是就学者本心日用事为间，体究践履，实地用功，是多少次第、多少积累在！正与空虚顿悟之说相反。闻者本无求为圣人之志，又未尝讲究其详，遂以见疑，亦无足怪。若吾子之高明，自当一语之下便了然矣，乃亦谓“立说太高，用功太捷”，何邪？","来信写道：“只怕先生的学说太过高妙，下功夫的途径又太过便捷，后学传来传去会出现谬误，不免沦入佛家明心见性、定慧顿悟的禅机之中，这也难怪那些听闻先生学说的人会有所怀疑了。”\n\n我关于格物、致知、诚意、正心的学说，是指学者必须在日常用功中体察本心，体会、探究、亲身实践，在切实之处用功，其中要经历多少阶段、多少积累才能做到这般境界！这正是与佛家在空虚之中寻求顿悟的学说截然相反之处。听到我学说的人本就没有做圣人的志向，又未曾仔细探究我的学说，所以才会有怀疑，这也不足为怪。像你这般高明的人，自然一点便透，为何又说“学说太过高妙，下功夫的途径太过便捷”呢？"],["中","一三三","省察克治","来书云：“所喻知行并进，不宜分别前后，即《中庸》‘尊德性而道问学’之功，交养互发，内外本末一以贯之之道。然工夫次第，不能无先后之差：如知食乃食，知汤乃饮，知衣乃服，知路乃行，未有不见是物先有是事。此亦毫厘倏忽之间，非谓有等，今日知之而明日乃行也。”\n\n既云“交养互发，内外本末一以贯之”，则知行并进之说无复可疑矣。又云“工夫次第，不能不\n无先后之差”，无乃自相矛盾已乎？“知食乃食”等说，此尤明白易见，但吾子为近闻障蔽，自不察耳。夫人必有欲食之心，然后知食，欲食之心即是意，即是行之始矣。食味之美恶，必待入口而后知，岂有不待入口而已先知食味之美恶者邪？必有欲行之心，然后知路，欲行之心即是意，即是行之始矣。路岐之险夷，必待身亲履历而后知，岂有不待身亲履历而已先知路岐之险夷者邪？“知汤乃饮，知衣乃服”，以此例之，皆无可疑。若如吾子之喻，是乃所谓不见是物而先有是事者矣。吾子又谓“此亦毫厘倏忽之间，非谓截然有等，今日知之而明日乃行也”，是亦察之尚有未精。然就如吾子之说，则知行之为合一并进，亦自断无可疑矣。","来信写道：“先生所讲的知行并进，不应该区分先后，这就是《中庸》所说的‘尊德性而道问学’的功夫，这是相互存养、交相督促，内外本末一以贯之的道理。然而，功夫毕竟是有一定的顺序，不能没有先后差别：比如见到食物才吃，见到汤才喝，见到衣服才穿，见到路才走，不存在没有看到对象却先有行为的。这中间不过一瞬间的事，并不是截然二分，并不是今天看到了要等明天再去做。”\n\n你既然说“相互存养、交相督促，内外本末一以贯之”，那么知行并进之说便没有什么可以怀疑的了。你又说“功夫有一定的顺序，不能没有先后差别”，这难道不是自相矛盾吗？“知食乃食”等说法，十分明白简单，然而你却被朱子的学说蒙蔽，没有觉察罢了。人必然有想吃的心，然后去认识食物，想吃的心便是意念，便是行动的开端。食物是否美味，要等尝了之后才知道，岂有没有尝过就已然知道食物美味与否的道理？必然先有想要走路的心，才会认识路，想要走路的心就是意念，就是行动的开端。路是否崎岖险恶，必然要亲自走一番才知道，岂有不亲自走过就已然知道路是否崎岖险恶的道理？“知汤乃饮，知衣乃服”都能以此类推，没什么可怀疑的。如果像你所说的那样，这就是没看到对象却想先去行动。你又说“这中间不过一瞬间的事，并不是截然二分，并不是今天看到了要等明天再去做”，这是你省察还没有精确到位。不过就你自己所说的这些话来看，知行并进是断然无疑的。"],["中","一三四","心即理","来书云：“真知即所以为行，不行不足谓之知，此为学者吃紧立教，俾务躬行则可。若真谓行即是知，恐其专求本心，遂遗物理，必有暗而不达之处，抑岂圣门知行并进之成法哉？”\n\n知之真切笃实处即是行，行之明觉精察处即是知。知行工夫本不可离，只为后世学者分作两截用功，失却知行本体，故有合一并进之说。真知即所以为行，不行不足谓之知。即如来说所云“知食乃食”等说可见，前已略言之矣。此虽吃紧救弊而发，然知行之体本来如是，非以己意抑扬其间，姑为是说，以苟一时之效者也。\n\n“专求本心，遂遗物理”，此盖先其本心者也。夫物理不外于吾心，外吾心而求物理，无物理矣。遗物理而求吾心，吾心又何物邪？心之体，性也，性即理也。故有孝亲之心即有孝之理，无孝亲之心即无孝之理矣；有忠君之心即有忠之理，无忠君之心即无忠之理矣。理岂外于吾心邪？晦庵谓“人之所以为学者，心与理而已。心虽主乎一身，而实管乎天下之理；理虽散在万事，而实不外乎一人之心”\n，是其一分一合之间，而未免已启学者心、理为二之弊。此后世所以有“专求本心，遂遗物理”之患，正由不知心即理耳。夫外心以求物理，是以有暗而不达之处，此告子义外之说，孟子所以谓之不知义也\n。心一而已，以其全体恻怛而言谓之仁，以其得宜而言谓之义，以其条理而言谓之理。不可外心以求仁，不可外心以求义，独可外心以求理乎？外心以求理，此知行之所以二也。求理于吾心，此圣门知行合一之教，吾子又何疑乎？","来信写道：“真正具备了某种认知便会去实践，不去实践便不能叫作认知，这是告诫学者要切实用功、脚踏实地去实践才行。如果真的认为行就是知，恐怕专注于探求本心，不顾事物的道理，必然会有不明白、无法理解的地方，这难道是圣人强调知行并进的既定方法吗？”\n\n认知达到真切笃实的地步就是实践，实践达到明觉精察的地步就是认知。知与行的功夫本来就不可分离，只是后世的学者将功夫分作两截，认识不到知行关系的本然面貌，因此才会有知行合一、知行并进的说法。真切的认知就是实践，不去实践便不能称之为认知。参照你信中所提及的“知食乃食”等说法便可明白，前文已经约略谈到了。这虽然是出于补救时弊才如此说的，但知行关系的本然状态便是如此，并非为了以一己私意揣度才这么说的，来达到一时之间效果的目的。\n\n“专注于探求本心，不顾事物的道理”，这大概是失去本心了。事物的道理并不在自己的心外，向自己的心外探求事物的道理，是求不得的。遗弃事物的道理而探求本心，那本心又是什么东西呢？心的本体就是性，性就是理。因此有孝亲之心就有孝顺的道理，没有孝亲之心就没有孝顺的道理；有忠君之心就有忠诚的道理，没有忠君之心就没有忠诚的道理。理难道在心外吗？朱熹所说“人所学习的东西，无非就是心和理。心虽然主宰身体而实则统管着天下万物的道理；理虽然散见于万事万物之中，实则均在于人心”，在这将心和理一分又一合之间，却误导了学者将心和理看作两边了。后来的人之所以有“专注于探求本心，不顾事物的道理”的错误，正是由于不知道心就是理。在心外探求物理，才会有不明白不理解的问题，这正是告子“以义为外”的说法，因此孟子批评告子不懂得何谓义。心是一个整体，就其全然都是恻隐之心而言称之为仁，就其处事得宜而言称之为义，就其有条有理而言称之为理。不能向心之外求义，难道能向心外求理吗？向心外求理，就是将知与行视作两件事了。向心中求理，正是圣人之学知行合一的教诲，你又有什么疑惑呢？"],["中","一三五","格物","来书云：“所释《大学》古本谓致其本体之知，此固孟子‘尽心’之旨。朱子亦以虚灵知觉为此心之量\n。然尽心由于知性，致知在于格物。”\n\n“尽心由于知性，致知在于格物”，此语然矣。然而推本吾子之意，则其所以为是语者，尚有未明也。朱子以“尽心、知性、知天”为物格、知致，以“存心、养性、事天”为诚意、正心、修身，以“夭寿不二，修身以俟”为知至、仁尽，圣人之事。若鄙人之见，则与朱子正相反矣。夫“尽心、知性、知天”者，生知安行，圣人之事也；“存心、养性、事天”者，学知利行，贤人之事也；“夭寿不二，修身以俟”者，困知勉行，学者之事也\n。岂可专以“尽心知性”为知，“存心养性”为行乎？吾子骤闻此言，必又以为大骇矣。然其间实无可疑者，一为吾子言之。\n\n夫心之体，性也。性之原，天也。能尽其心，是能尽其性矣。《中庸》云：“惟天下至诚为能尽其性。”又云，“知天地之化育，质诸鬼神而无疑，知天也。”此惟圣人而后能然。故曰：此“生知安行”，圣人之事也。存其心者，未能尽其心者也。故须加存之之功。心存之既久，不待于存而自无不存，然后可以进而言“尽”。盖“知天”之“知”，如知州、知县之“知”，知州则一州之事皆己事也，知县则一县之事皆己事也，是与天为一者也。“事天”则如子之事父、臣之事君，犹与天为二也。天之所以命于我者，心也、性也，吾但存之而不敢失，养之而不敢害，如“父母全而生之，子全而归之”\n者也。故曰：此“学知利行”，贤人之事也。至于“夭寿不二”，则与存其心者又有间矣。存其心者虽未能尽其心，固己一心于为善，时有不存则存之而已。今使之“夭寿不二”，是犹以夭寿二其心者也。犹以夭寿二其心，是其为善之心犹未能一也。存之尚有所未可，而何“尽”之可云乎？今且使之不以夭寿二其为善之心。若曰死生夭寿皆有定命，吾但一心于为善，修吾之身以俟天命而已，是其平日尚未知有天命也。“事天”虽与天为二，然已真知天命之所在，但惟恭敬奉承之而已耳。若俟之云者，则尚未能真知天命之所在，犹有所俟者也。故曰：所以立命。立者，“创立”之“立”，如立德、立言、立功、立名\n之类。凡言“立”者，皆是昔未尝有，而本始建立之谓。孔子所谓“不知命，无以为君子”\n者也。故曰：此“困知勉行”，学者之事也。\n\n今以“尽心、知性、知天”为格物致知，使初学之士尚未能不二其心者，而遽责之以圣人生知安行之事，如捕风捉影，茫然莫知所措其心，\n几何而不至于“率天下而路”\n也？今世致知格物之弊，亦居然可见矣。吾子所谓“务外遗内，博而寡要”者，无乃亦是过欤？此学问最紧要处，于此而差，将无往而不差矣。此鄙人之所以冒天下之非笑，忘其身之陷于罪戮，呶呶其言，其不容已者也。","来信写道：“先生解释《大学》古本认为，致知是获得关于本体的知，这固然与孟子‘尽心’的宗旨相合。朱子也认为虚灵知觉是心的本体。然而人之所以能够尽心是出于对性的体认，人能够扩充自己的知则是因为对于物的体认。”\n\n“人之所以能够尽心是出于对性的体认，人能够扩充自己的知则是因为对于物的体认”，这句话是对的。然而推敲你所想表达的意思，想来你之所以说这句话，是因为还有不明白的地方。朱子以“尽心、知性、知天”为格物，以“存心、养性、事天”为诚意、正心、修身，以“夭寿不二，修身以俟”为知的极致、仁的尽处，这是圣人的事业。依照我的看法，则正与朱子正相反。所谓“尽心、知性、知天”就是生而知之、安而行之，这才是圣人的事业；“存心、养性、事天”就是学而知之、利而行之，这是贤人的事业；“夭寿不二，修身以俟”，是困而知之、勉而行之，这是学者的事业。怎能只将“尽心知性”视作为知，而将“存心养性”视作为行呢？你刚开始听到我的说法，肯定又会大惊失色。然而其中确实没有可以怀疑的地方，且让我给你一一道来。\n\n所谓心的本体就是性，性的本体就是天理。能穷尽自己的本心，也就能穷尽自己的天性。《中庸》里说：“只有天下最诚敬的人才能穷尽其性。”还说，“通晓天地的化育，求证于鬼神而没有疑问，这便是知天。”这是只有达到圣人的境界才可以做到的。所以我才说：这是“生而知之、安而行之”，是圣人的事业。存养本心，说明还不能穷尽本心，这才需要施加存养的功夫。存养本心的时间久了，就不需要存养的功夫，自然而然能够达到无时无刻不自然存养的境界，然后才可以说“尽”。所谓“知天”的“知”，好比“知州”“知县”的“知”，知州就是将一州之内的事都视作自己的分内事，知县就是将一县之内的事都视作自己的分内事，所以“知天”就是与天为一的意思。“事天”则好比子女侍奉父母、臣子侍奉君主，故而“事天”还是与天有所分别。天所赋予我们的是本心与本性，我们只有善加存养而不敢遗失、损害，如同“父母完整地生下我们，死去时我们也要保持完整”。所以我说：这是“学而知之、利而行之”，是贤人的事业。至于“夭寿不二”的人，与存养本心的人又有区别。存养本心的人虽然不能穷尽本心，但依然一心为善，偶尔失却本心，施加存养的功夫就可以了。现如今要求人的寿命相等，这是由于心为寿命的长短所左右，产生了二心。正是因为有这个对于寿命的二心，所以为善的心便不能专一。存养的功夫都未必可行，又怎么能说“尽”呢？现在要求这样的人不因寿命长短而改变自己为善的心，将生死与寿命都视作天命所赋予的东西，只是一心向善，修养自身并等待天命，这说明这类人还不知道何谓天命。“事天”虽然与天为二，但是已经知道天命的所在，只是恭敬地顺应它而已。像那些等待天命的人，还不知道天命真正的所在，好像还在等待天命的到来。所以我说：这是立命。立就是“创立”的“立”，好比立德、立言、立功、立名等。但凡说“立”的地方，都是表达过去没有而如今确立的意思。孔子所说的“不知天命，就无法成为君子”正是此意。所以我说：这是“困而知之、勉而行之”，是学者的事业。\n\n如今将“尽心、知性、知天”视作格物致知，使得初学之人还不能一心一意地为学，就马上责备他不能像圣人那样生知安行，这就像是捕风捉影，让人茫然不知所措。这不是让人疲于奔命吗？现如今的格物致知学说的弊端，已然暴露无遗。你所谓“务外遗内，博而寡要”，不也是这种过失所造成的吗？这是做学问最紧要的地方，在这里出错，往后便步步皆错了。这就是我之所以要冒着天下之人的非议嘲笑，不顾身陷险地、招致罪祸，喋喋不休地宣传我的观点的原因，实在是不得已而为之啊！"],["中","一三六","致良知","来书云：“闻语学者，乃谓‘即物穷理’之说亦是玩物丧志，又取其‘厌繁就\n约’\n‘涵养本原\n’\n数说标示学者，指为晚年定论，此亦恐非。”\n\n朱子所谓格物云者，在即物而穷其理也。即物穷理是就事事物物上求其所谓定理者也，是以吾心而求理于事事物物之中，析心与理为二矣。夫求理于事事物物者，如求孝之理于其亲之谓也。求孝之理于其亲，则孝之理其果在于吾之心邪？抑果在于亲之身邪？假而果在于亲之身，则亲没之后，吾心遂无孝之理欤？见孺子之入井，必有恻隐之理，是恻隐之理果在于孺子之身欤，抑在于吾心之良知欤？其或不可以从之于井欤，其或可以手而援之欤？是皆所谓理也。是果在于孺子之身欤，抑果出于吾心之良知欤？以是例之，万事万物之理莫不皆然，是可以知析心与理为二之非矣。夫析心与理而为二，此告于义外之说，孟子之所深辟也。“务外遗内，博而寡要”，吾子既已知之矣，是果何谓而然哉？谓之玩物丧志，尚犹以为不可欤？\n\n若鄙人所谓致知格物者，致吾心之良知于事事物物也。吾心之良知即所谓天理也。致吾心良知之天理于事事物物，则事事物物皆得其理矣。致吾心之良知者，致知也；事事物物皆得其理者，格物也。是合心与理而为一者也。合心与理而为一，则凡区区前之所云，与朱子晚年之论，皆可以不言而喻矣。","来信写道：“听说您对学生讲，朱熹‘即物穷理’的学说就是玩物丧志，然而又拿朱熹关于‘厌繁就约’‘涵养本原’的几封信给学生看，认为这是朱子晚年确定的学说，这样恐怕不妥吧。”\n\n朱熹所说的格物，就是在即物而穷其理。即物穷理就是在事事物物上探求确定的道理，是用自己的心在事物上探求道理，这就将心与理一分为二了。在事物上探求道理，好比在双亲身上探求孝顺的道理。在双亲身上探求孝顺的道理，那么孝顺的道理究竟是在自己的心中，还是在双亲的身上呢？假如真的在双亲的身上，那么双亲过世之后，我的心中就没有孝顺的道理了吗？看见小孩坠入井中，必然会有恻隐之心，那么恻隐的道理是在小孩身上，还是在我心中的良知上呢？我是不能为了救小孩而跳入井中呢，还是施以援手把他拉上来呢？这都是所谓的道理。这些道理是在小孩的身上呢，还是出自我心中的良知呢？以此为例，万事万物的道理都是如此，这样便足以明白：将心与理一分为二是错误的。将心与理一分为二，这是告子“义外”之说，孟子曾经深切地批判过。“注重外在而忽视内心，追求博学却不得要领”，你既然已经知道这样不对，为什么还要这样说呢？我说“即物穷理”就是玩物丧志，你认为还有什么不妥的呢？\n\n我所说的格物致知，是将我心中的良知推之于万事万物。我心中的良知就是天理。将我心中的良知推之于万事万物，那么万事万物都合乎天理。推广我心中的良知就是“致知”，万事万物都合乎天理就是“格物”。这就把心和理合二为一了。把心和理合二为一，那么我前面所说的，以及我关于朱熹晚年之论的说法，就都不言而喻了。"],["中","一三七","知行合一","来书云：“人之心体本无不明，而气拘物蔽鲜有不昏。非学问思辨以明天下之理，则善恶之机、真妄之辨，不能自觉，任情恣意，其害有不可胜言者矣。”\n\n此段大略似是而非，盖承沿旧说之弊，不可以不辨也。夫学问思辨行皆所以为学，未有学而不行者也。如言学孝，则必服劳奉养，躬行孝道，则后谓之学。岂徒悬空口耳讲说，而遂可以谓之学孝乎？学射，则必张弓挟矢，引满中的；学书，则必伸纸执笔，操觚染翰\n。尽天下之学，无有不行而可以言学者，则学之始固已即是行矣。笃者，敦实笃厚之意。已行矣，而敦笃其行，不息其功之谓尔；盖学之不能以无疑，则有问，问即学也，即行也；又不能无疑，则有思，思即学也，即行也；又不能无疑，则有辨，辨即学也，即行也。辨即\n明矣，思既慎矣，问既审矣，学既能矣，又从而不息其功焉，斯之谓笃行。非谓学问思辨之后而始措之于行也。是故以求能其事而言谓之学。以求解其惑而言谓之问，以求通其说而言谓之思，以求精其察而言谓之辨，以求履其实而言谓之行。盖析其功而言则有五。合其事而言则一而已。此区区心理合一之体、知行并进之功，所以异于后世之说者，正在于是。\n\n今吾子特举学问思辨以穷天下之理，而不及笃行，是专以学问思辨为知，而谓穷理为无行也已。天下岂有不行而学者邪？岂有不行而遂可谓之穷理者邪？明道云：“只穷理，便尽性至命。”故必仁极仁而后谓之能穷仁之理，义极义而后谓之能穷义之理。仁极仁则尽仁之性矣，义极义则尽义之性矣。学至于穷理至矣，而尚未措之于行，天下宁有是邪？是故知不行之不可以为学，则知不行之不可以为穷理矣。知不行之不可以为穷理，则知知行之合一并进，而不可以分为两节事矣。\n\n夫万事万物之理不外于吾心，而必曰穷天下之理，是殆以吾心之良知为未足，而必外求于天下之广，以裨补增益之，是犹析心与理而为二也。夫学问思辨笃行之功，虽其困勉至于人一己百\n，而扩充之极，至于尽性知天，亦不过致吾心之良知而已。良知之外，岂复有加于毫末乎？今必曰穷天下之理，而不知反求诸其心，则凡所谓善恶之机、真妄之辨者，舍吾心之良知，亦将何所致其体察乎？吾子所谓“气拘物蔽”者，拘此蔽此而已。今欲去此之蔽，不知致力于此，而欲以外求，是犹目之不明者，不务服药调理以治其目，而徒伥伥然求明于其外，明岂可以自外而得哉？任情恣意之害，亦以不能精察天理于此心之良知而已。此诚毫厘千里之谬者，不容于不辩。吾子毋谓其论之太刻也！","来信写道：“人的心体本就明白，然而由于被气拘束、被物蒙蔽，很少有人不昏聩。不通过博学、审问、慎思、明辨的方法来明白天下的道理，便无法明白善恶的缘由、真假的差异，就会肆意妄为，其危害难以言述。”\n\n这段话大体上似是而非，大概是承袭了朱子学说的弊端，不能不分辨清楚。博学、审问、慎思、明辨、笃行都是学习的方法，不存在只学习不实践的道理。比如学习孝道，就必须服侍奉养双亲，亲身实践孝道，才可以称之为学。难道仅仅是空口白话地随便说说就可以称之为学习孝道了吗？学习射箭必须张弓搭箭，射中靶心；学习书法必须铺纸提笔，切实去写。天下所有的学习，没有不实践就可以称之为学的，所以在学习的开始就已经是实践了。笃是敦厚、踏实的意思。已经实践了，又反复实践加以强化，也就是一刻不停地下功夫的意思；然而学习不可能没有疑惑，有疑惑便会产生问题，问问题就是学习，也就是实践；然而询问后可能还有疑惑，这时便需要思考，思考也是学习，也就是实践；思考后可能还有疑惑，这时就要用到辨析的功夫，辨析也是学习，也就是实践。辨析明白了，思考审慎了，疑问消除了，学业长进了，然后还要一刻不息地用功，这就是笃行。并不是说在学、问、思、辨之后再去实践。因此，就探求能够做成某事而言叫作学，就求得解答困惑而言叫作问，就通晓学说而言叫作思，就考察精到而言叫作辨，就落到实处而言叫作行。从作用方面来看可以分为五个方面，但本质上则可以合为一件事。我所说的心理合一的本体、知行并进的功夫，之所以有别于后世的学说，正在于此。\n\n现在你特别举出博学、审问、慎思、明辨来穷尽天下的道理，却未提及笃行，这是只将学、问、思、辨视作为知，认为穷理的功夫不是实践。天下难道有不实践就能做学问的人吗？难道有不实践却说自己穷尽天下道理的人吗？程颢先生说：“只要穷尽事物的道理，便能穷尽天性、通达天命。”所以行仁必须将仁做到极致才算穷尽仁的道理，行义必须将义做到极致才算穷尽义的道理。将仁做到极致便是穷尽仁的性，将义做到极致便是穷尽义的性。学习要到穷尽事物的道理才算学成，倘若还没有付诸实践，怎么能叫学成了呢？所以应当明白：不去实践不能称之为学习，不去实践不能称之为穷理。明白不去实践不能称之为穷理，就能明白知行合一、知行并进的道理，就不会把知与行看作两件事了。\n\n万事万物的道理都不在自己的心之外，却要说穷尽天下事物的道理，是唯恐自己心中的良知不足，所以必须向外寻求，来填补自己心中的不足，这还是把心和理看作两件事。所谓博学、审问、慎思、明辨、笃行的功夫，即便是资质较差、需要付出百倍努力才能赶上常人的人，扩充到极致以至于“尽性知天”，也不过是实现自己心中的良知而已。良知之外，难道还能增加一丝一毫的东西吗？如今说必须穷尽天下事物的道理，却不知道向心中去探求，那么善恶的缘由、真伪的异同，舍去我们心中的良知，又如何能够体察明白呢？你所说的“被气拘束、被物蒙蔽”，正是被这种错误观念拘束、蒙蔽。而今要去除这一蒙蔽，不知致力于内求，还想向外去探求，好比那些眼睛不明亮的人，不服药调理、治好眼睛，却茫然去探求外面的光亮，眼睛的明亮难道可以由外而得吗？肆意妄为的危害也正是由于不能在心体良知上仔细体察天理而已。这真是差之毫厘、谬以千里，不能不分辨清楚。希望你不要认为我说得太苛刻了！"],["中","一三八","致良知","来书云：“教人以致知、明德，而戒其即物穷理，诚使昏暗之士深居端坐，不闻教告，遂能至于知致而德明乎？纵令静而有觉，稍悟本性，则亦定慧无用之见，果能知古今、达事变而致用于天下国家之实否乎？其曰‘知者意之体，物者意之用’‘格物如格君心之非之格’，语虽超悟独得，不踵陈见，抑恐于道未相吻合？”\n\n区区论致知格物，正所以穷理，未尝戒人穷理，使之深居端坐而一无所事也。若谓即物穷理，如前所云务外而遗内者，则有所不可耳。昏暗之士，果能随事随物精察此心之天理，以致其本然之良知，则“虽愚必明，虽柔必强”\n。大本立而达道行，九经之属，可一以贯之而无遗矣，尚何患其无致用之实乎？彼顽空虚静之徒，正惟不能随事随物精察此心之天理，以致其本然之良知，而遗弃伦理、寂灭虚无以为常，是以要之不可以治家国天下。孰谓圣人穷理尽性之学，而亦有是弊哉？\n\n心者，身之主也，而心之虚灵明觉，即所谓本然之良知也。其虚灵明觉之良知应感而动者，谓之意。有知而后有意，无知则无意矣，知非意之体乎？意之所用必有其物，物即事也。如意用于事亲，即事亲为一物；意用于治民，即治民为一物；意用于读书，即读书为一物；意用于听讼，即听讼为一物。凡意之所用，无有无物者。有是意即有是物，无是意即无是物矣，物非意之用乎？\n\n“格”字之义，有以“至”字之训者，如“格于文祖”\n“有苗来格”\n，是以“至”训得也。然“格于文祖”，必纯孝诚敬，幽明之间无一不得其理，而后谓之“格”；有苗之顽，实以文德诞敷而后“格”。则亦兼有“正”字之义在其间，未可专以“至”字尽之也。如“格其非心”“大臣格君心之非”\n之类，是则一皆“正其不正以归于正”之义，而不可以“至”字为训矣。且《大学》“格物”之训，又安知其不以“正”字为训，而必以“至”字为义乎？如以“至”字为义者，必曰“穷至事物之理”，而后其说始通。是其用功之要全在一“穷”字，用力之地全在一“理”字也。若上去一“穷”、下去一“理”字，而直曰“致知在至物”，其可通乎？夫“穷理尽性”\n，圣人之成训，见于《系辞》者也。苟“格物”之说而果即“穷理”之义，则圣人何不直曰“致知在穷理”，而必为此转折不完之语，以启后世之弊邪？\n\n盖《大学》“格物”之说，自与《系辞》“穷理”大旨虽同，而微有分辨。“穷理”者，兼格、致、诚、正而为功也。故言“穷理”，则格、致、诚、正之功皆在其中；言“格物”，则必兼举致知、诚意、正心，而后其功始备而密。今偏举“格物”而遂谓之“穷理”，此所以专以“穷理”属知，而谓“格物”未常有行。非惟不得“格物”之旨，并“穷理”之义而失之矣。此后世之学所以析知、行为先后两截，日以支离决裂，而圣学益以残晦者，其端实始于此。吾子盖亦未免承沿积习，则见以为“于道未相吻合”，不为过矣。","来信写道：“您教人以致知、明德，却不让他们即物穷理，倘若使那些内心昏蔽的人深居静坐，不闻圣人的教诲，难道能使他们致知、明德吗？纵使他们在静中有所觉悟，稍稍体悟到本性，那也是像佛家定慧一样毫无实用的见地，真的能够通晓古今、达乎事变，并且将其用于天下国家的实事上去吗？您说‘认知是意念的本体，事物是意念的作用’‘格物就好比是纠正君主心中的不正之念’。这话虽然显示出超高的悟性，独到而不落俗套，但恐怕并不符合大道吧？”\n\n我所说的格物致知，正是穷理的意思，并没有禁止学生去穷理，导致让他们深居静坐、无所事事。但如果认为即物穷理便像前文所说，追求外物而忽视内心存养，则是错误的。昏蔽之人如果能够在事物上体察心中的天理，进而实现其本心的良知，“愚笨的人也一定会变聪明，柔弱的人也一定会变刚强”。只要天下至大的根本得以确立、天下通达的大道得以畅行，九经之类的规范可以一以贯之，没有任何遗漏，还需要担心缺乏经世致用的本事吗？那些顽固不化、孤守虚静的佛家、道家之徒，正是因为不能在事物上体察心中的天理，进而实现心中的良知，反而抛弃伦常，将寂灭虚无当作常态，因此无法齐家、治国、平天下。谁说圣人穷理尽性的学问会有这样的弊病呢？\n\n心是身体的主宰，而心的清澈明亮就是我所说的本然具有的良知。清澈明亮的良知因感应而发动就是意念。有良知而后有意念，没有良知就没有意念，良知难道不是意念的本体吗？意念发用必然有对象，这个对象就是事。比如意念发动于侍奉双亲，那么侍奉双亲便是一件事；意念发动于治理民众，那么治理民众便是一件事；意念发动于读书，那么读书便是一件事；意念发动于听取诉讼，那么听取诉讼便是一件事。但凡意念所发动之处，都有事物的存在。有这样的意念便有这样的事物，没有这样的意念便没有这样的事物，事物的存在难道不是意念的作用吗？\n\n“格”字的含义，有人用“至”字来解释，如“格于文祖”“有苗来格”，其中的“格”就是“至”的意思。然而“格于文祖”必定是内心纯乎孝顺诚敬，对于生死幽明之事都能够合乎天理，才可以称之为“格”；苗人顽固，只有推行礼乐教化之后才算是“格”。所以“格”字也有“正”的含义，不能仅仅用一个“至”字来解释它所有的含义。如“格其非心”“大臣格君心之非”的“格”，都是“纠正其不正之处使其归于正当”的意思，这里就不能用“至”字来解释。《大学》中“格物”的意思，又如何能够断定是用“至”字而不是“正”字来解释呢？如用“至”字的含义，必须说到“穷至事物之理”，这样才解释得通。这样用功的关键全在一个“穷”字之上，用力之处也全在一个“理”字之上。如果即去掉“穷”字，又去掉“理”字，直接说“致知在至物”，这样说得通吗？所谓“穷理尽性”，是圣人既定的教诲，在《易经·说卦》中有记载。假如“格物”之说确实是“穷理”的含义，那圣人为什么不直接说“致知在穷理”，而是要转个弯，不把话说尽，导致后来的各种是非呢？\n\n《大学》中的“格物”之说，同《易经》“穷理”的主旨相同，但也有细微的差别。穷理囊括了格物、致知、诚意、正心的功夫。所以一说到穷理，格、致、诚、正的功夫也包含在里面；讨论格物，必然要提到致知、诚意、正心，这样功夫才能完备缜密。如今一谈到格物就说格物是穷理的功夫，这是只把穷理当作知，认为格物不包括行。这不但没有把握格物的宗旨，连穷理的本意也丧失了。后世的学者之所以把将知和行分开来看，功夫日益支离破碎，圣学日益残败晦涩，根本原因便在于此。你承袭旧说也在所难免，认为我的学说“不符合大道”，也并不过分。"],["中","一三九","致良知","来书云：“谓致知之功，将如何为温凊、如何为奉养，即是诚意，非别有所谓格物。此亦恐非。”\n\n此乃吾子自以己意揣度鄙见而为是说，非鄙人之所以告吾子者矣。若果如吾子之言，宁复有可通乎？盖鄙人之见，则谓：意欲温凊、意欲奉养者，所谓意也，而未可谓之诚意。必实行其温凊奉养之意，务求自慊而无自欺，然后谓之诚意。知如何而为温凊之节、知如何而为奉养之宜者，所谓知也，而未可谓之致知。必致其知如何为温凊之节者之知，而实以之温清，致其知如何为奉养之宜者之知，而实以之奉养，然后谓之致知。温凊之事，奉养之事，所谓物也，而未可谓之格物。必其于温凊之事也，一如其良知之所知当如何为温凊之节者而为之，无一毫之不尽，于奉养之事也，一如其良知之所知当如何为奉养之宜者而为之，无一毫之不尽，然后谓之格物。温凊之物格，然后知温凊之良知始致：奉养之物格，然后知奉养之良知始致。\n\n故曰：“物格而后知至。”致其知温凊之良知，而后温凊之意始诚；致其知奉养之良知，而后奉养之意始诚。故曰：“知至而后意诚。”此区区诚意、致知、格物之说盖如此。吾子更熟思之，将亦无可疑者矣。","来信写道：“致知的功夫就是如何使父母冬暖夏凉，如何将他们奉养得当，这便是诚意，此外没有所谓格物。这恐怕也不对。”\n\n这是你用自己的意思揣度我的观点才如此说的，并不是我所告诉你的原话。若诚如你所言，还能讲得通吗？我的意思是：想使得父母冬暖夏凉、将他们奉养得当，便是意念，还不能说是诚意。必然切实去践行使得父母冬暖夏凉、将他们奉养得当的意念，务求自己内心无所亏欠、自欺，这样才能称之为诚意。懂得如何使得父母冬暖夏凉、将他们奉养得当，可以称为知，但不能称为致知。必须将如何使父母冬暖夏凉、将他们奉养得当的知识推行于父母，使得父母切实地受到奉养，才可以称之为致知。冬暖夏凉、奉养父母之事，便是所谓物，但也不能称之为格物。必须在使父母冬暖夏凉、奉养父母的事上按照自己良知所知的去做，而没有丝毫不尽之处，才能称之为格物。冬暖夏凉这一物“格”了，使父母冬暖夏凉的良知才算“致”了；奉养父母这一物“格”了，使父母得以奉养的良知才算“致”了。\n\n所以《大学》里说：“物格而后知至。”实现使得父母冬暖夏凉的良知，而后使得父母冬暖夏凉的意念才算是诚；实现使得父母得以奉养的良知，而后使得父母得以奉养的意念才算是诚。所以《大学》里说：“知至而后意诚。”我诚意、致知、格物的观点大致如此。希望你再多加思考，就不会有什么疑问了。"],["中","一四〇","知行合一","来书云：“道之大端易于明白，所谓‘良知良能，愚夫愚妇可与及者\n’\n。至于节目时变之详，毫厘千里之缪，必待学而后知。今语孝于温凊定省，孰不知之？至于舜之不告而娶\n，武之不葬而兴师\n，养志、养口\n，小杖、大杖\n，割股\n、庐墓\n等事，处常处变，过与不及之间，必须讨论是非，以为制事之本，然后心体无蔽，临事无失。”\n\n“道之大端易于明白”，此语诚然。顾后之学者忽其易于明白者而弗由，而求其难于明白者以为学，此其所以“道在迩而求诸远，事在易而求诸难”也。孟子云：“夫道若大路然，岂难知哉？人病不由耳。”良知良能，愚夫愚妇与圣人同，但惟圣人能致其良知，而愚夫愚妇不能致，此圣愚之所由分也。\n\n节目时变，圣人夫岂不知，但不专以此为学。而其所谓学者，正惟致其良知，以精察此心之天理，而与后世之学不同耳。吾子未暇良知之致，而汲汲焉顾是之忧，此正求其难于明白者以为学之弊也。夫良知之于节目时变，犹规矩尺度之于方圆长短也。节目时变之不可预定，犹方圆长短之不可胜穷也。故规矩诚立，则不可欺以方圆，而天下之方圆不可胜用矣；尺度诚陈，则不可欺以长短，而天下之长短不可胜用矣。良知诚致，则不可欺以节目时变，而天下之节目时变不可胜应矣。毫厘千里之谬，不于吾心良知一念之微而察之，亦将何所用其学乎？是不以规矩而欲定天下之方圆，不以尺度而欲尽天下之长短。吾见其乖张谬戾，日劳而无成也已。\n\n吾子谓“语孝于温凊定省，孰不知之”，然而能致其知者鲜矣。若谓粗知温凊定省之仪节，而遂谓之能致其知，则凡知君之当仁者，皆可谓之能致其仁之知；知臣之当忠者，皆可谓之能致其忠之知，则天下孰非致知者邪？以是而言可以知“致知”之必在于行，而不行之不可以为“致知”也，明矣。知行合一之体，不益较然矣乎？\n\n夫舜之不告而娶，岂舜之前已有不告而娶者为之准则，故舜得以考之何典、间\n诸何人，而为此邪？抑亦求诸其心一念之良知，权轻重之宜，不得已而为此邪？武之不葬而兴师，岂武之前已有不葬而兴师者为之准则，故武得以考之何典、问诸何人，而为此邪？抑亦求诸其心一念之良知，权轻重之宜，不得已而为此邪？使舜之心而非诚于为无后，武之心而非诚于为救民，则其不告而娶与不葬而兴师，乃不孝、不忠之大者。而后之人不务致其良知，以精察义理于此心感应酬酢之间，顾欲悬空讨论此等变常之事，执之以为制事之本，以求临事之无失，其亦远矣。其余数端皆可类推，则古人致知之学从可知矣。","来信写道：“圣人之道大的方面容易明白，所谓‘良知和良能，即便愚夫愚妇也能明白’。至于具体的细节，以及随时代更替而变化的详情，则差之毫厘、谬以千里，必须通过学习才能明白。如今有关孝子要使父母冬暖夏凉、早晚请安等礼数，谁不明白？至于舜不告诉父亲就娶亲，武王没有安葬文王就伐纣，曾子赡养父亲是遵从父亲的意志、曾元赡养父亲只是让父亲活命，父亲用小杖打时应当承受、用大杖打时则应逃走，割股疗亲、结庐守孝等事情，在时变之中，过分与不足之间，必须讨论个是非曲直，作为处理世事的准则，然后心体才能不受蒙蔽，遇事才能没有过失。”\n\n“圣人之道大的方面容易明白”，这话没错。然而看看后来的学者，忽略简易明白的大道不去遵循，却去探求那些难以明白的东西作为学问，这是孟子所说的“道在近处却去远处求，事情简单却要做复杂”。孟子说：“圣人之道如同大路，难道很难理解吗？人们的弊病在于不去探求圣人之道罢了。”圣人与愚夫愚妇在良知良能上是相同的，只是圣人能够实现自己的良知，愚夫愚妇却不能，这才是圣人与愚人的分别之处。\n\n具体细节与时代之变化，圣人怎么会不知道，只是不专门以此作为学问。圣人所谓的学问，只是推行自己的良知以精确地体察心中的天理，这与后世所说的学问又有所不同。你还没能实现自己的良知，却在细节问题上操心，这正是把探求难以明白的东西作为学问的弊端。良知与细节和时变问题之间的关系，就像圆规矩尺、尺寸尺码与方圆、长短之间的关系一样。随时而变的细节无法预先确定，好比方圆长短的种类无法穷尽一样。故而有了圆规矩尺，是方是圆也就确立了，不过天下的方圆仍无法穷尽；有了尺寸尺码，是长是短也就确立了，不过天下的长短也仍无法穷尽。良知得以推广，细节和时变也得以确立，不过天下间所有的细节时变并不能一一应对。失之毫厘、谬以千里，不在自己心中良知念头的细微处考察，又想将学问用到什么地方呢？这是不用圆规矩尺却想定立天下的方圆，不确立尺寸尺码却想穷尽天下的长短。我认为这种做法十分荒诞，只会终日碌碌却毫无所成。\n\n你说“有关孝子要使父母冬暖夏凉、早晚请安的礼数，谁不知道”，不过真的能实行其所知的孝道的人却很少。如果说粗略明白如何使父母冬暖夏凉、早晚请安等礼数就算是能推行孝的良知了，那么凡是知道君主应当仁爱的人，都可以认为他实现仁的良知；知道臣子应当忠诚的人，都可以认为他能够推行忠的良知，那样天下还有良知没有实现的人吗？如此来看，便能够知道“致知”一定要实践，不实践不足以称之为“致知”，这是很明显的。知行合一是知行关系的本然状态，不也十分明白吗？\n\n至于舜不告诉父亲就娶妻，难道是在舜之前便有不告而娶的准则，故而舜可以在书中求证、询问于人，才这样做的吗？还是根据心中一念的良知，权宜轻重，不得已才如此做呢？周武王不安葬文王就兴兵伐纣，难道在武王之前已经有不葬而兴师的准则，故而武王可以在书中求证、询问于人，才这样做的吗？还是根据心中一念的良知，权宜轻重，不得已才如此做呢？假如舜心中不是真的怕自己无后，武王心中不是真的想救民于水火，那么他们不告而娶、不葬而兴师的行为就是最大的不孝、不忠。而后世之人不务求推行自己的良知，在内心感应事变的过程中体会义理，却想要凭空去讨论这些权变还是经常的问题，把它作为待人处事的一般原则，以求得遇事时能够没有过失，这距离圣人之道相差太远了。其余几件事都可以根据上述一一推得，古人致良知的学问也可想而知了。"],["中","一四一","心即理","来书云：“谓《大学》‘格物’之说，专求本心，犹可牵合。至于《六经》《四书》所载‘多闻多见’‘前言往行’‘好古敏求’‘博学审问’‘温故知新’‘博学详说’‘好问好察’\n，是皆明白求于事为之际，资于论说之间者，用功节目固不容紊矣。”\n\n格物之义，前已详悉，牵合之疑，想已不俟复解矣。至于“多闻多见”，乃孔子因子张之务外好高，徒欲以多闻多见为学，而不能求诸其心，以阙疑殆，此其言行所以不免于尤悔，而所谓见闻者，适以资其务外好高而已。盖所以救子张多闻多见之病，而非以是教之为学也。夫子尝曰：“盖有不知而作之者，我无是也。”\n是犹孟子“是非之心，人皆有之”之义也。此言正所以明德性之良知非由于闻见耳。若曰“多闻，择其善者而从之，多见而识\n之”，则是专求诸见闻之末，而已落在第二义矣，故曰“知之次也”。夫以见闻之知为次，则所谓知之上者果安所指乎？是可以窥圣门致知用力之地矣。夫子谓子贡曰：“赐也，汝以予为多学而识之者欤？非也，予一以贯之。”使诚在于多学而识，则夫子胡乃谬为是说以欺子贡者邪？一以贯之，非致其良知而何？《易》曰：“君子多识前言往行，以畜其德。”夫以畜其德为心，则凡多识前言往行者，孰非畜德之事？此正知行合一之功矣。\n\n“好古敏求”者，好古人之学而敏求此心之理耳。心即理也；学者，学此心也；求者，求此心也。孟子云：“学问之道无他，求其放心而已矣。”非若后世广记博诵古人之言词，以为好古，而汲汲然惟以求功名利达之具于外者也。“博学审问”，前言已尽。“温故知新”，朱子亦以温故属之尊德性矣。德性岂可以外求哉？惟夫知新必由于温故，而温故乃所以知新，则亦可以验知行之非两节矣。“博学而详说之”者，将“以反说约”也。若无反约之云，则“博学详说”者果何事邪？舜之“好问好察”，惟以用中而致其“精一”于道心耳。道心者，良知之谓也。君子之学，何尝离去事为而废论说？但其从事于事为论说者，要皆知行合一之功，正所以致其本心之良知，而非若世之徒事口耳谈说以为知者，分知行为两事，而果有节目先后之可言也。","来信写道：“您认为《大学》‘格物’之说的意思是专注于探求本心，还勉强说得过去。至于《六经》《四书》所记载的‘多闻多见’‘前言往行’‘好古敏求’‘博学审问’‘温故知新’‘博学详说’‘好问好察’，都是明明白白在处事作为之中、论辩谈说之间探求事物的道理，由此可见下功夫的次序不能紊乱。”\n\n格物的意思前文已经详细说过了，至于你觉得有所牵强疑惑的地方，想来也不用我多做解释。至于“多闻多见”，则是孔子针对子张的毛病而说的，子张好高骛远，专门向外探求，以多闻多见为学问，却不能反求诸心，因此他的言行难免有过错和悔恨，所谓的见闻恰恰助长了他好高骛远的毛病。所以孔子的话是纠正子张的毛病，并非教导子张把多闻多见当作学问。孔子曾说过：“有一类人不知道什么却凭空乱说，我不是这类人。”这就是孟子所谓“是非之心人皆有之”的意思。这句话正是要彰明德性的良知并非由见闻得来。至于孔子说“多闻，择其善者而从之，多见而识之”，则是专门探求见闻的细枝末节，已然是第二等的事了，所以说“知之次也”。以见闻之知为次要的知，那么首要的知是什么呢？在此可以看到圣人致知用力之处。孔子对子贡说：“赐啊，你认为我是学得多、知识广博的人吗？不是的，我的学说是以忠恕之道一以贯之的。”如果良知真的在于多闻多见，那么孔子为何要以这样的谬论欺骗子贡呢？一以贯之之道，不是致良知还能是什么呢？《易经》中说：“君子应该多反思自己以前的言语和行为，以此来存养自己的德性。”如果用意在于存养德性，那么更多地了解前人之言、过往之行，不也是存养德性吗？这正是知行合一的功夫。\n\n所谓“好古敏求”，是爱好古人的学问，勤奋地探索心中之理。心就是天理，学就是学习此心，求就是求索此心。孟子说：“做学问的道理十分简单，只是要将放纵的心收拾起来而已。”不像后世的学者广泛记诵古人的言辞，认为这就是好古，却又念念不忘追名逐利，追逐那些外在的东西。“博学审问”，前面已经谈过了。关于“温故知新”，朱熹也认为温故属于尊德性。德性难道可以向外去探求吗？知新必然经由温故，温故了才能知新，这也证明了知行功夫并非两个。“博学而详说之”是为了“返回到简约中去”。如果没有“反约”的说法，那么“博学详说”究竟是为了什么呢？舜“好问好察”，就是以中和的方法使其心体达到“精研专一”于向往大道的心。所谓道心就是良知。君子的学问何时离开了处事作为、抛弃了论辩谈说呢？但是君子从事于处事和论说，都要遵循知行合一的功夫，这正是为了实现自己本心之良知，而并非像世人只会夸夸其谈就认为这便是知，将知和行分作两件事，然后说什么下功夫有先后次序。"],["中","一四二","致良知","来书云：“杨、墨之为仁义\n，乡愿之乱忠信\n，尧、舜、子之之禅让\n，汤、武、楚项之放伐\n，周公、莽、操之摄辅\n，谩无印证，又焉适从？且于古今事变，礼乐名物未尝考识，使国家欲兴明堂，建辟雍，制历律，草封禅\n，又将何所致其用乎？故《论语》曰‘生而知之’者，义理耳。若夫礼乐名物、古今事变，亦必待学而后有以验其行事之实。此则可谓定论矣。”\n\n所喻杨、墨、乡愿、尧、舜、子之、汤、武、楚项、周公、莽、操之辨，与前舜、武之论，大略可以类推。古今事变之疑，前于良知之说，已有规矩尺度之喻，当亦无俟多赘矣。\n\n至于明堂、辟雍诸事，似尚未容于无言者。然其说甚长，姑就吾子之言而取正焉，则吾子之惑将亦可少释矣。\n\n夫明堂、辟雍之制，始见于《吕氏》之《月令》，汉濡之训疏\n。《六经》《四书》之中，未尝详及也。岂吕氏、汉儒之知，乃贤于三代之贤圣乎？齐宣之时，明堂尚有未毁\n，则幽、厉\n之世，周之明堂皆无恙也。尧、舜茅茨土阶，明堂之制未必备，而不害其为治；幽、厉之明堂，固犹文、武、成、康\n之旧，而无救于其乱。何邪？岂能“以不忍人之心，而行不忍人之政”\n，则虽茅茨土阶，固亦明堂也；以幽、厉之心，而行幽、厉之政，则虽明堂，亦暴政所自出之地邪？武帝肇讲于汉，而武后盛作于唐\n，其治乱何如邪？\n\n天子之学曰辟雍，诸侯之学曰泮宫\n，皆象地形而为之名耳。然三代之学，其要皆所以明人伦，非以辟不辟、泮不泮为重轻也。孔子云：“人而不仁，如礼何？人而不仁，如乐何？”\n制礼作乐，必具中和之德，声为律而身为度\n者，然后可以语此。若夫器数之末，乐工之事，祝史之守。故曾子曰：“君子所贵乎道者三……笾豆之事，则有司存也。”\n尧“命羲、和，钦若昊天，历象日月星辰”，其重在于“敬授人时”也。舜“在璇玑玉衡”，其重在于“以齐七政”\n也。是皆汲汲然以仁民之心而行其养民之政。治历明时之本，固在于此也。\n\n羲和历数之学，皋、契未必能之也，禹、稷未必能之也，“尧舜之知而不偏物”，虽尧舜亦未必能之也。然至于今，循羲和之法而世修之，虽曲知小慧之人、星术浅陋之士，亦能推步占侯\n而无所忒。则是后世曲知小慧之人，反贤于禹、稷、尧、舜者邪？\n\n封禅之说尤为不经，是乃后世佞人谀士所以求媚于其上，倡为夸侈以荡君心而靡国费。盖欺天罔人，无耻之大者，君子之所不道，司马相如\n之所以见讥于天下后世也。吾子乃以是为儒者所宜学，殆亦未之思邪？\n\n夫圣人之所以为圣者，以其生而知之也。而释《论语》者曰：“‘生而知之’者，义理耳。若夫礼乐名物、古今事变，亦必待学而后有以验其行事之实。”夫礼乐名物之类，果有关于作圣之功也，而圣人亦必待学而后能知焉，则是圣人亦不可以谓之“生知”矣。谓圣人为“生知”者，专指义理而言，而不以礼乐名物之类，则是礼乐名物之类无关于作圣之功矣。圣人之所以谓之“生知”者，专指义理而不以礼乐名物之类，则是“学而知之”者，亦惟当学知此义理而已；“困而知之”者，亦惟当困知此义理而已。今学者之学圣人，于圣人之所能知者，未能“学而知之”，而顾汲汲焉求知圣人之所不能知者以为学，无乃失其所以希圣之方欤？凡此皆就吾子之所惑者而稍为之分释，未及乎拔本塞源\n之论也。\n\n夫拔本塞源之论不明于天下\n，则天下之学圣人者，将日繁日难，斯人伦于禽兽、夷狄，而犹自以为圣人之学。吾之说虽或暂明于一时，终将冻解于西而冰坚于东，雾释于前而云滃于后，呶呶焉危困以死，而卒无救于天下之分毫也已。\n\n夫圣人之心，以天地万物为一体，其视天下之人，无外内远近，凡有血气，皆其昆弟赤子之亲，莫不欲安全而教养之，以遂其万物一体之念。天下之人心，其始亦非有异于圣人也，特其间于有我之私，隔于物欲之蔽，大者以小，通者以塞，人各有心，至有视其父、子、兄、弟如仇雠者。圣人有忧之，是以推其天地万物一体之仁以教天下，使之皆有以克其私、去其蔽，以复其心体之同然。其教之大端，则尧、舜、禹之相授受，所谓“道心惟微，惟精惟一，允执厥中”\n；而其节目，则舜之命契，所谓“父子有亲，君臣有义，夫妇有别，长幼有序，朋友有信”\n五者而已。唐、虞、三代之世，教者惟以此为教，而学者惟以此为学。当是之时，人无异见，家无异习，安此者谓之圣，勉此者谓之贤，而背此者虽其启明如朱\n，亦谓之不肖。下至闾井田野，农、工、商、贾之贱，莫不皆有是学，而惟以成其德行为务。何者？无有闻见之杂、记诵之烦、辞章之靡滥、功利之驰逐，而但使孝其亲、弟其长、信其朋友，以复其心体之同然。是盖性分之所固有，而非有假于外者，则人亦孰不能之乎？\n\n学校之中，惟以成德为事。而才能之异，或有长于礼乐、长于政教、长于水土播植者，则就其成德，而因使益精其能于学校之中。迨夫举德而任，则使之终身居其职而不易。用之者惟知同心一德，以共安天下之民，视才之称否，而不以崇卑为轻重，劳逸为美恶。效用者亦惟知同心一德，以共安天下之民，苟当其能，则终身扈于烦剧而不以为劳，安于卑琐而不以为贱。当是之时，天下之人熙熙皞皞，皆相视如一家之亲。其才质之下者，则安其农、工、商、贾之分，各勤其业，以相生相养，而无有乎希高慕外之心。其才能之异，若皋、夔、稷、契者\n，则出而各效其能。若一家之务，或营其衣食，或通其有无，或佣其器用，集谋并力，以求遂其仰事俯育之愿，惟恐当其事者之或怠而重己之累也。故稷勤其稼而不耻其不知教，视契之善教即己之善教也；夔司其乐而不耻于不明礼，视夷之通礼即己之通礼也。盖其心学纯明，而有以全其万物一体之仁。故其精神流贯，志气通达，而无有乎人己之分、物我之间。譬之一人之身，目视、耳听、手持、足行，以济一身之用，目不耻其无聪，而耳之所涉，目必营焉；足不耻其无执，而手之所探，足必前焉。盖其元气充同，血脉条畅，是以痒疴呼吸，感触神应，有不言而喻之妙。此圣人之学所以至易至简，易知易从，学易能而才易成者，正以大端惟在复心体之同然，而知识技能非所与论也。\n\n三代之衰，王道熄而霸术焻；孔孟既没，圣学晦而邪说横。教者不复以此为教，而学者不复以此为学。霸者之徒，窃取先王之近似者，假之于外以内济其私己之欲，天下靡然而宗之，圣人之道遂以芜塞。相仿相效，日求所以富强之说，倾诈之谋，攻伐之计，一切欺天罔人，苟一时之得，以猎取声利之术，若管、商、苏、张\n之属者，至不可名数。既其久也，斗争劫夺，不胜其祸，斯人沦于禽兽、夷狄，而霸术亦有所不能行矣。\n\n世之儒者慨然悲伤，搜猎先圣王之典章法制，而掇拾修补于煨烬之余。盖其为心，良亦欲以挽回先王之道。圣学既远，霸术之传积渍已深，虽在贤知，皆不免于习染。其所以讲明修饰，以求宣畅光复于世者，仅足以增霸者之藩篱，而圣学之门墙，遂不复可睹。于是乎有训诂之学，而传之以为名；有记诵之学，而言之以为博；有词章之学，而侈之以为丽。若是者纷纷籍籍，群起角立于天下，又不知其几家。万径千蹊，莫知所适。世之学者如入百戏之场，欢谑跳踉、骋奇斗巧、献笑争妍者，四面而竞出，前瞻后盼，应接不遑，而耳目眩瞀，精神恍惑，日夜遨游淹息其间，如病狂丧心之人，莫自知其家业之所归。时君世主亦皆昏迷颠倒于其说，而终身从事于无用之虚文，莫自知其所谓。间有觉其空疏谬妄、支离牵滞，而卓然自奋，欲以见诸行事之实者，极其所抵，亦不过为富强功利、五霸之事业而止。\n\n圣人之学日远日晦，而功利之习愈趋愈下。其间虽尝瞽惑于佛老，而佛老之说卒亦未能有以胜其功利之心；虽又尝折衷于群儒，而群儒之论终亦未能有以破其功利之见。盖至于今，功利之毒沦浃于人之心髓，而习以成性也几千年矣。相矜以知，相轧以势，相争以利，相高以技能，相取以声誉。其出而仕也，理钱谷者则欲兼夫兵刑，典礼乐者又欲与于铨轴，处郡县则思藩臬之高，居台谏则望宰执之要\n。故不能其事则不得以兼其官，不通其说则不可以要其誉：记诵之广，适以长其教\n也；知识之多，适以行其恶也；闻见之博，适以肆其辨也；辞章之富，适以饰其伪也。是以皋、夔、稷、契所不能兼之事，而今之初学小生皆欲通其说、究其术。其称名借号，未尝不曰“吾欲以共成天下之务”，而其诚心实意之所在，以为不如是则无以济其私而满其欲也。\n\n呜呼！以若是之积染，以若是之心志，而又讲之以若是之学术，宜其闻吾圣人之教，而视之以为赘疣枘凿。则其以良知为未足，而谓圣人之学为无所用，亦其势有所必至矣！呜呼！士生斯世，而尚何以求圣人之学乎！尚何以论圣人之学乎！士生斯世，而欲以为学者，不亦劳苦而繁难乎！不亦拘滞而险艰乎！呜呼，可悲也已！\n\n所幸天理之在人心，终有所不可泯，而良知之明，万古一日。则其闻吾拔本塞源之论，必有恻然而悲，戚然而痛，愤然而起，沛然若决江河，而有所不可御者矣。非夫豪杰之士，无所待而兴起者，吾谁与望乎？","来信写道：“杨朱、墨翟看似仁义，乡愿看似忠信，尧、舜、子之的禅让，商汤、周武王、项羽的放逐杀伐，周公、王莽、曹操的辅佐摄政，这些事迹散见于史书却无从考证，该听谁的呢？况且对于从古至今的事变、礼乐名物度数都没有考察认识，如果国家要设立明堂、建立学校、制定历法乐律、进行封禅仪式，又怎能发挥作用呢？所以《论语》说的‘生而知之’，就是理和义。其他比如礼乐名物、古今事变等事，必须学习后才能知道是否可行。这已经可以认为是定论了。”\n\n你所说的杨朱、墨翟、乡原、尧、舜、子之、商汤、周武王、项羽、周公、王莽、曹操等人的分别，与前面提到的舜和武王的事迹类似，大体上可以类推。对于古今事变的疑问，前面讨论良知之说时用了规矩与尺度的比喻，也不必再多说什么了。立明堂、建学校等事，似乎还有讨论的余地。不过真的说起恐怕很冗长，姑且就你信中所及讨论一二，多少可以解答你的疑惑。\n\n明堂和学校的制度，最早见于《吕氏春秋》中的《月令》篇和汉儒的注疏之中。《六经》《四书》中并未提及。难道《吕氏春秋》的作者和汉儒要比三代的圣贤还贤明吗？齐宣王的时候，明堂尚未被毁，即便在周幽王、周厉王的时代，周代的明堂也完好无损。尧舜的时代，人们住着茅草屋，垒土做成台阶，明堂的制度尚未完备，但这并不妨碍天下的治理；周幽王、周厉王时期的明堂，同文王、武王、成王、康王时的一样，但对于时代的祸乱也毫无补救。为何会如此呢？这难道不是说“以仁爱之心推行仁爱之政”，即便茅草屋、土台阶也可以起到明堂的作用；以暴君之心推行暴君之政，虽然设有明堂，也不过是暴君施暴政的地方吗？汉武帝曾与大臣讨论建立明堂，武则天毁了乾元殿修建明堂，他们的时代天下是治还是乱呢？\n\n天子的学校称为辟雍，诸侯的学校称为泮宫，都是根据地形来命名
